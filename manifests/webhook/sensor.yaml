apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: alertmanager-webhook
  namespace: kagent-poc
  labels:
    app.kubernetes.io/name: kagent-event-flow-poc
    app.kubernetes.io/component: webhook-sensor
spec:
  template:
    serviceAccountName: kagent-poc-sensor
    nodeSelector:
      kubernetes.io/hostname: k8s-worker1
  dependencies:
    - name: alertmanager
      eventSourceName: alertmanager-webhook
      eventName: alertmanager
  triggers:
    - template:
        name: alertmanager-webhook-consumer
        k8s:
          operation: create
          source:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                generateName: webhook-alert-consumer-
                namespace: kagent-poc
                labels:
                  app.kubernetes.io/name: kagent-event-flow-poc
                  app.kubernetes.io/component: alert-consumer
                  path: webhook
              spec:
                restartPolicy: Never
                containers:
                  - name: consumer
                    image: python:3.12-alpine
                    imagePullPolicy: IfNotPresent
                    command:
                      - python
                      - -c
                    args:
                      - |
                        import datetime
                        import json
                        import os

                        payload = os.environ.get("ALERT_PAYLOAD", "{}")
                        pod_name = os.environ.get("ALERT_POD_NAME", "unknown-pod")
                        parsed = json.loads(payload)
                        result = {
                            "alert_count": len(parsed.get("alerts", [])),
                            "alert_json": parsed,
                            "consumed_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
                            "path": "webhook",
                            "payload_keys": sorted(parsed.keys()),
                            "pod_name": pod_name,
                        }
                        print(json.dumps(result, sort_keys=True))
                    env:
                      - name: ALERT_POD_NAME
                        value: unknown-pod
                      - name: ALERT_PAYLOAD
                        value: "{}"
          parameters:
            - src:
                dependencyName: alertmanager
                dataKey: body.alerts.0.labels.pod
                value: unknown-pod
              dest: spec.containers.0.env.0.value
            - src:
                dependencyName: alertmanager
                dataTemplate: "{{ .Input.body | toJson }}"
                value: "{}"
              dest: spec.containers.0.env.1.value
