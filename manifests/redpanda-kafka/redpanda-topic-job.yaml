apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-create-alertmanager-topic
  namespace: kagent-poc
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/component: topic-bootstrap
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
        app.kubernetes.io/component: topic-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topic
          image: docker.redpanda.com/redpandadata/redpanda:v26.1.6
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ceu
            - |
              for attempt in {1..30}; do
                if rpk cluster info --brokers redpanda.kagent-poc.svc.cluster.local:9092; then
                  break
                fi
                sleep 2
              done
              rpk topic create alertmanager-events \
                --brokers redpanda.kagent-poc.svc.cluster.local:9092 \
                --partitions 1 \
                --replicas 1 || true
              rpk topic describe alertmanager-events \
                --brokers redpanda.kagent-poc.svc.cluster.local:9092
