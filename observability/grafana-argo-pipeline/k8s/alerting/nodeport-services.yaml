# NodePort services expose Argo EventSource and Redpanda Connect bridge
# to the host network so Grafana (running outside the cluster) can reach them.
# Port numbers must match the extraPortMappings published when the kind cluster
# was created (see cluster-config.yaml in the infra directory).
apiVersion: v1
kind: Service
metadata:
  name: grafana-alert-webhook-nodeport
  namespace: argo
  labels:
    app.kubernetes.io/name: grafana-alert-router
    alerting.symphony.dev/path: direct
spec:
  type: NodePort
  selector:
    eventsource-name: grafana-alert-webhook
  ports:
    - name: grafana-direct
      port: 12000
      targetPort: 12000
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-redpanda-webhook-nodeport
  namespace: argo
  labels:
    app.kubernetes.io/name: grafana-alert-router
    alerting.symphony.dev/path: redpanda
spec:
  type: NodePort
  selector:
    app: grafana-redpanda-webhook
  ports:
    - name: http
      port: 8080
      targetPort: 4195
      nodePort: 30001
