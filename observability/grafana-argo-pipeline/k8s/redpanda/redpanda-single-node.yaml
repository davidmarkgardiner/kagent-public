apiVersion: v1
kind: Namespace
metadata:
  name: redpanda
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: redpanda
  labels:
    app.kubernetes.io/name: redpanda
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/rpk
          args:
            - redpanda
            - start
            - --smp
            - "1"
            - --memory
            - 512M
            - --reserve-memory
            - 0M
            - --overprovisioned
            - --node-id
            - "0"
            - --check=false
            - --kafka-addr
            - 0.0.0.0:9092
            - --advertise-kafka-addr
            - redpanda.redpanda.svc.cluster.local:9092
            - --pandaproxy-addr
            - 0.0.0.0:8082
            - --advertise-pandaproxy-addr
            - redpanda.redpanda.svc.cluster.local:8082
            - --rpc-addr
            - 0.0.0.0:33145
            - --advertise-rpc-addr
            - redpanda-0.redpanda.redpanda.svc.cluster.local:33145
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
            - name: pandaproxy
              containerPort: 8082
            - name: rpc
              containerPort: 33145
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: redpanda
  labels:
    app.kubernetes.io/name: redpanda
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: admin
      port: 9644
      targetPort: admin
    - name: pandaproxy
      port: 8082
      targetPort: pandaproxy
    - name: rpc
      port: 33145
      targetPort: rpc
