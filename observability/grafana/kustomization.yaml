apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: k8s-pod-crash-evidence
    app.kubernetes.io/part-of: kagent-observability
    app.kubernetes.io/component: dashboard
configMapGenerator:
  - name: k8s-pod-crash-evidence-dashboard
    files:
      - k8s-pod-crash-evidence.json=dashboards/k8s-pod-crash-evidence.json
