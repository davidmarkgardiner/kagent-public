apiVersion: 1

datasources:
  - name: K-Agent Mimir
    uid: kagent-mimir
    type: prometheus
    access: proxy
    url: ${PROMETHEUS_URL}
    isDefault: false
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 30s
      # For multi-tenant Mimir/Grafana Cloud, uncomment and set the matching
      # secureJsonData value through Grafana environment substitution.
      # httpHeaderName1: X-Scope-OrgID
    # secureJsonData:
    #   httpHeaderValue1: ${PROMETHEUS_TENANT_ID}

  - name: K-Agent Loki
    uid: kagent-loki
    type: loki
    access: proxy
    url: ${LOKI_URL}
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      # For multi-tenant Loki/Grafana Cloud, uncomment and set the matching
      # secureJsonData value through Grafana environment substitution.
      # httpHeaderName1: X-Scope-OrgID
    # secureJsonData:
    #   httpHeaderValue1: ${LOKI_TENANT_ID}
