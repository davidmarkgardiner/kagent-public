---
# Template only. Prefer creating these Secrets imperatively from
# confluent.io/.bootstrap.env as shown in README.md.
apiVersion: v1
kind: Secret
metadata:
  name: confluent-credentials
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: confluent-cloud-pipeline
type: Opaque
stringData:
  bootstrap: "{{CONFLUENT_BOOTSTRAP}}"
  rest-endpoint: "{{CONFLUENT_REST_ENDPOINT}}"
  k8s-topic: "k8s-events"
  alerts-topic: "alertmanager-events"
  key: "{{CONFLUENT_SA_KEY}}"
  secret: "{{CONFLUENT_SA_SECRET}}"
