---
# Grafana Alloy - {{WORKLOAD_KUBE_CONTEXT}} workload cluster -> Confluent Cloud Kafka
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
  labels:
    app: alloy
    app.kubernetes.io/part-of: confluent-cloud-pipeline
data:
  config.alloy: | # pragma: allowlist secret
    logging {
      level  = coalesce(env("LOG_LEVEL"), "info")
      format = "logfmt"
    }

    loki.source.kubernetes_events "cluster_events" {
      namespaces = []
      job_name   = "kubernetes-events"
      log_format = "json"

      forward_to = [loki.process.enrich.receiver]
    }

    loki.process "enrich" {
      stage.static_labels {
        values = {
          cluster      = coalesce(env("CLUSTER_NAME"), "{{WORKLOAD_KUBE_CONTEXT}}"),
          environment  = coalesce(env("CLUSTER_ENVIRONMENT"), "lab"),
          region       = coalesce(env("CLUSTER_REGION"), "home"),
          source       = "alloy",
          pipeline     = "confluent-cloud-pipeline",
          payload_type = "kubernetes-event-otlp",
        }
      }

      stage.json {
        expressions = {
          event_type     = "type",
          event_reason   = "reason",
          event_message  = "message",
          event_count    = "count",
          obj_kind       = "involvedObject.kind",
          obj_name       = "involvedObject.name",
          obj_namespace  = "involvedObject.namespace",
          obj_uid        = "involvedObject.uid",
          first_time     = "firstTimestamp",
          last_time      = "lastTimestamp",
          source_comp    = "source.component",
          source_host    = "source.host",
        }
      }

      stage.labels {
        values = {
          event_type    = "",
          event_reason  = "",
          obj_kind      = "",
          obj_namespace = "",
        }
      }

      stage.drop {
        source              = "event_count"
        expression          = "^[2-9]|^[1-9][0-9]+"
        drop_counter_reason = "duplicate_event"
      }

      stage.limit {
        rate  = 10
        burst = 25
        drop  = true
      }

      forward_to = [otelcol.receiver.loki.bridge.receiver]
    }

    otelcol.receiver.loki "bridge" {
      output {
        logs = [otelcol.processor.batch.events.input]
      }
    }

    otelcol.processor.batch "events" {
      timeout             = "10s"
      send_batch_size     = 50
      send_batch_max_size = 100

      output {
        logs = [otelcol.exporter.kafka.confluent.input]
      }
    }

    otelcol.exporter.kafka "confluent" {
      protocol_version = "2.5.0"
      brokers          = [env("CONFLUENT_BOOTSTRAP")]

      logs {
        topic    = env("CONFLUENT_TOPIC")
        encoding = "otlp_json"
      }

      authentication {
        sasl {
          mechanism = "PLAIN"
          username  = env("CONFLUENT_SA_KEY")
          password  = env("CONFLUENT_SA_SECRET")
        }
        tls {
          insecure = false
        }
      }

      sending_queue {
        enabled    = true
        queue_size = 1000
      }

      retry_on_failure {
        enabled          = true
        initial_interval = "500ms"
        max_interval     = "30s"
        max_elapsed_time = "5m"
      }
    }
