---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-env
  namespace: monitoring
  labels:
    app: alloy
    app.kubernetes.io/part-of: confluent-cloud-pipeline
data:
  CLUSTER_NAME: "{{WORKLOAD_KUBE_CONTEXT}}"
  CLUSTER_REGION: "home"
  CLUSTER_ENVIRONMENT: "lab"
  LOG_LEVEL: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: monitoring
  labels:
    app: alloy
    app.kubernetes.io/part-of: confluent-cloud-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
      annotations:
        checksum/config: "update-when-config-changes"
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.12.2
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - containerPort: 12345
              name: http
          envFrom:
            - configMapRef:
                name: alloy-env
          env:
            - name: CONFLUENT_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: alloy-confluent
                  key: bootstrap
            - name: CONFLUENT_TOPIC
              valueFrom:
                secretKeyRef:
                  name: alloy-confluent
                  key: topic
            - name: CONFLUENT_SA_KEY
              valueFrom:
                secretKeyRef:
                  name: alloy-confluent
                  key: key
            - name: CONFLUENT_SA_SECRET
              valueFrom:
                secretKeyRef:
                  name: alloy-confluent
                  key: secret
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: data
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 12345
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: monitoring
  labels:
    app: alloy
    app.kubernetes.io/part-of: confluent-cloud-pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-k8s-events
  labels:
    app.kubernetes.io/part-of: confluent-cloud-pipeline
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-k8s-events
  labels:
    app.kubernetes.io/part-of: confluent-cloud-pipeline
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: alloy-k8s-events
  apiGroup: rbac.authorization.k8s.io
