---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: confluent-k8s-triage-critical
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: confluent-cloud-pipeline
    triage-tier: critical
spec:
  template:
    serviceAccountName: argo-events-sa
    container:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
  dependencies:
    - name: k8s-event
      eventSourceName: confluent-kafka
      eventName: k8s-events
  triggers:
    - template:
        name: critical-triage
        conditions: "k8s-event"
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: triage-critical-
                namespace: argo-events
                labels:
                  app.kubernetes.io/part-of: confluent-cloud-pipeline
                  triage-tier: critical
              spec:
                workflowTemplateRef:
                  name: k8s-triage-critical
                arguments:
                  parameters:
                    - name: otlp-payload
          parameters:
            - src:
                dependencyName: k8s-event
                dataKey: body
              dest: spec.arguments.parameters.0.value
      rateLimit:
        requestsPerUnit: 5
        unit: Minute
      retryStrategy:
        steps: 3
        duration: 10s
