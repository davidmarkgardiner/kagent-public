---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: confluent-alertmanager-triage
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: confluent-cloud-pipeline
    event-type: prometheus-alert
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sa
    container:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
  dependencies:
    - name: alertmanager-alert
      eventSourceName: confluent-kafka
      eventName: alertmanager-events
      filters:
        data:
          - path: body.source
            type: string
            value:
              - "alertmanager"
          - path: body.alertmanager.status
            type: string
            value:
              - "firing"
  triggers:
    - template:
        name: alertmanager-triage
        conditions: "alertmanager-alert"
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: alert-triage-
                namespace: argo-events
                labels:
                  app.kubernetes.io/part-of: confluent-cloud-pipeline
                  event-type: prometheus-alert
              spec:
                workflowTemplateRef:
                  name: alertmanager-triage
                arguments:
                  parameters:
                    - name: alert-payload
          parameters:
            - src:
                dependencyName: alertmanager-alert
                dataKey: body.alertmanager
              dest: spec.arguments.parameters.0.value
      rateLimit:
        requestsPerUnit: 5
        unit: Minute
      retryStrategy:
        steps: 3
        duration: 10s
