---
# Sensor - Infra catch-all tier (monitoring, gradual rollout)
# Rate limit: 3/min — conservative to start, increase as confidence grows
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: k8s-triage-infra
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: k8s-event-triage
    triage-tier: infra
spec:
  template:
    serviceAccountName: argo-events-sa
    container:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
  dependencies:
    - name: k8s-event
      eventSourceName: eventhub-infra
      eventName: k8s-events
  triggers:
    - template:
        name: infra-triage
        conditions: "k8s-event"
        rateLimit:
          requestsPerUnit: 3
          unit: Minute
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: triage-infra-
                namespace: argo-events
                labels:
                  app.kubernetes.io/part-of: k8s-event-triage
                  triage-tier: infra
              spec:
                workflowTemplateRef:
                  name: k8s-triage-infra
                arguments:
                  parameters:
                    - name: otlp-payload
          parameters:
            - src:
                dependencyName: k8s-event
                dataKey: body
              dest: spec.arguments.parameters.0.value
      retryStrategy:
        steps: 3
        duration: 10s
