---
# Workflow Template - Infra Catch-All Tier
# Filters: Warning events from core infrastructure namespaces
# Backend: Mattermost notification only (to start — add KAgent analysis later)
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: k8s-triage-infra
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: k8s-event-triage
    triage-tier: infra
spec:
  serviceAccountName: argo-events-sa
  entrypoint: triage-pipeline
  ttlStrategy:
    secondsAfterCompletion: 120
    secondsAfterSuccess: 60
    secondsAfterFailure: 300
  podGC:
    strategy: OnPodCompletion
  arguments:
    parameters:
      - name: otlp-payload
  templates:
    - name: triage-pipeline
      steps:
        - - name: parse-otlp
            template: parse-otlp
            arguments:
              parameters:
                - name: otlp-payload
                  value: "{{workflow.parameters.otlp-payload}}"
        - - name: process-event
            template: notify
            withParam: "{{steps.parse-otlp.outputs.parameters.events}}"
            arguments:
              parameters:
                - name: cluster
                  value: "{{item.cluster}}"
                - name: environment
                  value: "{{item.environment}}"
                - name: event-type
                  value: "{{item.event_type}}"
                - name: event-reason
                  value: "{{item.event_reason}}"
                - name: event-message
                  value: "{{item.event_message}}"
                - name: object-kind
                  value: "{{item.object_kind}}"
                - name: object-name
                  value: "{{item.object_name}}"
                - name: object-namespace
                  value: "{{item.object_namespace}}"
                - name: event-time
                  value: "{{item.event_time}}"
                - name: event-count
                  value: "{{item.event_count}}"

    # -------------------------------------------------------------------------
    # Parse OTLP — Infra namespace filter
    # Only processes events from core infrastructure namespaces
    # -------------------------------------------------------------------------
    - name: parse-otlp
      inputs:
        parameters:
          - name: otlp-payload
      outputs:
        parameters:
          - name: events
            valueFrom:
              path: /tmp/events.json
          - name: event-count
            valueFrom:
              path: /tmp/event-count.txt
      script:
        image: badouralix/curl-jq:alpine
        command: [sh]
        source: |
          cat > /tmp/otlp_input.json << '__OTLP_EOF__'
          {{inputs.parameters.otlp-payload}}
          __OTLP_EOF__

          # Parse OTLP envelope, extract K8s events, filter to infra namespaces
          jq '
            def attrs: [.[]? | {(.key): (.value.stringValue // (.value.intValue // .value.boolValue // "" | tostring))}] | add // {};

            # Core infrastructure namespaces — add/remove as you expand coverage
            def is_infra: . as $ns | ["external-dns","cert-manager","ingress-nginx","kube-system","monitoring","argo-events","argo"] | any(. == $ns);

            [
              .resourceLogs[]? |
              (.resource.attributes // [] | attrs) as $res |
              .scopeLogs[]?.logRecords[]? |
              (.attributes // [] | attrs) as $a |
              (.body.stringValue // "" | if . != "" then (fromjson? // {}) else {} end) as $ev |

              ($a.event_type // $ev.type // "") as $type |
              ($a.obj_namespace // $ev.involvedObject.namespace // "") as $ns |

              select($type == "Warning" and ($ns | is_infra)) |

              ($a.event_reason // $ev.reason // "") as $reason |

              {
                cluster:          ($a.cluster // $res.cluster // "unknown"),
                environment:      ($a.environment // $res.environment // "unknown"),
                event_type:       $type,
                event_reason:     $reason,
                event_message:    ($ev.message // ""),
                object_kind:      ($a.obj_kind // $ev.involvedObject.kind // ""),
                object_name:      ($ev.involvedObject.name // ""),
                object_namespace: $ns,
                event_time:       ($ev.lastTimestamp // $ev.firstTimestamp // ""),
                event_count:      ($ev.count // 1 | tostring)
              }
            ]
          ' /tmp/otlp_input.json > /tmp/events.json

          COUNT=$(jq length /tmp/events.json)
          echo "$COUNT" > /tmp/event-count.txt
          echo "[INFRA] $COUNT infra warning(s) from OTLP payload"
          jq -r '.[] | "  - \(.event_reason): \(.object_kind)/\(.object_name) in \(.object_namespace)"' /tmp/events.json
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

    # -------------------------------------------------------------------------
    # Mattermost notification only (to start)
    # Add KAgent analysis later once pattern is proven
    # -------------------------------------------------------------------------
    - name: notify
      inputs:
        parameters:
          - name: cluster
          - name: environment
          - name: event-type
          - name: event-reason
          - name: event-message
          - name: object-kind
          - name: object-name
          - name: object-namespace
          - name: event-time
          - name: event-count
      script:
        image: badouralix/curl-jq:alpine
        command: [sh]
        env:
          - name: WEBHOOK_URL
            valueFrom:
              configMapKeyRef:
                name: mattermost-webhook-config
                key: WEBHOOK_URL
        source: |
          REASON="{{inputs.parameters.event-reason}}"

          # Severity for color coding
          case "$REASON" in
            OOMKilled|CrashLoopBackOff|FailedScheduling|NodeNotReady)
              EMOJI=":red_circle:" ; COLOR="#e74c3c" ;;
            BackOff|Failed|Unhealthy|FailedMount|FailedAttachVolume)
              EMOJI=":large_orange_circle:" ; COLOR="#e67e22" ;;
            Killing|Evicted|FailedCreate)
              EMOJI=":warning:" ; COLOR="#f1c40f" ;;
            *)
              EMOJI=":gear:" ; COLOR="#95a5a6" ;;
          esac

          cat > /tmp/event_message.txt << '__MSG_EOF__'
          {{inputs.parameters.event-message}}
          __MSG_EOF__

          EVENT_MSG=$(cat /tmp/event_message.txt | head -c 500)

          jq -n \
            --arg emoji "$EMOJI" \
            --arg color "$COLOR" \
            --arg cluster "{{inputs.parameters.cluster}}" \
            --arg environment "{{inputs.parameters.environment}}" \
            --arg event_reason "{{inputs.parameters.event-reason}}" \
            --arg object_kind "{{inputs.parameters.object-kind}}" \
            --arg object_name "{{inputs.parameters.object-name}}" \
            --arg object_namespace "{{inputs.parameters.object-namespace}}" \
            --arg event_count "{{inputs.parameters.event-count}}" \
            --arg event_time "{{inputs.parameters.event-time}}" \
            --arg event_message "$EVENT_MSG" \
            '{
              username: "K8s Infra Monitor",
              icon_emoji: ":gear:",
              text: ($emoji + " **[Infra] " + $event_reason + "** in " + $object_namespace + " on " + $cluster),
              attachments: [
                {
                  fallback: ($event_reason + " in " + $object_namespace),
                  color: $color,
                  title: ($object_kind + "/" + $object_name),
                  text: ("| Field | Value |\n|-------|-------|\n| **Namespace** | `" + $object_namespace + "` |\n| **Reason** | " + $event_reason + " |\n| **Count** | " + $event_count + " |\n| **Time** | " + $event_time + " |")
                },
                {
                  fallback: "Message",
                  color: $color,
                  text: $event_message
                }
              ]
            }' > /tmp/mattermost.json

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @/tmp/mattermost.json \
            --max-time 10)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "[INFRA] $REASON in {{inputs.parameters.object-namespace}} -> Mattermost HTTP $HTTP_CODE"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
