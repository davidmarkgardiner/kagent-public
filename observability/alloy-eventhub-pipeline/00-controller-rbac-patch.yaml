---
# Supplemental RBAC — Argo memoize requires ConfigMap create/update
#
# The default argo-cluster-role (from Helm) only has get/watch/list on ConfigMaps.
# Memoize (used for 24h event dedup) needs create + update.
#
# Rather than patching the Helm-managed ClusterRole (which would be overwritten
# on upgrade), this creates a separate ClusterRole + binding for the controller SA.
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-memoize-configmaps
  labels:
    app.kubernetes.io/part-of: k8s-event-triage
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-memoize-configmaps
  labels:
    app.kubernetes.io/part-of: k8s-event-triage
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  kind: ClusterRole
  name: argo-memoize-configmaps
  apiGroup: rbac.authorization.k8s.io
