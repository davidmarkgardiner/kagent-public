---
# External Secrets - Azure Key Vault Integration
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault
  namespace: argo-events
spec:
  provider:
    azurekv:
      tenantId: "{{TENANT_ID}}"
      vaultUrl: "https://{{KEY_VAULT_NAME}}.vault.azure.net"
      authType: WorkloadIdentity
      serviceAccountRef:
        name: argo-events-sa
---
# Event Hub credentials for consuming events
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: eventhub-credentials
  namespace: argo-events
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  target:
    name: eventhub-credentials
    creationPolicy: Owner
  data:
    - secretKey: connection-string
      remoteRef:
        key: eventhub-connection-string
---
# Telegram credentials for alerting
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-credentials
  namespace: argo-events
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  target:
    name: telegram-credentials
    creationPolicy: Owner
  data:
    - secretKey: bot-token
      remoteRef:
        key: telegram-bot-token
    - secretKey: chat-id
      remoteRef:
        key: telegram-chat-id
---
# Service Account for Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sa
  namespace: argo-events
  annotations:
    azure.workload.identity/client-id: "{{MANAGED_IDENTITY_CLIENT_ID}}"
  labels:
    azure.workload.identity/use: "true"
