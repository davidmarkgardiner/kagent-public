---
# Event Hub Connection String for Alloy (workload cluster)
# Option 1: Direct secret (for testing)
# Option 2: Use External Secrets with Azure Key Vault (recommended for production)
apiVersion: v1
kind: Secret
metadata:
  name: alloy-eventhub
  namespace: monitoring
  labels:
    app: alloy
    app.kubernetes.io/part-of: k8s-event-triage
type: Opaque
stringData:
  # Replace with your Event Hub connection string
  # Format: Endpoint=sb://<namespace>.servicebus.windows.net/;SharedAccessKeyName=...;SharedAccessKey=...
  connection-string: "REPLACE_WITH_EVENTHUB_CONNECTION_STRING"
---
