---
# Event Hub Credentials
# IMPORTANT: Replace placeholder values before applying
apiVersion: v1
kind: Secret
metadata:
  name: eventhub-credentials
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: k8s-event-triage
type: Opaque
stringData:
  # Static value required by Event Hub SASL auth
  username: "$ConnectionString"
  # Replace with your Event Hub connection string
  # Format: Endpoint=sb://<namespace>.servicebus.windows.net/;SharedAccessKeyName=...;SharedAccessKey=...
  connection-string: "REPLACE_WITH_EVENTHUB_CONNECTION_STRING"
---
# TLS CA Certificate
# Create this secret using the commands in README.md Step 2
# This is a placeholder — you MUST generate it from your Event Hub endpoint:
#
#   echo | openssl s_client -connect <namespace>.servicebus.windows.net:9093 \
#     -showcerts 2>/dev/null \
#     | awk '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/' \
#     > /tmp/eventhub-ca-chain.pem
#
#   kubectl create secret generic eventhub-tls-ca -n argo-events \
#     --from-file=ca.pem=/tmp/eventhub-ca-chain.pem
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: eventhub-tls-ca
#   namespace: argo-events
# type: Opaque
# data:
#   ca.pem: <base64-encoded-ca-chain>
---
# Mattermost Webhook Configuration
# Replace with your Mattermost incoming webhook URL
apiVersion: v1
kind: ConfigMap
metadata:
  name: mattermost-webhook-config
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: k8s-event-triage
data:
  WEBHOOK_URL: "REPLACE_WITH_MATTERMOST_WEBHOOK_URL"
