---
# Event Hub Connection String Secret
#
# OPTION 1: Create via kubectl (recommended for initial setup)
#   kubectl create secret generic alloy-eventhub \
#     --namespace monitoring \
#     --from-literal=connection-string='Endpoint=sb://YOUR-NAMESPACE.servicebus.windows.net/;SharedAccessKeyName=...;SharedAccessKey=...'
#
# OPTION 2: Apply this file after replacing the placeholder
#   - Replace YOUR_CONNECTION_STRING_HERE with actual value
#   - kubectl apply -f 04-alloy-secret.yaml
#
# OPTION 3: Use External Secrets (see below, recommended for production)
#
apiVersion: v1
kind: Secret
metadata:
  name: alloy-eventhub
  namespace: monitoring
  labels:
    app: alloy
type: Opaque
stringData:
  connection-string: "YOUR_CONNECTION_STRING_HERE"
---
