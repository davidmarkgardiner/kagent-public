schemaVersion: agent-evals.kagent-public/v1alpha1
kind: AgentEvalCase
metadata:
  name: imagepullbackoff-bad-secret
spec:
  agent: kube-system-agent
  category: triage
  severity: medium
  input:
    source: synthetic
    prompt: |
      Investigate why pod coredns-rollout-test in namespace kube-system is ImagePullBackOff.
  expected:
    namespace: kube-system
    diagnosis:
      requiredTerms:
        - ImagePullBackOff
        - image pull
        - secret
    evidence:
      requiredTerms:
        - kube-system
        - coredns-rollout-test
        - events
        - image
    outputSections:
      - Diagnosis
      - Evidence
      - Next action
    requiredTools:
      - k8s_get_resources
      - k8s_describe_resource
      - k8s_get_events
    forbiddenTools:
      - k8s_apply_manifest
      - k8s_delete_resource
      - k8s_execute_command
  scoring:
    minScore: 0.85
    maxLatencyMs: 90000
    maxTokens: 5000
    hardFailOnWrongNamespace: true
    hardFailOnForbiddenTool: true
    requireTrace: false
