apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: agent-lifecycle-eval
  namespace: argo
  labels:
    app.kubernetes.io/part-of: kagent-agent-evals
    platform.com/team: platform
    platform.com/type: evaluation
spec:
  entrypoint: evaluate-lifecycle
  arguments:
    parameters:
      - name: runtime_image
        value: "alpine:3.19"
      - name: agent_eval_root
        value: /opt/agent-evals
      - name: case_id
        value: pod-crashloop-hitl-remediation
      - name: run_id
        value: "{{workflow.name}}"
      - name: workflow_name
        value: "{{workflow.name}}"
      - name: incident_id
        value: PLACEHOLDER_GITLAB_ISSUE_ID
      - name: incident_namespace
        value: demo-payments
      - name: workload
        value: checkout-api
      - name: failure_mode
        value: CrashLoopBackOff
      - name: ticket_system
        value: GitLab
      - name: ticket_id
        value: PLACEHOLDER_GITLAB_ISSUE_ID
      - name: ticket_url
        value: PLACEHOLDER_GITLAB_ISSUE_URL
      - name: ticket_closed
        value: "false"
      - name: remediation_mode
        value: gitops_or_workflow_only
      - name: workflow_json
        value: "{}"
      - name: marker_evidence
        value: ""
  templates:
    - name: evaluate-lifecycle
      serviceAccountName: agent-lifecycle-eval
      volumes:
        - name: agent-eval-runtime
          configMap:
            name: agent-eval-runtime-files
            defaultMode: 0755
            items:
              - key: reporting.py
                path: scripts/reporting.py
              - key: metrics.py
                path: scripts/metrics.py
              - key: collect-lifecycle-evidence.py
                path: scripts/collect-lifecycle-evidence.py
              - key: route-lifecycle-review.py
                path: scripts/route-lifecycle-review.py
              - key: score-lifecycle-run.py
                path: scripts/score-lifecycle-run.py
              - key: summarize-agent-scores.py
                path: scripts/summarize-agent-scores.py
              - key: pod-crashloop-hitl-remediation.yaml
                path: lifecycle-cases/pod-crashloop-hitl-remediation.yaml
              - key: chaos-pod-delete.yaml
                path: lifecycle-cases/chaos-pod-delete.yaml
      inputs:
        parameters:
          - name: runtime_image
          - name: agent_eval_root
          - name: case_id
          - name: run_id
          - name: workflow_name
          - name: incident_id
          - name: incident_namespace
          - name: workload
          - name: failure_mode
          - name: ticket_system
          - name: ticket_id
          - name: ticket_url
          - name: ticket_closed
          - name: remediation_mode
          - name: workflow_json
          - name: marker_evidence
      script:
        image: "{{inputs.parameters.runtime_image}}"
        command: [sh]
        volumeMounts:
          - name: agent-eval-runtime
            mountPath: /opt/agent-evals
            readOnly: true
        source: |
          set -eu

          apk add --no-cache python3 py3-yaml >/dev/null

          eval_root="{{inputs.parameters.agent_eval_root}}"
          output_dir=/work/output
          mkdir -p "${output_dir}" /work/evidence

          cat > /work/evidence/workflow.json <<'__KAGENT_EVAL_WORKFLOW_JSON_20260608__'
          {{inputs.parameters.workflow_json}}
          __KAGENT_EVAL_WORKFLOW_JSON_20260608__

          cat > /work/evidence/markers.txt <<'__KAGENT_EVAL_MARKER_EVIDENCE_20260608__'
          {{inputs.parameters.marker_evidence}}
          __KAGENT_EVAL_MARKER_EVIDENCE_20260608__
          printf '\nEVALUATION_AGENT: completed\n' >> /work/evidence/markers.txt

          if [ "$(wc -c < /work/evidence/workflow.json)" -gt 200000 ]; then
            echo "workflow_json exceeds inline parameter guard; pass large evidence as an artifact" >&2
            exit 2
          fi
          if [ "$(wc -c < /work/evidence/markers.txt)" -gt 200000 ]; then
            echo "marker_evidence exceeds inline parameter guard; pass large evidence as an artifact" >&2
            exit 2
          fi

          collect_args="
            --output ${output_dir}/lifecycle-run.json
            --case-id {{inputs.parameters.case_id}}
            --run-id {{inputs.parameters.run_id}}
            --workflow-name {{inputs.parameters.workflow_name}}
            --incident-id {{inputs.parameters.incident_id}}
            --namespace {{inputs.parameters.incident_namespace}}
            --workload {{inputs.parameters.workload}}
            --failure-mode {{inputs.parameters.failure_mode}}
            --ticket-system {{inputs.parameters.ticket_system}}
            --ticket-id {{inputs.parameters.ticket_id}}
            --ticket-url {{inputs.parameters.ticket_url}}
            --remediation-mode {{inputs.parameters.remediation_mode}}
          "

          if [ -s /work/evidence/workflow.json ]; then
            collect_args="${collect_args} --argo-workflow /work/evidence/workflow.json"
          fi
          if [ -s /work/evidence/markers.txt ]; then
            collect_args="${collect_args} --evidence /work/evidence/markers.txt"
          fi
          if [ "{{inputs.parameters.ticket_closed}}" = "true" ]; then
            collect_args="${collect_args} --ticket-closed"
          fi

          python3 "${eval_root}/scripts/collect-lifecycle-evidence.py" ${collect_args}

          set +e
          python3 "${eval_root}/scripts/score-lifecycle-run.py" \
            --case "${eval_root}/lifecycle-cases/{{inputs.parameters.case_id}}.yaml" \
            --run "${output_dir}/lifecycle-run.json" \
            --output-dir "${output_dir}"
          score_status=$?
          set -e

          python3 "${eval_root}/scripts/summarize-agent-scores.py" \
            --results-dir "${output_dir}" \
            --summary-md "${output_dir}/summary.md" \
            --metrics "${output_dir}/agent-eval.prom"

          python3 "${eval_root}/scripts/route-lifecycle-review.py" \
            --results-dir "${output_dir}" \
            --output "${output_dir}/review-route.json"

          exit "${score_status}"
      outputs:
        parameters:
          - name: lifecycle-run
            valueFrom:
              path: /work/output/lifecycle-run.json
          - name: lifecycle-summary
            valueFrom:
              path: /work/output/summary.md
          - name: lifecycle-metrics
            valueFrom:
              path: /work/output/agent-eval.prom
          - name: review-route
            valueFrom:
              path: /work/output/review-route.json
