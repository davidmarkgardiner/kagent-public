apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-lifecycle-eval
  namespace: argo
  labels:
    app.kubernetes.io/part-of: kagent-agent-evals
    platform.com/team: platform
    platform.com/type: evaluation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-lifecycle-eval
  namespace: argo
  labels:
    app.kubernetes.io/part-of: kagent-agent-evals
    platform.com/team: platform
    platform.com/type: evaluation
rules:
  - apiGroups: [argoproj.io]
    resources: [workflowtaskresults]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-lifecycle-eval
  namespace: argo
  labels:
    app.kubernetes.io/part-of: kagent-agent-evals
    platform.com/team: platform
    platform.com/type: evaluation
subjects:
  - kind: ServiceAccount
    name: agent-lifecycle-eval
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-lifecycle-eval
