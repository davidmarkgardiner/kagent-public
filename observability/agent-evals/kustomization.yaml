apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - argo/lifecycle-eval-workflow-template.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: agent-eval-runtime-files
    namespace: argo
    files:
      - reporting.py=scripts/reporting.py
      - collect-lifecycle-evidence.py=scripts/collect-lifecycle-evidence.py
      - score-lifecycle-run.py=scripts/score-lifecycle-run.py
      - summarize-agent-scores.py=scripts/summarize-agent-scores.py
      - pod-crashloop-hitl-remediation.yaml=lifecycle-cases/pod-crashloop-hitl-remediation.yaml
