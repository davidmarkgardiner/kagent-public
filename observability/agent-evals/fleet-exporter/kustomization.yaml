apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - k8s/rbac.yaml
  - k8s/deployment.yaml
  - k8s/service.yaml
  - k8s/servicemonitor.yaml
configMapGenerator:
  - name: kagent-fleet-metrics-exporter
    files:
      - exporter.py
generatorOptions:
  disableNameSuffixHash: true
