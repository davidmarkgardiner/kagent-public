apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-fleet-metrics-exporter
  labels:
    app.kubernetes.io/name: kagent-fleet-metrics-exporter
    app.kubernetes.io/part-of: kagent-agent-evals
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kagent-fleet-metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-fleet-metrics-exporter
        app.kubernetes.io/part-of: kagent-agent-evals
    spec:
      serviceAccountName: kagent-fleet-metrics-exporter
      containers:
        - name: exporter
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python3", "/app/exporter.py"]
          env:
            - name: CLUSTER_NAME
              value: "{{CLUSTER_NAME}}"
            - name: ARGO_NAMESPACE
              value: argo
            - name: PORT
              value: "8080"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          ports:
            - name: metrics
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: exporter
              mountPath: /app
              readOnly: true
      volumes:
        - name: exporter
          configMap:
            name: kagent-fleet-metrics-exporter
            defaultMode: 0555
