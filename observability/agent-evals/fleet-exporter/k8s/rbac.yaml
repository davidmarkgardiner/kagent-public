apiVersion: v1
kind: ServiceAccount
metadata:
  name: kagent-fleet-metrics-exporter
  labels:
    app.kubernetes.io/name: kagent-fleet-metrics-exporter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kagent-fleet-metrics-exporter
  labels:
    app.kubernetes.io/name: kagent-fleet-metrics-exporter
rules:
  - apiGroups: ["kagent.dev"]
    resources: ["agents"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kagent-fleet-metrics-exporter
  labels:
    app.kubernetes.io/name: kagent-fleet-metrics-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kagent-fleet-metrics-exporter
subjects:
  - kind: ServiceAccount
    name: kagent-fleet-metrics-exporter
    namespace: monitoring
