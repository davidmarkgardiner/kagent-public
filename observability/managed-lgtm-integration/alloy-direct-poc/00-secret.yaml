# ---------------------------------------------------------------------------
# Bearer token used by Alloy to authenticate against the Argo Events webhook.
#
# The EventSource (01-eventsource.yaml) reads this Secret via authSecret:
# Argo Events checks the Authorization: Bearer <value> header on every POST.
#
# REPLACE THE VALUE before applying. Generate with:
#   openssl rand -hex 32
#
# Stamp it into both Kubernetes (here) and into the Alloy values / sidecar
# secret that mounts /etc/alloy-webhook/token (see alloy-snippet.alloy).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: alloy-poc-webhook-token
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: alloy-direct-poc
type: Opaque
stringData:
  # CHANGE ME — must match the bearer Alloy sends.
  token: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
