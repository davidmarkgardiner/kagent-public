# ---------------------------------------------------------------------------
# Sensor — every POST to /alloy spawns one alloy-poc-echo workflow.
#
# No filter at PoC stage: we want to see EVERY payload arrive in workflow
# logs. Add a `filters.data` block later (e.g. body.severity == "critical")
# once we know the real Alloy-emitted shape.
#
# Rate limit set generously — change down to ~5/min before production.
# ---------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: alloy-poc-sensor
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: alloy-direct-poc
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sa
    container:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
  dependencies:
    - name: alloy-event
      eventSourceName: alloy-poc
      eventName: alloy
      # No filters — accept everything during PoC.
  triggers:
    - template:
        name: alloy-poc-echo-workflow
        conditions: "alloy-event"
        rateLimit:
          requestsPerUnit: 30
          unit: Minute
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: alloy-poc-
                namespace: argo-events
                labels:
                  app.kubernetes.io/part-of: alloy-direct-poc
                  event-type: alloy-webhook
              spec:
                workflowTemplateRef:
                  name: alloy-poc-echo
                arguments:
                  parameters:
                    - name: alloy-payload
          parameters:
            - src:
                dependencyName: alloy-event
                dataKey: body
              dest: spec.arguments.parameters.0.value
      retryStrategy:
        steps: 3
        duration: 10s
