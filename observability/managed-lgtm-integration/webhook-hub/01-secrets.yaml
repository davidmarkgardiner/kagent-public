# Bearer token for the inbound webhook. Two layers verify it:
#   1. Istio AuthorizationPolicy (05-...) checks `Authorization: Bearer *` is present
#   2. Argo Events EventSource (03-...) verifies the EXACT token via authSecret
#
# Generate before applying:
#   TOKEN=$(openssl rand -hex 32)
#   kubectl create secret generic webhook-hub-token \
#     --namespace argo-events \
#     --from-literal=token="${TOKEN}"
#
# Or wire to Vault via ExternalSecret (preferred for prod). Example below.
---
# Placeholder — replace `REPLACE_WITH_BEARER_TOKEN` with the value from openssl,
# OR delete this Secret and use the imperative `kubectl create secret` above.
apiVersion: v1
kind: Secret
metadata:
  name: webhook-hub-token
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: webhook-hub
type: Opaque
stringData:
  token: "REPLACE_WITH_BEARER_TOKEN"
---
# Production pattern — uncomment when External Secrets Operator is configured.
# Stores the token in Azure Key Vault, syncs to the same Secret name above.
#
