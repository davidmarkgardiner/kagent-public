# Argo WorkflowTemplate — AI triage action invoked by ai-triage Sensor
#
# Receives the raw AlertManager-shaped JSON body from the Sensor, parses one
# alert per logRecord, then calls KAgent A2A for analysis and posts a
# colour-coded card to Mattermost.
#
# Same shape as ../alerts/workflow-template-alerts.yaml but consumes a
# direct webhook body (not OTLP-wrapped from Kafka).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: webhook-hub-ai-triage
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: webhook-hub
spec:
  serviceAccountName: argo-events-sa
  entrypoint: main
  arguments:
    parameters:
      - name: alert-payload
        description: Raw AlertManager-shaped JSON body from the Hub Sensor

  templates:
    # ---- 1. Entry DAG -----------------------------------------------------
    - name: main
      dag:
        tasks:
          - name: parse-alerts
            template: parse-alerts

          - name: triage
            depends: parse-alerts
            template: triage-one-alert
            arguments:
              parameters:
                - name: alert
                  value: "{{item}}"
            withParam: "{{tasks.parse-alerts.outputs.parameters.alerts}}"

    # ---- 2. Unwrap webhook body, fan out one alert per array element -----
    - name: parse-alerts
      script:
        image: badouralix/curl-jq:alpine
        command: [sh]
        source: |
          set -eu
          PAYLOAD='{{workflow.parameters.alert-payload}}'

          echo "$PAYLOAD" \
            | jq -c '
                [ .alerts[]
                  | {
                      alertname:   .labels.alertname,
                      severity:    (.labels.severity // "info"),
                      status:      .status,
                      namespace:   (.labels.namespace // ""),
                      pod:         (.labels.pod // ""),
                      service:     (.labels.service // ""),
                      cluster:     (.labels.cluster // ""),
                      team:        (.labels.team // "unknown"),
                      summary:     .annotations.summary,
                      description: .annotations.description,
                      runbook_url: (.annotations.runbook_url // ""),
                      starts_at:   .startsAt,
                      generator_url: .generatorURL
                    }
                ]
                | unique_by(.alertname + .namespace + .pod)
              ' \
            > /tmp/alerts.json

          cat /tmp/alerts.json
      outputs:
        parameters:
          - name: alerts
            valueFrom:
              path: /tmp/alerts.json

    # ---- 3. Per-alert triage: KAgent analysis + Mattermost ---------------
    - name: triage-one-alert
      inputs:
        parameters:
          - name: alert
      script:
        image: badouralix/curl-jq:alpine
        command: [sh]
        source: |
          set -eu
          ALERT='{{inputs.parameters.alert}}'

          ALERTNAME=$(echo "$ALERT"  | jq -r '.alertname')
          SEVERITY=$(echo  "$ALERT"  | jq -r '.severity')
          NAMESPACE=$(echo "$ALERT"  | jq -r '.namespace')
          POD=$(echo       "$ALERT"  | jq -r '.pod')
          CLUSTER=$(echo   "$ALERT"  | jq -r '.cluster')
          SUMMARY=$(echo   "$ALERT"  | jq -r '.summary')
          RUNBOOK=$(echo   "$ALERT"  | jq -r '.runbook_url')

          # ---- KAgent A2A prompt with namespace/cluster anchoring ----
          # (Pattern from memory: prevents Qwen 14B param hallucination)
          PROMPT=$(jq -n \
            --arg alertname "$ALERTNAME" \
            --arg severity  "$SEVERITY"  \
            --arg ns        "$NAMESPACE" \
            --arg pod       "$POD"       \
            --arg cluster   "$CLUSTER"   \
            --arg summary   "$SUMMARY"   \
            '"Triage this alert. CRITICAL: use exact namespace \"" + $ns + "\" and cluster \"" + $cluster + "\".\n\nAlert: " + $alertname + "\nSeverity: " + $severity + "\nPod: " + $pod + "\nSummary: " + $summary + "\n\nReturn:\n1. Likely root cause (1 sentence)\n2. Three remediation options ranked by safety\n3. The exact kubectl commands to investigate further"')

          KAGENT_URL=$(cat /etc/kagent-config/KAGENT_URL)
          AGENT=$(cat /etc/kagent-config/KAGENT_TRIAGE_AGENT)

          A2A_BODY=$(jq -n --argjson prompt "$PROMPT" \
            '{jsonrpc:"2.0",id:"webhook-hub-triage",method:"message/send",params:{message:{role:"user",parts:[{kind:"text",text:$prompt}]}}}')

          ANALYSIS=$(curl -sf -X POST \
            "${KAGENT_URL}/api/a2a/kagent/${AGENT}/" \
            -H "Content-Type: application/json" \
            -d "$A2A_BODY" \
            | jq -r '.result.artifacts[0].parts[0].text // "KAgent analysis unavailable"')

          # ---- Mattermost notification ----
          WEBHOOK=$(cat /etc/mattermost-config/WEBHOOK_URL)

          case "$SEVERITY" in
            critical) COLOR="#e74c3c"; EMOJI=":red_circle:" ;;
            warning)  COLOR="#e67e22"; EMOJI=":large_orange_circle:" ;;
            *)        COLOR="#95a5a6"; EMOJI=":white_circle:" ;;
          esac

          MM_BODY=$(jq -n \
            --arg color    "$COLOR" \
            --arg emoji    "$EMOJI" \
            --arg name     "$ALERTNAME" \
            --arg sev      "$SEVERITY" \
            --arg ns       "$NAMESPACE" \
            --arg pod      "$POD" \
            --arg cluster  "$CLUSTER" \
            --arg summary  "$SUMMARY" \
            --arg analysis "$ANALYSIS" \
            --arg runbook  "$RUNBOOK" \
            '{
              text: ($emoji + " :fire: **" + $name + "** (" + $sev + ") via webhook-hub"),
              attachments: [{
                color: $color,
                fields: [
                  {short:true, title:"cluster",   value:$cluster},
                  {short:true, title:"namespace", value:$ns},
                  {short:true, title:"pod",       value:$pod},
                  {short:false, title:"summary",  value:$summary},
                  {short:false, title:"AI triage", value:$analysis},
                  {short:false, title:"runbook",  value:$runbook}
                ]
              }]
            }')

          curl -sf -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$MM_BODY"

          echo "Triaged $ALERTNAME for $NAMESPACE/$POD"

      volumeMounts:
        - name: kagent-config
          mountPath: /etc/kagent-config
        - name: mattermost-config
          mountPath: /etc/mattermost-config

  volumes:
    - name: kagent-config
      configMap:
        name: kagent-config
    - name: mattermost-config
      configMap:
        name: mattermost-webhook-config
