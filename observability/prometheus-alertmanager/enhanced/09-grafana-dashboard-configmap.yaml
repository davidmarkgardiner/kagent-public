apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-triage-dashboard-enhanced
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: prometheus-alerting
    app.kubernetes.io/component: dashboard
data:
  prometheus-alert-triage.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Enhanced Prometheus Alert Triage Dashboard - Visualizes alerts and triage workflows",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Alert Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Total number of alerts currently firing",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "match": "null", "result": { "text": "0" } }, "type": "special" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showPercentChange": false
          },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\"}) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Active Firing",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Critical severity alerts",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\",severity=\"critical\"}) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Critical",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Warning severity alerts",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\",severity=\"warning\"}) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Warning",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Pending alerts",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"pending\"}) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Pending",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Number of triage workflows triggered",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "count(argo_workflows_count{namespace=\"argo-events\"}) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Triage Workflows",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Workflow success rate",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "green", "value": 95 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdMarkers": true },
          "targets": [
            {
              "expr": "(\n                sum(argo_workflows_count{namespace=\"argo-events\",status=\"Succeeded\"}) OR vector(0)\n                /\n                sum(argo_workflows_count{namespace=\"argo-events\"}) OR vector(1)\n              ) * 100",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Success Rate",
          "type": "gauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Alert Timeline",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Alert firing history",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "showPoints": "auto",
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 6 },
          "id": 7,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "sum by (alertname)(ALERTS{alertstate=\"firing\"})",
              "legendFormat": "{{alertname}}",
              "refId": "A"
            }
          ],
          "title": "Alerts Over Time",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Alert duration",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 30 }
                ]
              },
              "unit": "min"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 6 },
          "id": 8,
          "options": { "displayMode": "gradient", "orientation": "horizontal" },
          "targets": [
            {
              "expr": "(time() - ALERTS_FOR_STATE{alertstate=\"firing\"}) / 60",
              "instant": true,
              "legendFormat": "{{alertname}}",
              "refId": "A"
            }
          ],
          "title": "Alert Duration",
          "type": "bargauge"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["prometheus", "alerting", "triage", "argo", "kubernetes"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Data Source",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "browser",
      "title": "Prometheus Alert Triage Dashboard",
      "uid": "prometheus-alert-triage-enhanced",
      "version": 2
    }
