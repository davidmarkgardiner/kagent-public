---
# Enhanced Helm values overlay for kube-prometheus-stack AlertManager
# This configuration adds Argo Events webhook receiver with improved routing
#
# Usage:
#   helm upgrade <release-name> prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --reuse-values -f 01-alertmanager-values.yaml
#
alertmanager:
  config:
    global:
      resolve_timeout: 5m
      smtp_require_tls: false
    
    # Inhibit rules prevent duplicate alerts
    inhibit_rules:
      # If a critical alert is firing, suppress warning alerts with same labels
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal:
          - alertname
          - namespace
          - pod
      # If a warning alert is firing, suppress info alerts
      - source_matchers:
          - severity = warning
        target_matchers:
          - severity = info
        equal:
          - alertname
          - namespace

    route:
      receiver: 'default-receiver'
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      
      routes:
        # Route critical alerts immediately to Argo Events for triage
        - receiver: 'argo-events-webhook'
          group_wait: 10s
          matchers:
            - severity =~ "critical|error"
            - alertname =~ "KubePod.*|KubeContainer.*|KubeNode.*|OOMKilled.*|PodHighRestarts|FailedScheduling|ContainerCPUHigh|ContainerMemoryHigh|PVCNearCapacity|NodeNotReady|KubeletDown"
          continue: true
        
        # Route warning alerts to Argo Events (with normal group wait)
        - receiver: 'argo-events-webhook'
          matchers:
            - severity =~ "warning"
            - alertname =~ "KubePod.*|KubeContainer.*|OOMKilled.*|PodHighRestarts|FailedScheduling|ContainerCPUHigh|ContainerMemoryHigh|PVCNearCapacity"
          continue: true
        
        # Route all alerts to default receiver as well
        - receiver: 'default-receiver'
          matchers:
            - alertname =~ ".*"

    receivers:
      - name: 'default-receiver'
        # Default receiver - no configuration needed if using Prometheus Operator defaults

      - name: 'argo-events-webhook'
        webhook_configs:
          - url: 'http://alertmanager-eventsource-svc.argo-events.svc.cluster.local:12000/alerts'
            send_resolved: true
            max_alerts: 50
            timeout: 10s
            # Custom headers for authentication (optional)
            # headers:
            #   X-Custom-Auth: some-token

  # AlertManager resource configuration
  alertmanagerSpec:
    replicas: 1
    retention: 120h
    
    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    
    # Storage configuration (optional - uses emptyDir if not specified)
    # storage:
    #   volumeClaimTemplate:
    #     spec:
    #       storageClassName: standard
    #       accessModes: ["ReadWriteOnce"]
    #       resources:
    #         requests:
    #           storage: 10Gi
    
    # Enable external URL for alert links
    externalUrl: "http://localhost:9093"

# Enable additional PrometheusRules for better coverage
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
