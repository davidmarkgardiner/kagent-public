        </div>
        
        <!-- AI Agents -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon agent">👤</div>
            <div class="card-title">AI Agents</div>
          </div>
          <div class="service-list">
            <div class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Scotty 🔧</span>
              </div>
              <span class="url">k8s-cp1 (192.168.6.4)</span>
            </div>
            <div class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Gem 💎</span>
              </div>
              <span class="url">192.168.6.10</span>
            </div>
            <div class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Kimi 🧠</span>
              </div>
              <span class="url">192.168.6.104</span>
            </div>
            <div class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Codex 🤖</span>
              </div>
              <span class="url">192.168.6.105</span>
            </div>
            <div class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Data 🖥️</span>
              </div>
              <span class="url">192.168.5.95</span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="footer">
        <p>Homelab Architecture v2026.02 | <a href="https://github.com/david/homelab">GitHub</a></p>
        <p style="margin-top: 0.5rem; font-size: 0.875rem;">Built with ❤️ on Proxmox + Kubernetes + Longhorn</p>
      </div>
      
      <script>
        // Simple animation for counters
        function animateValue(id, start, end, duration) {
          const obj = document.getElementById(id);
          let startTimestamp = null;
          const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) {
              window.requestAnimationFrame(step);
            }
          };
          window.requestAnimationFrame(step);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
          animateValue("node-count", 0, 3, 1000);
          animateValue("service-count", 0, 20, 1500);
          animateValue("agent-count", 0, 5, 1200);
        });
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quick-dashboard
  namespace: homelab-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quick-dashboard
  template:
    metadata:
      labels:
        app: quick-dashboard
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: html
          configMap:
            name: quick-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: quick-dashboard
  namespace: homelab-dashboard
spec:
  type: NodePort
  selector:
    app: quick-dashboard
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30050
