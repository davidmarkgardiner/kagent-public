# Quick Dashboard - Immediate Value
# Deploy this for instant homelab visibility
---
apiVersion: v1
kind: Namespace
metadata:
  name: homelab-dashboard
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: quick-dashboard
  namespace: homelab-dashboard
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Homelab Command Center</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
          min-height: 100vh;
          color: #fff;
          padding: 2rem;
        }
        .header {
          text-align: center;
          margin-bottom: 2rem;
        }
        .header h1 {
          font-size: 2.5rem;
          background: linear-gradient(90deg, #00d4ff, #7b2cbf);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 0.5rem;
        }
        .status-bar {
          display: flex;
          justify-content: center;
          gap: 2rem;
          margin-bottom: 2rem;
        }
        .status-item {
          background: rgba(255,255,255,0.05);
          padding: 1rem 2rem;
          border-radius: 12px;
          text-align: center;
        }
        .status-item .value {
          font-size: 2rem;
          font-weight: bold;
          color: #00d4ff;
        }
        .status-item .label {
          color: #94a3b8;
          font-size: 0.875rem;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
          gap: 1.5rem;
          max-width: 1400px;
          margin: 0 auto;
        }
        .card {
          background: rgba(255,255,255,0.05);
          border-radius: 16px;
          padding: 1.5rem;
          border: 1px solid rgba(255,255,255,0.1);
          transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
          transform: translateY(-4px);
          box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .card-header {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          margin-bottom: 1rem;
        }
        .card-icon {
          width: 40px;
          height: 40px;
          border-radius: 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 1.25rem;
        }
        .card-title {
          font-size: 1.125rem;
          font-weight: 600;
        }
        .service-list {
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
        }
        .service-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0.75rem;
          background: rgba(0,0,0,0.2);
          border-radius: 8px;
          text-decoration: none;
          color: inherit;
          transition: background 0.2s;
        }
        .service-item:hover {
          background: rgba(0,212,255,0.1);
        }
        .service-name {
          display: flex;
          align-items: center;
          gap: 0.5rem;
        }
        .status-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
        }
        .status-ok { background: #4ade80; }
        .status-warn { background: #fbbf24; }
        .status-error { background: #f87171; }
        .url {
          color: #94a3b8;
          font-size: 0.75rem;
        }
        .infrastructure { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .development { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .ai { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .apps { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .home { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .agent { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        
        .footer {
          text-align: center;
          margin-top: 3rem;
          padding: 2rem;
          color: #64748b;
        }
        .footer a {
          color: #00d4ff;
          text-decoration: none;
        }
      </style>
    </head>
    <body>
      <div class="header">
        <h1>🏠 Homelab Command Center</h1>
        <p>{{INGRESS_DOMAIN}} infrastructure overview</p>
      </div>
      
      <div class="status-bar">
        <div class="status-item">
          <div class="value" id="node-count">3</div>
          <div class="label">K8s Nodes</div>
        </div>
        <div class="status-item">
          <div class="value" id="service-count">20+</div>
          <div class="label">Services</div>
        </div>
        <div class="status-item">
          <div class="value" id="agent-count">5</div>
          <div class="label">AI Agents</div>
        </div>
      </div>
      
      <div class="grid">
        <!-- Infrastructure -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon infrastructure">🛠️</div>
            <div class="card-title">Infrastructure</div>
          </div>
          <div class="service-list">
            <a href="https://npm.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Nginx Proxy Manager</span>
              </div>
              <span class="url">npm.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Glance Dashboard</span>
              </div>
              <span class="url">lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://longhorn.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Longhorn Storage</span>
              </div>
              <span class="url">longhorn.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://uptime.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Uptime Kuma</span>
              </div>
              <span class="url">uptime.lab.{{INGRESS_DOMAIN}}</span>
            </a>
          </div>
        </div>
        
        <!-- Development -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon development">💻</div>
            <div class="card-title">Development</div>
          </div>
          <div class="service-list">
            <a href="https://gitea.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Gitea Git Server</span>
              </div>
              <span class="url">gitea.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Grafana Monitoring</span>
              </div>
              <span class="url">{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://tasks.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Vikunja Tasks</span>
              </div>
              <span class="url">tasks.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://langfuse.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Langfuse Observability</span>
              </div>
              <span class="url">langfuse.lab.{{INGRESS_DOMAIN}}</span>
            </a>
          </div>
        </div>
        
        <!-- AI/LLM -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon ai">🤖</div>
            <div class="card-title">AI / LLM</div>
          </div>
          <div class="service-list">
            <a href="https://ai.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>KubeAI (LLM)</span>
              </div>
              <span class="url">ai.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://ai.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Open WebUI</span>
              </div>
              <span class="url">(via KubeAI)</span>
            </a>
          </div>
        </div>
        
        <!-- Applications -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon apps">📱</div>
            <div class="card-title">Applications</div>
          </div>
          <div class="service-list">
            <a href="https://blog.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Ghost Blog</span>
              </div>
              <span class="url">blog.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://stocks.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Ghostfolio</span>
              </div>
              <span class="url">stocks.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://forum.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Flarum Forum</span>
              </div>
              <span class="url">forum.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://vidauto.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>VidAuto</span>
              </div>
              <span class="url">vidauto.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://authentik.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Authentik SSO</span>
              </div>
              <span class="url">authentik.lab.{{INGRESS_DOMAIN}}</span>
            </a>
          </div>
        </div>
        
        <!-- Home -->
        <div class="card">
          <div class="card-header">
            <div class="card-icon home">🏡</div>
            <div class="card-title">Home</div>
          </div>
          <div class="service-list">
            <a href="https://ha.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Home Assistant</span>
              </div>
              <span class="url">ha.lab.{{INGRESS_DOMAIN}}</span>
            </a>
            <a href="https://proxmox.lab.{{INGRESS_DOMAIN}}" class="service-item">
              <div class="service-name">
                <span class="status-dot status-ok"></span>
                <span>Proxmox VE</span>
              </div>
              <span class="url">proxmox.lab.{{INGRESS_DOMAIN}}</span>
