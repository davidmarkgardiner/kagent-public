apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  annotations:
      {"apiVersion":"kagent.dev/v1alpha2","kind":"Agent","metadata":{"annotations":{},"labels":{"app.kubernetes.io/name":"platform-knowledge-agent","app.kubernetes.io/part-of":"kagent"},"name":"platform-knowledge-agent","namespace":"kagent"},"spec":{"declarative":{"a2aConfig":{"skills":[{"description":"Answer shared AKS platform documentation questions from the Git-backed platform knowledge base.","examples":["How do I secure my pod?","How do I bring my own domain?","How do I set up a pod disruption budget?","What Kubernetes resources are available on the shared AKS platform?"],"id":"platform-knowledge","name":"Platform Knowledge","tags":["aks","platform","documentation","knowledge-base"]}]},"deployment":{"replicas":1,"resources":{"limits":{"cpu":"500m","memory":"512Mi"},"requests":{"cpu":"100m","memory":"256Mi"}}},"modelConfig":"platform-kb-openai","promptTemplate":{"dataSources":[{"alias":"builtin","kind":"ConfigMap","name":"kagent-builtin-prompts"}]},"runtime":"python","stream":true,"systemMessage":"You are the shared AKS platform knowledge-base agent.\n\nUse the query_documentation tool before answering platform documentation\nquestions. Query the platform knowledge base with:\n- productName: platform-kb\n- version: current\n- dbName: platform-kb.db\n\nAnswer only from retrieved documentation. Cite source paths and headings.\nIf the retrieved docs do not answer the user's question, say that clearly\nand direct the user to raise a platform support ticket.\n\nDo not create, modify, or delete Azure resources. Do not push to Git from\nthis chat agent. If the user reports stale or missing documentation,\nsummarize the gap and route it to the approved stale-doc PR workflow.\n","tools":[{"mcpServer":{"apiGroup":"kagent.dev","kind":"RemoteMCPServer","name":"platform-kb-querydoc","toolNames":["query_documentation"]},"type":"McpServer"}]},"description":"Shared AKS platform documentation assistant backed by doc2vec/querydoc.","type":"Declarative"}}
  labels:
    app.kubernetes.io/name: platform-knowledge-agent
    app.kubernetes.io/part-of: kagent
  name: platform-knowledge-agent
  namespace: kagent
spec:
  declarative:
    a2aConfig:
      skills:
      - description: Answer shared AKS platform documentation questions from the Git-backed
          platform knowledge base.
        examples:
        - How do I secure my pod?
        - How do I bring my own domain?
        - How do I set up a pod disruption budget?
        - What Kubernetes resources are available on the shared AKS platform?
        id: platform-knowledge
        name: Platform Knowledge
        tags:
        - aks
        - platform
        - documentation
        - knowledge-base
    deployment:
      replicas: 1
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    modelConfig: platform-kb-openai
    promptTemplate:
      dataSources:
      - alias: builtin
        kind: ConfigMap
        name: kagent-builtin-prompts
    runtime: python
    stream: true
    systemMessage: |
      You are the shared AKS platform knowledge-base agent.

      Use the query_documentation tool before answering platform documentation
      questions. Query the platform knowledge base with:
      - productName: platform-kb
      - version: current
      - dbName: platform-kb.db

      Answer only from retrieved documentation. Cite source paths and headings.
      If the retrieved docs do not answer the user's question, say that clearly
      and direct the user to raise a platform support ticket.

      Do not create, modify, or delete Azure resources. Do not push to Git from
      this chat agent. If the user reports stale or missing documentation,
      summarize the gap and route it to the approved stale-doc PR workflow.
    tools:
    - mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: platform-kb-querydoc
        toolNames:
        - query_documentation
    - mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: memory-mcp
        toolNames:
        - add_observations
        - search_nodes
        - open_nodes
        - read_graph
  description: Shared AKS platform documentation assistant backed by doc2vec/querydoc.
  type: Declarative
status:
  conditions:
  - lastTransitionTime: "2026-05-14T08:41:22Z"
    message: Agent configuration accepted
    observedGeneration: 3
    reason: Reconciled
    type: Accepted
  - lastTransitionTime: "2026-05-14T08:36:03Z"
    message: Deployment is ready
    observedGeneration: 3
    reason: DeploymentReady
    type: Ready
