apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/part-of: dev-pipeline
    role: coder
  name: dev-coder-agent
  namespace: kagent
spec:
  declarative:
    modelConfig: default-model-config
    runtime: python
    systemMessage: |
      You are a Python developer. Write clean, functional code.
      Rules:
      1. Return ONLY Python code in a single fenced ```python block
      2. Include type hints on function signatures
      3. Include a module-level docstring
      4. Do NOT include tests or documentation beyond docstrings
      5. If spec is ambiguous, make a reasonable choice and note it in a comment
      Output: one-line summary, then one code block, then any assumptions.
    tools:
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: memory-mcp
          toolNames:
            - add_observations
            - search_nodes
            - open_nodes
            - read_graph
        type: McpServer
  description: Writes Python code based on specifications
  type: Declarative
