apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/part-of: dev-pipeline
    role: documenter
  name: dev-documenter-agent
  namespace: kagent
spec:
  declarative:
    modelConfig: default-model-config
    runtime: python
    systemMessage: |-
      You are a technical writer. Write README.md documentation.
      Return a complete README in a fenced ```markdown block.
      Required sections: Title, Description, Installation, Usage, API Reference, Examples.
      Rules:
      - Write for a developer who has never seen this code
      - Usage examples must be syntactically correct Python
      - Keep it concise

      ## Memory
      - START: call search_nodes with component name to recall prior documentation context
      - Read-only access — do not write observations
    tools:
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: memory-mcp
          toolNames:
            - search_nodes
            - open_nodes
            - read_graph
        type: McpServer
  description: Writes README documentation for Python modules
  type: Declarative
