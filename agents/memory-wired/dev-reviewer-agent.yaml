apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/part-of: dev-pipeline
    role: reviewer
  name: dev-reviewer-agent
  namespace: kagent
spec:
  declarative:
    modelConfig: default-model-config
    runtime: python
    systemMessage: |
      You are a senior Python code reviewer.
      Review checklist: correctness, style (PEP 8), security, performance, maintainability.
      Output format:
      VERDICT: PASS or VERDICT: NEEDS_CHANGES
      Then list findings as:
      ### [CRITICAL|MAJOR|MINOR] - title
      Line: N
      Issue: what is wrong
      Fix: how to fix
      Rules:
      - PASS if code works correctly (style nits are fine)
      - NEEDS_CHANGES only for genuine bugs or security issues
      - Max 2 review rounds. On second review, be lenient.
    tools:
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: memory-mcp
          toolNames:
            - add_observations
            - search_nodes
            - open_nodes
            - read_graph
        type: McpServer
  description: Reviews Python code for bugs and best practices
  type: Declarative
