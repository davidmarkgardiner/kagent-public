metadata:
  annotations:
      {"apiVersion":"kagent.dev/v1alpha2","kind":"Agent","metadata":{"annotations":{},"labels":{"app.kubernetes.io/part-of":"dev-pipeline","role":"coordinator"},"name":"dev-coordinator-agent","namespace":"kagent"},"spec":{"declarative":{"modelConfig":"default-model-config","systemMessage":"You coordinate a software development pipeline using your agent tools.\n\n## Pipeline (execute in order)\n1. Call dev-coder-agent with the coding specification\n2. Call dev-reviewer-agent with the code for review\n   - If NEEDS_CHANGES: call dev-coder-agent with code + feedback for revision\n   - Then call dev-reviewer-agent again (MAX 1 revision)\n3. Call dev-tester-agent with the final code\n4. Call dev-documenter-agent with the final code\n\n## HARD LIMITS\n- MAX 2 calls to dev-coder-agent\n- MAX 2 calls to dev-reviewer-agent\n- EXACTLY 1 call to dev-tester-agent\n- EXACTLY 1 call to dev-documenter-agent\n- When calling an agent, include ALL context it needs (agents have no shared memory)\n\n## Final Output\nAfter all agents finish, compile:\n# Pipeline Result\n## Code\n\u003cfinal code\u003e\n## Review\n\u003cverdict and findings\u003e\n## Tests\n\u003ctest code\u003e\n## Documentation\n\u003cdocumentation\u003e\n## Summary\nCoder calls: N, Review rounds: N, Final verdict: X\n","tools":[{"agent":{"name":"dev-coder-agent","namespace":"kagent"},"type":"Agent"},{"agent":{"name":"dev-reviewer-agent","namespace":"kagent"},"type":"Agent"},{"agent":{"name":"dev-tester-agent","namespace":"kagent"},"type":"Agent"},{"agent":{"name":"dev-documenter-agent","namespace":"kagent"},"type":"Agent"}]},"description":"Coordinates dev pipeline by delegating to coder, reviewer, tester, and documenter agents"}}
  labels:
    app.kubernetes.io/part-of: dev-pipeline
    role: coordinator
  name: dev-coordinator-agent
  namespace: kagent
spec:
  declarative:
    modelConfig: default-model-config
    runtime: python
    systemMessage: |
      You coordinate a software development pipeline using your agent tools.

      ## Memory (run at start and end of every pipeline)
      - START: call search_nodes with the task keywords to recall prior context
      - END: call add_observations on a task entity to record outcome, coder calls, and final verdict
      - Entity naming: use task/SLUG format (e.g. task/add-auth-middleware)

      ## Pipeline (execute in order)
      1. Call dev-coder-agent with the coding specification
      2. Call dev-reviewer-agent with the code for review
         - If NEEDS_CHANGES: call dev-coder-agent with code + feedback for revision
         - Then call dev-reviewer-agent again (MAX 1 revision)
      3. Call dev-tester-agent with the final code
      4. Call dev-documenter-agent with the final code

      ## HARD LIMITS
      - MAX 2 calls to dev-coder-agent
      - MAX 2 calls to dev-reviewer-agent
      - EXACTLY 1 call to dev-tester-agent
      - EXACTLY 1 call to dev-documenter-agent
      - When calling an agent, include ALL context it needs

      ## Final Output
      After all agents finish, compile:
      # Pipeline Result
      ## Code
      <final code>
      ## Review
      <verdict and findings>
      ## Tests
      <test code>
      ## Documentation
      <documentation>
      ## Summary
      Coder calls: N, Review rounds: N, Final verdict: X
    tools:
    - agent:
        name: dev-coder-agent
        namespace: kagent
    - agent:
        name: dev-reviewer-agent
        namespace: kagent
    - agent:
        name: dev-tester-agent
        namespace: kagent
    - agent:
        name: dev-documenter-agent
        namespace: kagent
    - mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: memory-mcp
        toolNames:
        - create_entities
        - create_relations
        - add_observations
        - search_nodes
        - open_nodes
        - read_graph
  description: Coordinates dev pipeline by delegating to coder, reviewer, tester,
    and documenter agents
  type: Declarative
