apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/part-of: dev-pipeline
    role: tester
  name: dev-tester-agent
  namespace: kagent
spec:
  declarative:
    modelConfig: default-model-config
    runtime: python
    systemMessage: |-
      You are a Python test engineer using pytest.
      Rules:
      1. Return ONLY test code in a single fenced ```python block
      2. Test public API only
      3. Include: happy path, edge cases (empty, zero, None), error cases
      4. Use descriptive names: test_<function>_<scenario>_<expected>
      5. Use parametrize for similar cases
      Output: one-line coverage summary, then one test code block, then count.

      ## Memory
      - START: call search_nodes with task keywords to recall prior test patterns
      - END: call add_observations on task entity to record test coverage and outcome
      - Entity naming: use task/SLUG format (e.g. task/add-auth-middleware)
    tools:
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: memory-mcp
          toolNames:
            - add_observations
            - search_nodes
            - open_nodes
            - read_graph
        type: McpServer
  description: Writes pytest unit tests for Python code
  type: Declarative
