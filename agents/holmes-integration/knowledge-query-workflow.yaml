# Knowledge Concierge query workflow
#
# Single-step RAG over kagent-triage/docs/:
#   1. retrieve  — ripgrep the corpus ConfigMap, pick top 3 files
#   2. ask       — A2A call to knowledge-concierge with question + retrieved chunks
#   3. notify    — optional Mattermost post (re-uses kagent-sre-workflow shape)
#
# Corpus ConfigMap: kagent-knowledge-corpus (build with build-knowledge-corpus.sh)
# Agent: knowledge-concierge in kagent ns
#
# Submit:
#   argo submit -n argo --from workflowtemplate/knowledge-query \
#     --parameter question="How do we rotate secrets in this platform?" \
#     --watch
#
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: knowledge-query
  namespace: argo
  labels:
    app: kagent
    type: knowledge-rag
  annotations:
    description: "Q&A over kagent-triage docs via knowledge-concierge agent (workflow-side ripgrep retrieval)"
    version: "1.0"
spec:
  serviceAccountName: argo
  entrypoint: query
  activeDeadlineSeconds: 600

  ttlStrategy:
    secondsAfterCompletion: 600
    secondsAfterSuccess: 300
    secondsAfterFailure: 1800
  podGC:
    strategy: OnWorkflowCompletion

  volumes:
    - name: corpus
      configMap:
        name: kagent-knowledge-corpus

  volumeClaimTemplates:
    - metadata:
        name: work
      spec:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 32Mi

  arguments:
    parameters:
      - name: question
        value: "How do we onboard a new namespace to the platform?"
      - name: top_k
        value: "3"
      - name: kagent_controller_url
        value: "http://kagent-controller.kagent.svc.cluster.local:8083"
      - name: mattermost_webhook_url
        value: ""

  templates:
    - name: query
      steps:
        - - name: retrieve
            template: retrieve-chunks
        - - name: ask
            template: call-concierge
        - - name: notify
            template: mattermost-notify
            when: "{{workflow.parameters.mattermost_webhook_url}} != \"\""
            continueOn:
              failed: true

    # ── Step 1: ripgrep top-K files from /corpus and concat into /work/retrieved.md
    - name: retrieve-chunks
      script:
        image: alpine:3.19
        command: [sh]
        volumes:
          - name: corpus
            configMap:
              name: kagent-knowledge-corpus
        volumeMounts:
          - name: corpus
            mountPath: /corpus
            readOnly: true
          - name: work
            mountPath: /work
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        source: |
          set -e
          apk add --no-cache ripgrep > /dev/null

          QUESTION='{{workflow.parameters.question}}'
          TOPK='{{workflow.parameters.top_k}}'

          echo "=== Knowledge retrieval ==="
          echo "Question: $QUESTION"
          echo "Corpus dir: /corpus ($(ls /corpus/*.md 2>/dev/null | wc -l) files)"

          # Strip stop-words and short tokens, rebuild a ripgrep alternation pattern.
          # Keeps tokens >=4 chars, lowercases, dedupes. Demo-grade — not BM25.
          PATTERN=$(printf '%s' "$QUESTION" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs 'a-z0-9' '\n' \
            | awk 'length($0) >= 4' \
            | grep -v -E '^(what|when|where|which|whose|whom|that|this|these|those|with|from|have|been|does|will|would|could|should|about|into|onto|over|under|again|than|then|some|such|like|just|very|here|there|they|them|their|your|yours|ours|hers|ourselves)$' \
            | sort -u \
            | head -20 \
            | paste -sd '|' -)

          if [ -z "$PATTERN" ]; then
            echo "WARN: question yielded no usable tokens — falling back to all docs"
            PATTERN='.'
          fi
          echo "rg pattern: $PATTERN"

          # Score each file by ripgrep hit count, take top-K
          TOP_FILES=$(rg --no-heading --count-matches --ignore-case -e "$PATTERN" /corpus 2>/dev/null \
            | sort -t: -k2 -nr \
            | head -"$TOPK" \
            | cut -d: -f1)

          if [ -z "$TOP_FILES" ]; then
            echo "WARN: no hits — using doc index as fallback"
            cat /corpus/_index.txt > /work/retrieved.md 2>/dev/null \
              || echo "_No corpus available_" > /work/retrieved.md
          else
            : > /work/retrieved.md
            for f in $TOP_FILES; do
              name=$(basename "$f")
              echo "## SOURCE: kagent-triage/docs/${name}" >> /work/retrieved.md
              echo >> /work/retrieved.md
              cat "$f" >> /work/retrieved.md
              echo >> /work/retrieved.md
              echo "---" >> /work/retrieved.md
              echo >> /work/retrieved.md
            done

            # Always append the index so the agent can suggest related reading
            if [ -f /corpus/_index.txt ]; then
              echo "## SOURCE: kagent-triage/docs/_index.txt" >> /work/retrieved.md
              echo >> /work/retrieved.md
              cat /corpus/_index.txt >> /work/retrieved.md
            fi
          fi

          BYTES=$(wc -c < /work/retrieved.md)
          echo "Retrieved: $BYTES bytes across:"
          for f in $TOP_FILES; do echo "  - $(basename "$f")"; done

    # ── Step 2: A2A call to knowledge-concierge
    - name: call-concierge
      retryStrategy:
        limit: 1
        retryPolicy: "OnFailure"
        backoff:
          duration: "10s"
      script:
        image: badouralix/curl-jq:alpine
        command: [sh]
        volumeMounts:
          - name: work
            mountPath: /work
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        source: |
          set -e

          if [ ! -f /work/retrieved.md ]; then
            echo "ERROR: /work/retrieved.md missing"; exit 1
          fi

          QUESTION='{{workflow.parameters.question}}'
          RETRIEVED=$(cat /work/retrieved.md)

          # Build prompt: question + retrieved chunks. Citation rule lives in
          # the agent's system prompt; the chunks here are the only ground truth.
          PROMPT="QUESTION:
          ${QUESTION}

          RETRIEVED CORPUS CHUNKS (your only source of truth):

          ${RETRIEVED}

          Answer the question grounded only in the chunks above. Cite source
          file paths inline. If the answer is not in the chunks, say so."

          TASK_ID="argo-$(echo {{workflow.name}} | tr -cd 'a-z0-9-')-$(date +%s)"

          jq -n \
            --arg task_id "$TASK_ID" \
            --arg prompt "$PROMPT" \
            '{
              jsonrpc: "2.0",
              id: $task_id,
              method: "message/send",
              params: {
                message: {
                  role: "user",
                  parts: [{kind: "text", text: $prompt}]
                }
              }
            }' > /tmp/a2a.json

          echo "Calling knowledge-concierge via A2A…"
          START=$(date +%s)

          HTTP_CODE=$(curl -s -o /work/concierge-response.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 300 \
            -X POST "{{workflow.parameters.kagent_controller_url}}/api/a2a/kagent/knowledge-concierge/" \
            -H "Content-Type: application/json" \
            -d @/tmp/a2a.json)

          DURATION=$(( $(date +%s) - START ))
          echo "HTTP: ${HTTP_CODE}, Duration: ${DURATION}s"

          case "${HTTP_CODE}" in ''|*[!0-9]*) echo "ERROR: curl failed"; exit 1 ;; esac
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "Concierge call failed (HTTP ${HTTP_CODE})"
            cat /work/concierge-response.json 2>/dev/null
            exit 1
          fi

          RPC_ERROR=$(jq -r '.error.message // empty' /work/concierge-response.json)
          if [ -n "$RPC_ERROR" ]; then
            echo "A2A error: $RPC_ERROR"; exit 1
          fi

          ANSWER=$(jq -r '
            [.result.artifacts[]?.parts[]? | select(.kind == "text") | .text] | join("\n\n")
          ' /work/concierge-response.json)
          if [ -z "$ANSWER" ] || [ "$ANSWER" = "null" ]; then
            ANSWER=$(jq -r '
              [.result.history[]? | select(.role == "agent") | .parts[]? | select(.kind == "text") | .text] | last // "_No answer returned_"
            ' /work/concierge-response.json)
          fi
          # Strip Qwen-style think tags
          ANSWER=$(printf '%s' "$ANSWER" | sed 's/<think>.*<\/think>//g')

          printf '%s' "$ANSWER" > /work/answer.md

          echo
          echo "=== Knowledge Concierge answer ==="
          echo
          cat /work/answer.md
          echo
          echo "=== End answer ($(wc -c < /work/answer.md) bytes, ${DURATION}s) ==="

    # ── Step 3: optional Mattermost notify
    - name: mattermost-notify
      script:
        image: badouralix/curl-jq:alpine
        command: [sh]
        volumeMounts:
          - name: work
            mountPath: /work
        env:
          - name: MATTERMOST_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: mattermost-webhook
                key: url
                optional: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        source: |
          WEBHOOK_URL="${MATTERMOST_WEBHOOK_URL:-{{workflow.parameters.mattermost_webhook_url}}}"
          [ -z "$WEBHOOK_URL" ] && { echo "No webhook configured, skip"; exit 0; }

          ANSWER=$(cat /work/answer.md 2>/dev/null | head -c 3000)
          jq -n \
            --arg q '{{workflow.parameters.question}}' \
            --arg a "$ANSWER" \
            --arg wf '{{workflow.name}}' \
            '{
              username: "Knowledge Concierge",
              icon_url: "https://avatars.githubusercontent.com/u/193178627",
              text: ":books: **Q:** " + $q + "\n\n**A:**\n" + $a + "\n\n_workflow: `" + $wf + "`_"
            }' > /tmp/mm.json

          curl -sS -o /dev/null -w "MM HTTP: %{http_code}\n" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @/tmp/mm.json
