# Local LLM Analysis-Only Workflow
# Uses Qwen 3 14B via KubeAI for zero-cost Kubernetes incident analysis
# Outputs: GitLab issue + Mattermost notification (NO remediation)
#
# Improvements over v2:
# - TTL/PodGC for auto-cleanup
# - GitLab token from K8s Secret (not workflow parameter)
# - Pre-built image (no apk install at runtime)
# - Storage class explicit for longhorn
# - Cluster name: {{CLUSTER_NAME}}
# - Improved system prompt for structured output
#
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: local-llm-analysis
  namespace: argo
  labels:
    app: k8s-triage
    type: analysis-only
  annotations:
    description: "Local LLM analysis-only workflow (no remediation)"
    version: "3.0"
    model: "qwen3-14b"
spec:
  serviceAccountName: argo
  entrypoint: analyse-and-report
  activeDeadlineSeconds: 300

  # Auto-cleanup
  ttlStrategy:
    secondsAfterCompletion: 300
    secondsAfterSuccess: 300
    secondsAfterFailure: 600
  podGC:
    strategy: OnWorkflowCompletion

  volumeClaimTemplates:
    - metadata:
        name: work
      spec:
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 64Mi

  arguments:
    parameters:
      - name: query
        value: "Investigate Kubernetes resource issue"
      - name: event_type
        value: "Unknown"
      - name: cluster
        value: "{{CLUSTER_NAME}}"
      - name: namespace
        value: "default"
      - name: resource_kind
        value: "Pod"
      - name: resource_name
        value: "unknown"
      - name: severity
        value: "medium"
      - name: error_message
        value: ""
      - name: gitlab_project_id
        value: "68265584"
      - name: gitlab_url
        value: "https://gitlab.com"
      - name: mattermost_webhook_url
        value: "http://mattermost.mattermost:8065/hooks/5mb3nzhrajtw4xk6m7dmnmm27w"
      - name: local_llm_url
        value: "http://kubeai.kubeai.svc.cluster.local/openai/v1"
      - name: llm_model
        value: "qwen3-14b"

  templates:
    - name: analyse-and-report
      steps:
        - - name: validate
            template: validate-inputs
        - - name: investigate
            template: call-local-llm
        - - name: report
            template: create-gitlab-issue
            continueOn:
              failed: true
        - - name: notify
            template: mattermost-notify

    # Step 1: Validate inputs and LLM connectivity
    - name: validate-inputs
      script:
        image: curlimages/curl:8.5.0
        command: [sh]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        source: |
          echo "=== Local LLM Analysis Workflow v3.0 ==="
          echo "LLM: {{workflow.parameters.local_llm_url}} ({{workflow.parameters.llm_model}})"
          echo "Cluster: {{workflow.parameters.cluster}}"
          echo "Target: {{workflow.parameters.resource_kind}}/{{workflow.parameters.resource_name}} in {{workflow.parameters.namespace}}"

          if [ -z "{{workflow.parameters.query}}" ]; then
            echo "ERROR: query is required"; exit 1
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 5 --max-time 10 \
            "{{workflow.parameters.local_llm_url}}/models" 2>/dev/null)

          if [ "${HTTP_CODE}" -eq 200 ]; then
            echo "LLM reachable (HTTP ${HTTP_CODE})"
          else
            echo "ERROR: LLM not reachable (HTTP ${HTTP_CODE})"; exit 1
          fi

    # Step 2: Call local LLM for analysis
    - name: call-local-llm
      retryStrategy:
        limit: 2
        retryPolicy: "OnFailure"
        backoff:
          duration: "10s"
          factor: 2
      script:
        image: badouralix/curl-jq:alpine
        command: [sh]
        volumeMounts:
          - name: work
            mountPath: /work
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        source: |
          echo "Calling {{workflow.parameters.llm_model}}..."

          cat > /tmp/prompt.json << 'PROMPT'
          {
            "model": "{{workflow.parameters.llm_model}}",
            "messages": [
              {
                "role": "system",
                "content": "/no_think You are a Kubernetes SRE expert performing incident triage. Provide a structured analysis with these exact sections:\n\n## Root Cause Analysis\nIdentify the most likely root cause.\n\n## Key Findings\nBullet list of diagnostic observations.\n\n## Recommended Fixes\nNumbered list of actionable remediation steps, most impactful first.\n\n## Investigation Checklist\nChecklist of manual verification steps for the SRE.\n\nBe concise and actionable. Do not speculate without evidence."
              },
              {
                "role": "user",
                "content": "Investigate this Kubernetes issue:\n\nEvent Type: {{workflow.parameters.event_type}}\nCluster: {{workflow.parameters.cluster}}\nNamespace: {{workflow.parameters.namespace}}\nResource: {{workflow.parameters.resource_kind}}/{{workflow.parameters.resource_name}}\nSeverity: {{workflow.parameters.severity}}\nError Message: {{workflow.parameters.error_message}}\n\nQuery: {{workflow.parameters.query}}"
              }
            ],
            "max_tokens": 3000,
            "temperature": 0.3
          }
          PROMPT

          START=$(date +%s)

          HTTP_CODE=$(curl -s -o /work/llm-response.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 180 \
            -X POST "{{workflow.parameters.local_llm_url}}/chat/completions" \
            -H "Content-Type: application/json" \
            -d @/tmp/prompt.json 2>/dev/null)

          DURATION=$(( $(date +%s) - START ))
          echo "HTTP: ${HTTP_CODE}, Duration: ${DURATION}s"

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "FAILED"; cat /work/llm-response.json 2>/dev/null; exit 1
          fi

          TOKENS=$(jq -r '.usage.total_tokens // 0' /work/llm-response.json)
          echo "Tokens: ${TOKENS}"

          jq --arg d "$DURATION" \
             --arg t "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             --arg m "{{workflow.parameters.llm_model}}" \
            '. + {_meta: {duration_s: ($d|tonumber), timestamp: $t, model: $m}}' \
            /work/llm-response.json > /work/resp.json && mv /work/resp.json /work/llm-response.json

    # Step 3: Format and create GitLab issue
    - name: create-gitlab-issue
      retryStrategy:
        limit: 2
        retryPolicy: "OnFailure"
        backoff:
          duration: "5s"
          factor: 2
      script:
        image: node:22-alpine
        command: [node]
        volumeMounts:
          - name: work
            mountPath: /work
        env:
          - name: GITLAB_TOKEN
            valueFrom:
              secretKeyRef:
                name: gitlab-token
                key: GITLAB_TOKEN
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        source: |
          const fs = require('fs');
          const https = require('https');

          let response;
          try {
            response = JSON.parse(fs.readFileSync('/work/llm-response.json', 'utf8'));
          } catch (e) {
            console.error('Failed to parse LLM response:', e.message);
            response = { choices: [{ message: { content: '_Error parsing LLM response_' } }] };
          }

          // Strip <think></think> tags that Qwen sometimes emits despite /no_think
          const raw = response.choices?.[0]?.message?.content || '_No analysis provided_';
          const content = raw.replace(/<think>[\s\S]*?<\/think>\s*/g, '').trim();
          const tokens = response.usage?.total_tokens || 0;
          const duration = response._meta?.duration_s || 'N/A';
          const model = response._meta?.model || 'unknown';
          const timestamp = new Date().toISOString();
          const rk = '{{workflow.parameters.resource_kind}}'.toLowerCase();

          const errorMsg = '{{workflow.parameters.error_message}}';
          const errorSection = errorMsg ? '```\n' + errorMsg + '\n```' : '_No error message provided_';

          const body = [
            '# Incident Analysis (Local LLM)',
            '',
            '| Field | Value |',
            '|-------|-------|',
            '| **Alert Type** | {{workflow.parameters.event_type}} |',
            '| **Cluster** | {{workflow.parameters.cluster}} |',
            '| **Namespace** | {{workflow.parameters.namespace}} |',
            '| **Resource** | {{workflow.parameters.resource_kind}}/{{workflow.parameters.resource_name}} |',
            `| **Timestamp** | ${timestamp} |`,
            '| **Severity** | {{workflow.parameters.severity}} |',
            `| **Model** | ${model} (local) |`,
            `| **Response Time** | ${duration}s |`,
            `| **Tokens** | ${tokens} |`,
            '',
            '### Error Message',
            errorSection,
            '',
            '---',
            '',
            '# Analysis',
            '',
            content,
            '',
            '---',
            '',
            '# Quick Commands',
            '',
            '```bash',
            `kubectl get ${rk} {{workflow.parameters.resource_name}} -n {{workflow.parameters.namespace}}`,
            `kubectl describe ${rk} {{workflow.parameters.resource_name}} -n {{workflow.parameters.namespace}}`,
            `kubectl logs ${rk}/{{workflow.parameters.resource_name}} -n {{workflow.parameters.namespace}} --tail=100`,
            `kubectl get events -n {{workflow.parameters.namespace}} --sort-by='.lastTimestamp' | tail -20`,
            '```',
            '',
            '---',
            '',
            '# Next Steps',
            '',
            '- [ ] Review this analysis',
            '- [ ] Verify findings against live cluster state',
            '- [ ] Apply recommended fixes',
            '- [ ] Monitor for recurrence',
            '- [ ] Close when resolved',
            '',
            '<details><summary>Raw LLM Response</summary>',
            '',
            '```json',
            JSON.stringify(response, null, 2).substring(0, 10000),
            '```',
            '</details>',
            '',
            `*Analysis-only | ${model} | {{workflow.name}}*`,
          ].join('\n');

          const payload = JSON.stringify({
            title: `[${model}][{{workflow.parameters.cluster}}] {{workflow.parameters.event_type}}: {{workflow.parameters.namespace}}/{{workflow.parameters.resource_name}}`,
            description: body,
            labels: 'analysis-only,local-llm,{{workflow.parameters.event_type}},{{workflow.parameters.severity}},auto-generated'
          });

          const url = new URL(`{{workflow.parameters.gitlab_url}}/api/v4/projects/{{workflow.parameters.gitlab_project_id}}/issues`);
          const options = {
            hostname: url.hostname,
            port: url.port || 443,
            path: url.pathname,
            method: 'POST',
            headers: {
              'PRIVATE-TOKEN': process.env.GITLAB_TOKEN,
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(payload)
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              console.log(`GitLab HTTP: ${res.statusCode}`);
              if (res.statusCode === 201) {
                const gl = JSON.parse(data);
                console.log(`Issue #${gl.iid}: ${gl.web_url}`);
                fs.writeFileSync('/work/gitlab-issue-url.txt', gl.web_url);
                fs.writeFileSync('/work/gitlab-issue-iid.txt', String(gl.iid));
              } else {
                console.error('GitLab error:', data);
                process.exit(1);
              }
            });
          });

          req.on('error', (e) => {
            console.error('Request failed:', e.message);
            process.exit(1);
          });

          req.write(payload);
          req.end();

    # Step 4: Notify Mattermost
    - name: mattermost-notify
      script:
        image: curlimages/curl:8.5.0
        command: [sh]
        volumeMounts:
          - name: work
            mountPath: /work
        env:
          - name: MATTERMOST_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: mattermost-webhook
                key: url
                optional: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        source: |
          # Use Secret if available, fall back to workflow parameter
          WEBHOOK_URL="${MATTERMOST_WEBHOOK_URL:-{{workflow.parameters.mattermost_webhook_url}}}"

          if [ -z "$WEBHOOK_URL" ] || [ "$WEBHOOK_URL" = "" ]; then
            echo "No Mattermost webhook configured, skipping notification"
            exit 0
          fi

          ISSUE_URL=$(cat /work/gitlab-issue-url.txt 2>/dev/null || echo "unknown")
          ISSUE_IID=$(cat /work/gitlab-issue-iid.txt 2>/dev/null || echo "?")

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"K8s Analyst\",
              \"icon_url\": \"https://raw.githubusercontent.com/robusta-dev/holmesgpt/main/docs/images/logo.png\",
              \"text\": \"### :mag: Analysis Complete\n| Field | Value |\n|---|---|\n| **Cluster** | {{workflow.parameters.cluster}} |\n| **Event** | {{workflow.parameters.event_type}} |\n| **Resource** | {{workflow.parameters.resource_kind}}/{{workflow.parameters.resource_name}} |\n| **Namespace** | {{workflow.parameters.namespace}} |\n| **Severity** | {{workflow.parameters.severity}} |\n| **Model** | {{workflow.parameters.llm_model}} (local) |\n| **GitLab** | [#${ISSUE_IID}](${ISSUE_URL}) |\n| **Workflow** | {{workflow.name}} |\n\n:information_source: *Analysis only - no remediation applied*\"
            }"

          echo "Notification sent (issue #${ISSUE_IID})"
