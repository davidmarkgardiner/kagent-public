# Test Workflow - KAgent Alert Triage
#
# Simulates an AlertManager KubePodCrashLooping alert targeting
# a test-crashloop pod in the default namespace.
#
# Prerequisites:
#   # Create a crashing pod for KAgent to investigate:
#   kubectl apply -f - <<'EOF'
#   apiVersion: v1
#   kind: Pod
#   metadata:
#     name: test-crashloop
#     namespace: default
#     labels:
#       test: kagent-alert-triage
#   spec:
#     restartPolicy: Always
#     containers:
#       - name: crash
#         image: busybox:latest
#         command: ["sh", "-c", "echo 'Starting...'; sleep 2; exit 1"]
#   EOF
#
# Submit:
#   kubectl apply -f test-kagent-alert-triage.yaml
#
# Watch:
#   argo watch -n argo @latest
#
# Cleanup:
#   kubectl delete pod test-crashloop -n default
#   argo delete -n argo -l app=k8s-triage,test=true
#
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: test-kagent-alert-
  namespace: argo
  labels:
    app: k8s-triage
    test: "true"
spec:
  workflowTemplateRef:
    name: kagent-alert-triage
  arguments:
    parameters:
      - name: alert-payload
        value: |
          {
            "version": "4",
            "groupKey": "{}:{alertname=\"KubePodCrashLooping\"}",
            "status": "firing",
            "receiver": "argo-events-webhook",
            "alerts": [{
              "status": "firing",
              "labels": {
                "alertname": "KubePodCrashLooping",
                "severity": "warning",
                "namespace": "default",
                "pod": "test-crashloop",
                "container": "crash"
              },
              "annotations": {
                "summary": "Pod default/test-crashloop is in CrashLoopBackOff",
                "description": "Pod default/test-crashloop (crash) is in waiting state (reason: CrashLoopBackOff) for more than 5 minutes."
              },
              "startsAt": "2026-02-18T10:00:00.000Z",
              "endsAt": "0001-01-01T00:00:00Z",
              "generatorURL": "http://prometheus:9090/graph"
            }],
            "commonLabels": {
              "alertname": "KubePodCrashLooping",
              "severity": "warning"
            },
            "commonAnnotations": {
              "summary": "Pod default/test-crashloop is in CrashLoopBackOff"
            },
            "externalURL": "http://alertmanager:9093"
          }
      - name: remediate
        value: "false"
