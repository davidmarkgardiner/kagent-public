apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: holmes-investigation-gitlab
  namespace: argo
  annotations:
    description: "Holmes AI investigation with automated GitLab issue creation"
    version: "2.1"
spec:
  serviceAccountName: argo
  entrypoint: investigate-and-report
  activeDeadlineSeconds: 600

  volumeClaimTemplates:
    - metadata:
        name: work
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 64Mi

  arguments:
    parameters:
      - name: query
        value: "Investigate Kubernetes resource"
      - name: title
        value: "Holmes Investigation"
      - name: event_type
        value: "Unknown"
      - name: cluster
        value: "homelab-prod"
      - name: namespace
        value: "default"
      - name: resource_kind
        value: "Pod"
      - name: resource_name
        value: "unknown"
      - name: severity
        value: "medium"
      - name: error_message
        value: ""
      - name: gitlab_project_id
        value: "68265584"
      - name: gitlab_token
        value: ""
      - name: gitlab_url
        value: "https://gitlab.com"
      - name: holmes_url
        value: "http://holmesgpt.holmes:5050"

  templates:
    - name: investigate-and-report
      steps:
        - - name: validate-inputs
            template: validate-inputs
        - - name: holmes-investigation
            template: call-holmes
        - - name: report
            template: format-and-create-issue

    - name: validate-inputs
      script:
        image: alpine:3.19
        command: [sh]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        source: |
          echo "Holmes Investigation Workflow"
          echo "Holmes: {{workflow.parameters.holmes_url}}"
          if [ -z "{{workflow.parameters.gitlab_token}}" ]; then
            echo "ERROR: gitlab_token is required"; exit 1
          fi
          if [ -z "{{workflow.parameters.query}}" ]; then
            echo "ERROR: query is required"; exit 1
          fi
          echo "Inputs validated"

    - name: call-holmes
      retryStrategy:
        limit: 2
        retryPolicy: "OnFailure"
        backoff:
          duration: "10s"
          factor: 2
      script:
        image: curlimages/curl:8.5.0
        command: [sh]
        volumeMounts:
          - name: work
            mountPath: /work
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        source: |
          echo "Calling Holmes AI at {{workflow.parameters.holmes_url}}..."

          cat > /tmp/request.json << 'HOLMESREQ'
          {
            "query": "{{workflow.parameters.query}}",
            "title": "{{workflow.parameters.title}}",
            "description": "Automated investigation via Argo Workflow",
            "source": "argo-workflow",
            "subject": {
              "kind": "{{workflow.parameters.resource_kind}}",
              "name": "{{workflow.parameters.resource_name}}",
              "namespace": "{{workflow.parameters.namespace}}"
            },
            "context": {
              "cluster": "{{workflow.parameters.cluster}}",
              "event_type": "{{workflow.parameters.event_type}}",
              "severity": "{{workflow.parameters.severity}}",
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}"
            }
          }
          HOLMESREQ

          HTTP_CODE=$(curl -s -o /work/holmes-response.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 120 \
            -X POST "{{workflow.parameters.holmes_url}}/api/investigate" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json 2>&1)

          echo "HTTP: ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -eq 200 ]; then
            echo "Holmes investigation completed"
            cat /work/holmes-response.json | head -50
          else
            echo "Holmes failed (HTTP ${HTTP_CODE})"
            cat /work/holmes-response.json 2>/dev/null
            exit 1
          fi

    - name: format-and-create-issue
      script:
        image: node:18-alpine
        command: [node]
        volumeMounts:
          - name: work
            mountPath: /work
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        source: |
          const fs = require('fs');
          const https = require('https');

          let response;
          try {
            response = JSON.parse(fs.readFileSync('/work/holmes-response.json', 'utf8'));
          } catch (e) {
            console.error('Failed to parse Holmes response:', e.message);
            response = { analysis: '_Error parsing Holmes response_', error: e.message };
          }

          const investigationId = `{{workflow.name}}-${Date.now()}`;
          const timestamp = new Date().toISOString();

          const formatToolCalls = (calls) => {
            if (!calls || !Array.isArray(calls) || calls.length === 0) return '_None_';
            return calls.map(t => `- \`${t.tool_name || 'unknown'}\`: ${t.description || ''}`).join('\n');
          };

          const formatSections = (sections) => {
            if (!sections || !Array.isArray(sections) || sections.length === 0) return '_None_';
            return sections.map(s => {
              if (typeof s === 'string') return `- ${s}`;
              if (s.title && s.content) return `### ${s.title}\n${s.content}`;
              return `- ${JSON.stringify(s)}`;
            }).join('\n\n');
          };

          const errorMsg = '{{workflow.parameters.error_message}}';
          const errorSection = errorMsg ? '```\n' + errorMsg + '\n```' : '_No error message_';
          const rk = '{{workflow.parameters.resource_kind}}'.toLowerCase();

          const body = [
            '# Problem Summary',
            '',
            '| Field | Value |',
            '|-------|-------|',
            '| **Alert Type** | {{workflow.parameters.event_type}} |',
            '| **Cluster** | {{workflow.parameters.cluster}} |',
            '| **Namespace** | {{workflow.parameters.namespace}} |',
            '| **Resource** | {{workflow.parameters.resource_kind}}/{{workflow.parameters.resource_name}} |',
            `| **Timestamp** | ${timestamp} |`,
            '| **Severity** | {{workflow.parameters.severity}} |',
            `| **LLM Calls** | ${response.num_llm_calls || 'N/A'} |`,
            '',
            '### Error Message',
            errorSection,
            '',
            '---',
            '',
            '# Holmes AI Analysis',
            '',
            response.analysis || '_No analysis provided_',
            '',
            '### Key Findings',
            formatSections(response.sections),
            '',
            '### Tool Calls',
            formatToolCalls(response.tool_calls),
            '',
            '---',
            '',
            '# Next Steps',
            '',
            '- [ ] Review investigation report',
            '- [ ] Verify findings against cluster state',
            '- [ ] Apply recommended fixes',
            '- [ ] Close when resolved',
            '',
            '---',
            '',
            '```bash',
            `kubectl get ${rk} {{workflow.parameters.resource_name}} -n {{workflow.parameters.namespace}}`,
            `kubectl logs ${rk}/{{workflow.parameters.resource_name}} -n {{workflow.parameters.namespace}} --tail=100`,
            `kubectl describe ${rk} {{workflow.parameters.resource_name}} -n {{workflow.parameters.namespace}}`,
            '```',
            '',
            '<details><summary>Raw Holmes Response</summary>',
            '',
            '```json',
            JSON.stringify(response, null, 2),
            '```',
            '</details>',
            '',
            `*Auto-generated by Holmes AI + Argo Workflow | ${investigationId}*`,
          ].join('\n');

          const payload = JSON.stringify({
            title: `[{{workflow.parameters.cluster}}] {{workflow.parameters.event_type}}: {{workflow.parameters.namespace}}/{{workflow.parameters.resource_name}} - Holmes Investigation`,
            description: body,
            labels: 'holmes-investigation,{{workflow.parameters.event_type}},{{workflow.parameters.severity}},auto-generated'
          });

          const url = new URL(`{{workflow.parameters.gitlab_url}}/api/v4/projects/{{workflow.parameters.gitlab_project_id}}/issues`);
          const options = {
            hostname: url.hostname,
            port: url.port || 443,
            path: url.pathname,
            method: 'POST',
            headers: {
              'PRIVATE-TOKEN': '{{workflow.parameters.gitlab_token}}',
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(payload)
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              console.log(`GitLab HTTP: ${res.statusCode}`);
              if (res.statusCode === 201) {
                const gl = JSON.parse(data);
                console.log(`Issue #${gl.iid}: ${gl.web_url}`);
              } else {
                console.error('GitLab error:', data);
                process.exit(1);
              }
            });
          });

          req.on('error', (e) => { console.error('Request failed:', e.message); process.exit(1); });
          req.write(payload);
          req.end();
