# KAgent Alert Triage - Bridge WorkflowTemplate
#
# Bridges AlertManager webhook payloads to the kagent-sre-workflow.
# Parses raw AlertManager JSON → extracts structured params → submits
# a child workflow using the kagent-sre-workflow WorkflowTemplate.
#
# Flow: parse alert payload → submit kagent-sre-workflow → wait for completion
#
# Usage (manual):
#   argo submit --from workflowtemplate/kagent-alert-triage \
#     -p alert-payload='{"status":"firing","alerts":[...]}'
#
# Usage (via Argo Events sensor):
#   The sensor injects the AlertManager body into the alert-payload parameter.
#
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: kagent-alert-triage
  namespace: argo
  labels:
    app: k8s-triage
    type: kagent-alert-bridge
  annotations:
    description: "Bridge: AlertManager payload → KAgent SRE investigation"
    version: "1.0"
spec:
  serviceAccountName: argo
  entrypoint: main
  activeDeadlineSeconds: 1200

  ttlStrategy:
    secondsAfterCompletion: 600
    secondsAfterSuccess: 300
    secondsAfterFailure: 1800
  podGC:
    strategy: OnWorkflowCompletion

  arguments:
    parameters:
      - name: alert-payload
        description: "Raw AlertManager webhook JSON payload"
      - name: remediate
        value: "false"
        description: "Set to true to use sre-remediation-agent instead of sre-triage-agent"

  templates:
    - name: main
      steps:
        - - name: parse
            template: parse-alert-payload
        - - name: kagent-triage
            template: submit-kagent-workflow
            arguments:
              parameters:
                - name: query
                  value: "{{steps.parse.outputs.parameters.query}}"
                - name: event_type
                  value: "{{steps.parse.outputs.parameters.event_type}}"
                - name: namespace
                  value: "{{steps.parse.outputs.parameters.namespace}}"
                - name: resource_kind
                  value: "{{steps.parse.outputs.parameters.resource_kind}}"
                - name: resource_name
                  value: "{{steps.parse.outputs.parameters.resource_name}}"
                - name: severity
                  value: "{{steps.parse.outputs.parameters.severity}}"
                - name: error_message
                  value: "{{steps.parse.outputs.parameters.error_message}}"

    # Step 1: Parse AlertManager JSON payload
    # Extracts fields from the first alert in the alerts[] array
    - name: parse-alert-payload
      script:
        image: badouralix/curl-jq:alpine
        command: [sh]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        source: |
          set -e
          cat > /tmp/payload.json << 'EOF'
          {{workflow.parameters.alert-payload}}
          EOF

          echo "=== KAgent Alert Triage Bridge v1.0 ==="

          # Validate payload
          ALERT_COUNT=$(jq '.alerts | length' /tmp/payload.json 2>/dev/null)
          if [ -z "$ALERT_COUNT" ] || [ "$ALERT_COUNT" -eq 0 ]; then
            echo "ERROR: No alerts found in payload"
            exit 1
          fi
          echo "Payload contains ${ALERT_COUNT} alert(s), processing first alert"

          # Extract fields from first firing alert
          ALERTNAME=$(jq -r '.alerts[0].labels.alertname // "Unknown"' /tmp/payload.json)
          NAMESPACE=$(jq -r '.alerts[0].labels.namespace // "default"' /tmp/payload.json)
          POD=$(jq -r '.alerts[0].labels.pod // "unknown"' /tmp/payload.json)
          CONTAINER=$(jq -r '.alerts[0].labels.container // ""' /tmp/payload.json)
          SEVERITY=$(jq -r '.alerts[0].labels.severity // "warning"' /tmp/payload.json)
          SUMMARY=$(jq -r '.alerts[0].annotations.summary // ""' /tmp/payload.json)
          DESCRIPTION=$(jq -r '.alerts[0].annotations.description // ""' /tmp/payload.json)

          echo "Alert: ${ALERTNAME} | NS: ${NAMESPACE} | Pod: ${POD} | Severity: ${SEVERITY}"

          # Build investigation query
          QUERY="Investigate ${ALERTNAME} alert for Pod/${POD} in namespace ${NAMESPACE}."
          [ -n "$SUMMARY" ] && QUERY="${QUERY} Summary: ${SUMMARY}."
          [ -n "$DESCRIPTION" ] && QUERY="${QUERY} ${DESCRIPTION}"

          # Build error message from annotations
          ERROR_MSG="${SUMMARY}"
          if [ -n "$DESCRIPTION" ] && [ "$DESCRIPTION" != "" ]; then
            ERROR_MSG="${SUMMARY} — ${DESCRIPTION}"
          fi

          # Map Prometheus severity to workflow severity levels
          case "$SEVERITY" in
            critical) SEV="high" ;;
            warning)  SEV="medium" ;;
            *)        SEV="low" ;;
          esac

          # Write outputs
          printf '%s' "$QUERY"      > /tmp/query
          printf '%s' "$ALERTNAME"  > /tmp/event_type
          printf '%s' "$NAMESPACE"  > /tmp/namespace
          printf '%s' "Pod"         > /tmp/resource_kind
          printf '%s' "$POD"        > /tmp/resource_name
          printf '%s' "$SEV"        > /tmp/severity
          printf '%s' "$ERROR_MSG"  > /tmp/error_message

          echo "Parsed → event_type=${ALERTNAME}, ns=${NAMESPACE}, pod=${POD}, severity=${SEV}"
      outputs:
        parameters:
          - name: query
            valueFrom:
              path: /tmp/query
          - name: event_type
            valueFrom:
              path: /tmp/event_type
          - name: namespace
            valueFrom:
              path: /tmp/namespace
          - name: resource_kind
            valueFrom:
              path: /tmp/resource_kind
          - name: resource_name
            valueFrom:
              path: /tmp/resource_name
          - name: severity
            valueFrom:
              path: /tmp/severity
          - name: error_message
            valueFrom:
              path: /tmp/error_message

    # Step 2: Submit kagent-sre-workflow as a child Workflow
    # Uses the resource template to create a Workflow CR and wait for completion
    - name: submit-kagent-workflow
      inputs:
        parameters:
          - name: query
          - name: event_type
          - name: namespace
          - name: resource_kind
          - name: resource_name
          - name: severity
          - name: error_message
      resource:
        action: create
        successCondition: status.phase == Succeeded
        failureCondition: status.phase in (Failed, Error)
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: kagent-alert-
            namespace: argo
            labels:
              app: k8s-triage
              trigger: alertmanager
          spec:
            workflowTemplateRef:
              name: kagent-sre-workflow
            arguments:
              parameters:
                - name: query
                  value: "{{inputs.parameters.query}}"
                - name: event_type
                  value: "{{inputs.parameters.event_type}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
                - name: resource_kind
                  value: "{{inputs.parameters.resource_kind}}"
                - name: resource_name
                  value: "{{inputs.parameters.resource_name}}"
                - name: severity
                  value: "{{inputs.parameters.severity}}"
                - name: error_message
                  value: "{{inputs.parameters.error_message}}"
                - name: remediate
                  value: "{{workflow.parameters.remediate}}"
                - name: cluster
                  value: "{{CLUSTER_NAME}}"
