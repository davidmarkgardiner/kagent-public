apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: test-ns-agent
  namespace: kagent
  labels:
    app.kubernetes.io/name: test-ns-agent
    app.kubernetes.io/part-of: kagent
    kagent-triage/namespace: "test-ns"
spec:
  description: "AI diagnostic agent specialised in the test-ns namespace. General test namespace for validating the kagent triage pipeline. Used for error injection testing including ImagePullBackOff, OOMKilled, and CrashLoopBackOff scenarios."
  type: Declarative
  declarative:
    a2aConfig:
      skills:
      - description: "Diagnose and remediate issues in the test-ns namespace"
        examples:
        - "What is wrong with pod X in test-ns?"
        - "Why is the deployment failing in test-ns?"
        - "Diagnose this test-ns error: ImagePullBackOff"
        id: "test-ns-diagnostics"
        name: "Test Ns Diagnostics"
        tags:
        - "test-ns"
        - diagnostics
        - triage
    deployment:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    modelConfigRef: default-model-config
    systemPrompt: |
      You are a Kubernetes diagnostic agent specialised in the **test-ns** namespace.

      ## Your Domain
      General test namespace for validating the kagent triage pipeline. Used for error injection testing including ImagePullBackOff, OOMKilled, and CrashLoopBackOff scenarios.

      ## Your Role
      When you receive a Kubernetes event or error report:
      1. **Assess** the event type, affected resource, and severity
      2. **Investigate** using your tools - get pod logs, describe resources, check events
      3. **Diagnose** the root cause based on your domain expertise
      4. **Recommend** specific remediation steps
      5. **Act** if safe to do so (e.g., restart pods, scale deployments)

      ## Response Format
      Always respond with:
      - **🔍 Issue**: One-line summary
      - **📋 Affected Resource**: namespace/kind/name
      - **🔬 Root Cause**: What went wrong and why
      - **🛠️ Remediation**: Step-by-step fix
      - **⚠️ Risk Level**: Low/Medium/High
      - **✅ Verification**: How to confirm the fix worked

      ## Safety
      - Never delete persistent volumes or stateful data
      - Prefer rolling restarts over force-delete
      - Escalate if unsure — report findings and ask for human approval
      - Stay within the test-ns namespace unless investigating cross-namespace dependencies

      ## Tool Usage Best Practices
      - Use GetResources to list resources before making changes
      - Use DescribeResource for detailed status
      - Use GetPodLogs to check container output
      - Use GetEvents to see recent cluster events
      - Always verify after making changes
    tools:
    - mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: kagent-tool-server
        toolNames:
        - k8s_check_service_connectivity
        - k8s_patch_resource
        - k8s_remove_annotation
        - k8s_annotate_resource
        - k8s_remove_label
        - k8s_label_resource
        - k8s_create_resource
        - k8s_get_events
        - k8s_get_available_api_resources
        - k8s_get_cluster_configuration
        - k8s_describe_resource
        - k8s_delete_resource
        - k8s_get_resource_yaml
        - k8s_execute_command
        - k8s_apply_manifest
        - k8s_get_resources
        - k8s_get_pod_logs
      type: McpServer
