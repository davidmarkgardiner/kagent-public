---
# Fault 1: ExternalSecret referencing non-existent SecretStore
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: test-broken-externalsecret
  namespace: external-secrets
  labels:
    app: kagent-test
    test-type: secretstore-not-found
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: nonexistent-store
    kind: SecretStore
  target:
    name: test-broken-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: fake/secret/path
---
# Fault 2: CrashLoopBackOff — simulate operator crash
apiVersion: v1
kind: Pod
metadata:
  name: test-crashloop-eso
  namespace: external-secrets
  labels:
    app: kagent-test
    test-type: crashloop
spec:
  containers:
  - name: crash
    image: busybox:latest
    command: ["sh", "-c", "echo 'ESO component crash simulation'; exit 1"]
    resources:
      requests:
        memory: "16Mi"
        cpu: "10m"
      limits:
        memory: "32Mi"
        cpu: "50m"
  restartPolicy: Always
