# Test Error Injection Manifests for test-ns
# Apply these to trigger various Kubernetes errors for testing kagent triage

---
# 1. ImagePullBackOff - Deployment with non-existent image tag
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-image-deployment
  namespace: test-ns
  labels:
    app: bad-image
    test-type: image-pull-error
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-image
  template:
    metadata:
      labels:
        app: bad-image
        test-type: image-pull-error
    spec:
      containers:
        - name: nginx
          image: nginx:nonexistent-tag-xyz123
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---
# 2. OOMKilled - Pod with very low memory limit that will be killed
apiVersion: v1
kind: Pod
metadata:
  name: oom-test-pod
  namespace: test-ns
  labels:
    app: memory-stress
    test-type: oom-killed
spec:
  containers:
    - name: stress
      image: polinux/stress:latest
      command:
        - stress
      args:
        - --vm
        - "1"
        - --vm-bytes
        - "100M"  # Try to allocate 100MB
        - --vm-hang
        - "1"
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"  # Only 64MB allowed - will cause OOMKill
          cpu: "100m"
  restartPolicy: Never

---
# 3. CrashLoopBackOff - Pod with bad command that exits immediately
apiVersion: v1
kind: Pod
metadata:
  name: crashloop-test-pod
  namespace: test-ns
  labels:
    app: crash-test
    test-type: crashloop-backoff
spec:
  containers:
    - name: crash
      image: busybox:latest
      command:
        - /bin/sh
        - -c
        - "echo 'Intentional crash for testing'; exit 1"
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "64Mi"
          cpu: "50m"
  restartPolicy: Always

---
# 4. Additional: Deployment with resource pressure (optional testing)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-pressure-deployment
  namespace: test-ns
  labels:
    app: resource-pressure
    test-type: resource-pressure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-pressure
  template:
    metadata:
      labels:
        app: resource-pressure
        test-type: resource-pressure
    spec:
      containers:
        - name: cpu-stress
          image: polinux/stress:latest
          command:
            - stress
          args:
            - --cpu
            - "4"
            - --timeout
            - "600s"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"  # Will be CPU throttled
