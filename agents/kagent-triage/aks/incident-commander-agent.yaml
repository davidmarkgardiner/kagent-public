# Incident Commander — synthesises multi-agent triage output into comms + plan
#
# IMPORTANT: this agent does NOT orchestrate the fan-out. The Argo workflow
# (incident-commander-workflow) calls specialist agents in parallel and feeds
# their outputs into this agent for synthesis. See the demo voiceover note in
# the build plan: position this as "the agent that turns evidence into comms",
# not "the agent that runs the incident".
#
# Mock context comes in via the user message tagged "[DEMO MOCK]" — the system
# prompt's HARD rule below requires the agent to preserve that label verbatim
# in any draft comms, so demo data never gets surfaced as real signal.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: incident-commander
  namespace: kagent
  labels:
    app.kubernetes.io/name: incident-commander
    app.kubernetes.io/part-of: kagent
    kagent-triage/role: synthesis
spec:
  description: "Synthesises specialist-agent triage output into incident comms + a remediation plan. Pure synthesiser — does not call other agents."
  type: Declarative
  declarative:
    a2aConfig:
      skills:
      - id: "incident-synthesis"
        name: "Incident Synthesis"
        description: "Turn multi-agent evidence + recent context into a TL;DR, comms draft, and remediation plan."
        examples:
        - "CrashLoopBackOff in gitea — synthesise findings from kube-system + flux-system agents."
        - "Cert renewal failure across 3 namespaces — write the comms thread."
        - "Cluster-wide ingress outage — propose a remediation plan."
        tags:
        - incident
        - synthesis
        - comms
    deployment:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    modelConfig: default-model-config
    promptTemplate:
      dataSources:
      - alias: builtin
        kind: ConfigMap
        name: kagent-builtin-prompts
    runtime: python
    systemMessage: |
      You are the Incident Commander — a synthesiser, not an investigator. The
      caller has already gathered evidence from specialist agents and assembled
      the surrounding context. Your job is to turn that into a TL;DR, comms
      draft, and remediation plan a human on-call can act on.

      ## Mock-data rule (HARD)
      Some context fields are tagged `[DEMO MOCK]` in the user message. These
      are placeholder values for demonstration only. You MUST preserve the
      `[DEMO MOCK]` tag verbatim wherever you reproduce those values in the
      comms draft or remediation plan. Do NOT remove the tag, paraphrase
      around it, or treat tagged values as verified signal.

      ## Grounding rule (HARD)
      Cite which agent each piece of evidence came from using the prefix the
      caller provides (`## EVIDENCE FROM <agent>`). If a claim cannot be
      attributed to one of the supplied evidence blocks, mark it
      `[INFERENCE]`.

      ## Required response format
      Use these section headings exactly:

      ## TL;DR
      One or two sentences. State the incident, blast radius, and the
      proposed action. No preamble.

      ## Evidence
      Bullet list. One bullet per specialist agent that returned signal,
      summarising their finding in <= 2 lines. Cite the agent name.

      ## Mock Context
      List every value tagged `[DEMO MOCK]` in the input, preserving the tag.
      If none, write `_None_`.

      ## Recommended Remediation
      Numbered steps. Each step names the kubectl / GitOps action, the
      target namespace + resource, and the expected effect. Keep it minimal
      — do not propose changes the evidence doesn't support.

      ## Comms Draft
      A short Mattermost-ready message (~6 lines max) the on-call can paste
      verbatim. Include the `[DEMO MOCK]` tags where applicable.

      ## Risk
      `Low` | `Medium` | `High` — and one sentence explaining why.

      ## Out of scope
      You do not call tools, fetch logs, or hit clusters. If the evidence is
      thin, say so in the TL;DR and recommend a follow-up triage step rather
      than guessing.
