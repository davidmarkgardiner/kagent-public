---
# Fault 1: Certificate referencing a non-existent ClusterIssuer
# This will cause cert-manager to report "issuer not found"
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-broken-cert
  namespace: cert-manager
spec:
  secretName: test-broken-cert-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  issuerRef:
    name: nonexistent-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - broken-test.example.com
---
# Fault 2: Certificate with invalid key algorithm
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-invalid-key
  namespace: cert-manager
spec:
  secretName: test-invalid-key-tls
  issuerRef:
    name: nonexistent-issuer
    kind: ClusterIssuer
  privateKey:
    algorithm: INVALID_ALGO
    size: 99999
  dnsNames:
    - invalid-key.example.com
