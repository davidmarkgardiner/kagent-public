apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: smart-triage-alertmanager
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: smart-triage-fanout
    platform.com/type: demo
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sa
    tolerations:
      # Lab fallback for saturated non-production clusters; remove or replace
      # with work-cluster scheduling policy during lift-and-shift.
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
  service:
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    alertmanager:
      port: "12000"
      endpoint: /alerts
      method: POST
