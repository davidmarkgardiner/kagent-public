apiVersion: v1
kind: ServiceAccount
metadata:
  name: smart-triage-fanout-workflow
  namespace: argo
  labels:
    app.kubernetes.io/part-of: smart-triage-fanout
    platform.com/type: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smart-triage-fanout-workflow
  namespace: argo
  labels:
    app.kubernetes.io/part-of: smart-triage-fanout
    platform.com/type: demo
rules:
  - apiGroups: [argoproj.io]
    resources: [workflowtaskresults]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smart-triage-fanout-workflow
  namespace: argo
  labels:
    app.kubernetes.io/part-of: smart-triage-fanout
    platform.com/type: demo
subjects:
  - kind: ServiceAccount
    name: smart-triage-fanout-workflow
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: smart-triage-fanout-workflow
