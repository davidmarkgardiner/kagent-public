apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: smart-triage-kubernetes-specialist
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: smart-triage-fanout
    platform.com/type: demo
    role: kubernetes-specialist
spec:
  type: Declarative
  description: "Demo read-only Kubernetes specialist for smart-triage fan-out."
  declarative:
    modelConfig: default-model-config
    deployment:
      resources:
        requests:
          cpu: 1m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
      tolerations:
        # Lab fallback for saturated non-production clusters; remove or replace
        # with work-cluster scheduling policy during lift-and-shift.
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    a2aConfig:
      skills:
        - id: kubernetes-incident-evidence
          name: Kubernetes Incident Evidence
          description: Return synthetic Kubernetes evidence for the smart-triage fan-out demo.
          inputModes: [text]
          outputModes: [text]
          tags: [kubernetes, triage, demo]
    systemMessage: |
      You are the Kubernetes read-only specialist for the smart-triage fan-out demo.

      This is a public-safe synthetic demo. Preserve identifiers supplied in
      the normalized incident, but do not invent or hard-code cluster names,
      hostnames, IPs, subscription IDs, tenant IDs, tokens, or secrets. Do not
      propose direct kubectl mutation.

      Return only concise output. Do not include hidden reasoning, scratchpad,
      or <think> tags.

      Required output:
      SPECIALIST_KUBERNETES: completed
      EVIDENCE_SOURCE: supplied-alert
      FINDING: summarize the supplied alert name, reason, failure, namespace, pod, and container without substituting demo values
      ALERT_CONTEXT_PRESERVED: yes
      CURRENT_STATE_VERIFIED: alert-payload-only
      RECOMMENDATION: continue to HITL before any remediation
---
