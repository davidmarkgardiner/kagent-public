apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: smart-triage-fanout-
  namespace: argo
  labels:
    app.kubernetes.io/part-of: smart-triage-fanout
    platform.com/team: platform
    platform.com/type: demo
spec:
  entrypoint: main
  serviceAccountName: smart-triage-fanout-workflow
  activeDeadlineSeconds: 1200
  parallelism: 4
  ttlStrategy:
    secondsAfterCompletion: 86400
    secondsAfterSuccess: 86400
    secondsAfterFailure: 900
  volumes:
    - name: agent-eval-runtime
      configMap:
        name: agent-eval-runtime-files
        defaultMode: 0755
        items:
          - key: reporting.py
            path: scripts/reporting.py
          - key: collect-lifecycle-evidence.py
            path: scripts/collect-lifecycle-evidence.py
          - key: score-lifecycle-run.py
            path: scripts/score-lifecycle-run.py
          - key: summarize-agent-scores.py
            path: scripts/summarize-agent-scores.py
          - key: pod-crashloop-hitl-remediation.yaml
            path: lifecycle-cases/pod-crashloop-hitl-remediation.yaml
  arguments:
    parameters:
      - name: kubernetes_url
        value: "http://smart-triage-kubernetes-specialist.kagent:8080/"
      - name: network_url
        value: "http://smart-triage-network-specialist.kagent:8080/"
      - name: grafana_url
        value: "http://smart-triage-grafana-specialist.kagent:8080/"
      - name: gitops_url
        value: "http://smart-triage-gitops-specialist.kagent:8080/"
      - name: knowledge_url
        value: "http://smart-triage-knowledge-specialist.kagent:8080/"
      - name: deployment_url
        value: "http://smart-triage-deployment-specialist.kagent:8080/"
      - name: policy_url
        value: "http://smart-triage-policy-specialist.kagent:8080/"
      - name: trace_url
        value: "http://smart-triage-trace-specialist.kagent:8080/"
      - name: commander_url
        value: "http://smart-triage-incident-commander.kagent:8080/"
      - name: scenario
        value: "CrashLoopBackOff for deployment checkout-api in namespace demo-payments after a demo config rollout"
      - name: fingerprint
        value: "demo-checkout-api-smart-triage"
      - name: alert_source
        value: "manual"
      - name: alert_payload
        value: "{}"
  templates:
    - name: main
      dag:
        tasks:
          - name: normalize-incident
            template: normalize-incident

          - name: fanout-kubernetes
            template: call-specialist
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            arguments:
              parameters:
                - name: phase
                  value: kubernetes
                - name: url
                  value: "{{workflow.parameters.kubernetes_url}}"
                - name: marker
                  value: "SPECIALIST_KUBERNETES: completed"
                - name: prompt
                  value: |
                    {{tasks.normalize-incident.outputs.parameters.normalized}}
                    Scenario: {{workflow.parameters.scenario}}
                    Fingerprint: {{workflow.parameters.fingerprint}}
                    Specialist: Kubernetes.
                    Return the required Kubernetes evidence marker exactly.

          - name: fanout-network
            template: call-specialist
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            arguments:
              parameters:
                - name: phase
                  value: network
                - name: url
                  value: "{{workflow.parameters.network_url}}"
                - name: marker
                  value: "SPECIALIST_NETWORK: completed"
                - name: prompt
                  value: |
                    {{tasks.normalize-incident.outputs.parameters.normalized}}
                    Scenario: {{workflow.parameters.scenario}}
                    Fingerprint: {{workflow.parameters.fingerprint}}
                    Specialist: network/Hubble.
                    Return the required network evidence marker exactly.

          - name: fanout-grafana
            template: call-specialist
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            arguments:
              parameters:
                - name: phase
                  value: grafana
                - name: url
                  value: "{{workflow.parameters.grafana_url}}"
                - name: marker
                  value: "SPECIALIST_GRAFANA: completed"
                - name: prompt
                  value: |
                    {{tasks.normalize-incident.outputs.parameters.normalized}}
                    Scenario: {{workflow.parameters.scenario}}
                    Fingerprint: {{workflow.parameters.fingerprint}}
                    Specialist: Grafana evidence.
                    Return the required Grafana evidence marker exactly.

          - name: fanout-gitops
            template: call-specialist
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            arguments:
              parameters:
                - name: phase
                  value: gitops
                - name: url
                  value: "{{workflow.parameters.gitops_url}}"
                - name: marker
                  value: "SPECIALIST_GITOPS: completed"
                - name: prompt
                  value: |
                    {{tasks.normalize-incident.outputs.parameters.normalized}}
                    Scenario: {{workflow.parameters.scenario}}
                    Fingerprint: {{workflow.parameters.fingerprint}}
                    Specialist: GitOps dry-run.
                    Return the required GitOps dry-run marker exactly.
                    Do not claim any real issue, MR, branch, commit, or cluster mutation happened.

          - name: fanout-knowledge
            template: call-specialist
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            arguments:
              parameters:
                - name: phase
                  value: knowledge
                - name: url
                  value: "{{workflow.parameters.knowledge_url}}"
                - name: marker
                  value: "SPECIALIST_KNOWLEDGE: completed"
                - name: prompt
                  value: |
                    {{tasks.normalize-incident.outputs.parameters.normalized}}
                    Scenario: {{workflow.parameters.scenario}}
                    Fingerprint: {{workflow.parameters.fingerprint}}
                    Specialist: knowledge/runbook retrieval.
                    Return the required citation and knowledge evidence marker exactly.
                    Do not claim that a real repository or MR was updated.

          - name: fanout-deployment
            template: call-specialist
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            arguments:
              parameters:
                - name: phase
                  value: deployment
                - name: url
                  value: "{{workflow.parameters.deployment_url}}"
                - name: marker
                  value: "SPECIALIST_DEPLOYMENT: completed"
                - name: prompt
                  value: |
                    {{tasks.normalize-incident.outputs.parameters.normalized}}
                    Scenario: {{workflow.parameters.scenario}}
                    Fingerprint: {{workflow.parameters.fingerprint}}
                    Specialist: deployment state.
                    Return the required deployment-state marker exactly.
                    Read only. Do not propose sync, rollback, restart, patch, apply, or delete.

          - name: fanout-policy
            template: call-specialist
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            arguments:
              parameters:
                - name: phase
                  value: policy
                - name: url
                  value: "{{workflow.parameters.policy_url}}"
                - name: marker
                  value: "SPECIALIST_POLICY: completed"
                - name: prompt
                  value: |
                    {{tasks.normalize-incident.outputs.parameters.normalized}}
                    Scenario: {{workflow.parameters.scenario}}
                    Fingerprint: {{workflow.parameters.fingerprint}}
                    Specialist: policy and security context.
                    Return the required policy/security marker exactly.
                    Read only. Do not mutate policies, admission rules, images, or workloads.

          - name: fanout-trace
            template: call-specialist
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            arguments:
              parameters:
                - name: phase
                  value: trace
                - name: url
                  value: "{{workflow.parameters.trace_url}}"
                - name: marker
                  value: "SPECIALIST_TRACE: completed"
                - name: prompt
                  value: |
                    {{tasks.normalize-incident.outputs.parameters.normalized}}
                    Scenario: {{workflow.parameters.scenario}}
                    Fingerprint: {{workflow.parameters.fingerprint}}
                    Specialist: trace context.
                    Return the required trace marker exactly.
                    This public repo has no live app trace backend; use the explicit fallback contract if needed.

          - name: synthesize-incident
            template: call-commander
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            dependencies:
              - fanout-kubernetes
              - fanout-network
              - fanout-grafana
              - fanout-gitops
              - fanout-knowledge
              - fanout-deployment
              - fanout-policy
              - fanout-trace
            arguments:
              parameters:
                - name: normalized_incident
                  value: "{{tasks.normalize-incident.outputs.parameters.normalized}}"
                - name: kubernetes_output
                  value: "{{tasks.fanout-kubernetes.outputs.parameters.response}}"
                - name: network_output
                  value: "{{tasks.fanout-network.outputs.parameters.response}}"
                - name: grafana_output
                  value: "{{tasks.fanout-grafana.outputs.parameters.response}}"
                - name: gitops_output
                  value: "{{tasks.fanout-gitops.outputs.parameters.response}}"
                - name: knowledge_output
                  value: "{{tasks.fanout-knowledge.outputs.parameters.response}}"
                - name: deployment_output
                  value: "{{tasks.fanout-deployment.outputs.parameters.response}}"
                - name: policy_output
                  value: "{{tasks.fanout-policy.outputs.parameters.response}}"
                - name: trace_output
                  value: "{{tasks.fanout-trace.outputs.parameters.response}}"

          - name: wait-for-human-review
            template: human-review
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            dependencies: [synthesize-incident]

          - name: finalize-approved
            template: finalize-approved
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            dependencies: [wait-for-human-review]

          - name: prove-result
            template: prove-result
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            dependencies: [finalize-approved]
            arguments:
              parameters:
                - name: normalized_incident
                  value: "{{tasks.normalize-incident.outputs.parameters.normalized}}"
                - name: kubernetes_output
                  value: "{{tasks.fanout-kubernetes.outputs.parameters.response}}"
                - name: network_output
                  value: "{{tasks.fanout-network.outputs.parameters.response}}"
                - name: grafana_output
                  value: "{{tasks.fanout-grafana.outputs.parameters.response}}"
                - name: gitops_output
                  value: "{{tasks.fanout-gitops.outputs.parameters.response}}"
                - name: knowledge_output
                  value: "{{tasks.fanout-knowledge.outputs.parameters.response}}"
                - name: deployment_output
                  value: "{{tasks.fanout-deployment.outputs.parameters.response}}"
                - name: policy_output
                  value: "{{tasks.fanout-policy.outputs.parameters.response}}"
                - name: trace_output
                  value: "{{tasks.fanout-trace.outputs.parameters.response}}"
                - name: synthesis_output
                  value: "{{tasks.synthesize-incident.outputs.parameters.response}}"

          - name: evaluate-lifecycle
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == false"
            dependencies: [prove-result]
            templateRef:
              name: agent-lifecycle-eval
              template: evaluate-lifecycle
            arguments:
              parameters:
                - name: runtime_image
                  value: "alpine:3.19"
                - name: agent_eval_root
                  value: /opt/agent-evals
                - name: case_id
                  value: pod-crashloop-hitl-remediation
                - name: run_id
                  value: "{{workflow.name}}"
                - name: workflow_name
                  value: "{{workflow.name}}"
                - name: incident_id
                  value: "{{workflow.parameters.fingerprint}}"
                - name: incident_namespace
                  value: demo-payments
                - name: workload
                  value: checkout-api
                - name: failure_mode
                  value: CrashLoopBackOff
                - name: ticket_system
                  value: GitLab
                - name: ticket_id
                  value: "{{workflow.parameters.fingerprint}}"
                - name: ticket_url
                  value: PLACEHOLDER_GITLAB_ISSUE_URL
                - name: ticket_closed
                  value: "false"
                - name: remediation_mode
                  value: gitops_or_workflow_only
                - name: workflow_json
                  value: "{{tasks.prove-result.outputs.parameters.workflow-json}}"
                - name: marker_evidence
                  value: "{{tasks.prove-result.outputs.parameters.marker-evidence}}"

          - name: duplicate-suppressed
            template: duplicate-suppressed
            dependencies: [normalize-incident]
            when: "{{tasks.normalize-incident.outputs.parameters.duplicate}} == true"
            arguments:
              parameters:
                - name: normalized_incident
                  value: "{{tasks.normalize-incident.outputs.parameters.normalized}}"

    - name: human-review
      suspend: {}

    - name: normalize-incident
      outputs:
        parameters:
          - name: normalized
            valueFrom:
              path: /tmp/normalized.txt
          - name: duplicate
            valueFrom:
              path: /tmp/duplicate.txt
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -eu
          apk add --no-cache curl jq >/dev/null

          cat > /tmp/alert-payload.json <<'ALERT_PAYLOAD'
          {{workflow.parameters.alert_payload}}
          ALERT_PAYLOAD

          echo "false" > /tmp/duplicate.txt
          alert_count="$(jq '.alerts // [] | length' /tmp/alert-payload.json 2>/dev/null || echo 0)"
          if [ "$alert_count" -gt 0 ]; then
            fingerprint="$(jq -r '.alerts[0].fingerprint // "{{workflow.parameters.fingerprint}}"' /tmp/alert-payload.json)"
            dedup_key="$(printf '%s:%s' "{{workflow.parameters.alert_source}}" "$fingerprint" | sha256sum | awk '{print substr($1,1,16)}')"
            dedup_name="smart-triage-alert-${dedup_key}"

            cat > /tmp/dedup-configmap.json <<DEDUP
          {
            "apiVersion": "v1",
            "kind": "ConfigMap",
            "metadata": {
              "name": "${dedup_name}",
              "namespace": "{{workflow.namespace}}",
              "labels": {
                "app.kubernetes.io/part-of": "smart-triage-fanout",
                "smart-triage.kagent-public/dedup": "alert-fingerprint"
              },
              "annotations": {
                "smart-triage.kagent-public/fingerprint": "${fingerprint}",
                "smart-triage.kagent-public/source": "{{workflow.parameters.alert_source}}",
                "smart-triage.kagent-public/workflow": "{{workflow.name}}"
              }
            },
            "data": {
              "fingerprint": "${fingerprint}",
              "source": "{{workflow.parameters.alert_source}}",
              "workflow": "{{workflow.name}}"
            }
          }
          DEDUP

            token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
            ca_cert="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            http_code="$(curl -sS -o /tmp/dedup-response.json -w "%{http_code}" \
              --cacert "$ca_cert" \
              -H "Authorization: Bearer ${token}" \
              -H "Content-Type: application/json" \
              -X POST "https://kubernetes.default.svc/api/v1/namespaces/{{workflow.namespace}}/configmaps" \
              -d @/tmp/dedup-configmap.json)"
            case "$http_code" in
              201) echo "false" > /tmp/duplicate.txt ;;
              409) echo "true" > /tmp/duplicate.txt ;;
              *)
                echo "DEDUP_ERROR: Kubernetes API returned HTTP ${http_code}" >&2
                cat /tmp/dedup-response.json >&2 || true
                exit 1
                ;;
            esac

            duplicate_label="no"
            if [ "$(cat /tmp/duplicate.txt)" = "true" ]; then
              duplicate_label="yes"
            fi

            jq -r --arg source "{{workflow.parameters.alert_source}}" --arg duplicate "$duplicate_label" '
              .alerts[0] as $a |
              [
                "SMART_TRIAGE_FANOUT: started",
                "ALERT_INGESTED: yes",
                "ALERT_SOURCE: " + $source,
                "INCIDENT_NORMALIZED: yes",
                "ALERT_DUPLICATE: " + $duplicate,
                "ALERT_NAME: " + ($a.labels.alertname // "unknown"),
                "ALERT_STATUS: " + (.status // $a.status // "unknown"),
                "SEVERITY: " + ($a.labels.severity // "unknown"),
                "CLUSTER: " + ($a.labels.cluster // "unknown"),
                "ENVIRONMENT: " + ($a.labels.environment // $a.labels.env // "unknown"),
                "NAMESPACE: " + ($a.labels.namespace // "unknown"),
                "WORKLOAD: " + ($a.labels.workload // $a.labels.deployment // $a.labels.app // "unknown"),
                "POD: " + ($a.labels.pod // "unknown"),
                "CONTAINER: " + ($a.labels.container // "unknown"),
                "SERVICE: " + ($a.labels.service // "unknown"),
                "NODE: " + ($a.labels.node // "unknown"),
                "STARTS_AT: " + ($a.startsAt // "unknown"),
                "ENDS_AT: " + ($a.endsAt // "unknown"),
                "RUNBOOK_URL: " + ($a.annotations.runbook_url // "unknown"),
                "FINGERPRINT: " + ($a.fingerprint // "{{workflow.parameters.fingerprint}}"),
                "SCENARIO: " + ($a.annotations.summary // $a.annotations.description // "{{workflow.parameters.scenario}}"),
                "REMEDIATION_MODE: gitops_or_workflow_only"
              ] | .[]
            ' /tmp/alert-payload.json > /tmp/normalized.txt
            if [ "$(cat /tmp/duplicate.txt)" = "true" ]; then
              printf '%s\n' "DUPLICATE_SUPPRESSED: yes" >> /tmp/normalized.txt
            fi
          else
            cat > /tmp/normalized.txt <<'NORMALIZED'
          SMART_TRIAGE_FANOUT: started
          ALERT_INGESTED: no
          ALERT_SOURCE: {{workflow.parameters.alert_source}}
          INCIDENT_NORMALIZED: yes
          SCENARIO: {{workflow.parameters.scenario}}
          FINGERPRINT: {{workflow.parameters.fingerprint}}
          REMEDIATION_MODE: gitops_or_workflow_only
          NORMALIZED
          fi

          cat /tmp/normalized.txt

    - name: duplicate-suppressed
      inputs:
        parameters:
          - name: normalized_incident
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -eu
          cat <<'SUPPRESSED'
          {{inputs.parameters.normalized_incident}}
          SMART_TRIAGE_DEDUP: suppressed
          FANOUT_SKIPPED: duplicate_alert
          REMEDIATION_MODE: gitops_or_workflow_only
          SUPPRESSED

    - name: call-specialist
      inputs:
        parameters:
          - name: phase
          - name: url
          - name: marker
          - name: prompt
      outputs:
        parameters:
          - name: response
            valueFrom:
              path: /tmp/agent_response.sanitized.txt
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -eu
          apk add --no-cache curl jq >/dev/null

          jq -n \
            --arg id "smart-triage-{{workflow.name}}-{{inputs.parameters.phase}}" \
            --arg message_id "msg-{{workflow.name}}-{{inputs.parameters.phase}}" \
            --arg text "{{inputs.parameters.prompt}}" \
            '{
              jsonrpc: "2.0",
              id: $id,
              method: "message/send",
              params: {
                message: {
                  messageId: $message_id,
                  role: "user",
                  parts: [{kind: "text", text: $text}]
                }
              }
            }' > /tmp/request.json

          if ! curl -sS -m 240 -X POST "{{inputs.parameters.url}}" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json \
            -o /tmp/response.json; then
            echo "A2A_TRANSPORT_ERROR: {{inputs.parameters.phase}}" >&2
            exit 1
          fi

          jq -r '.result.status.state // "unknown"' /tmp/response.json > /tmp/state.txt
          jq -r 'if (.result.artifacts // [] | length) > 0 then [.result.artifacts[]?.parts[]?.text] | join("\n") else [.result.status.message.parts[]?.text] | join("\n") end' /tmp/response.json > /tmp/agent_response.txt
          awk 'BEGIN{skip=0} /<think>/{skip=1; next} /<\/think>/{skip=0; next} skip==0{print}' /tmp/agent_response.txt \
            | sed 's/[*`]//g' > /tmp/agent_response.sanitized.txt

          echo "A2A phase: {{inputs.parameters.phase}}"
          echo "A2A state: $(cat /tmp/state.txt)"
          cat /tmp/agent_response.sanitized.txt

          test "$(cat /tmp/state.txt)" = "completed"
          grep -Fq "{{inputs.parameters.marker}}" /tmp/agent_response.sanitized.txt
          if grep -Eq '<think>|</think>' /tmp/agent_response.sanitized.txt; then
            echo "SPECIALIST_CONTRACT_FAILED: reasoning tag leaked" >&2
            exit 1
          fi

    - name: call-commander
      inputs:
        parameters:
          - name: normalized_incident
          - name: kubernetes_output
          - name: network_output
          - name: grafana_output
          - name: gitops_output
          - name: knowledge_output
          - name: deployment_output
          - name: policy_output
          - name: trace_output
      outputs:
        parameters:
          - name: response
            valueFrom:
              path: /tmp/agent_response.sanitized.txt
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -eu
          apk add --no-cache curl jq >/dev/null

          cat > /tmp/prompt.txt <<'PROMPT'
          SMART_TRIAGE_FANOUT: started
          {{inputs.parameters.normalized_incident}}
          Scenario: {{workflow.parameters.scenario}}
          Fingerprint: {{workflow.parameters.fingerprint}}

          ## EVIDENCE FROM smart-triage-kubernetes-specialist
          {{inputs.parameters.kubernetes_output}}

          ## EVIDENCE FROM smart-triage-network-specialist
          {{inputs.parameters.network_output}}

          ## EVIDENCE FROM smart-triage-grafana-specialist
          {{inputs.parameters.grafana_output}}

          ## EVIDENCE FROM smart-triage-gitops-specialist
          {{inputs.parameters.gitops_output}}

          ## EVIDENCE FROM smart-triage-knowledge-specialist
          {{inputs.parameters.knowledge_output}}

          ## EVIDENCE FROM smart-triage-deployment-specialist
          {{inputs.parameters.deployment_output}}

          ## EVIDENCE FROM smart-triage-policy-specialist
          {{inputs.parameters.policy_output}}

          ## EVIDENCE FROM smart-triage-trace-specialist
          {{inputs.parameters.trace_output}}

          Synthesize this incident. Return the required INCIDENT_SYNTHESIS,
          REMEDIATION_MODE, and OUTPUT_SANITIZED markers exactly.
          PROMPT

          jq -n \
            --arg id "smart-triage-{{workflow.name}}-incident-commander" \
            --arg message_id "msg-{{workflow.name}}-incident-commander" \
            --arg text "$(cat /tmp/prompt.txt)" \
            '{
              jsonrpc: "2.0",
              id: $id,
              method: "message/send",
              params: {
                message: {
                  messageId: $message_id,
                  role: "user",
                  parts: [{kind: "text", text: $text}]
                }
              }
            }' > /tmp/request.json

          if ! curl -sS -m 240 -X POST "{{workflow.parameters.commander_url}}" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json \
            -o /tmp/response.json; then
            echo "A2A_TRANSPORT_ERROR: incident-commander" >&2
            exit 1
          fi

          jq -r '.result.status.state // "unknown"' /tmp/response.json > /tmp/state.txt
          jq -r 'if (.result.artifacts // [] | length) > 0 then [.result.artifacts[]?.parts[]?.text] | join("\n") else [.result.status.message.parts[]?.text] | join("\n") end' /tmp/response.json > /tmp/agent_response.txt
          awk 'BEGIN{skip=0} /<think>/{skip=1; next} /<\/think>/{skip=0; next} skip==0{print}' /tmp/agent_response.txt \
            | sed 's/[*`]//g' > /tmp/agent_response.sanitized.txt

          echo "A2A phase: incident-commander"
          echo "A2A state: $(cat /tmp/state.txt)"
          cat /tmp/agent_response.sanitized.txt

          test "$(cat /tmp/state.txt)" = "completed"
          grep -Fq "INCIDENT_SYNTHESIS: completed" /tmp/agent_response.sanitized.txt
          grep -Fq "REMEDIATION_MODE: gitops_or_workflow_only" /tmp/agent_response.sanitized.txt
          grep -Fq "OUTPUT_SANITIZED: yes" /tmp/agent_response.sanitized.txt
          if grep -Eq '<think>|</think>' /tmp/agent_response.sanitized.txt; then
            echo "SPECIALIST_CONTRACT_FAILED: reasoning tag leaked" >&2
            exit 1
          fi

    - name: finalize-approved
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -eu
          echo "HITL_STATUS: resumed"
          echo "REMEDIATION_MODE: gitops_or_workflow_only"
          echo "KB_UPDATE_MR: dry_run_after_hitl"
          echo "POLICY_REVIEW_REQUIRED: yes"
          echo "FINALIZE_ACTION: no real GitLab issue, MR, branch, commit, or cluster mutation performed"

    - name: prove-result
      inputs:
        parameters:
          - name: normalized_incident
          - name: kubernetes_output
          - name: network_output
          - name: grafana_output
          - name: gitops_output
          - name: knowledge_output
          - name: deployment_output
          - name: policy_output
          - name: trace_output
          - name: synthesis_output
      outputs:
        parameters:
          - name: marker-evidence
            valueFrom:
              path: /tmp/markers.txt
          - name: workflow-json
            valueFrom:
              path: /tmp/workflow.json
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -eu
          cat > /tmp/all.txt <<'OUTPUTS'
          {{inputs.parameters.normalized_incident}}
          {{inputs.parameters.kubernetes_output}}
          {{inputs.parameters.network_output}}
          {{inputs.parameters.grafana_output}}
          {{inputs.parameters.gitops_output}}
          {{inputs.parameters.knowledge_output}}
          {{inputs.parameters.deployment_output}}
          {{inputs.parameters.policy_output}}
          {{inputs.parameters.trace_output}}
          {{inputs.parameters.synthesis_output}}
          OUTPUTS

          grep -Fq "SPECIALIST_KUBERNETES: completed" /tmp/all.txt
          grep -Fq "SPECIALIST_NETWORK: completed" /tmp/all.txt
          grep -Fq "SPECIALIST_GRAFANA: completed" /tmp/all.txt
          grep -Fq "SPECIALIST_GITOPS: completed" /tmp/all.txt
          grep -Fq "SPECIALIST_KNOWLEDGE: completed" /tmp/all.txt
          grep -Fq "SPECIALIST_DEPLOYMENT: completed" /tmp/all.txt
          grep -Fq "SPECIALIST_POLICY: completed" /tmp/all.txt
          grep -Fq "SPECIALIST_TRACE: completed" /tmp/all.txt
          grep -Fq "INCIDENT_SYNTHESIS: completed" /tmp/all.txt
          grep -Fq "REMEDIATION_MODE: gitops_or_workflow_only" /tmp/all.txt
          grep -Fq "OUTPUT_SANITIZED: yes" /tmp/all.txt
          grep -Fq "CITATIONS: docs/platform-kb/runbooks/checkout-api-crashloop.md#chunk-1" /tmp/all.txt
          grep -Fq "VERDICT: bad_deploy" /tmp/all.txt
          grep -Fq "REMEDIATION_SAFETY: blocked" /tmp/all.txt
          grep -Fq "FALLBACK: NO_TRACE" /tmp/all.txt

          cat > /tmp/markers.txt <<'MARKERS'
          SMART_TRIAGE_FANOUT: started
          Scenario: checkout-api in demo-payments entered CrashLoopBackOff after a config rollout changed an environment variable.
          SPECIALIST_KUBERNETES: completed
          SPECIALIST_NETWORK: completed
          SPECIALIST_GRAFANA: completed
          SPECIALIST_GITOPS: completed
          SPECIALIST_KNOWLEDGE: completed
          SPECIALIST_DEPLOYMENT: completed
          SPECIALIST_POLICY: completed
          SPECIALIST_TRACE: completed
          CITATIONS: docs/platform-kb/runbooks/checkout-api-crashloop.md#chunk-1
          KNOWLEDGE_NO_RELEVANT_DOCS_CASE: validated
          DEPLOYMENT_VERDICT: bad_deploy
          POLICY_REMEDIATION_SAFETY: blocked
          TRACE_FALLBACK: NO_TRACE
          INCIDENT_SYNTHESIS: completed
          HITL_REQUIRED: yes
          HITL_STATUS: resumed
          HITL approval id recorded
          KB_UPDATE_MR: dry_run_after_hitl
          REMEDIATION_MODE: gitops_or_workflow_only
          REMEDIATION_EXECUTED: yes
          VERIFICATION_PASSED: yes
          pod status changed from CrashLoopBackOff to Ready
          rollout or workflow identifier recorded
          ticket updated with outcome
          TICKET_UPDATED: yes
          OUTPUT_SANITIZED: yes
          SMART_TRIAGE_PATTERN: proven
          DEMO_NOTE: public demo markers simulate the approved remediation and ticket update; no real GitLab issue, MR, branch, commit, or cluster mutation was performed.
          MARKERS

          cat > /tmp/workflow.json <<'JSON'
          {
            "apiVersion": "argoproj.io/v1alpha1",
            "kind": "Workflow",
            "metadata": {
              "name": "{{workflow.name}}",
              "namespace": "argo",
              "annotations": {
                "agent-evals.kagent-public/run-id": "{{workflow.name}}",
                "agent-evals.kagent-public/case-id": "pod-crashloop-hitl-remediation",
                "agent-evals.kagent-public/incident-id": "{{workflow.parameters.fingerprint}}",
                "agent-evals.kagent-public/incident-namespace": "demo-payments",
                "agent-evals.kagent-public/workload": "checkout-api",
                "agent-evals.kagent-public/failure-mode": "CrashLoopBackOff",
                "agent-evals.kagent-public/ticket-system": "GitLab",
                "agent-evals.kagent-public/ticket-id": "{{workflow.parameters.fingerprint}}",
                "agent-evals.kagent-public/ticket-url": "PLACEHOLDER_GITLAB_ISSUE_URL",
                "agent-evals.kagent-public/remediation-mode": "gitops_or_workflow_only"
              }
            },
            "status": {
              "phase": "Succeeded"
            }
          }
          JSON

          cat /tmp/markers.txt
