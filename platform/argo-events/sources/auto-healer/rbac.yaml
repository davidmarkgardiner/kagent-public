# RBAC for Auto-Healer Workflow
# Allows watching events and managing pods for auto-fix
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sa
  namespace: argo-events
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: auto-healer-role
rules:
  # Watch events across all namespaces
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Manage pods (for restart/delete)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  # Manage deployments (for rollout restart)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "patch"]
  # Create workflows
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates"]
    verbs: ["get", "list", "create", "delete"]
  # Required for workflow task results
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: auto-healer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: auto-healer-role
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: argo-events
  # Also bind to default SA used by EventSource
  - kind: ServiceAccount
    name: default
    namespace: argo-events
