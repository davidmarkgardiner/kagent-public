# Sensor: Connect K8s events to Holmes auto-healer workflow
# All events go to workflow, triage step determines if/when to process
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: auto-healer-sensor
  namespace: argo-events
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sa

  dependencies:
    - name: k8s-warnings
      eventSourceName: k8s-all-warnings
      eventName: all-warnings

  triggers:
    - template:
        name: trigger-healer
        conditions: k8s-warnings
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: healer-
                namespace: argo-events
              spec:
                workflowTemplateRef:
                  name: auto-healer-holmes
                arguments:
                  parameters:
                    - name: event-reason
                    - name: resource-name
                    - name: resource-namespace
                    - name: resource-kind
                    - name: event-message
          parameters:
            - src:
                dependencyName: k8s-warnings
                dataKey: body.reason
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: k8s-warnings
                dataKey: body.involvedObject.name
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: k8s-warnings
                dataKey: body.involvedObject.namespace
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: k8s-warnings
                dataKey: body.involvedObject.kind
              dest: spec.arguments.parameters.3.value
            - src:
                dependencyName: k8s-warnings
                dataKey: body.message
              dest: spec.arguments.parameters.4.value
      retryStrategy:
        steps: 3
        duration: 30s
