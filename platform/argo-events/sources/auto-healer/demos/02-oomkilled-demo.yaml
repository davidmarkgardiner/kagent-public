# Demo 2: OOMKilled
# This deployment allocates more memory than its limit, triggering OOMKilled
# Expected: HolmesGPT detects and runs `kubectl rollout restart deployment`
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oomkilled-demo
  namespace: demo-autohealer
  labels:
    app: oomkilled-demo
    demo: oomkilled
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oomkilled-demo
  template:
    metadata:
      labels:
        app: oomkilled-demo
    spec:
      containers:
        - name: memory-hog
          image: python:3.11-slim
          command:
            - python
            - -c
            - |
              import time
              print("Starting memory allocation...")
              data = []
              for i in range(1000):
                  # Allocate ~1MB per iteration
                  data.append('x' * 1024 * 1024)
                  time.sleep(0.1)
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi  # Will be exceeded, triggering OOMKilled
