# Test Deployment: Broken app to trigger auto-healer
# Uses a non-existent image to cause ImagePullBackOff
apiVersion: v1
kind: Namespace
metadata:
  name: test-autohealer
  labels:
    purpose: testing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
  namespace: test-autohealer
  labels:
    app: broken-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
        - name: app
          # Non-existent image to trigger ImagePullBackOff
          image: nonexistent-registry.io/fake-image:v999
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
