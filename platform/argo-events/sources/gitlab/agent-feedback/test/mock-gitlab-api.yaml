# Disposable home-lab test double. Do not include in production Kustomizations.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-feedback-mock
  namespace: argo
data:
  server.py: |
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    ISSUE = {
        "iid": 42,
        "title": "Agent feedback rehydration test",
        "description": "agent-run-id: run-abc-123\n\nOriginal bounded investigation.",
        "labels": ["agent:waiting-for-human"],
        "web_url": "https://gitlab.example.invalid/group/project/-/issues/42",
    }
    NOTES = [{"id": 900, "author": {"username": "platform-agent"}, "created_at": "2026-01-01T00:00:00Z", "body": "Earlier recommendation", "system": False}]

    class Handler(BaseHTTPRequestHandler):
        def reply(self, status, body):
            encoded = json.dumps(body).encode()
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(encoded)))
            self.end_headers()
            self.wfile.write(encoded)

        def authorized(self, expected):
            return self.headers.get("PRIVATE-TOKEN") == expected

        def do_GET(self):
            if not self.authorized("test-reader-token"):
                return self.reply(401, {"message": "reader token rejected"})
            if self.path.endswith("/notes?per_page=20&order_by=created_at&sort=desc"):
                return self.reply(200, NOTES)
            if "/issues/42" in self.path:
                return self.reply(200, ISSUE)
            return self.reply(404, {"message": "not found"})

        def do_POST(self):
            if not self.authorized("test-writer-token"):
                return self.reply(401, {"message": "writer token rejected"})
            length = int(self.headers.get("Content-Length", "0"))
            body = json.loads(self.rfile.read(length))
            print("POSTED_AGENT_NOTE=" + json.dumps(body, sort_keys=True), flush=True)
            return self.reply(201, {"id": 901, "body": body.get("body", "")})

        def log_message(self, format, *args):
            print(format % args, flush=True)

    HTTPServer(("", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-feedback-mock
  namespace: argo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab-feedback-mock
  template:
    metadata:
      labels:
        app: gitlab-feedback-mock
    spec:
      containers:
        - name: mock
          image: python:3.12-alpine
          command: [python3, /app/server.py]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: code
              mountPath: /app
              readOnly: true
      volumes:
        - name: code
          configMap:
            name: gitlab-feedback-mock
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-feedback-mock
  namespace: argo
spec:
  selector:
    app: gitlab-feedback-mock
  ports:
    - name: http
      port: 8080
      targetPort: 8080
