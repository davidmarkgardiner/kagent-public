# RBAC for Argo Events to submit workflows
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sa
  namespace: argo-events
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-events-workflow-submitter
rules:
  # Workflow operations
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "clusterworkflowtemplates"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # ConfigMap and Secret access for workflow parameters
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Pod logs for debugging
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-events-workflow-submitter-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-events-workflow-submitter
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: argo-events
---
# Role for workflow pods to access secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-secret-access
  namespace: argo-events
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["gitlab-mcp-secret"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
    resourceNames: ["mattermost-webhook-config"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-secret-access-binding
  namespace: argo-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workflow-secret-access
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: argo-events
