# Argo Events Sensors — translate bot callbacks into Argo Workflow operations.
#
# Argo Events v1.9 rejects multiple dependencies in one Sensor that reference
# the same EventSource/event pair. Keep one Sensor per decision so each callback
# path can use a data filter safely:
#   - body.decision == "approved" -> resume the named workflow
#   - body.decision == "rejected" -> stop the named workflow
#   - body.decision == "expired"  -> stop the named workflow
#
# The bot POSTs a JSON body with at least:
#   { "workflow_name": "<argo workflow name>",
#     "workflow_namespace": "argo",
#     "decision": "approved|rejected|expired",
#     "approval_id": "<nonce>",
#     "approver": "<user>",
#     "comment": "optional" }
#
# Apply:
#   kubectl apply -f sensor.yaml
#
# Verify:
#   kubectl get sensors -n argo-events | grep teams-hitl
# ---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: teams-hitl-sensor
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: approval-approved
      eventSourceName: teams-hitl-callback
      eventName: approval
      filters:
        data:
          - path: body.decision
            type: string
            value: [approved]
  triggers:
    - template:
        name: resume-on-approve
        argoWorkflow:
          operation: resume
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                name: ""
                namespace: argo
          parameters:
            - src:
                dependencyName: approval-approved
                dataKey: body.workflow_name
              dest: metadata.name
            - src:
                dependencyName: approval-approved
                dataKey: body.workflow_namespace
                value: argo
              dest: metadata.namespace
      conditions: approval-approved
---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: teams-hitl-reject-sensor
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: approval-rejected
      eventSourceName: teams-hitl-callback
      eventName: approval
      filters:
        data:
          - path: body.decision
            type: string
            value: [rejected]
  triggers:
    - template:
        name: stop-on-reject
        argoWorkflow:
          operation: stop
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                name: ""
                namespace: argo
          parameters:
            - src:
                dependencyName: approval-rejected
                dataKey: body.workflow_name
              dest: metadata.name
            - src:
                dependencyName: approval-rejected
                dataKey: body.workflow_namespace
                value: argo
              dest: metadata.namespace
      conditions: approval-rejected
---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: teams-hitl-expire-sensor
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: approval-expired
      eventSourceName: teams-hitl-callback
      eventName: approval
      filters:
        data:
          - path: body.decision
            type: string
            value: [expired]
  triggers:
    - template:
        name: stop-on-expire
        argoWorkflow:
          operation: stop
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                name: ""
                namespace: argo
          parameters:
            - src:
                dependencyName: approval-expired
                dataKey: body.workflow_name
              dest: metadata.name
            - src:
                dependencyName: approval-expired
                dataKey: body.workflow_namespace
                value: argo
              dest: metadata.namespace
      conditions: approval-expired
