# Argo Events Sensor — translates bot callbacks into Argo Workflow operations
#
# Triggers (in order evaluated):
#   - body.decision == "approved" → resume the named workflow
#   - body.decision == "rejected" → stop the named workflow (fails it)
#   - body.decision == "expired"  → stop the named workflow
#
# The bot POSTs a JSON body with at least:
#   { "workflow_name": "<argo workflow name>",
#     "workflow_namespace": "argo",
#     "decision": "approved|rejected|expired",
#     "approval_id": "<nonce>",
#     "approver": "<user>",
#     "comment": "optional" }
#
# Apply:
#   kubectl apply -f sensor.yaml
#
# Verify:
#   kubectl get sensor -n argo-events teams-hitl-sensor
#   kubectl logs -n argo-events deploy/teams-hitl-sensor-sensor --tail=50
# ---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: teams-hitl-sensor
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa     # must have workflows.argoproj.io patch permission
  dependencies:
    - name: approval-dep
      eventSourceName: teams-hitl-callback
      eventName: approval

  triggers:
    # ─── APPROVED → resume the paused workflow ───────────────────────────
    - template:
        name: resume-on-approve
        conditions: approval-dep
        k8s:
          operation: patch
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                name: ""                    # filled from payload
                namespace: argo
          parameters:
            - src:
                dependencyName: approval-dep
                dataKey: body.workflow_name
              dest: metadata.name
            - src:
                dependencyName: approval-dep
                dataKey: body.workflow_namespace
                value: argo                  # fallback if bot omits namespace
              dest: metadata.namespace
          patchStrategy: application/merge-patch+json
          # Resume the workflow by setting the `suspend` node condition to false
          # (via Argo Workflows' built-in resume via the argoWorkflow trigger type)
        # Alternative using dedicated argoWorkflow trigger — cleaner:
        argoWorkflow:
          operation: resume
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                name: ""
                namespace: argo
          parameters:
            - src:
                dependencyName: approval-dep
                dataKey: body.workflow_name
              dest: metadata.name
      conditions: approval-dep
      # Only fire on decision=approved
      when:
        any:
          - expr: 'decision == "approved"'
            dependencies:
              - name: approval-dep
                dataTemplate: "{{ .Input.body.decision }}"

    # ─── REJECTED → stop the workflow ─────────────────────────────────────
    - template:
        name: stop-on-reject
        argoWorkflow:
          operation: stop
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                name: ""
                namespace: argo
          parameters:
            - src:
                dependencyName: approval-dep
                dataKey: body.workflow_name
              dest: metadata.name
      conditions: approval-dep
      when:
        any:
          - expr: 'decision == "rejected"'
            dependencies:
              - name: approval-dep
                dataTemplate: "{{ .Input.body.decision }}"

    # ─── EXPIRED → stop the workflow (same effect as reject) ──────────────
    # The workflow's own suspend duration may also time out first, in which
    # case this trigger is a no-op — Argo Events handles missing workflows
    # gracefully.
    - template:
        name: stop-on-expire
        argoWorkflow:
          operation: stop
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                name: ""
                namespace: argo
          parameters:
            - src:
                dependencyName: approval-dep
                dataKey: body.workflow_name
              dest: metadata.name
      conditions: approval-dep
      when:
        any:
          - expr: 'decision == "expired"'
            dependencies:
              - name: approval-dep
                dataTemplate: "{{ .Input.body.decision }}"
