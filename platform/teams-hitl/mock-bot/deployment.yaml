# Dev-only mock-bot Deployment + Service for testing the approval flow
# WITHOUT needing the real Teams bot. Do NOT deploy to production.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-bot
  namespace: argo
  labels:
    app: mock-bot
    tier: dev-only
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-bot
  template:
    metadata:
      labels:
        app: mock-bot
    spec:
      containers:
        - name: mock-bot
          image: ghcr.io/<your-org>/mock-teams-bot:latest   # build from the Dockerfile
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mock-bot
  namespace: argo
spec:
  selector:
    app: mock-bot
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
