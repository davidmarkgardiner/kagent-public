apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-memory-server
  namespace: kagent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-memory-server
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kagent
    ports:
    - protocol: TCP
      port: 3000
