# kagent ModelConfig — agentgateway → Azure OpenAI (UAMI)
#
# DEPLOY ON: worker cluster (where kagent runs)
#
# The worker cluster has NO Azure credentials.
# agentgateway on the management cluster handles UAMI token fetch/refresh natively.
#
# Apply:
#   kubectl apply -f modelconfig-azure.yaml
#
# Verify:
#   kubectl get modelconfig agentgateway-azure-openai -n kagent -o yaml
# ---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: agentgateway-azure-openai
  namespace: kagent
spec:
  provider: OpenAI
  model: REPLACE_WITH_DEPLOYMENT_NAME   # Azure OpenAI deployment name, e.g. gpt-4o
  apiKeySecret: litellm-key             # same dummy secret — agentgateway holds real creds
  apiKeySecretKey: api-key
  openAI:
    # /azure/v1 routes to Azure OpenAI backend via agentgateway.
    #
    # AKS Istio add-on clusters are separate meshes by default, so the
    # worker cluster calls agentgateway as an external HTTPS endpoint via
    # the mgmt cluster's Istio ingress + wildcard Gateway.
    #
    # Use the specific hostname you set in istio-virtualservice.yaml
    # (matches a pattern under the wildcard Gateway's hosts list).
    baseUrl: "https://REPLACE_AGENTGATEWAY_HOSTNAME/azure/v1"
