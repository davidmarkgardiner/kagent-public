# Temporary mock backend used by smoke-failover.sh --mode mock-429.
#
# DEPLOY ON: management cluster only during testing.
# The script patches the primary provider host to this service, verifies fallback,
# and then restores the original host.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm-429
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: mock-llm-429
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-llm-429
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-llm-429
    spec:
      containers:
        - name: mock
          image: python:3.12-alpine
          ports:
            - containerPort: 8080
          command:
            - python
            - -c
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      self.send_response(429)
                      self.send_header("content-type", "application/json")
                      self.end_headers()
                      self.wfile.write(json.dumps({"error": {"message": "mock primary rate limit", "type": "rate_limit"}}).encode())

                  def do_POST(self):
                      self.do_GET()

                  def log_message(self, fmt, *args):
                      return

              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm-429
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: mock-llm-429
spec:
  selector:
    app.kubernetes.io/name: mock-llm-429
  ports:
    - name: http
      port: 8080
      targetPort: 8080
