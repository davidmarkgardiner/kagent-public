# Managed-Loki rule-sync alerts.
#
# Do not apply this directly to vanilla Prometheus. It is a PrometheusRule-shaped
# object for environments that sync `lgtm.engine: loki` rules into a Loki ruler.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: work-llm-capacity-log-alerts
  namespace: monitoring
  labels:
    shipto.lgtm: "true"
    lgtm.tenant: platform
    lgtm.engine: loki
    team: ai-platform
    route_to: triage
spec:
  groups:
    - name: work-llm-capacity-log-signals
      interval: 1m
      rules:
        - alert: WorkQwenRateLimitLogBurst
          expr: |
            sum by (cluster) (
              count_over_time({namespace=~"agentgateway-system|kgateway-system"} |~ "(?i)(429|too many requests|rate.?limit|quota exceeded)" [10m])
            ) > 5
          for: 5m
          labels:
            severity: warning
            team: ai-platform
            route_to: triage
          annotations:
            summary: "Qwen rate-limit signals in gateway logs"
            description: "Repeated rate-limit or quota signals are present in gateway logs. Reduce workflow concurrency or Kafka consumer fan-out until the Qwen capacity envelope is confirmed."

        - alert: WorkQwenResetOrTimeoutLogBurst
          expr: |
            sum by (cluster) (
              count_over_time({namespace=~"agentgateway-system|kgateway-system"} |~ "(?i)(connection reset|reset by peer|tls.*reset|upstream.*reset|deadline exceeded|context deadline exceeded|timeout)" [10m])
            ) > 3
          for: 5m
          labels:
            severity: warning
            team: ai-platform
            route_to: triage
          annotations:
            summary: "Qwen reset or timeout signals in gateway logs"
            description: "Gateway logs show resets or timeouts. Check Qwen TLS session pressure, gateway egress IPs, and active workflow concurrency."

        - alert: WorkKagentA2ACallDidNotComplete
          expr: |
            sum by (cluster) (
              count_over_time({namespace=~"argo|argo-events|kagent"} |~ "(?i)(K-Agent A2A call did not complete|a2a call did not complete|agent invocation did not complete|context deadline exceeded)" [10m])
            ) > 0
          for: 2m
          labels:
            severity: warning
            team: ai-platform
            route_to: triage
          annotations:
            summary: "kagent A2A call did not complete"
            description: "A triage workflow or kagent component logged that an A2A call did not complete. Check workflow pod logs, configured Qwen concurrency, gateway route health, and model latency."
