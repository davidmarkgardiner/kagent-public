# OpenAI-compatible Qwen3 no-think proxy for KubeAI/Ollama.
#
# Why this exists:
# - Ollama native /api/chat supports "think": false for Qwen3.
# - KubeAI/Agent Gateway's OpenAI-compatible path does not pass that field
#   through reliably.
# - kagent expects an OpenAI-compatible /chat/completions endpoint.
#
# Flow:
#   kagent -> agent-gw /qwen/v1 -> qwen3-openai-clean-proxy
#          -> qwen3-ollama-native /api/chat with think=false
#
# The proxy also strips any residual <think>...</think> tags before returning
# an OpenAI-compatible response.
apiVersion: v1
kind: Service
metadata:
  name: qwen3-ollama-native
  namespace: kubeai
  labels:
    app.kubernetes.io/name: qwen3-ollama-native
    app.kubernetes.io/part-of: qwen3-no-think-proxy
spec:
  selector:
    model: qwen3-14b
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen3-openai-clean-proxy
  namespace: kubeai
  labels:
    app.kubernetes.io/name: qwen3-openai-clean-proxy
    app.kubernetes.io/part-of: qwen3-no-think-proxy
data:
  proxy.py: |
    import json
    import os
    import re
    import time
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    OLLAMA_URL = os.environ.get("OLLAMA_URL", "http://qwen3-ollama-native.kubeai.svc.cluster.local:8000")
    MODEL = os.environ.get("QWEN_MODEL", "qwen3-14b")
    THINK_RE = re.compile(r"<think>.*?</think>\\s*", re.DOTALL | re.IGNORECASE)

    def clean_text(value):
        return THINK_RE.sub("", value or "").strip()

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            print("%s %s" % (self.address_string(), fmt % args), flush=True)

        def write_json(self, status, payload):
            body = json.dumps(payload).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path in ("/health", "/ready", "/"):
                self.write_json(200, {"status": "ok", "model": MODEL})
                return
            if self.path.endswith("/models"):
                self.write_json(200, {
                    "object": "list",
                    "data": [{"id": MODEL, "object": "model", "owned_by": "kubeai-ollama"}],
                })
                return
            self.write_json(404, {"error": {"message": "not found"}})

        def do_POST(self):
            if not self.path.endswith("/chat/completions"):
                self.write_json(404, {"error": {"message": "not found"}})
                return

            raw = self.rfile.read(int(self.headers.get("Content-Length", "0") or "0"))
            try:
                incoming = json.loads(raw or b"{}")
            except json.JSONDecodeError:
                self.write_json(400, {"error": {"message": "invalid json"}})
                return

            options = {}
            if "temperature" in incoming:
                options["temperature"] = incoming["temperature"]
            if "max_tokens" in incoming:
                options["num_predict"] = incoming["max_tokens"]

            ollama_payload = {
                "model": incoming.get("model") or MODEL,
                "messages": incoming.get("messages") or [],
                "stream": False,
                "think": False,
            }
            if options:
                ollama_payload["options"] = options

            req = urllib.request.Request(
                OLLAMA_URL + "/api/chat",
                data=json.dumps(ollama_payload).encode("utf-8"),
                headers={"Content-Type": "application/json"},
                method="POST",
            )

            try:
                with urllib.request.urlopen(req, timeout=120) as resp:
                    ollama = json.loads(resp.read())
            except Exception as exc:
                self.write_json(502, {"error": {"message": "ollama upstream failed", "detail": str(exc)}})
                return

            content = clean_text((ollama.get("message") or {}).get("content", ""))
            now = int(time.time())
            self.write_json(200, {
                "id": "qwen3-clean-%d" % now,
                "object": "chat.completion",
                "created": now,
                "model": MODEL,
                "choices": [{
                    "index": 0,
                    "message": {"role": "assistant", "content": content},
                    "finish_reason": "stop",
                }],
                "usage": {
                    "prompt_tokens": ollama.get("prompt_eval_count", 0),
                    "completion_tokens": ollama.get("eval_count", 0),
                    "total_tokens": ollama.get("prompt_eval_count", 0) + ollama.get("eval_count", 0),
                },
            })

    if __name__ == "__main__":
        ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-openai-clean-proxy
  namespace: kubeai
  labels:
    app.kubernetes.io/name: qwen3-openai-clean-proxy
    app.kubernetes.io/part-of: qwen3-no-think-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen3-openai-clean-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3-openai-clean-proxy
    spec:
      containers:
        - name: proxy
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/proxy.py"]
          env:
            - name: OLLAMA_URL
              value: http://qwen3-ollama-native.kubeai.svc.cluster.local:8000
            - name: QWEN_MODEL
              value: qwen3-14b
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: qwen3-openai-clean-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-openai-clean-proxy
  namespace: kubeai
  labels:
    app.kubernetes.io/name: qwen3-openai-clean-proxy
    app.kubernetes.io/part-of: qwen3-no-think-proxy
spec:
  selector:
    app.kubernetes.io/name: qwen3-openai-clean-proxy
  ports:
    - name: http
      port: 80
      targetPort: 8080
