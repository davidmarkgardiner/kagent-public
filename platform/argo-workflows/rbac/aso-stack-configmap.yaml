apiVersion: v1
data:
  README.md: "# ASO-Stack: AKS Cluster Deployment with GitOps\n\nThis directory contains\
    \ the Azure Service Operator (ASO) manifests and FluxCD configuration for deploying\
    \ an AKS cluster from a Minikube control plane, then using GitOps to deploy applications\
    \ onto the AKS cluster.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n\
    \    A[Minikube] --> B[Azure Service Operator]\n    B --> C[Azure Resources]\n\
    \    C --> D[AKS Cluster]\n    D --> E[Flux Extension]\n    E --> F[GitRepository]\n\
    \    F --> G[Applications]\n\n    C --> H[Resource Group]\n    C --> I[Managed\
    \ Identity]\n    C --> J[Role Assignment]\n\n    G --> K[cert-manager]\n    G\
    \ --> L[external-dns]\n    G --> M[Istio Apps]\n```\n\n## Directory Structure\n\
    \n```\naso-stack/\n\u251C\u2500\u2500 README.md                    # This file\n\
    \u251C\u2500\u2500 kustomization.yaml          # Kustomize manifest ordering\n\
    \u251C\u2500\u2500 resourcegroup.yaml          # Azure Resource Group\n\u251C\u2500\
    \u2500 identity.yaml               # User Assigned Managed Identity\n\u251C\u2500\
    \u2500 roleassignment.yaml         # RBAC for managed identity\n\u251C\u2500\u2500\
    \ cluster.yaml                # AKS Cluster configuration\n\u251C\u2500\u2500\
    \ federated.yaml              # Federated identity credential\n\u251C\u2500\u2500\
    \ extension.yaml              # Flux extension for AKS\n\u251C\u2500\u2500 fluxconfiguration.yaml\
    \      # GitOps configuration\n\u2514\u2500\u2500 flux-setup-instructions.md \
    \ # Additional setup notes\n```\n\n## Deployment Flow\n\n### Phase 1: Infrastructure\
    \ Provisioning (Minikube \u2192 Azure)\n\n1. **Minikube Control Plane Setup**\n\
    \   - Azure Service Operator runs on Minikube\n   - ASO manages Azure resources\
    \ via Azure ARM APIs\n   - All infrastructure defined as Kubernetes manifests\n\
    \n2. **Azure Resource Creation Order**\n\n   ```yaml\n   # Applied in sequence\
    \ via kustomization.yaml:\n   - resourcegroup.yaml # Creates Azure Resource Group\n\
    \   - identity.yaml # Creates User Assigned Managed Identity\n   - roleassignment.yaml\
    \ # Grants permissions to identity\n   - cluster.yaml # Provisions AKS cluster\
    \ with Istio\n   - federated.yaml # Links AKS identity to workload identity\n\
    \   - extension.yaml # Installs Flux extension on AKS\n   - fluxconfiguration.yaml\
    \ # Configures GitOps source and sync\n   ```\n\n3. **Key Infrastructure Features**\n\
    \   - **Private AKS cluster** with public FQDN for management\n   - **Istio service\
    \ mesh** (asm-1-25 revision) with internal ingress\n   - **Cilium networking**\
    \ (overlay mode with network policy)\n   - **Workload Identity** enabled for pod-to-Azure\
    \ authentication\n   - **Auto-scaling** with Node Auto Provisioning (NAP)\n  \
    \ - **Azure monitoring** and security features enabled\n\n### Phase 2: GitOps\
    \ Application Deployment (AKS \u2192 Applications)\n\n1. **Flux Configuration**\n\
    \   - Flux extension automatically installed on AKS cluster\n   - GitRepository\
    \ source: `https://github.com/davidmarkgardiner/claude-aso`\n   - Branch: `infra`\n\
    \   - Sync interval: 120 seconds\n\n2. **Application Kustomizations**\n\n   ```yaml\n\
    \   # Two parallel sync paths:\n   app: # Path: ./apps\n     - cert-manager #\
    \ TLS certificate management\n     - external-dns # DNS record automation\n\n\
    \   istio-app: # Path: ./istio-apps\n     - namespaces # Application namespaces\n\
    \     - gateways # Istio ingress configuration\n     - podinfo # Demo applications\n\
    \     - traffic policies # Istio CRDs and routing\n   ```\n\n3. **Continuous Deployment**\n\
    \   - Changes to `infra` branch trigger automatic sync\n   - Prune enabled: removes\
    \ resources not in Git\n   - Force sync: overwrites manual cluster changes\n \
    \  - Timeout: 600 seconds per sync operation\n\n## Key Configuration Details\n\
    \n### AKS Cluster Specifications\n\n- **Location**: UK South\n- **Kubernetes Version**:\
    \ 1.32\n- **Node Pool**: System pool with Standard_D4s_v3 (1 node, availability\
    \ zone 1)\n- **Network**: Azure CNI Overlay with Cilium dataplane\n- **Service\
    \ Mesh**: Istio with internal ingress gateway\n- **Identity**: Azure RBAC with\
    \ AAD integration\n- **Security**: Private cluster, workload identity, defender\
    \ enabled\n\n### GitOps Configuration\n\n- **Repository**: https://github.com/davidmarkgardiner/claude-aso\n\
    - **Branch**: infra\n- **Applications Path**: `./apps` and `./istio-apps`\n- **Sync\
    \ Mode**: Automatic every 2 minutes\n- **Reconciliation**: Force sync with pruning\
    \ enabled\n\n## Prerequisites\n\n1. **Minikube** with sufficient resources (4GB+\
    \ RAM recommended)\n2. **Azure Service Operator** installed on Minikube\n3. **Azure\
    \ subscription** with appropriate permissions\n4. **GitHub repository** with application\
    \ manifests\n5. **kubectl** configured for both Minikube and AKS contexts\n\n\
    ## Deployment Steps\n\n1. **Apply ASO manifests to Minikube**\n\n   ```bash\n\
    \   kubectl apply -k /path/to/aso-stack\n   ```\n\n2. **Monitor Azure resource\
    \ creation**\n\n   ```bash\n   # Check ASO resource status\n   kubectl get resourcegroup,managedidentity,managedcluster\
    \ -n azure-system\n\n   # Monitor cluster provisioning (15-20 minutes)\n   kubectl\
    \ describe managedcluster uk8s-tsshared-weu-gt025-int-prod -n azure-system\n \
    \  ```\n\n3. **Obtain AKS credentials**\n\n   ```bash\n   az aks get-credentials\
    \ --resource-group dev01-weu-dev-prod --name uk8s-tsshared-weu-gt025-int-prod\n\
    \   ```\n\n4. **Verify Flux deployment**\n\n   ```bash\n   # Check Flux extension\n\
    \   kubectl get extension -n azure-system\n\n   # Check GitOps sync status\n \
    \  kubectl get gitrepository,kustomization -n flux-system\n   ```\n\n5. **Verify\
    \ application deployment**\n\n   ```bash\n   # Check cert-manager\n   kubectl\
    \ get pods -n cert-manager\n\n   # Check external-dns\n   kubectl get pods -n\
    \ external-dns\n\n   # Check Istio applications\n   kubectl get pods -n istio-system\n\
    \   kubectl get gateway,virtualservice -A\n   ```\n\n## Monitoring and Troubleshooting\n\
    \n### Infrastructure Status\n\n```bash\n# ASO operator status\nkubectl get pods\
    \ -n azureserviceoperator-system\n\n# Azure resource provisioning status\nkubectl\
    \ get managedcluster uk8s-tsshared-weu-gt025-int-prod -n azure-system -o yaml\n\
    ```\n\n### GitOps Status\n\n```bash\n# Flux controllers\nkubectl get pods -n flux-system\n\
    \n# Sync status and errors\nkubectl describe gitrepository -n flux-system\nkubectl\
    \ describe kustomization -n flux-system\n\n# Flux logs\nkubectl logs -n flux-system\
    \ -l app=source-controller\nkubectl logs -n flux-system -l app=kustomize-controller\n\
    ```\n\n### Application Health\n\n```bash\n# All applications\nkubectl get helmrelease\
    \ -A\nkubectl get pods -A | grep -E \"(cert-manager|external-dns|istio)\"\n\n\
    # Istio gateway status\nkubectl get gateway -n istio-system\nkubectl get vs,dr\
    \ -A\n```\n\n## Security Considerations\n\n- **Private cluster**: API server only\
    \ accessible via private network\n- **Workload Identity**: Pods authenticate to\
    \ Azure using managed identities\n- **RBAC**: Fine-grained permissions with Azure\
    \ RBAC integration\n- **Network policies**: Cilium enforces pod-to-pod communication\
    \ rules\n- **Image scanning**: Container image vulnerability scanning enabled\n\
    - **Secret management**: Azure Key Vault integration for sensitive data\n\n##\
    \ Cost Optimization\n\n- **Node Auto Provisioning**: Automatically scales nodes\
    \ based on workload requirements\n- **Spot instances**: Can be configured for\
    \ non-production workloads\n- **Resource quotas**: Prevent resource overconsumption\n\
    - **Monitoring**: Azure Monitor tracks resource utilization and costs\n\n## Next\
    \ Steps\n\n1. Configure DNS zones for external-dns automation\n2. Set up TLS certificates\
    \ for ingress traffic\n3. Deploy monitoring stack (Prometheus/Grafana)\n4. Implement\
    \ backup strategies for persistent workloads\n5. Configure alerting and incident\
    \ response procedures\n"
  cluster.yaml: "apiVersion: containerservice.azure.com/v1api20240402preview\nkind:\
    \ ManagedCluster\nmetadata:\n  name: uk8s-tsshared-weu-gt025-int-prod\n  namespace:\
    \ azure-system\nspec:\n  azureName: uk8s-tsshared-weu-gt025-int-prod\n  location:\
    \ uksouth\n  owner:\n    name: dev01-weu-dev-prod\n  operatorSpec:\n    configMaps:\n\
    \      oidcIssuerProfile:\n        name: aks-oidc-config-prod\n        key: issuer-url\n\
    \  dnsPrefix: uk8s-tsshared-weu-gt025-int-prodk8s\n  kubernetesVersion: \"1.32\"\
    \n  linuxProfile:\n    adminUsername: localadmin\n    ssh:\n      publicKeys:\n\
    \        - keyData: ssh-rsa \n\
    \  # Node provisioning with auto mode (NAP)\n  nodeProvisioningProfile:\n    mode:\
    \ Auto\n  # Identity Configuration\n  identity:\n    type: UserAssigned\n    userAssignedIdentities:\n\
    \      - reference:\n          armId: /subscriptions/{{AZURE_SUBSCRIPTION_ID}}/resourceGroups/rg-my-aks-cluster/providers/Microsoft.ManagedIdentity/userAssignedIdentities/my-aks-cluster-control-plane-identity\n\
    \  # AAD and RBAC Configuration\n  aadProfile:\n    enableAzureRBAC: true\n  \
    \  managed: true\n    adminGroupObjectIDs:\n      - {{AZURE_SUBSCRIPTION_ID}}\n\
    \  enableRBAC: true\n  disableLocalAccounts: false\n  # Network Profile\n  networkProfile:\n\
    \    networkPlugin: azure\n    networkPluginMode: overlay\n    networkPolicy:\
    \ cilium\n    networkDataplane: cilium\n    serviceCidr: 10.251.0.0/17\n    dnsServiceIP:\
    \ 10.251.0.10\n    podCidr: 10.251.128.0/17\n    ipFamilies: [\"IPv4\"]\n    loadBalancerSku:\
    \ standard\n    outboundType: loadBalancer\n  # API Server Access\n  apiServerAccessProfile:\n\
    \    enablePrivateCluster: false\n    disableRunCommand: true\n  agentPoolProfiles:\n\
    \    - name: systempool\n      vnetSubnetReference:\n        armId: /subscriptions/{{AZURE_SUBSCRIPTION_ID}}/resourceGroups/aks-cluster/providers/Microsoft.Network/virtualNetworks/aks-vnet/subnets/aks-subnet\n\
    \      mode: System\n      count: 1\n      enableAutoScaling: false\n      # vmSize:\
    \ Standard_D8s_v3 # Production\n      vmSize: Standard_B8ms # Dev/Test\n     \
    \ availabilityZones: [\"1\"]\n      osDiskType: Managed\n      osDiskSizeGB: 128\n\
    \      osType: Linux\n      osSKU: AzureLinux\n      maxPods: 110\n      enableNodePublicIP:\
    \ false\n      enableEncryptionAtHost: false\n      securityProfile:\n       \
    \ enableSecureBoot: true\n        enableVTPM: true\n        # sshAccess: Disabled\n\
    \  identityProfile:\n    kubeletidentity:\n      clientId: {{AZURE_SUBSCRIPTION_ID}}\n\
    \      objectId: {{AZURE_SUBSCRIPTION_ID}}\n      resourceReference:\n\
    \        armId: /subscriptions/{{AZURE_SUBSCRIPTION_ID}}/resourceGroups/rg-my-aks-cluster/providers/Microsoft.ManagedIdentity/userAssignedIdentities/my-aks-cluster-kubelet-identity\n\
    \  # Auto Upgrade Configuration\n  autoUpgradeProfile:\n    upgradeChannel: stable\n\
    \    nodeOSUpgradeChannel: NodeImage\n  # Security Profile\n  securityProfile:\n\
    \    defender:\n      logAnalyticsWorkspaceResourceReference:\n        armId:\
    \ /subscriptions/{{AZURE_SUBSCRIPTION_ID}}/resourceGroups/aks-cluster/providers/Microsoft.OperationalInsights/workspaces/test-workspace\n\
    \      securityMonitoring:\n        enabled: true\n    workloadIdentity:\n   \
    \   enabled: true\n    imageCleaner:\n      enabled: false\n      intervalHours:\
    \ 48\n  # Storage Profile\n  storageProfile:\n    diskCSIDriver:\n      enabled:\
    \ true\n    fileCSIDriver:\n      enabled: true\n    snapshotController:\n   \
    \   enabled: true\n  # Addon Profiles\n  addonProfiles:\n    azureKeyvaultSecretsProvider:\n\
    \      enabled: true\n      config:\n        enableSecretRotation: \"true\" #\
    \ pragma: allowlist secret\n        rotationPollInterval: \"30m\"\n    azurepolicy:\n\
    \      enabled: true\n      config:\n        version: \"v2\"\n  # Monitoring and\
    \ Metrics\n  # azureMonitorProfile:\n  #   metrics:\n  #     enabled: true\n \
    \ #     kubeStateMetrics:\n  #       metricLabelsAllowlist: \"namespaces=[owner,\
    \ swID]\"\n  #       metricAnnotationsAllowList: \"pods=[k8s-annotation-1,k8s-annotation-n]\"\
    \n  #   # Container Insights Configuration\n  #   containerInsights:\n  #    \
    \ enabled: false\n  # Cluster SKU and Support\n  sku:\n    name: Base\n    tier:\
    \ Standard\n  supportPlan: KubernetesOfficial\n  # Workload Auto Scaler with KEDA\n\
    \  workloadAutoScalerProfile:\n    keda:\n      enabled: true\n  # OIDC Issuer\
    \ - Required for workload identity\n  oidcIssuerProfile:\n    enabled: true\n\
    \  serviceMeshProfile:\n    mode: Istio\n    istio:\n      components:\n     \
    \   ingressGateways:\n          - enabled: true\n            mode: Internal\n\
    \          - enabled: true\n            mode: External\n      revisions:\n   \
    \     - asm-1-25\n  podIdentityProfile:\n    enabled: false\n    userAssignedIdentityExceptions:\n\
    \      - name: k8s-control-plane-exception\n        namespace: kube-system\n \
    \       podLabels:\n          kubernetes.azure.com/managedby: aks\n      - name:\
    \ platform-control-plane-exception\n        namespace: platform-system\n        podLabels:\n\
    \          kubernetes.azure.com/managedby: aks\n  # Resource group for node resources\n\
    \  nodeResourceGroup: MC_dev01-weu-dev-prod_uk8s-tsshared-weu-gt025-int-prod_uksouth\n\
    \  # Service Principal Profile\n  servicePrincipalProfile:\n    clientId: msi\n\
    \  # Tags\n  tags:\n    environment: dev\n    project: uk8s\n    costCenter: BT-TS-INFRA-\n\
    \    managedBy: flux-system\n    billingReference: BT-TS-INFRA-\n    opEnvironment:\
    \ EV\n    cmdbReference: DEV01\n    Owner: DavidGardiner\n    Status: InUse\n\
    \    Team: AKSEngineering\n    DeployedBy: AzureServiceOperator\n  privateLinkResources:\n\
    \    - reference:\n        armId: /subscriptions/{{AZURE_SUBSCRIPTION_ID}}/resourcegroups/DEV01-weu-dev-prod/providers/Microsoft.ContainerService/managedClusters/uk8s-tsshared-weu-gt025-int-prod/privateLinkResources/management\n"
  dns.yaml: "# DNS Resources for External DNS and Certificate Manager\napiVersion:\
    \ resources.azure.com/v1api20200601\nkind: ResourceGroup\nmetadata:\n  name: dns-rg\n\
    \  namespace: azure-system\nspec:\n  azureName: dns\n  location: westeurope\n\
    ---\napiVersion: network.azure.com/v1api20220701\nkind: DnsZone\nmetadata:\n \
    \ name: davidmarkgardiner-co-uk\n  namespace: azure-system\nspec:\n  azureName:\
    \ davidmarkgardiner.co.uk\n  owner:\n    name: dns-rg\n  zoneType: Public\n"
  extension.yaml: "apiVersion: kubernetesconfiguration.azure.com/v1api20230501\nkind:\
    \ Extension\nmetadata:\n  name: aso-flux-extension\n  namespace: azure-system\n\
    spec:\n  azureName: aso-flux-extension\n  autoUpgradeMinorVersion: true\n  extensionType:\
    \ microsoft.flux\n  identity:\n    type: SystemAssigned\n  owner:\n    group:\
    \ containerservice.azure.com\n    kind: ManagedCluster\n    name: uk8s-tsshared-weu-gt025-int-prod\n\
    \  scope:\n    cluster:\n      releaseNamespace: flux-system\n  configurationSettings:\n\
    \    multiTenancy.enforce: \"false\"\n    image-automation-controller.enabled:\
    \ \"true\"\n    image-reflector-controller.enabled: \"true\"\n    workload-identity.enabled:\
    \ \"true\"\n    workload-identity.azureClientId: \"{{AZURE_SUBSCRIPTION_ID}}\"\
    \n"
