apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow
  namespace: argo
  labels:
    app.kubernetes.io/name: argo-workflow
    app.kubernetes.io/part-of: argo-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-binding
  namespace: argo
  labels:
    app.kubernetes.io/name: argo-workflow-binding
    app.kubernetes.io/part-of: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-argo-workflows-edit
subjects:
- kind: ServiceAccount
  name: argo-workflow
  namespace: argo
---
# Additional permissions for workflowtaskresults
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-taskresults
  namespace: argo
  labels:
    app.kubernetes.io/name: argo-workflow-taskresults
    app.kubernetes.io/part-of: argo-workflows
rules:
- apiGroups: ["argoproj.io"]
  resources: ["workflowtaskresults"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: ["argoproj.io"]
  resources: ["workflows", "workflowtemplates", "cronworkflows", "clusterworkflowtemplates"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-taskresults-binding
  namespace: argo
  labels:
    app.kubernetes.io/name: argo-workflow-taskresults-binding
    app.kubernetes.io/part-of: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow-taskresults
subjects:
- kind: ServiceAccount
  name: argo-workflow
  namespace: argo