apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-namespace-provisioner
  namespace: argo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-provisioner
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - configmaps
      - secrets
      - pods
      - services
      - serviceaccounts
      - persistentvolumeclaims
      - events
      - limitranges
      - resourcequotas
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  - apiGroups: ["argoproj.io"]
    resources:
      - workflowtaskresults
      - rollouts
      - analysisruns
      - analysistemplates
      - experiments
    verbs: ["create", "patch", "get", "list", "watch", "update", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-namespace-provisioner-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: namespace-provisioner
subjects:
  - kind: ServiceAccount
    name: argo-namespace-provisioner
    namespace: argo
