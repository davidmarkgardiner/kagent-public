apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: chaos-demo-pod-delete-schedule
  namespace: argo
  annotations:
    reliability.platform/schedule-placeholder: "{{CRON_SCHEDULE}}"
    reliability.platform/timezone-placeholder: "{{TIMEZONE}}"
  labels:
    app.kubernetes.io/name: chaos-demo-pod-delete-schedule
    app.kubernetes.io/part-of: kagent
    reliability.platform/suite: chaos-demo-sandbox
    reliability.platform/env-tier: dev
spec:
  schedule: "0 10 * * 2"
  timezone: Etc/UTC
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: run-approved-chaos-test
    serviceAccountName: chaos-test-manager-workflow
    arguments:
      parameters:
        - name: dry_run
          value: "true"
        - name: gitlab_mr_url
          value: "{{GITLAB_MR_URL}}"
        - name: approval_id
          value: "{{APPROVAL_ID}}"
    templates:
      - name: run-approved-chaos-test
        steps:
          - - name: submit-lifecycle
              template: submit-lifecycle
      - name: submit-lifecycle
        resource:
          action: create
          manifest: |
            apiVersion: argoproj.io/v1alpha1
            kind: Workflow
            metadata:
              generateName: chaos-test-lifecycle-
              namespace: argo
              labels:
                app.kubernetes.io/name: chaos-test-lifecycle
                reliability.platform/suite: chaos-demo-sandbox
                reliability.platform/test: chaos-demo-pod-delete
                reliability.platform/env-tier: dev
            spec:
              workflowTemplateRef:
                name: chaos-test-lifecycle
              arguments:
                parameters:
                  - name: chaos_test_spec
                    value: |
                      apiVersion: reliability.platform.example/v1alpha1
                      kind: ChaosTest
                      metadata:
                        name: chaos-demo-pod-delete
                        labels:
                          reliability.platform/suite: chaos-demo-sandbox
                          reliability.platform/owner: platform
                          reliability.platform/env-tier: dev
                      spec:
                        owner: platform
                        description: Scheduled dry-run wrapper for the reviewed pod-delete chaos test.
                        target:
                          environment: dev
                          clusters:
                            selectionMode: explicit
                            count: 1
                            selector: environment=dev,reliability.platform/chaos-optin=true
                            resolved:
                              - "{{CLUSTER_NAME}}"
                          namespace: chaos-demo
                          selector:
                            matchLabels:
                              app.kubernetes.io/name: chaos-target
                              reliability.platform/chaos-optin: "true"
                          serviceOwnership: catalog://platform/chaos-target
                        experiment:
                          provider: litmus
                          type: pod-delete
                          parameters:
                            totalChaosDuration: "20"
                            chaosInterval: "5"
                            podsAffectedPerc: "50"
                            force: "true"
                        schedule:
                          mode: cron
                          cron: "{{CRON_SCHEDULE}}"
                          window: next-business-hours-lower-env
                        safety:
                          blastRadius: single-workload
                          maxDurationSeconds: 600
                          abortConditions:
                            - demo workload unavailable for more than 120 seconds
                          rollback: Stop workflow, remove active ChaosEngine, and wait for chaos-target Ready replicas.
                          requiresHITL: true
                        observability:
                          expectedSignals:
                            - ChaosResult reaches Pass or Fail
                            - smart triage fan-out starts
                          recoverySignals:
                            - deployment/chaos-target reports two Ready replicas
                          grafanaDashboard: chaos-test-lifecycle
                        triage:
                          workflowTemplate: smart-triage-fanout
                        eval:
                          rubricRef: chaos-pod-delete
                          benchmark: 8
                        reporting:
                          destination:
                            - GitLab
                            - GrafanaAnnotation
                            - Teams
                        learning:
                          memoryUpdatePolicy: curator-only
                          kbUpdatePolicy: hitl-gated-mr
                  - name: run_id
                    value: "{{workflow.name}}"
                  - name: dry_run
                    value: "{{workflow.parameters.dry_run}}"
                  - name: gitlab_mr_url
                    value: "{{workflow.parameters.gitlab_mr_url}}"
                  - name: approval_id
                    value: "{{workflow.parameters.approval_id}}"
