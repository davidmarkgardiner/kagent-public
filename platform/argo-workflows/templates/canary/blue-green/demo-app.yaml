apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-green-demo-app
  labels:
    app: blue-green-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: blue-green-demo
  template:
    metadata:
      labels:
        app: blue-green-demo
    spec:
      containers:
      - name: demo-app
        image: nginx:1.21
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: blue-green-demo-service
  labels:
    app: blue-green-demo
spec:
  selector:
    app: blue-green-demo
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP