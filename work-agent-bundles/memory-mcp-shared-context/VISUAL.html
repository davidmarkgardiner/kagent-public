<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory MCP Shared Context</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f8fafc;color:#172033;margin:0}
    main{max-width:1050px;margin:auto;padding:32px}
    .flow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .box{background:#fff;border:1px solid #d8dee9;border-radius:8px;padding:16px}
    b{color:#0b4f8a}.sub{color:#526070}
    @media(max-width:850px){.flow{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <h1>Memory MCP Shared Context</h1>
  <p class="sub">Useful prior context is recalled safely, not mutated freely.</p>
  <section class="flow">
    <div class="box"><b>Seed</b><p>Store approved context.</p></div>
    <div class="box"><b>Recall</b><p>Retrieve in another session.</p></div>
    <div class="box"><b>Use</b><p>Apply memory to triage.</p></div>
    <div class="box"><b>Curate</b><p>Route updates through owner path.</p></div>
    <div class="box"><b>Govern</b><p>Block unsafe write/delete.</p></div>
  </section>
</main>
</body>
</html>
