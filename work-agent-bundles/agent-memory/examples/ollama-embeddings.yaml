apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: kagent
  labels: { app: ollama }
spec:
  replicas: 1
  selector: { matchLabels: { app: ollama } }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.6.8
          ports: [{ containerPort: 11434 }]
          env:
            - { name: OLLAMA_HOST, value: "0.0.0.0" }
            - { name: OLLAMA_KEEP_ALIVE, value: "-1" }
          resources:
            requests: { cpu: "500m", memory: 2Gi }
            limits: { cpu: "4", memory: 6Gi }
          volumeMounts:
            - { name: models, mountPath: /root/.ollama }
      volumes:
        - name: models
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: kagent
spec:
  selector: { app: ollama }
  ports:
    - { name: http, port: 11434, targetPort: 11434 }
