---
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: alloy-k8s-events-kafka
  namespace: "{{ARGO_EVENTS_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-k8s-events-kafka
spec:
  template:
    serviceAccountName: "{{ARGO_EVENTS_SERVICE_ACCOUNT}}"
  kafka:
    k8s-events:
      url: "{{CONFLUENT_BOOTSTRAP}}"
      topic: "{{CONFLUENT_K8S_EVENTS_TOPIC}}"
      consumerGroup:
        groupName: "{{CONSUMER_GROUP_PREFIX}}-alloy-k8s-events-smoke"
      tls:
        caCertSecret:
          name: "{{CONFLUENT_CA_SECRET_NAME}}"
          key: ca.pem
      sasl:
        mechanism: "PLAIN"
        userSecret:
          name: "{{CONFLUENT_CREDENTIALS_SECRET_NAME}}"
          key: key
        passwordSecret:
          name: "{{CONFLUENT_CREDENTIALS_SECRET_NAME}}"
          key: secret
      jsonBody: true
      partition: ""
      version: "2.5.0"
