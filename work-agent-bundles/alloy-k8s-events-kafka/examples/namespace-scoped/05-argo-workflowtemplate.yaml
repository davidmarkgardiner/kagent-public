---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: alloy-k8s-event-smoke
  namespace: "{{ARGO_WORKFLOWS_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-k8s-events-kafka
spec:
  serviceAccountName: "{{ARGO_WORKFLOWS_SERVICE_ACCOUNT}}"
  entrypoint: inspect-k8s-event
  arguments:
    parameters:
      - name: kafka-event-payload
        value: "{}"
  templates:
    - name: inspect-k8s-event
      inputs:
        parameters:
          - name: kafka-event-payload
      container:
        image: alpine:3.20
        command:
          - sh
          - -c
        args:
          - |
            set -eu
            echo "ALLOY_K8S_EVENT_PAYLOAD_BEGIN"
            printf '%s\n' '{{inputs.parameters.kafka-event-payload}}'
            echo "ALLOY_K8S_EVENT_PAYLOAD_END"
            echo "This workflow only proves Argo consumed the Kafka payload."
