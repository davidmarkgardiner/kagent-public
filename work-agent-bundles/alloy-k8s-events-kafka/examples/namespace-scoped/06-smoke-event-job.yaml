---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-k8s-event-smoke
  namespace: "{{TEST_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-k8s-events-kafka
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alloy-k8s-event-smoke
  namespace: "{{TEST_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-k8s-events-kafka
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alloy-k8s-event-smoke
  namespace: "{{TEST_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-k8s-events-kafka
subjects:
  - kind: ServiceAccount
    name: alloy-k8s-event-smoke
    namespace: "{{TEST_NAMESPACE}}"
roleRef:
  kind: Role
  name: alloy-k8s-event-smoke
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: alloy-k8s-event-smoke
  namespace: "{{TEST_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-k8s-events-kafka
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: alloy-k8s-events-kafka
    spec:
      restartPolicy: Never
      serviceAccountName: alloy-k8s-event-smoke
      containers:
        - name: create-event
          image: bitnami/kubectl:1.30
          command:
            - sh
            - -c
          args:
            - |
              set -eu
              kubectl -n "{{TEST_NAMESPACE}}" create event alloy-k8s-event-smoke \
                --reason=AlloyKafkaSmoke \
                --type=Normal \
                --message="Alloy Kubernetes Event to Kafka smoke test"
