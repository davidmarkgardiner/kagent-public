<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Runtime Model Gateway Readiness</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f8fafc;color:#172033;margin:0}
    main{max-width:1100px;margin:auto;padding:32px}
    .flow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .box{background:#fff;border:1px solid #d8dee9;border-radius:8px;padding:16px}
    b{color:#0b4f8a}.sub{color:#526070}
    @media(max-width:850px){.flow{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <h1>Runtime Model Gateway Readiness</h1>
  <p class="sub">A go/no-go check before any live demo relies on the platform.</p>
  <section class="flow">
    <div class="box"><b>kagent</b><p>Agents ready and usable.</p></div>
    <div class="box"><b>Model</b><p>Backend answers within timeout.</p></div>
    <div class="box"><b>Gateway</b><p>Agent Gateway route returns clean output.</p></div>
    <div class="box"><b>A2A</b><p>message/send completes.</p></div>
    <div class="box"><b>MCP</b><p>Required tool servers accepted.</p></div>
  </section>
</main>
</body>
</html>
