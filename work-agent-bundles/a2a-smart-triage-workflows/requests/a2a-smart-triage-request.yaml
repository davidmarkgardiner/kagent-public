apiVersion: platform.example.com/v1alpha1
kind: A2ASmartTriageRequest
metadata:
  name: kagent-triage-v2-a2a-fanout
spec:
  incidentId: "{{INCIDENT_ID}}"
  alertSource: "{{ALERT_SOURCE}}"
  requiredSpecialists:
    - kubernetes
    - grafana
    - knowledge
    - gitops
    - policy
    - memory
    - chaos
    - lifecycle-eval
  finalDemo:
    proveExistingCapabilitiesOnly: true
    include:
      - querydoc_vector_kb
      - grafana_mcp
      - gitlab_mcp
      - memory_context_if_available
      - hitl_gate
      - chaos_to_lifecycle_eval
      - gitlab_evidence_report
  requireSynthesis: true
