apiVersion: platform.example.com/v1alpha1
kind: GitLabMcpGitOpsPrRequest
metadata:
  name: kagent-triage-v2-gitlab-mcp-pr-proof
spec:
  project: "{{GITLAB_PROJECT}}"
  targetBranch: "{{TARGET_BRANCH}}"
  sourceBranch: "gitlab-mcp/gitops-pr-{{RUN_ID}}"
  safeFilePath: "docs/kagent-triage-v2/gitlab-mcp-pr-proof-{{RUN_ID}}.md"
  requiredMarkers:
    - "KAGENT_MCP: called"
    - "GITLAB_BRANCH: created"
    - "GITLAB_FILE: created_or_updated"
    - "GITLAB_MR: created"
    - "GITLAB_MR_NOTE: created"
    - "HUMAN_REVIEW_REQUIRED: yes"
    - "OUTPUT_SANITIZED: yes"
