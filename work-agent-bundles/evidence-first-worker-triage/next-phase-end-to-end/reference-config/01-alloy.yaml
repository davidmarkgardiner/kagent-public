apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-vector-triage-red-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: alloy-vector-kafka-triage
data:
  config.alloy: |
    logging {
      level = "info"
      format = "logfmt"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }
    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label = "container"
      }
      // Node the pod runs on. On a management cluster the triage agent cannot
      // live-inspect the worker, so the node name must travel in the envelope
      // for a human/agent to reach back to the right worker node.
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label = "service"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        regex = "agentic-triage-proof"
        action = "keep"
      }
    }
    loki.source.kubernetes "pod_logs" {
      targets = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_logs.receiver]
    }
    loki.source.kubernetes_events "events" {
      namespaces = ["agentic-triage-proof"]
      job_name = "kubernetes-events"
      log_format = "json"
      forward_to = [loki.process.events.receiver]
    }
    loki.process "pod_logs" {
      stage.static_labels {
        values = {
          cluster = "red",
          environment = "lab",
          source_type = "pod-log",
        }
      }
      forward_to = [otelcol.receiver.loki.vector.receiver]
    }
    loki.process "events" {
      // loki.source.kubernetes_events with log_format="json" emits a FLATTENED
      // event body. Top-level keys: count, kind, msg, name, reason, type,
      // reportingcontroller, ... There is NO `involvedObject` object and NO
      // `container` field (proven: evidence/ALLOY-EVENT-RAW-CAPTURE-2026-07-21.md).
      // Extract only what is really present in the body:
      //   - `reason` -> event_reason (top-level key).
      //   - `name`   -> pod (top-level key = the involved object's name).
      // `namespace` is NOT in the body; it is labelled by this source's own
      // namespace watch (see loki.source.kubernetes_events namespaces=[...] above),
      // so no extraction is needed for it here.
      // `container` is not recoverable at this stage; for events that name it,
      // it lives only inside `msg` text and is parsed downstream in Vector.
      stage.json {
        expressions = {
          event_reason = "reason",
          pod = "name",
        }
      }
      stage.labels {
        values = {
          event_reason = "",
          pod = "",
        }
      }
      stage.static_labels {
        values = {
          cluster = "red",
          environment = "lab",
          source_type = "kubernetes-event",
        }
      }
      forward_to = [otelcol.receiver.loki.vector.receiver]
    }
    otelcol.receiver.loki "vector" {
      output {
        logs = [otelcol.processor.batch.vector.input]
      }
    }
    otelcol.processor.batch "vector" {
      timeout = "2s"
      send_batch_size = 100
      output {
        logs = [otelcol.exporter.otlphttp.vector.input]
      }
    }
    otelcol.exporter.otlphttp "vector" {
      client {
        endpoint = "http://vector-telemetry-triage.argo-events.svc.cluster.local:4318"
      }
      sending_queue {
        enabled = true
        queue_size = 1000
      }
      retry_on_failure {
        enabled = true
        initial_interval = "1s"
        max_interval = "30s"
        max_elapsed_time = "5m"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy-vector-triage
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: alloy-vector-kafka-triage
spec:
  replicas: 1
  selector:
    matchLabels: {app: alloy-vector-triage}
  template:
    metadata:
      labels: {app: alloy-vector-triage}
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.12.2
          args: [run, /etc/alloy/config.alloy, --storage.path=/var/lib/alloy/data]
          resources:
            requests: {cpu: 50m, memory: 256Mi}
            limits: {cpu: 300m, memory: 512Mi}
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: config
          configMap: {name: alloy-vector-triage-red-config}
        - name: data
          emptyDir: {}
