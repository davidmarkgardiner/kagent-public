apiVersion: batch/v1
kind: Job
metadata:
  name: ensure-incident-triage-topic
  namespace: "{{KAFKA_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-vector-kafka-triage
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: rpk
          image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
          command: [sh, -ec]
          args:
            - rpk topic create {{KAFKA_TOPIC}} --brokers {{KAFKA_BOOTSTRAP}} --partitions {{KAFKA_PARTITIONS}} --replicas {{KAFKA_REPLICATION_FACTOR}} || rpk topic list --brokers {{KAFKA_BOOTSTRAP}} | grep -qx {{KAFKA_TOPIC}}
