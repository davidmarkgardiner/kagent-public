# Disposable Confluent-path verification fixtures. All strings are synthetic.
apiVersion: v1
kind: Pod
metadata:
  name: scheduling-failure-confluent
  namespace: agentic-triage-proof
  labels: {app.kubernetes.io/name: scheduler-test, triage-test: confluent-scheduling}
spec:
  nodeSelector: {triage.example.invalid/node: no-such-node}
  containers:
    - name: app
      image: busybox:1.36
      command: [sh, -c, 'sleep 300']
---
apiVersion: v1
kind: Pod
metadata:
  name: oomkilled-confluent
  namespace: agentic-triage-proof
  labels: {app.kubernetes.io/name: memory-test, triage-test: confluent-oom}
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command: [sh, -c, 'echo "FATAL synthetic memory exhaustion"; head -c 128M /dev/zero > /dev/null']
      resources:
        limits: {memory: 32Mi}
---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-missing-confluent
  namespace: agentic-triage-proof
  labels: {app.kubernetes.io/name: config-test, triage-test: confluent-configmap}
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command: [sh, -c, 'echo "ERROR synthetic application cannot find ConfigMap app-settings-v999"; sleep 180']
---
apiVersion: v1
kind: Pod
metadata:
  name: imagepull-failure-confluent
  namespace: agentic-triage-proof
  labels: {app.kubernetes.io/name: image-test, triage-test: confluent-imagepull}
spec:
  containers:
    - name: app
      image: example.invalid/triage/no-such-image:latest
