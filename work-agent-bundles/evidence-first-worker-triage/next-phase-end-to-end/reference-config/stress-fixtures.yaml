# Controlled, non-production evidence exercise. Not included in kustomization.
apiVersion: v1
kind: Pod
metadata:
  name: payments-timeout-log-stress
  namespace: agentic-triage-proof
  labels: {app: payments-api, triage-test: stress-log-timeout}
spec:
  restartPolicy: Never
  containers:
    - name: payments-api
      image: busybox:1.36
      command: [sh, -c]
      args: ['echo "ERROR synthetic payment timeout request_id=stress-log-001"; sleep 180']
      resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 50m, memory: 32Mi}}
---
apiVersion: v1
kind: Pod
metadata:
  name: auth-redaction-log-stress
  namespace: agentic-triage-proof
  labels: {app: auth-api, triage-test: stress-log-redaction}
spec:
  restartPolicy: Never
  containers:
    - name: auth-api
      image: busybox:1.36
      command: [sh, -c]
      args: ['echo "FATAL synthetic auth failure password=synthetic-password token=synthetic-token authorization=Bearer synthetic-bearer"; sleep 180']
      resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 50m, memory: 32Mi}}
---
apiVersion: v1
kind: Pod
metadata:
  name: inventory-crashloop-stress
  namespace: agentic-triage-proof
  labels: {app: inventory-api, triage-test: stress-backoff}
spec:
  restartPolicy: Always
  containers:
    - name: inventory-api
      image: busybox:1.36
      command: [sh, -c]
      args: ['echo "FATAL synthetic inventory startup failure"; exit 1']
      resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 50m, memory: 32Mi}}
---
apiVersion: v1
kind: Pod
metadata:
  name: imagepull-backoff-stress
  namespace: agentic-triage-proof
  labels: {app: catalog-api, triage-test: stress-imagepull}
spec:
  containers:
    - name: catalog-api
      image: example.invalid/triage/no-such-image:latest
      resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 50m, memory: 32Mi}}
---
apiVersion: v1
kind: Pod
metadata:
  name: failed-scheduling-control-stress
  namespace: agentic-triage-proof
  labels: {app: scheduling-control, triage-test: stress-control}
spec:
  nodeSelector: {triage.kagent.dev/no-such-node: "true"}
  containers:
    - name: control
      image: busybox:1.36
      command: [sh, -c]
      args: ['sleep 180']
      resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 50m, memory: 32Mi}}
