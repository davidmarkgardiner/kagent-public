apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-k8s-events-config
  namespace: "{{MONITORING_NAMESPACE}}"
  labels:
    app: alloy-k8s-events
    app.kubernetes.io/part-of: alloy-k8s-events
data:
  config.alloy: |
    logging {
      level  = coalesce(env("LOG_LEVEL"), "info")
      format = "logfmt"
    }

    loki.source.kubernetes_events "cluster_events" {
      namespaces = ["{{SMOKE_NAMESPACE}}"]
      job_name   = "kubernetes-events"
      log_format = "json"

      forward_to = [loki.process.enrich.receiver]
    }

    loki.process "enrich" {
      stage.static_labels {
        values = {
          cluster      = coalesce(env("CLUSTER_NAME"), "{{CLUSTER_NAME}}"),
          environment  = coalesce(env("CLUSTER_ENVIRONMENT"), "{{CLUSTER_ENVIRONMENT}}"),
          region       = coalesce(env("CLUSTER_REGION"), "{{CLUSTER_REGION}}"),
          source       = "alloy",
          pipeline     = "alloy-k8s-events-loki",
          payload_type = "kubernetes-event",
          test_scope   = "{{SMOKE_NAMESPACE}}",
        }
      }

      stage.json {
        expressions = {
          event_type     = "type",
          event_reason   = "reason",
          event_message  = "message",
          event_count    = "count",
          obj_kind       = "involvedObject.kind",
          obj_name       = "involvedObject.name",
          obj_namespace  = "involvedObject.namespace",
          first_time     = "firstTimestamp",
          last_time      = "lastTimestamp",
          source_comp    = "source.component",
        }
      }

      stage.labels {
        values = {
          event_type    = "",
          event_reason  = "",
          obj_kind      = "",
          obj_namespace = "",
        }
      }

      stage.drop {
        source              = "event_count"
        expression          = "^[2-9]|^[1-9][0-9]+"
        drop_counter_reason = "duplicate_event"
      }

      stage.limit {
        rate  = 10
        burst = 25
        drop  = true
      }

      forward_to = [loki.write.local_loki.receiver]
    }

    loki.write "local_loki" {
      endpoint {
        url = "http://{{LOKI_GATEWAY_SERVICE}}.{{MONITORING_NAMESPACE}}.svc/loki/api/v1/push"
      }
    }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alloy-k8s-events-read
  namespace: "{{SMOKE_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-k8s-events
rules:
  - apiGroups: [""]
    resources: ["events", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alloy-k8s-events-read
  namespace: "{{SMOKE_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: alloy-k8s-events
subjects:
  - kind: ServiceAccount
    name: alloy-k8s-events
    namespace: "{{MONITORING_NAMESPACE}}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alloy-k8s-events-read
