# Standalone smoke event exporter. If the target environment already collects
# Kubernetes events with Alloy, merge the config and labels into that managed
# installation instead. Do not run both paths or events may be duplicated.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-triage-alloy-events-config
  namespace: "{{MONITORING_NAMESPACE}}"
  labels:
    app: agentic-triage-alloy-events
    app.kubernetes.io/part-of: agentic-triage-smoke
data:
  config.alloy: |
    logging {
      level  = coalesce(env("LOG_LEVEL"), "info")
      format = "logfmt"
    }

    loki.source.kubernetes_events "cluster_events" {
      namespaces = ["{{SMOKE_NAMESPACE}}"]
      job_name   = "kubernetes-events"
      log_format = "json"

      forward_to = [loki.process.enrich.receiver]
    }

    loki.process "enrich" {
      stage.static_labels {
        values = {
          cluster      = coalesce(env("CLUSTER_NAME"), "{{CLUSTER_NAME}}"),
          environment  = coalesce(env("CLUSTER_ENVIRONMENT"), "{{CLUSTER_ENVIRONMENT}}"),
          region       = coalesce(env("CLUSTER_REGION"), "{{CLUSTER_REGION}}"),
          source       = "alloy",
          pipeline     = "agentic-triage-alloy-events-loki",
          payload_type = "kubernetes-event",
          test_scope   = "{{SMOKE_NAMESPACE}}",
        }
      }

      stage.json {
        expressions = {
          event_type     = "type",
          event_reason   = "reason",
          event_message  = "msg",
          event_count    = "count",
          obj_kind       = "kind",
          obj_name       = "name",
          source_comp    = "sourcecomponent",
        }
      }

      stage.labels {
        values = {
          event_type    = "",
          event_reason  = "",
          obj_kind      = "",
        }
      }

      stage.drop {
        source              = "event_count"
        expression          = "^[2-9]|^[1-9][0-9]+"
        drop_counter_reason = "duplicate_event"
      }

      stage.limit {
        rate  = 10
        burst = 25
        drop  = true
      }

      forward_to = [loki.write.local_loki.receiver]
    }

    loki.write "local_loki" {
      endpoint {
        url = "http://{{LOKI_GATEWAY_SERVICE}}.{{MONITORING_NAMESPACE}}.svc/loki/api/v1/push"
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentic-triage-alloy-events
  namespace: "{{MONITORING_NAMESPACE}}"
  labels:
    app.kubernetes.io/name: agentic-triage-alloy-events
    app.kubernetes.io/part-of: agentic-triage-smoke
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentic-triage-alloy-events-read
  namespace: "{{SMOKE_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: agentic-triage-smoke
rules:
  - apiGroups: [""]
    resources: ["events", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentic-triage-alloy-events-read
  namespace: "{{SMOKE_NAMESPACE}}"
  labels:
    app.kubernetes.io/part-of: agentic-triage-smoke
subjects:
  - kind: ServiceAccount
    name: agentic-triage-alloy-events
    namespace: "{{MONITORING_NAMESPACE}}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentic-triage-alloy-events-read
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-triage-alloy-events
  namespace: "{{MONITORING_NAMESPACE}}"
  labels:
    app.kubernetes.io/name: agentic-triage-alloy-events
    app.kubernetes.io/part-of: agentic-triage-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentic-triage-alloy-events
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentic-triage-alloy-events
        app.kubernetes.io/part-of: agentic-triage-smoke
    spec:
      serviceAccountName: agentic-triage-alloy-events
      containers:
        - name: alloy
          image: "{{ALLOY_IMAGE}}"
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          env:
            - name: CLUSTER_NAME
              value: "{{CLUSTER_NAME}}"
            - name: CLUSTER_ENVIRONMENT
              value: "{{CLUSTER_ENVIRONMENT}}"
            - name: CLUSTER_REGION
              value: "{{CLUSTER_REGION}}"
          ports:
            - name: http
              containerPort: 12345
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: config
          configMap:
            name: agentic-triage-alloy-events-config
        - name: data
          emptyDir: {}
