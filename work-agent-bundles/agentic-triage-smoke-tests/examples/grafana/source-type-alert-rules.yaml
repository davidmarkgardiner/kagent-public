# Grafana alerting provisioning example for agentic triage source-type smokes.
# The log and event query shapes match the 2026-07-10 live proof. The file is
# placeholder-safe; validate provisioning schema against the installed Grafana
# version before applying.
apiVersion: 1
contactPoints:
  - orgId: 1
    name: agentic-triage-smart-triage-webhook
    receivers:
      - uid: agentic-triage-smart-triage-webhook
        type: webhook
        settings:
          url: "{{GRAFANA_ALERT_WEBHOOK_URL}}"
          httpMethod: POST
        disableResolveMessage: true
  - orgId: 1
    name: agentic-triage-vector-kafka-webhook
    receivers:
      - uid: agentic-triage-vector-kafka-webhook
        type: webhook
        settings:
          url: "{{VECTOR_WEBHOOK_URL}}"
          httpMethod: POST
        disableResolveMessage: true
groups:
  - orgId: 1
    name: agentic-triage-source-type-smokes
    folder: Agentic Triage Smoke
    interval: 30s
    rules:
      - uid: ats-metric-crashloop
        title: Agentic Triage Smoke Metric CrashLoop {{RUN_ID}}
        condition: A
        data:
          - refId: A
            datasourceUid: "{{PROMETHEUS_DATASOURCE_UID}}"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: 'kube_pod_container_status_terminated_reason{namespace="{{SMOKE_NAMESPACE}}",reason="Error"} > 0'
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Error
        for: 30s
        labels:
          cluster: "{{CLUSTER_NAME}}"
          namespace: "{{SMOKE_NAMESPACE}}"
          workload: "{{SMOKE_WORKLOAD}}"
          run_id: "{{RUN_ID}}"
          smoke: metric-crashloop
          source_type: metrics
        annotations:
          summary: Smoke workload container terminated with Error
          description: Agentic triage metrics smoke from Grafana to webhook.
      - uid: ats-log-errorburst
        title: Agentic Triage Smoke Log Error Burst {{RUN_ID}}
        condition: C
        data:
          - refId: A
            datasourceUid: "{{LOKI_DATASOURCE_UID}}"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              queryType: range
              editorMode: code
              expr: 'sum by (cluster,namespace,pod,container,app,service_name,node_name,reason,failure,run_id) (count_over_time({namespace="{{SMOKE_NAMESPACE}}",source_type="logs"} |= "AGENTIC_TRIAGE_SMOKE_ERROR" | logfmt | run_id="{{RUN_ID}}" [5m]))'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 30s
        labels:
          cluster: "{{CLUSTER_NAME}}"
          namespace: "{{SMOKE_NAMESPACE}}"
          workload: "{{SMOKE_WORKLOAD}}"
          run_id: "{{RUN_ID}}"
          smoke: log-errorburst
          source_type: logs
          route_to: vector-kafka
        annotations:
          summary: 'Pod log error {{ $labels.reason }} in {{ $labels.namespace }}/{{ $labels.pod }}'
          description: 'Cluster={{ $labels.cluster }} namespace={{ $labels.namespace }} pod={{ $labels.pod }} container={{ $labels.container }} service={{ $labels.service_name }} node={{ $labels.node_name }} reason={{ $labels.reason }} failure={{ $labels.failure }} run_id={{ $labels.run_id }}'
          log_reason: '{{ $labels.reason }}'
          failure: '{{ $labels.failure }}'
          evidence_query: '{cluster="{{ $labels.cluster }}", namespace="{{ $labels.namespace }}", pod="{{ $labels.pod }}", source_type="logs"} |= "AGENTIC_TRIAGE_SMOKE_ERROR"'
      - uid: ats-event-failedscheduling
        title: Agentic Triage Smoke Event FailedScheduling {{RUN_ID}}
        condition: C
        data:
          - refId: A
            datasourceUid: "{{LOKI_DATASOURCE_UID}}"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              queryType: range
              editorMode: code
              expr: 'sum by (cluster,namespace,event_reason,event_type,pod,event_message) (count_over_time({job="kubernetes-events",namespace="{{SMOKE_NAMESPACE}}",event_reason="FailedScheduling"} | json | name="{{EVENT_SMOKE_POD}}" | label_format pod="{{.name}}", event_message="{{.msg}}" [5m]))'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                    params: []
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 30s
        labels:
          cluster: "{{CLUSTER_NAME}}"
          namespace: "{{SMOKE_NAMESPACE}}"
          workload: "{{SMOKE_WORKLOAD}}"
          run_id: "{{RUN_ID}}"
          smoke: event-failedscheduling
          source_type: events
          event_reason: FailedScheduling
        annotations:
          summary: 'Kubernetes {{ $labels.event_reason }} event for {{ $labels.namespace }}/{{ $labels.pod }}'
          description: 'Cluster={{ $labels.cluster }} namespace={{ $labels.namespace }} pod={{ $labels.pod }} type={{ $labels.event_type }} reason={{ $labels.event_reason }}'
          event_reason: '{{ $labels.event_reason }}'
          event_message: '{{ $labels.event_message }}'
          evidence_query: '{job="kubernetes-events", namespace="{{ $labels.namespace }}", event_reason="{{ $labels.event_reason }}"} |= "{{ $labels.pod }}"'
      - uid: ats-trace-latency
        title: Agentic Triage Smoke Trace Latency {{RUN_ID}}
        condition: A
        data:
          - refId: A
            datasourceUid: "{{PROMETHEUS_DATASOURCE_UID}}"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: 'histogram_quantile(0.95, sum by (le,service_name) (rate(traces_spanmetrics_latency_bucket{service_name="{{SMOKE_SERVICE}}"}[5m]))) > {{LATENCY_THRESHOLD_SECONDS}}'
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Error
        for: 30s
        labels:
          cluster: "{{CLUSTER_NAME}}"
          namespace: "{{SMOKE_NAMESPACE}}"
          workload: "{{SMOKE_WORKLOAD}}"
          service: "{{SMOKE_SERVICE}}"
          run_id: "{{RUN_ID}}"
          smoke: trace-latency
          source_type: traces
        annotations:
          summary: Smoke service high latency trace alert
          description: Agentic triage trace-linked smoke from Grafana to webhook.
          trace_id: "{{TRACE_ID_OR_NO_TRACE}}"
          tempo_url: "{{TEMPO_DEEPLINK_OR_NO_TRACE}}"
policies:
  - orgId: 1
    receiver: agentic-triage-smart-triage-webhook
    group_by:
      - alertname
      - run_id
      - smoke
    routes:
      - receiver: agentic-triage-vector-kafka-webhook
        object_matchers:
          - - route_to
            - =
            - vector-kafka
      - receiver: agentic-triage-smart-triage-webhook
        object_matchers:
          - - run_id
            - =~
            - triage-smoke-.*
