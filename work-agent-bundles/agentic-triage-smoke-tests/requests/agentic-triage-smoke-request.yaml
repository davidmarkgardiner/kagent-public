apiVersion: platform.example.com/v1alpha1
kind: AgenticTriageSmokeRequest
metadata:
  name: "{{RUN_ID}}"
spec:
  cluster: "{{CLUSTER_NAME}}"
  environment: "nonprod"
  server: "{{SERVER_NAME}}"
  target:
    namespace: "{{TARGET_NAMESPACE}}"
    workload: "{{TARGET_WORKLOAD}}"
    service: "{{TARGET_SERVICE}}"
    podSelector: "{{TARGET_POD_SELECTOR}}"
  routing:
    alertOriginCluster: "{{ALERT_ORIGIN_CLUSTER}}"
    grafanaContactPoint: "{{GRAFANA_TEST_CONTACT_POINT}}"
    alertRoute: "{{ALERT_ROUTE}}"
    webhookHop: "direct|vector" # "vector" if Grafana/Alertmanager webhook lands in Vector before the smart-triage EventSource
    vectorEndpoint: "{{VECTOR_WEBHOOK_ENDPOINT}}" # required only when webhookHop is "vector"
    vectorCluster: "{{VECTOR_CLUSTER}}" # required only when webhookHop is "vector"
    argoNamespace: "{{ARGO_NAMESPACE}}"
    argoEventsNamespace: "{{ARGO_EVENTS_NAMESPACE}}"
  observability:
    monitoringNamespace: "{{MONITORING_NAMESPACE}}"
    smokeNamespace: "{{SMOKE_NAMESPACE}}"
    prometheusDatasourceUid: "{{PROMETHEUS_DATASOURCE_UID}}"
    lokiDatasourceUid: "{{LOKI_DATASOURCE_UID}}"
    lokiGatewayService: "{{LOKI_GATEWAY_SERVICE}}"
    grafanaAlertWebhookUrl: "{{GRAFANA_ALERT_WEBHOOK_URL}}"
    smokeContainer: "{{SMOKE_CONTAINER}}"
    eventSmokePod: "{{EVENT_SMOKE_POD}}"
    clusterEnvironment: "{{CLUSTER_ENVIRONMENT}}"
    clusterRegion: "{{CLUSTER_REGION}}"
  agents:
    smokeAgentName: "{{SMOKE_AGENT_NAME}}"
    grafanaEvidenceAgent: "grafana-evidence-agent"
    tierTwoAgent: "agentic-triage-tier-two-poc"
    tierTwoWorkflowTemplate: "agentic-triage-tier-two"
    modelConfig: "{{MODEL_CONFIG}}"
  smokes:
    metricCrashloop: true
    metricCpuOrMemory: true
    logErrorBurst: true
    kubernetesEvent: true
    traceOrFallback: true
    dedupReplay: true
    negativeAgentHealth: true
  safety:
    productionAllowed: false
    dryRunRemediation: true
    requireHitlBeforeMutation: true
    namespaceAllowlist:
      - "{{TARGET_NAMESPACE}}"
