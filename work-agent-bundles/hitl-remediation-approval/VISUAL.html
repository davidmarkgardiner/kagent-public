<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HITL Remediation Approval</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f7f9fc;color:#172033}
    main{max-width:1050px;margin:auto;padding:32px}
    .flow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .box{background:#fff;border:1px solid #d8dee9;border-radius:8px;padding:16px}
    b{color:#0b4f8a}.sub{color:#526070}
    @media(max-width:850px){.flow{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <h1>HITL Remediation Approval</h1>
  <p class="sub">Non-read-only action waits for human approval.</p>
  <section class="flow">
    <div class="box"><b>Propose</b><p>Agent recommends bounded remediation.</p></div>
    <div class="box"><b>Suspend</b><p>Workflow pauses before action.</p></div>
    <div class="box"><b>Approve</b><p>Human identity and decision recorded.</p></div>
    <div class="box"><b>Execute</b><p>Action runs only if approved.</p></div>
    <div class="box"><b>Verify</b><p>Outcome and report are captured.</p></div>
  </section>
</main>
</body>
</html>
