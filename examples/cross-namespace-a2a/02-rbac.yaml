    name: specialist
    namespace: team-beta
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-runtime-readonly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-runtime-readonly
  namespace: team-gamma
