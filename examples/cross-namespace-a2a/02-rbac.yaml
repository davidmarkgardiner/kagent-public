apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: team-alpha
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: specialist
  namespace: team-beta
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rogue-orchestrator
  namespace: team-gamma
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-runtime-readonly
  namespace: team-alpha
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-agent-runtime-readonly
  namespace: team-alpha
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: team-alpha
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-runtime-readonly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
