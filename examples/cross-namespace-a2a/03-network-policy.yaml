apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: team-alpha
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-a2a-orchestrator-ingress
  namespace: team-alpha
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Required on Calico-style clusters where kubelet HTTP readiness probes are
    # subject to NetworkPolicy. Tighten this to the real node CIDR per cluster.
    - from:
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: team-beta
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-a2a-specialist-ingress
  namespace: team-beta
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Required on Calico-style clusters where kubelet HTTP readiness probes are
    # subject to NetworkPolicy. Tighten this to the real node CIDR per cluster.
    - from:
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kagent
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentgateway-system
        - namespaceSelector:
            matchLabels:
              team: alpha
      ports:
        - protocol: TCP
          port: 8080
---
