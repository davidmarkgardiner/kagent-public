apiVersion: v1
kind: Secret
metadata:
  name: kagent-openai
  namespace: team-gamma
type: Opaque
stringData:
  OPENAI_API_KEY: local-kubeai-placeholder
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: local-qwen
  namespace: team-gamma
spec:
  provider: OpenAI
  model: qwen3-14b
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  openAI:
    baseUrl: http://kubeai.kubeai.svc.cluster.local/openai/v1
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: rogue-orchestrator
  namespace: team-gamma
  labels:
    app.kubernetes.io/name: rogue-orchestrator
    app.kubernetes.io/part-of: cross-namespace-a2a
spec:
  description: Negative-control agent. It references team-beta/specialist from a namespace that is not allowed.
  type: Declarative
  declarative:
    modelConfig: local-qwen
    deployment:
      labels:
        app.kubernetes.io/name: rogue-orchestrator
        app.kubernetes.io/part-of: cross-namespace-a2a
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
    a2aConfig:
      skills:
        - id: forbidden-delegation
          name: Forbidden Delegation
          description: Should fail admission/reconcile because beta does not permit gamma.
          inputModes: [text]
          outputModes: [text]
          tags: [negative-control]
    systemMessage: |
      This agent should not become accepted because it references team-beta/specialist from team-gamma.
    tools:
      - type: Agent
        agent:
          name: specialist
          namespace: team-beta
