apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-kb-querydoc
  labels:
    app.kubernetes.io/name: platform-kb-querydoc
    app.kubernetes.io/part-of: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-kb-querydoc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-kb-querydoc
        app.kubernetes.io/part-of: kagent
    spec:
      containers:
        - name: querydoc
          image: ghcr.io/kagent-dev/doc2vec/mcp:1.1.14
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-kb-openai
                  key: OPENAI_API_KEY
            - name: SQLITE_DB_DIR
              value: /data
            - name: VECTOR_DB_TYPE
              value: sqlite
            - name: PORT
              value: "8080"
            - name: TRANSPORT_TYPE
              value: http
            - name: KAGENT_LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: platform-kb-data
