apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-kb-indexer
  labels:
    app.kubernetes.io/name: platform-kb-indexer
    app.kubernetes.io/part-of: kagent
spec:
  schedule: "17 2 * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: platform-kb-indexer
            app.kubernetes.io/part-of: kagent
        spec:
          restartPolicy: Never
          containers:
            - name: indexer
              image: node:20-bookworm-slim
              imagePullPolicy: IfNotPresent
              env:
                - name: KB_REPO_URL
                  value: "https://github.com/davidmarkgardiner/kagent-public.git"
                - name: KB_REPO_REF
                  value: "main"
                - name: KB_SOURCE_PATH
                  value: "docs/platform-kb"
                - name: DOC2VEC_REPO
                  value: "https://github.com/kagent-dev/doc2vec.git"
                - name: EMBEDDING_PROVIDER
                  value: "openai"
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-kb-openai
                      key: OPENAI_API_KEY
              volumeMounts:
                - name: data
                  mountPath: /data
              command:
                - /bin/bash
                - -ceu
                - |
                  apt-get update
                  apt-get install -y --no-install-recommends git ca-certificates
                  rm -rf /var/lib/apt/lists/*

                  work="$(mktemp -d)"
                  git clone --depth 1 --branch "${KB_REPO_REF}" "${KB_REPO_URL}" "${work}/kb"
                  test -d "${work}/kb/${KB_SOURCE_PATH}"
                  git clone --depth 1 "${DOC2VEC_REPO}" "${work}/doc2vec"
                  mkdir -p "${work}/doc2vec/platform-kb" "${work}/doc2vec/vector-dbs"
                  cp -R "${work}/kb/${KB_SOURCE_PATH}/." "${work}/doc2vec/platform-kb/"

                  cat > "${work}/doc2vec/config.yaml" <<'EOF'
                  embedding:
                    provider: 'openai'
                    dimension: 3072
                    openai:
                      api_key: '${OPENAI_API_KEY}'
                      model: 'text-embedding-3-large'

                  sources:
                    - type: 'local_directory'
                      product_name: 'platform-kb'
                      version: 'current'
                      path: './platform-kb'
                      include_extensions:
                        - '.md'
                      recursive: true
                      max_size: 1048576
                      database_config:
                        type: 'sqlite'
                        params:
                          db_path: './vector-dbs/platform-kb.db'
                  EOF

                  cd "${work}/doc2vec"
                  PUPPETEER_SKIP_DOWNLOAD=true npm install
                  npm start 2>&1 | tee "${work}/doc2vec-build.log"
                  if grep -E -i "incorrect api key|401 unauthorized|error generating embeddings|failed to generate embeddings|failed to create embeddings|embedding failed|embedding error|^error:" "${work}/doc2vec-build.log" >/dev/null 2>&1; then
                    echo "ERROR: doc2vec reported embedding failures; refusing to publish platform-kb.db" >&2
                    exit 3
                  fi
                  test -s vector-dbs/platform-kb.db
                  cp vector-dbs/platform-kb.db /data/platform-kb.db.tmp
                  mv /data/platform-kb.db.tmp /data/platform-kb.db
                  cat > /data/platform-kb-manifest.json <<EOF
                  {"repo":"${KB_REPO_URL}","ref":"${KB_REPO_REF}","source":"${KB_SOURCE_PATH}","generated_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
                  EOF
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: platform-kb-data
