apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-rule-sync-proof-config
  namespace: monitoring
data:
  config.yaml: |
    multitenancy_enabled: true

    server:
      http_listen_port: 9009

    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/blocks
      tsdb:
        dir: /data/tsdb
      bucket_store:
        sync_dir: /data/bucket-sync

    compactor:
      data_dir: /data/compactor

    distributor:
      ring:
        kvstore:
          store: inmemory

    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: inmemory

    ruler:
      enable_api: true
      rule_path: /runtime-ruler
      alertmanager_url: http://kube-prom-kube-prometheus-alertmanager.monitoring:9093/alertmanager

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/ruler-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir-rule-sync-proof
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mimir-rule-sync-proof
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir-rule-sync-proof
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir-rule-sync-proof
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:2.17.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/mimir/config.yaml
            - -target=all
          ports:
            - name: http
              containerPort: 9009
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/mimir
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: mimir-rule-sync-proof-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir-rule-sync-proof
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mimir-rule-sync-proof
spec:
  selector:
    app.kubernetes.io/name: mimir-rule-sync-proof
  ports:
    - name: http
      port: 9009
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-rule-sync-proof
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-rule-sync-proof
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-rule-sync-proof
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-rule-sync-proof
subjects:
  - kind: ServiceAccount
    name: alloy-rule-sync-proof
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-rule-sync-proof-config
  namespace: monitoring
data:
  config.alloy: |
    mimir.rules.kubernetes "proof" {
      address       = "http://mimir-rule-sync-proof.monitoring.svc:9009"
      tenant_id     = "platform"
      sync_interval = "30s"

      rule_selector {
        match_labels = {
          "shipto.lgtm"    = "true",
          "lgtm.tenant"   = "platform",
          "rulesync.proof" = "true",
        }

        match_expression {
          key      = "lgtm.engine"
          operator = "NotIn"
          values   = ["loki"]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy-rule-sync-proof
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy-rule-sync-proof
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy-rule-sync-proof
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy-rule-sync-proof
    spec:
      serviceAccountName: alloy-rule-sync-proof
      containers:
        - name: alloy
          image: grafana/alloy:v1.16.1
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - name: http
              containerPort: 12345
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
      volumes:
        - name: config
          configMap:
            name: alloy-rule-sync-proof-config
---
apiVersion: v1
kind: Service
metadata:
  name: alloy-rule-sync-proof
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy-rule-sync-proof
spec:
  selector:
    app.kubernetes.io/name: alloy-rule-sync-proof
  ports:
    - name: http
      port: 12345
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: managed-rule-sync-smoke
  namespace: monitoring
  labels:
    shipto.lgtm: "true"
    lgtm.tenant: platform
    route_to: triage
    rulesync.proof: "true"
spec:
  groups:
    - name: managed.rule.sync.smoke
      interval: 1m
      rules:
        - alert: ManagedRuleSyncSmoke
          expr: vector(1)
          for: 1m
          labels:
            severity: info
            route_to: triage
          annotations:
            summary: Synthetic Alloy mimir.rules.kubernetes smoke test
