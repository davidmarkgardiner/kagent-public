apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: k-agent-triage-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/name: k-agent-triage-webhook
    app.kubernetes.io/part-of: k-agent-observability
spec:
  route:
    receiver: argo-events-triage-webhook
    groupBy:
      - alertname
      - namespace
      - pod
      - gateway
    groupWait: 1s
    groupInterval: 30s
    repeatInterval: 5m
    matchers:
      - name: kagent_path
        value: webhook
        matchType: "="
  receivers:
    - name: argo-events-triage-webhook
      webhookConfigs:
        - url: http://path-b-alertmanager-webhook-eventsource-svc.argo-events.svc:12000/alertmanager
          sendResolved: true
          maxAlerts: 0
          timeout: 10s
