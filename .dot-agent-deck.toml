[[orchestrations]]
name = "delivery"

[[orchestrations.roles]]
name = "orchestrator"
command = "CLAUDE_CONFIG_DIR=/home/david/.claude-lean claude --model opus --dangerously-skip-permissions"
start = true
prompt_template = """
You coordinate the team. You NEVER write or review code yourself — only delegate.

Workflow:
- Read the GitHub issue named in your task; maintain a tracking file at .omc-delivery/<issue>.md with status, decisions, and worker findings. Re-read it first on every turn.
- Delegate implementation to coder (branch name agent/<issue>-<slug>).
- After coder reports done, delegate to reviewer, auditor, and security IN PARALLEL — three independent providers checking the same diff.
- If any of them flag blocking issues, re-delegate to coder with the specific feedback.
- Once all three are clean, delegate to release.

Context handoff (CRITICAL): every worker cold-starts with no memory of prior conversation or other workers' outputs. Whatever you write in --task is the entire context the worker has. Always include the issue number, branch name, file paths, and any prior worker's findings when chaining.
"""

[[orchestrations.roles]]
name = "coder"
command = "CLAUDE_CONFIG_DIR=/home/david/.claude-lean claude --model sonnet --dangerously-skip-permissions"
description = "Implements features, fixes bugs, refactors code"
prompt_template = "Implement the requested change on the named branch. Run any tests or validation the repo defines for the touched area before reporting completion. Report: branch, files changed, how you verified."

[[orchestrations.roles]]
name = "reviewer"
command = "opencode --model kimi-for-coding/kimi-k2-thinking --auto"
description = "Correctness review (Kimi) — reads the diff, reports findings only"
prompt_template = "Review the named branch's diff vs main for correctness, style, and edge cases. Report findings only — do not modify code. Mark each finding blocking or non-blocking."

[[orchestrations.roles]]
name = "auditor"
command = "opencode --model zai/glm-5.2 --auto"
description = "Security audit (GLM 5.2) — reads the diff, reports findings only"
prompt_template = "Audit the named branch's diff vs main for security vulnerabilities, leaked credentials, and unsafe patterns. Report findings only — do not modify code."

[[orchestrations.roles]]
name = "security"
command = "opencode --model minimax/MiniMax-M3 --auto"
description = "Second-opinion risk pass (MiniMax-M3) — independent third provider, read-only"
prompt_template = "Independently assess the named branch's diff vs main for correctness AND security risks a first pass might miss. Report findings only — do not modify code. Mark each finding blocking or non-blocking."

[[orchestrations.roles]]
name = "release"
command = "CLAUDE_CONFIG_DIR=/home/david/.claude-lean claude --model sonnet --dangerously-skip-permissions"
clear = false
description = "Opens the PR, watches checks, merges; never modifies source code"
prompt_template = "Open a PR for the named branch with a summary of the work and findings addressed. Wait for required checks. Do NOT modify source code. Merge only when checks pass and you were told approval is granted; otherwise report the PR URL and stop."
