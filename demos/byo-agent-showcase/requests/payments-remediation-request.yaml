apiVersion: platform.kagent.dev/v1alpha1
kind: BYOAgentRequest
metadata:
  name: payments-remediation
spec:
  team: payments
  namespace: payments-dev
  agentType: remediation-planner
  owner: "{{TEAM_OWNER}}"
  modelConfig: agentgateway-qwen
  failureModes:
    - CrashLoopBackOff after bad config rollout
    - stale ConfigMap annotation
  allowedTools:
    - k8s_get_resources
    - k8s_describe_resource
    - k8s_get_pod_logs
    - k8s_get_events
    - k8s_annotate_resource
    - k8s_patch_resource
  forbiddenTools:
    - k8s_delete_resource
    - k8s_execute_command
  memory:
    read: true
    write: curator-after-hitl
  hitl:
    required: true
    approval: "{{HITL_FRONT_DOOR}}"
  escalation:
    contact: "{{TEAM_ESCALATION_CONTACT}}"
