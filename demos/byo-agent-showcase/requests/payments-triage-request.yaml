apiVersion: platform.kagent.dev/v1alpha1
kind: BYOAgentRequest
metadata:
  name: payments-triage
spec:
  team: payments
  namespace: payments-dev
  agentType: watcher
  owner: "{{TEAM_OWNER}}"
  modelConfig: agentgateway-qwen
  failureModes:
    - CrashLoopBackOff
    - ImagePullBackOff
    - service routing failure
  allowedTools:
    - k8s_get_resources
    - k8s_describe_resource
    - k8s_get_pod_logs
    - k8s_get_events
  memory:
    read: true
    write: false
  escalation:
    contact: "{{TEAM_ESCALATION_CONTACT}}"
