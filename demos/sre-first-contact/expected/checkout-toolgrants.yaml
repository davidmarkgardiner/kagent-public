apiVersion: platform.kagent.dev/v1alpha1
kind: ToolGrant
metadata:
  name: sre-first-contact-front-door
  namespace: kagent
spec:
  agentRef:
    name: sre-first-contact-agent
  toolCatalogRef: sre-first-contact-tools@v1.0
  allowedToolNames:
    - argo_submit_workflow
    - argo_get_workflow
    - argo_get_workflow_logs
    - grafana_query_metrics
    - grafana_query_logs
    - grafana_get_dashboard
    - querydoc_search
    - search_nodes
    - open_nodes
    - read_graph
    - gitlab_get_project
    - gitlab_get_merge_request
    - gitlab_list_merge_requests
  expiresAt: "2027-01-01T00:00:00Z"
  reason: "SRE front-door onboarding and evidence coordination"
