---
# Example pattern: one normalized Kafka EventSource, multiple Sensors.
# This is documentation/reference YAML. Validate against the installed Argo
# Events version before applying in a real cluster.
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: catent-triage-kafka
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: catent-alert-routing
spec:
  template:
    serviceAccountName: argo-events-sa
  kafka:
    incident-triage-requests:
      url: "{{CONFLUENT_BOOTSTRAP}}"
      topic: "incident-triage-requests"
      consumerGroup:
        groupName: "catent-triage-router"
      tls:
        caCertSecret:
          name: confluent-public-ca
          key: ca.pem
      sasl:
        mechanism: "PLAIN"
        userSecret:
          name: confluent-credentials
          key: key
        passwordSecret:
          name: confluent-credentials
          key: secret
      jsonBody: true
      partition: ""
      version: "2.5.0"
---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: catent-p0-platform-critical
  namespace: argo-events
  labels:
    app.kubernetes.io/part-of: catent-alert-routing
    catent.routing/lane: p0-platform-critical
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: platform-critical
      eventSourceName: catent-triage-kafka
      eventName: incident-triage-requests
      filters:
        data:
          - path: body.schema_version
            type: string
            value: ["observability.triage.v1"]
          - path: body.alert_status
            type: string
            value: ["firing"]
          - path: body.queue_priority
            type: string
            value: ["p0", "p1"]
          - path: body.route_domain
            type: string
            value: ["platform", "security", "network"]
  triggers:
    - template:
        name: critical-platform-triage
        conditions: "platform-critical"
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: catent-platform-critical-
                namespace: argo-events
                labels:
                  catent.routing/lane: p0-platform-critical
              spec:
                workflowTemplateRef:
                  name: critical-platform-triage
                arguments:
                  parameters:
                    - name: triage-payload
          parameters:
            - src:
                dependencyName: platform-critical
                dataKey: body
              dest: spec.arguments.parameters.0.value
      rateLimit:
        requestsPerUnit: 30
        unit: Minute
      retryStrategy:
        steps: 5
        duration: 5s
