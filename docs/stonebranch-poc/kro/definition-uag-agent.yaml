---
# KRO ResourceGraphDefinition: Stonebranch UAG Agent
# Deploys a UAG agent pool into a namespace with RBAC, NetworkPolicy, and security hardening.
# Use this to deploy agents on worker clusters that connect to a remote OMS.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: uk8suagagent.kro.run
  labels:
    kro.run/type: application
    kro.run/category: scheduling
  annotations:
    kro.run/description: "Stonebranch UAG Agent deployment with RBAC and NetworkPolicy"
    kro.run/version: "1.0.0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: UK8SUagAgent
    spec:
      # ========================================
      # OMS Connection (required — get from Stonebranch team)
      # ========================================
      omsAddress: 'string | required=true description="OMS server hostname or IP"'
      omsPort: 'string | default="7878" description="OMS server port"'

      # ========================================
      # Agent Configuration
      # ========================================
      agentPrefix: 'string | required=true pattern="^[A-Za-z0-9][A-Za-z0-9-]{0,30}$" description="Agent name prefix, e.g. AKS-WORKER1"'
      replicas: 'integer | default=2 description="Number of agent replicas"'
      targetNamespace: 'string | default="stonebranch" description="Namespace to deploy agents into"'

      # ========================================
      # Image Configuration
      # ========================================
      imageTag: 'string | default="8.0.0.0-debian" description="Stonebranch Universal Agent image tag"'

      # ========================================
      # Resource Limits
      # ========================================
      cpuRequest: 'string | default="50m" description="CPU request per agent pod"'
      memoryRequest: 'string | default="128Mi" description="Memory request per agent pod"'
      cpuLimit: 'string | default="250m" description="CPU limit per agent pod"'
      memoryLimit: 'string | default="256Mi" description="Memory limit per agent pod"'

  # ========================================
  # Resources
  # ========================================
  resources:
    # ----------------------------------------
    # Namespace
    # ----------------------------------------
    - id: agentNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.targetNamespace}
          labels:
            app.kubernetes.io/part-of: stonebranch
            role: worker

    # ----------------------------------------
    # ServiceAccount
    # ----------------------------------------
    - id: serviceAccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: uag-agent
          namespace: ${schema.spec.targetNamespace}
          labels:
            app: uag-agent

    # ----------------------------------------
    # RBAC: Role (namespace-scoped, read-only)
    # ----------------------------------------
    - id: role
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: uag-agent
          namespace: ${schema.spec.targetNamespace}
        rules:
          - apiGroups: [""]
            resources: ["pods", "services", "configmaps", "events"]
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources: ["pods/log"]
            verbs: ["get"]
          - apiGroups: ["apps"]
            resources: ["deployments", "statefulsets", "daemonsets"]
            verbs: ["get", "list", "watch"]
          - apiGroups: ["batch"]
            resources: ["jobs", "cronjobs"]
            verbs: ["get", "list", "watch"]

    # ----------------------------------------
    # RBAC: RoleBinding
    # ----------------------------------------
    - id: roleBinding
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: uag-agent
          namespace: ${schema.spec.targetNamespace}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: uag-agent
        subjects:
          - kind: ServiceAccount
            name: uag-agent
            namespace: ${schema.spec.targetNamespace}

    # ----------------------------------------
    # NetworkPolicy: Agent egress locked to OMS only
    # ----------------------------------------
    - id: networkPolicy
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: uag-agent-egress
          namespace: ${schema.spec.targetNamespace}
        spec:
          podSelector:
            matchLabels:
              app: uag-agent
          policyTypes:
          - Egress
          - Ingress
          egress:
          # Allow DNS
          - ports:
            - port: 53
              protocol: UDP
            - port: 53
              protocol: TCP
          # Allow OMS connection
          - ports:
            - port: ${int(schema.spec.omsPort)}
              protocol: TCP
          ingress: []

    # ----------------------------------------
    # Agent Deployment
    # ----------------------------------------
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: uag-agent
          namespace: ${schema.spec.targetNamespace}
          labels:
            app: uag-agent
            component: agent
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: uag-agent
          template:
            metadata:
              labels:
                app: uag-agent
                component: agent
            spec:
              serviceAccountName: uag-agent
              securityContext:
                runAsNonRoot: true
                runAsUser: 10010
                runAsGroup: 0
                fsGroup: 0
                seccompProfile:
                  type: RuntimeDefault
              initContainers:
              - name: patch-agent-config
                image: "stonebranch/universal-agent:${schema.spec.imageTag}"
                command: ["sh", "-c"]
                args:
                - |
                  cp -a /etc/universal/* /config/
                  sed -i "s|^oms_servers.*|oms_servers ${schema.spec.omsPort}@${schema.spec.omsAddress}|" /config/uags.conf
                  sed -i "s|^netname.*|netname ${schema.spec.agentPrefix}-$(hostname | tail -c 6)|" /config/uags.conf
                  grep -E "^oms_servers|^netname" /config/uags.conf
                  mkdir -p /vardata/spool/oms /vardata/spool/ubroker /vardata/log /vardata/tmp /vardata/trace \
                           /vardata/keystore /vardata/cmdref /vardata/uem /vardata/uag
                  cp /etc/passwd /etcdata/passwd
                securityContext:
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                volumeMounts:
                - name: universal-config
                  mountPath: /config
                - name: var-universal
                  mountPath: /vardata
                - name: etc-passwd
                  mountPath: /etcdata
              containers:
              - name: uag
                image: "stonebranch/universal-agent:${schema.spec.imageTag}"
                securityContext:
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                volumeMounts:
                - name: universal-config
                  mountPath: /etc/universal
                - name: var-universal
                  mountPath: /var/opt/universal
                - name: tmp
                  mountPath: /tmp
                - name: etc-passwd
                  mountPath: /etc/passwd
                  subPath: passwd
                ports:
                - name: broker
                  containerPort: 7887
                  protocol: TCP
                resources:
                  requests:
                    cpu: ${schema.spec.cpuRequest}
                    memory: ${schema.spec.memoryRequest}
                  limits:
                    cpu: ${schema.spec.cpuLimit}
                    memory: ${schema.spec.memoryLimit}
                livenessProbe:
                  tcpSocket:
                    port: 7887
                  initialDelaySeconds: 30
                  periodSeconds: 10
                readinessProbe:
                  tcpSocket:
                    port: 7887
                  initialDelaySeconds: 15
                  periodSeconds: 5
              volumes:
              - name: universal-config
                emptyDir: {}
              - name: var-universal
                emptyDir: {}
              - name: tmp
                emptyDir: {}
              - name: etc-passwd
                emptyDir: {}

    # ----------------------------------------
    # Agent Service
    # ----------------------------------------
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: uag-agent
          namespace: ${schema.spec.targetNamespace}
          labels:
            app: uag-agent
        spec:
          type: ClusterIP
          ports:
          - name: broker
            port: 7887
            targetPort: 7887
            protocol: TCP
          selector:
            app: uag-agent
