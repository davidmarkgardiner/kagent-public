apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-test-manager-workflow
  namespace: argo
  labels:
    app.kubernetes.io/name: chaos-test-manager-workflow
    app.kubernetes.io/part-of: chaos-test-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-test-manager-workflow
  namespace: argo
  labels:
    app.kubernetes.io/name: chaos-test-manager-workflow
    app.kubernetes.io/part-of: chaos-test-manager
rules:
  - apiGroups: ["argoproj.io"]
    resources:
      - workflows
      - workflowtemplates
      - workflowtaskresults
    verbs: ["create", "get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-test-manager-workflow
  namespace: argo
  labels:
    app.kubernetes.io/name: chaos-test-manager-workflow
    app.kubernetes.io/part-of: chaos-test-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-test-manager-workflow
subjects:
  - kind: ServiceAccount
    name: chaos-test-manager-workflow
    namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-test-manager-litmus-reader
  namespace: chaos-demo
  labels:
    app.kubernetes.io/name: chaos-test-manager-workflow
    app.kubernetes.io/part-of: chaos-test-manager
rules:
  - apiGroups: ["litmuschaos.io"]
    resources:
      - chaosengines
      - chaosresults
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods
      - events
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-test-manager-litmus-reader
  namespace: chaos-demo
  labels:
    app.kubernetes.io/name: chaos-test-manager-workflow
    app.kubernetes.io/part-of: chaos-test-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-test-manager-litmus-reader
subjects:
  - kind: ServiceAccount
    name: chaos-test-manager-workflow
    namespace: argo
