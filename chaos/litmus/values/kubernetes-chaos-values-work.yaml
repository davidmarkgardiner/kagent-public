# ChaosHub Kubernetes experiment image values for a ring-fenced work cluster.
image:
  litmus:
    repository: registry.example.com/mirror/litmuschaos/ansible-runner
    tag: 3.28.0
    pullPolicy: IfNotPresent
  litmusGO:
    repository: registry.example.com/mirror/litmuschaos/go-runner
    tag: 3.28.0
    pullPolicy: IfNotPresent
  litmusLIBImage:
    repository: registry.example.com/mirror/litmuschaos/go-runner
    tag: 3.28.0

environment:
  runtime: containerd
  socketPath: /run/containerd/containerd.sock

# Disable node-level experiments by default for a staff/shared cluster.
experiments:
  disabled:
    - node-cpu-hog
    - node-memory-hog
    - node-io-stress
    - node-drain
    - node-taint
    - kubelet-service-kill
    - docker-service-kill
