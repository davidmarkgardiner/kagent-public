apiVersion: litmuschaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: pod-delete
  namespace: chaos-demo
  labels:
    app: pod-delete
    app.kubernetes.io/name: pod-delete
    app.kubernetes.io/part-of: litmus
    litmuschaos.io/version: 3.28.0
description:
  message: |
    Deletes a pod belonging to a deployment/statefulset/daemonset.
spec:
  definition:
    scope: Namespaced
    image: litmuschaos.docker.scarf.sh/litmuschaos/go-runner:3.28.0
    imagePullPolicy: Always
    command: ["/bin/bash"]
    args: ["-c", "./experiments -name pod-delete"]
    labels:
      app.kubernetes.io/part-of: litmus
      name: pod-delete
    env:
      - name: TOTAL_CHAOS_DURATION
        value: "15"
      - name: RAMP_TIME
        value: ""
      - name: FORCE
        value: "true"
      - name: CHAOS_INTERVAL
        value: "5"
      - name: PODS_AFFECTED_PERC
        value: ""
      - name: TARGET_PODS
        value: ""
      - name: SEQUENCE
        value: parallel
    permissions:
      - apiGroups: ["", "apps", "apps.openshift.io", "argoproj.io", "batch", "litmuschaos.io"]
        resources:
          - chaosengines
          - chaosexperiments
          - chaosresults
          - daemonsets
          - deploymentconfigs
          - deployments
          - events
          - jobs
          - pods
          - pods/exec
          - pods/log
          - replicasets
          - replicationcontrollers
          - rollouts
          - statefulsets
        verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update"]
---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: litmus-pod-delete
  namespace: chaos-demo
  labels:
    app: litmus-pod-delete
    app.kubernetes.io/name: litmus-pod-delete
    app.kubernetes.io/part-of: litmus
spec:
  appinfo:
    appns: chaos-demo
    applabel: "app.kubernetes.io/name=chaos-target"
    appkind: deployment
  chaosServiceAccount: k8s-chaos-admin
  engineState: active
  jobCleanUpPolicy: retain
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "20"
            - name: CHAOS_INTERVAL
              value: "5"
            - name: FORCE
              value: "true"
            - name: PODS_AFFECTED_PERC
              value: "50"
