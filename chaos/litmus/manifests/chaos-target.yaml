apiVersion: v1
kind: Namespace
metadata:
  name: chaos-demo
  labels:
    app: chaos-demo
    app.kubernetes.io/name: chaos-demo
    app.kubernetes.io/part-of: chaos-poc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-target
  namespace: chaos-demo
  labels:
    app: chaos-target
    app.kubernetes.io/name: chaos-target
    app.kubernetes.io/part-of: chaos-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chaos-target
  template:
    metadata:
      labels:
        app: chaos-target
        app.kubernetes.io/name: chaos-target
        app.kubernetes.io/part-of: chaos-demo
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          imagePullPolicy: IfNotPresent
          args:
            - -listen=:8080
            - -text=chaos-target healthy
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-target
  namespace: chaos-demo
  labels:
    app: chaos-target
    app.kubernetes.io/name: chaos-target
    app.kubernetes.io/part-of: chaos-demo
spec:
  selector:
    app.kubernetes.io/name: chaos-target
  ports:
    - name: http
      port: 8080
      targetPort: http
