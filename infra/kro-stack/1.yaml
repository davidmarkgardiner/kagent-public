    - id: resourceGroup
      template:
        apiVersion: resources.azure.com/v1api20200601
        kind: ResourceGroup
        metadata:
          name: ${schema.spec.resourceGroup}
          namespace: ${schema.spec.namespace}
        spec:
          azureName:  ${schema.spec.resourceGroup}
          location: ${schema.spec.location}

    - id: managedCluster
      # TODO: check configuration against latest/currently running
      template:
        apiVersion: containerservice.azure.com/v1api20240402preview
        kind: ManagedCluster
        metadata:
          name: ${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          azureName: ${schema.spec.clusterName}
          location: ${schema.spec.location}
          owner:
            name: ${schema.spec.resourceGroup}
          operatorSpec:
            configMaps:
              oidcIssuerProfile:
                name: oidc-${schema.spec.clusterName}
                key: ${schema.spec.oidcIssuer.configMapKey}
          dnsPrefix: ${schema.spec.clusterName}k8s
          kubernetesVersion: ${schema.spec.kubernetesVersion}
          linuxProfile:
            adminUsername: localadmin
            ssh:
              publicKeys:
                - keyData: ${schema.spec.sshPublicKey}
          # Node provisioning with auto mode (NAP)
          nodeProvisioningProfile:
            mode: Auto
          # Identity Configuration
          identity:
            type: UserAssigned
            userAssignedIdentities:
              - reference:
                  armId: ${schema.spec.identity.controlPlaneIdentityResourceId}
          # AAD and RBAC Configuration
          aadProfile:
            enableAzureRBAC: ${schema.spec.aad.enableAzureRBAC}
            managed: true
            adminGroupObjectIDs: ${schema.spec.aad.adminGroupObjectIds}
          enableRBAC: true
          disableLocalAccounts: ${schema.spec.security.disableLocalAccounts}
          # Network Profile
          networkProfile:
            networkPlugin: azure
            networkPluginMode: overlay
            networkPolicy: cilium
            networkDataplane: cilium
            serviceCidr: ${schema.spec.network.serviceCidr}
            dnsServiceIP: ${schema.spec.network.dnsServiceIP}
            podCidr: ${schema.spec.network.podCidr}
            ipFamilies: ["IPv4"]
            loadBalancerSku: standard
            outboundType: userDefinedRouting
          # API Server Access
          apiServerAccessProfile:
            enablePrivateCluster: true
            enablePrivateClusterPublicFQDN: true
            privateDNSZone: none
            disableRunCommand: ${schema.spec.security.disableRunCommand}
          agentPoolProfiles:
            - name: ${schema.spec.nodePool.name}
              vnetSubnetReference:
                armId: /subscriptions/${schema.spec.network.vnetSubscriptionId}/resourceGroups/${schema.spec.network.vnetResourceGroup}/providers/Microsoft.Network/virtualNetworks/${schema.spec.network.vnetName}/subnets/${schema.spec.network.subnetName}
              mode: System
              count: ${schema.spec.nodePool.count}
              enableAutoScaling: ${schema.spec.nodePool.enableAutoScaling}
              vmSize: ${schema.spec.nodePool.vmSize}
              availabilityZones: ${schema.spec.nodePool.availabilityZones}
              osDiskType: ${schema.spec.nodePool.osDiskType}
              osDiskSizeGB: ${schema.spec.nodePool.osDiskSizeGB}
              osType: Linux
              osSKU: ${schema.spec.nodePool.osSKU}
              maxPods: ${schema.spec.nodePool.maxPods}
              enableNodePublicIP: false
              enableEncryptionAtHost: true
              securityProfile:
                enableSecureBoot: ${schema.spec.security.enableSecureBoot}
                enableVTPM: ${schema.spec.security.enableVTPM}
                sshAccess: Disabled
          identityProfile:
            kubeletidentity:
              clientId: ${schema.spec.identity.kubeletIdentityClientId}
              objectId: ${schema.spec.identity.kubeletIdentityObjectId}
              resourceReference:
                armId: ${schema.spec.identity.kubeletIdentityResourceId}
          # Auto Upgrade Configuration
          autoUpgradeProfile:
            upgradeChannel: ${schema.spec.autoUpgrade.upgradeChannel}
            nodeOSUpgradeChannel: ${schema.spec.autoUpgrade.nodeOSUpgradeChannel}
          # Security Profile
          securityProfile:
            defender:
              logAnalyticsWorkspaceResourceReference:
                armId: ${schema.spec.security.defenderWorkspaceResourceId}
              securityMonitoring:
                enabled: ${schema.spec.security.enableDefender}
            workloadIdentity:
              enabled: ${schema.spec.workloadIdentity.enabled}
            imageCleaner:
              enabled: false
              intervalHours: 48
          # Storage Profile
          storageProfile:
            diskCSIDriver:
              enabled: ${schema.spec.storage.diskCSIDriverEnabled}
            fileCSIDriver:
              enabled: ${schema.spec.storage.fileCSIDriverEnabled}
            snapshotController:
              enabled: ${schema.spec.storage.snapshotControllerEnabled}
          # Addon Profiles
          addonProfiles:
            azureKeyvaultSecretsProvider:
              enabled: ${schema.spec.addons.azureKeyvaultSecretsProvider.enabled}
              config:
                enableSecretRotation: ${schema.spec.addons.azureKeyvaultSecretsProvider.enableSecretRotation}
                rotationPollInterval: ${schema.spec.addons.azureKeyvaultSecretsProvider.rotationPollInterval}
            azurepolicy:
              enabled: ${schema.spec.addons.azurePolicy.enabled}
              config:
                version: ${schema.spec.addons.azurePolicy.version}
          # Cluster SKU and Support
          sku:
            name: ${schema.spec.sku.name}
            tier: ${schema.spec.sku.tier}
          supportPlan: ${schema.spec.supportPlan}
          # Workload Auto Scaler with KEDA and VPA
          # workloadAutoScalerProfile:
          #   keda:
          #     enabled: ${schema.spec.workloadAutoScaler.kedaEnabled}
          #   verticalPodAutoscaler:
          #     enabled: ${schema.spec.workloadAutoScaler.vpaEnabled}
          # OIDC Issuer - Required for workload identity
          oidcIssuerProfile:
            enabled: ${schema.spec.oidcIssuer.enabled}
          # Service Mesh Profile (Conditional)
          serviceMeshProfile:
            mode: Istio
            istio:
              components:
                ingressGateways:
                  - enabled: ${schema.spec.serviceMesh.internalIngressEnabled}
                    mode: Internal
                  - enabled: ${schema.spec.serviceMesh.externalIngressEnabled}
                    mode: External
              revisions: ${schema.spec.serviceMesh.istioRevisions}
          podIdentityProfile:
            enabled: false
            userAssignedIdentityExceptions:
              - name: k8s-control-plane-exception
                namespace: kube-system
                podLabels:
                  kubernetes.azure.com/managedby: aks
              - name: platform-control-plane-exception
                namespace: platform-system
                podLabels:
                  kubernetes.azure.com/managedby: aks
          # Resource group for node resources
          nodeResourceGroup: MC_${schema.spec.resourceGroup}_${schema.spec.clusterName}_${schema.spec.location}
          # Service Principal Profile
          servicePrincipalProfile:
            clientId: msi
          # Tags
          tags: ${schema.spec.tags}
          # Private Link Resources 
          privateLinkResources:
            - reference:
                armId: ${schema.spec.privateLinkResources}
          azureMonitorProfile:
            metrics:
              enabled: ${schema.spec.azureMonitorProfile.metrics.enabled}
              kubeStateMetrics:
                metricLabelsAllowlist: "namespaces=[owner, swID]"
    
    - id: externalSecretsIdentity
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: UserAssignedIdentity
        metadata:
          name: uami-${schema.spec.clusterName}-externalsecrets
          namespace: ${schema.spec.namespace}
        spec:
          azureName: uami-${schema.spec.clusterName}-externalsecrets
          location: ${schema.spec.location}
          owner:
            name: ${schema.spec.resourceGroup}
          operatorSpec:
            configMaps:
              clientId:
                name: eso-identity-cm-${schema.spec.clusterName}
                key: clientId
              principalId:
                name: eso-identity-cm-${schema.spec.clusterName}
                key: principalId
              tenantId:
                name: eso-identity-cm-${schema.spec.clusterName}
                key: tenantId

    - id: externalDnsIdentity
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: UserAssignedIdentity
        metadata:
          name: uami-${schema.spec.clusterName}-externaldns
          namespace: ${schema.spec.namespace}
        spec:
          azureName: uami-${schema.spec.clusterName}-externaldns
          location: ${schema.spec.location}
          owner:
            name: ${schema.spec.resourceGroup}
          operatorSpec:
            configMaps:
              clientId:
                name: external-dns-identity-cm-${schema.spec.clusterName}
                key: clientId
              principalId:
                name: external-dns-identity-cm-${schema.spec.clusterName}
                key: principalId
              tenantId:
                name: external-dns-identity-cm-${schema.spec.clusterName}
                key: tenantId

    - id: certManagerIdentity
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: UserAssignedIdentity
        metadata:
          name: uami-${schema.spec.clusterName}-certmanager
          namespace: ${schema.spec.namespace}
        spec:
          azureName: uami-${schema.spec.clusterName}-certmanager
          location: ${schema.spec.location}
          owner:
            name: ${schema.spec.resourceGroup}
          operatorSpec:
            configMaps:
              clientId:
                name: cert-manager-identity-cm-${schema.spec.clusterName}
                key: clientId
              principalId:
                name: cert-manager-identity-cm-${schema.spec.clusterName}
                key: principalId
              tenantId:
                name: cert-manager-identity-cm-${schema.spec.clusterName}
                key: tenantId

    - id: externalSecretsFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: externalsecrets-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          azureName: federated_workload_identity${schema.spec.clusterName}
          owner:
            name: uami-${schema.spec.clusterName}-externalsecrets
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:external-secrets:external-secrets

    - id: externalDnsFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: externaldns-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          azureName: federated_workload_identity${schema.spec.clusterName}
          owner:
            name: uami-${schema.spec.clusterName}-externaldns
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:external-dns:extdns-workload-identity-sa

    - id: externalDnsBcmFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: externaldnsbcm-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          azureName: federated_workload_identity_external_dns_bcm${schema.spec.clusterName}
          owner:
            name: uami-${schema.spec.clusterName}-externaldns
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:external-dns-bcm:extdns-workload-identity-sa

    - id: certManagerFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: certmanager-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          azureName: federated_workload_identity${schema.spec.clusterName}
          owner:
            name: uami-${schema.spec.clusterName}-certmanager
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:platform-issuer-system:cert-manager

