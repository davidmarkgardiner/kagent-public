apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: uk8sfluxgitops.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: UK8SFluxGitOps
    spec:
      clusterName: string | required=true description="The name of the AKS cluster"
      namespace: string | required=true description="The namespace where the cluster resource will be created"
      flux:
        core:
          url: string | default="" description="Git repository URL for core configuration"
          branch: string | default="main" description="Git branch for core configuration"
        config:
          url: string | default="" description="Git repository URL for cluster configuration"
          branch: string | default="main" description="Git branch for cluster configuration"

  resources:
    - id: fluxExtension
      template:
        apiVersion: kubernetesconfiguration.azure.com/v1api20241101
        kind: Extension
        metadata:
          name: flux-${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          azureName: flux-${schema.spec.clusterName}
          autoUpgradeMinorVersion: true
          extensionType: microsoft.flux
          identity:
            type: SystemAssigned
          owner:
            group: containerservice.azure.com
            kind: ManagedCluster
            name: ${schema.spec.clusterName}
          scope:
            cluster:
              releaseNamespace: flux-system
          configurationSettings:
            multiTenancy.enforce: "false"
            image-automation-controller.enabled: "true"
            image-reflector-controller.enabled: "true"
            workloadIdentity.enable: "true"
            workloadIdentity.azureClientId: ${schema.spec.identity.fluxClientId}

    - id: fluxConfigurationCore
      template:
        apiVersion: kubernetesconfiguration.azure.com/v1api20241101
        kind: FluxConfiguration
        metadata:
          name: uk8s-core-${schema.spec.clusterName}
          namespace: uk8s-nextgen
        spec:
          azureName: uk8s-core
          namespace: uk8s-core
          owner:
            group: containerservice.azure.com
            kind: ManagedCluster
            name: ${schema.spec.clusterName}
          sourceKind: GitRepository
          scope: cluster
          suspend: false
          gitRepository:
            provider: Azure
            repositoryRef:
              branch: ${schema.spec.flux.core.branch}
            url: ${schema.spec.flux.core.url}
            timeoutInSeconds: 60
            syncIntervalInSeconds: 120
          kustomizations:
            napconfiguration:
              path: environments/${env}/napconfiguration/base
              timeoutInSeconds: 600
              syncIntervalInSeconds: 120
              retryIntervalInSeconds: 60
              prune: true
              force: true
              postBuild:
                substituteFrom:
                - kind: ConfigMap
                  name: cluster-vars-${name_suffix}
                  optional: false
            core:
              path: ./environments/${env}/${schema.spec.clusterName}
              dependsOn: ["napconfiguration"]
              timeoutInSeconds: 600
              syncIntervalInSeconds: 60
              retryIntervalInSeconds: 60
              prune: true
              force: true
              postBuild:
                substituteFrom:
                - kind: ConfigMap
                  name: cluster-vars-${name_suffix}
                  optional: false
                - kind: ConfigMap
                  name: cluster-vars-${env}
                  optional: false
            tier2:
              path: ./environments/${env}/${schema.spec.clusterName}/tier2
              dependsOn: ["core"]
              timeoutInSeconds: 600
              syncIntervalInSeconds: 60
              retryIntervalInSeconds: 60
              prune: true
              force: true
              postBuild:
                substituteFrom:
                - kind: ConfigMap
                  name: cluster-vars-${env}
                  optional: false

    - id: fluxConfigurationConfig
      template:
        apiVersion: kubernetesconfiguration.azure.com/v1api20241101
        kind: FluxConfiguration
        metadata:
          name: uk8s-config-${schema.spec.clusterName}
          namespace: uk8s-nextgen
        spec:
          azureName: uk8s-config
          namespace: uk8s-config
          owner:
            group: containerservice.azure.com
            kind: ManagedCluster
            name: ${schema.spec.clusterName}
          sourceKind: GitRepository
          scope: cluster
          suspend: false
          gitRepository:
            provider: Azure
            repositoryRef:
              branch: ${schema.spec.flux.config.branch}
            url: ${schema.spec.flux.config.url}
            timeoutInSeconds: 60
            syncIntervalInSeconds: 120
          kustomizations:
            baseconfiguration:
              path: baseconfiguration/${env}/
              timeoutInSeconds: 600
              syncIntervalInSeconds: 120
              retryIntervalInSeconds: 60
              prune: true
              force: true
              postBuild:
                substituteFrom:
                - kind: ConfigMap
                  name: cluster-vars-${env}
                  optional: false
            resourcegroupdefinition:
              path: baseconfiguration/base/resourcegroupdefinitions
              dependsOn: ["baseconfiguration"]
              timeoutInSeconds: 600
              syncIntervalInSeconds: 60
              retryIntervalInSeconds: 60
              prune: true
              force: true
              postBuild:
                substituteFrom:
                - kind: ConfigMap
                  name: cluster-vars-${env}
                  optional: false
            resourcegroupinstance:
              path: baseconfiguration/base/resourcegroupinstance
              dependsOn: ["resourcegroupdefinition"]
              timeoutInSeconds: 600
              syncIntervalInSeconds: 60
              retryIntervalInSeconds: 60
              prune: true
              force: true
              postBuild:
                substituteFrom:
                - kind: ConfigMap
                  name: cluster-vars-${env}
                  optional: false
            app:
              path: environment/dev/westeurope/${schema.spec.clusterName}
              dependsOn: ["baseconfiguration"]
              timeoutInSeconds: 600
              syncIntervalInSeconds: 60
              retryIntervalInSeconds: 60
              prune: true
              force: true
              postBuild:
                substituteFrom:
                - kind: ConfigMap
                  name: cluster-vars-${env}
                  optional: false


