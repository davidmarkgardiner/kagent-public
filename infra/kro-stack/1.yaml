apiVersion: kro.run/v1alpha1
kind: UK8SCluster
metadata:
  name: uk8s-tsshared-weu-gt025-int-d08
  namespace: uk8s-nextgen
spec:
  clusterName: "uk8s-tsshared-weu-gt025-int-d08"
  location: "westeurope"
  resourceGroup: ""
  flux:
    core:
      branch: "jf/feat/kroAsoBuild"  
  tags:
    environment: dev

---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: uk8scluster.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: UK8SCluster
    spec:
      # Cluster Identity
      clusterName: string | required=true description="The name of the AKS cluster"
      namespace: string | default="uk8s-nextgen" required=true description="The namespace where the cluster resource will be created"
      location: string | required=true description="Azure region for the cluster" default="uksouth"
      subscriptionId: string | default="" description="Subscription ID for the management identity"

      # Owner Resource Group
      resourceGroup: string | required=true description="The resource group that owns this cluster"

      # Kubernetes Version
      kubernetesVersion: string | default="1.33" description="Kubernetes version"

      # SSH Configuration
      sshPublicKey: string | default="" required=true description="SSH public key for Linux nodes"

      # Network Configuration
      network:
        vnetSubscriptionId: string | required=true description="Subscription ID for the VNET"
        vnetResourceGroup: string | required=true description="Resource group containing the VNET"
        vnetName: string | required=true description="Virtual network name"
        subnetName: string | required=true description="Subnet name for nodes"
        serviceCidr: string | default="10.251.0.0/17" description="Service CIDR block"
        dnsServiceIP: string | default="10.251.0.10" description="DNS service IP"
        podCidr: string | default="10.251.128.0/17" description="Pod CIDR block"

      # Identity Configuration
      identity:
        controlPlaneIdentityResourceId: string | required=true description="ARM ID of the control plane managed identity"
        kubeletIdentityClientId: string | required=true description="Client ID of the kubelet identity"
        kubeletIdentityObjectId: string | required=true description="Object ID of the kubelet identity"
        kubeletIdentityResourceId: string | required=true description="ARM ID of the kubelet identity"
        fluxClientId: string | required=true description="Client ID of the flux identity for image and source controller to use for workload identity"     

      # AAD Configuration
      aad:
        enableAzureRBAC: boolean | default=true description="Enable Azure RBAC for Kubernetes authorization"
        adminGroupObjectIds: '[]string | required=true description="List of Azure AD group object IDs for cluster admin access"'

      # Node Pool Configuration
      nodePool:
        name: string | default="sysnpl" description="Name of the system node pool"
        vmSize: string | default="Standard_B8ms" description="VM size for nodes"
        count: integer | default=1 minimum=1 maximum=100 description="Number of nodes"
        enableAutoScaling: boolean | default=false description="Enable autoscaling"
        availabilityZones: '[]string | default=["1"] description="Availability zones"'
        osDiskType: string | default="Managed" description="OS disk type"
        osDiskSizeGB: integer | default=128 minimum=30 maximum=2048 description="OS disk size in GB"
        osSKU: string | default="AzureLinux" enum="AzureLinux,Ubuntu,Windows2019,Windows2022" description="OS SKU"
        maxPods: integer | default=110 minimum=10 maximum=250 description="Maximum pods per node"

      # Security Configuration
      security:
        enableSecureBoot: boolean | default=true description="Enable secure boot"
        enableVTPM: boolean | default=true description="Enable vTPM"
        disableLocalAccounts: boolean | default=true description="Disable local accounts"
        disableRunCommand: boolean | default=true description="Disable run command"
        enableDefender: boolean | default=true description="Enable Microsoft Defender"
        defenderWorkspaceResourceId: string | required=true description="Log Analytics workspace for Defender"

      # Workload Identity
      workloadIdentity:
        enabled: boolean | default=true description="Enable workload identity"

      # OIDC Issuer
      oidcIssuer:
        enabled: boolean | default=true description="Enable OIDC issuer"
        configMapKey: string | default="issuer-url" description="ConfigMap key for OIDC issuer URL"

      # Auto Upgrade
      autoUpgrade:
        upgradeChannel: string | default="stable" enum="none,patch,stable,rapid,node-image" description="Auto upgrade channel"
        nodeOSUpgradeChannel: string | default="NodeImage" enum="None,Unmanaged,SecurityPatch,NodeImage" description="Node OS upgrade channel"

      # Storage Profile
      storage:
        diskCSIDriverEnabled: boolean | default=true description="Enable disk CSI driver"
        fileCSIDriverEnabled: boolean | default=true description="Enable file CSI driver"
        snapshotControllerEnabled: boolean | default=true description="Enable snapshot controller"

      # Addons
      addons:
        azureKeyvaultSecretsProvider:
          enabled: boolean | default=true description="Enable Key Vault secrets provider"
          enableSecretRotation: string | default="true" description="Enable secret rotation - must be string true or false"
          rotationPollInterval: string | default="30m" description="Rotation poll interval"
        azurePolicy:
          enabled: boolean | default=true description="Enable Azure Policy"
          version: string | default="v2" description="Azure Policy version"

      # Workload Auto Scaler
      workloadAutoScaler:
        keda:
          enabled: boolean | default=true description="Enable KEDA"
        verticalPodAutoscaler:
          enabled: boolean | default=true description="Enable VPA"

      # Service Mesh (Istio)
      serviceMesh:
        enabled: boolean | default=true description="Enable Istio service mesh"
        istioRevisions: '[]string | default=["asm-1-27"] description="Istio revisions"'
        internalIngressEnabled: boolean | default=true description="Enable internal ingress gateway"
        externalIngressEnabled: boolean | default=true description="Enable external ingress gateway"

      # Monitoring and Metrics
      azureMonitorProfile:
        metrics:
          enabled: boolean | default=true description="Enable Azure Monitor metrics"

      # SKU and Support
      sku:
        name: string | default="Base" enum="Base,Premium" description="SKU name"
        tier: string | default="Standard" enum="Free,Standard,Premium" description="SKU tier"
      supportPlan: string | default="KubernetesOfficial" enum="KubernetesOfficial,AKSLongTermSupport" description="Support plan"

      # Tags
      tags: 'map[string]string | required=true description="Resource tags"'

      # Private Link Resources (Optional)
      privateLinkResources: string | description="Private link resources for private cluster connectivity"

      flux:
        core:
          url: string | default="" description="Git repository URL for core configuration"
          branch: string | default="main" description="Git branch for core configuration"
        config:
          url: string | default="" description="Git repository URL for cluster configuration"
          branch: string | default="main" description="Git branch for cluster configuration"


    # status:
    #   # Status fields populated from the ManagedCluster
    #   # provisioningState: ${managedCluster.status.provisioningState}
    #   # powerState: ${managedCluster.status.powerState.code}
    #   # fqdn: ${managedCluster.status.fqdn}
    #   currentKubernetesVersion: ${managedCluster.status.currentKubernetesVersion}
    #   oidcIssuerUrl: ${managedCluster.status.oidcIssuerProfile.issuerURL}

  resources:

    - id: Jobs
      template:
        apiVersion: kro.run/v1alpha1
        kind: UK8Sjobs
        metadata:
          name: jobs-${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          clusterName: "${schema.spec.clusterName}"
          resourceGroup: "${schema.spec.resourceGroup}"

    - id: cronJobs
      template:
        apiVersion: kro.run/v1alpha1
        kind: UK8Scronjobs
        metadata:
          name: cronjobs-${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          clusterName: "${schema.spec.clusterName}"
          resourceGroup: "${schema.spec.resourceGroup}"

    - id: fluxGitOps
      template:
        apiVersion: kro.run/v1alpha1
        kind: UK8SFluxGitOps
        metadata:
          name: flux-${schema.spec.clusterName}
          namespace: ${schema.spec.namespace}
        spec:
          clusterName: "${schema.spec.clusterName}"
          resourceGroup: "${schema.spec.resourceGroup}"
          namespace: ${schema.spec.namespace}
          flux:
            core:
              url: ${schema.spec.flux.core.url}
              branch: ${schema.spec.flux.core.branch}
            config:
              url: ${schema.spec.flux.config.url}
              branch: ${schema.spec.flux.config.branch}


