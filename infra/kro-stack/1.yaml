apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: uk8sjobs.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: UK8Sjobs
    spec:
      # clusterName: string | required=true description="The name of the AKS cluster"
      # namespace: string | default="uk8s-nextgen" required=true description="The namespace where the cluster resource will be created"
      # resourceGroup: string | required=true description="The resource group that owns this cluster"
      subscriptionId: string | default="" description="Subscription ID for the management identity"
      azureTenantId: string | default="" description="Azure AD tenant ID"
      azureMonitorWorkspaceResourceId: string | default="" description="Resource ID of Azure Monitor workspace"
      grafanaResourceId: string | default="" description="Resource ID of Azure Managed Grafana instance"
      asoClientId: string | default="" description="ASO workload identity client ID"

  resources:  
    - id: grafanaIntegrationServiceAccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: grafana-integration-reconcile-sa
          namespace: flux-system
          annotations:
            azure.workload.identity/client-id: ${schema.spec.asoClientId}

    - id: grafanaIntegrationJob
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: grafana-integration-job-${schema.spec.clusterName}
          namespace: flux-system
        spec:
          backoffLimit: 2
          template:
            metadata:
              labels:
                azure.workload.identity/use: "true"
            spec:
              serviceAccountName: grafana-integration-reconcile-sa
              restartPolicy: Never
              containers:
              - name: azure-cli
                image: {{REGISTRY_HOST}}/{{REGISTRY_PROJECT}}/azp-agent-ubuntu:1.21.1
                command:
                - /bin/bash
                - -c
                - |
                  set -e
                  echo "=== DEBUG: ENVIRONMENT VARIABLES ==="
                  echo "CLUSTER_NAME: $CLUSTER_NAME"
                  echo "RESOURCE_GROUP: $RESOURCE_GROUP"
                  echo "AZURE_MONITOR_WORKSPACE_ID: $AZURE_MONITOR_WORKSPACE_ID"
                  echo "GRAFANA_RESOURCE_ID: $GRAFANA_RESOURCE_ID"
                  echo "AZURE_TENANT_ID: $AZURE_TENANT_ID"
                  echo "AZURE_CLIENT_ID: $AZURE_CLIENT_ID"
                  echo "=== Starting Grafana Integration Configuration ==="
                  echo "Logging in with workload identity..."
                  az login --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                            --service-principal \
                            -u "${AZURE_CLIENT_ID}" \
                            -t "${AZURE_TENANT_ID}"
                  az account set -s "$SUBSCRIPTION"
                  az account show
                  az aks list -o table
                  echo "Cluster: $CLUSTER_NAME"
                  echo "Resource Group: $RESOURCE_GROUP"
                  echo "Grafana Resource ID: $GRAFANA_RESOURCE_ID"
                  echo "Waiting for AKS cluster to be ready..."
                  max_attempts=20
                  attempt=0
                  while [ $attempt -lt $max_attempts ]; do
                    provisioning_state=$(az aks show \
                      --name "$CLUSTER_NAME" \
                      --resource-group "$RESOURCE_GROUP" \
                      --query "provisioningState" \
                      --output tsv 2>/dev/null || echo "NotFound")
                    echo "DEBUG: provisioning_state=$provisioning_state (attempt $((attempt+1))/$max_attempts)"
                    if [ "$provisioning_state" = "Succeeded" ]; then
                      echo "✅ AKS cluster is ready!"
                      break
                    elif [ "$provisioning_state" = "Failed" ]; then
                      echo "❌ AKS cluster provisioning failed!"
                      exit 1
                    else
                      echo "⏳ Cluster state: $provisioning_state (attempt $((attempt+1))/$max_attempts)"
                      sleep 30
                      attempt=$((attempt+1))
                    fi
                  done
                  if [ $attempt -eq $max_attempts ]; then
                    echo "❌ Timeout waiting for cluster to be ready"
                    exit 1
                  fi
                  echo "Checking current Azure Monitor configuration..."
                  current_config=$(az aks show \
                    --name "$CLUSTER_NAME" \
                    --resource-group "$RESOURCE_GROUP" \
                    --query "azureMonitorProfile.metrics.enabled" \
                    --output tsv 2>/dev/null || echo "false")
                  echo "DEBUG: current_config=$current_config"

                  if [ "$current_config" = "true" ]; then
                    echo "ℹ️  Azure Monitor metrics already enabled, skipping update...."
                  else
                    echo "🔧 Enabling Azure Monitor metrics and configuring Grafana integration..."

                    az aks update \
                      --name "$CLUSTER_NAME" \
                      --resource-group "$RESOURCE_GROUP" \
                      --enable-azure-monitor-metrics \
                      --azure-monitor-workspace-resource-id "$AZURE_MONITOR_WORKSPACE_ID" \
                      --grafana-resource-id "$GRAFANA_RESOURCE_ID" \
                      --ksm-metric-annotations-allow-list "namespaces=[owner,swcID]" \
                      --no-wait
                    echo "✅ Grafana integration configuration completed!"

                  fi
                  
                  echo "Verifying configuration..."
                  az aks show \
                    --name "$CLUSTER_NAME" \
                    --resource-group "$RESOURCE_GROUP" \
                    --query "{metrics: azureMonitorProfile.metrics.enabled, cluster: name, state: provisioningState}" \
                    --output table
                  echo "=== Configuration Complete ==="
                env:
                  - name: CLUSTER_NAME
                    value: ${schema.spec.clusterName}
                  - name: RESOURCE_GROUP
                    value: ${schema.spec.resourceGroup}
                  - name: AZURE_MONITOR_WORKSPACE_ID
                    value: ${schema.spec.azureMonitorWorkspaceResourceId}
                  - name: GRAFANA_RESOURCE_ID
                    value: ${schema.spec.grafanaResourceId}
                  - name: SUBSCRIPTION
                    value: ${schema.spec.subscriptionId}
                  - name: AZURE_TENANT_ID
                    value: ${schema.spec.azureTenantId}
                  - name: AZURE_CLIENT_ID
                    value: ${schema.spec.asoClientId}
                  - name: AZURE_FEDERATED_TOKEN_FILE
                    value: /var/run/secrets/azure/tokens/azure-identity-token
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "256Mi"
                    cpu: "200m"
                volumeMounts:
                - name: azure-identity-token
                  mountPath: /var/run/secrets/azure/tokens
                  readOnly: true
              volumes:
              - name: azure-identity-token
                projected:
                  sources:
                  - serviceAccountToken:
                      path: azure-identity-token
                      expirationSeconds: 3600
                      audience: api://AzureADTokenExchange
