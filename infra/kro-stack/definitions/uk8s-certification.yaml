---
# ResourceGraphDefinition for UK8S Cluster Certification Workflow
# This defines the Argo Workflows certification system for validating AKS clusters
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: uk8scertification.kro.run
  labels:
    kro.run/type: certification
    kro.run/category: validation
  annotations:
    kro.run/description: "Automated certification workflow system for UK8S AKS clusters"
    kro.run/version: "1.0.0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: UK8SCertification
    spec:
      # ========================================
      # Cluster Identity
      # ========================================
      clusterName: string | required=true description="The name of the AKS cluster to certify"
      resourceGroup: string | required=true description="The resource group containing the cluster"
      targetNamespace: string | required=true description="The namespace where cluster resources are managed"
      instanceName: string | required=true description="The name of the UK8SClusterPublic instance"
      subscriptionId: string | required=true description="Azure subscription ID" pattern="^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

      # ========================================
      # Environment and Metadata
      # ========================================
      environment: string | required=true enum="dev,staging,production" description="Environment classification"
      clusterType: string | default="PUBLIC" enum="PUBLIC,PRIVATE" description="Cluster access type for validation"

      # ========================================
      # Certification Configuration
      # ========================================
      certification:
        timeout: integer | default=1800 description="Certification timeout in seconds"
        schedule: 'string | default="0 2 * * 0" description="Cron schedule for weekly certification (default: Sunday 2 AM UTC)"'
        suspended: boolean | default=true description="Whether to start the CronWorkflow suspended"
        autoTrigger: boolean | default=true description="Automatically trigger initial certification after cluster creation"

  # ========================================
  # Resources Created by this RGD
  # ========================================
  resources:
    # ----------------------------------------
    # Certification WorkflowTemplate
    # ----------------------------------------
    - id: certificationWorkflow
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: WorkflowTemplate
        metadata:
          name: certify-${schema.spec.clusterName}
          namespace: argo
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: certification
            environment: ${schema.spec.environment}
          annotations:
            kro.run/description: "Automated certification workflow for UK8S ${schema.spec.clusterType} cluster ${schema.spec.clusterName}"
            kro.run/version: "1.0.0"
        spec:
          entrypoint: certify-cluster
          serviceAccountName: argo-workflow-executor

          # Projected service account token for Azure workload identity
          volumes:
            - name: azure-identity-token
              projected:
                sources:
                  - serviceAccountToken:
                      path: azure-identity-token
                      expirationSeconds: 3600
                      audience: api://AzureADTokenExchange

          # Disable artifact archiving and GC to avoid Minio dependency
          archiveLogs: false
          artifactGC:
            strategy: Never

          # Clean up pods after workflow completes
          podGC:
            strategy: OnWorkflowSuccess

          # Pre-configure parameters with cluster-specific values
          arguments:
            parameters:
              - name: clusterName
                value: ${schema.spec.clusterName}
              - name: resourceGroup
                value: ${schema.spec.resourceGroup}
              - name: targetNamespace
                value: ${schema.spec.targetNamespace}
              - name: instanceName
                value: ${schema.spec.instanceName}
              - name: subscriptionId
                value: ${schema.spec.subscriptionId}
              - name: environment
                value: ${schema.spec.environment}
              - name: clusterType
                value: ${schema.spec.clusterType}
              - name: certification-timeout
                value: "${schema.spec.certification.timeout}"

          onExit: generate-final-report

          templates:
            # Main certification DAG
            - name: certify-cluster
              dag:
                tasks:
                  - name: wait-for-cluster
                    template: wait-for-cluster-ready

                  - name: validate-config
                    template: validate-configuration
                    dependencies: [wait-for-cluster]

                  - name: validate-kro
                    template: validate-kro-resources
                    dependencies: [validate-config]

                  - name: validate-aso
                    template: validate-aso-resources
                    dependencies: [validate-kro]

                  - name: validate-flux
                    template: validate-flux-gitops
                    dependencies: [validate-aso]

                  - name: get-aks-credentials
                    template: get-aks-credentials
                    dependencies: [validate-aso]

                  - name: validate-aks-system-components
                    template: validate-aks-system-components
                    dependencies: [get-aks-credentials]

                  - name: validate-connectivity
                    template: validate-cluster-connectivity
                    dependencies: [validate-aks-system-components]

                  - name: validate-security
                    template: validate-security-compliance
                    dependencies: [validate-connectivity]

                  - name: validate-api-access
                    template: validate-api-access-type
                    dependencies: [validate-connectivity]

                  - name: aggregate-results
                    template: aggregate-certification
                    dependencies: [validate-kro, validate-aso, validate-flux, validate-aks-system-components, validate-connectivity, validate-security, validate-api-access]

            # Wait for cluster to be ready
            - name: wait-for-cluster-ready
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Waiting for Cluster to be Ready ==="

                  NAMESPACE="{{workflow.parameters.targetNamespace}}"
                  INSTANCE="{{workflow.parameters.instanceName}}"
                  CLUSTER="{{workflow.parameters.clusterName}}"
                  MAX_WAIT=1800  # 30 minutes
                  INTERVAL=30
                  ELAPSED=0

                  echo "Waiting for UK8SClusterPublic instance to be ACTIVE and Ready..."

                  while [ $ELAPSED -lt $MAX_WAIT ]; do
                    # Check UK8SClusterPublic status
                    STATE=$(kubectl get uk8sclusterpublic $INSTANCE -n $NAMESPACE \
                      -o jsonpath='{.status.state}' 2>/dev/null || echo "NOT_FOUND")

                    READY=$(kubectl get uk8sclusterpublic $INSTANCE -n $NAMESPACE \
                      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")

                    echo "[$ELAPSED/$MAX_WAIT seconds] State: $STATE, Ready: $READY"

                    if [[ "$STATE" == "ACTIVE" ]] && [[ "$READY" == "True" ]]; then
                      echo "✓ UK8SClusterPublic is ACTIVE and Ready"
                      break
                    fi

                    sleep $INTERVAL
                    ELAPSED=$((ELAPSED + INTERVAL))
                  done

                  if [ $ELAPSED -ge $MAX_WAIT ]; then
                    echo "✗ Timeout waiting for UK8SClusterPublic to be ready"
                    exit 1
                  fi

                  # Wait for ManagedCluster to be Ready
                  echo ""
                  echo "Waiting for ManagedCluster to be Ready..."
                  ELAPSED=0

                  while [ $ELAPSED -lt $MAX_WAIT ]; do
                    MC_READY=$(kubectl get managedcluster $CLUSTER -n $NAMESPACE \
                      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")

                    MC_REASON=$(kubectl get managedcluster $CLUSTER -n $NAMESPACE \
                      -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null || echo "Unknown")

                    echo "[$ELAPSED/$MAX_WAIT seconds] ManagedCluster Ready: $MC_READY ($MC_REASON)"

                    if [[ "$MC_READY" == "True" ]]; then
                      echo "✓ ManagedCluster is Ready"
                      break
                    fi

                    # If it's still reconciling, that's okay, keep waiting
                    if [[ "$MC_REASON" == "Reconciling" ]]; then
                      echo "  Still reconciling Azure resources..."
                    fi

                    sleep $INTERVAL
                    ELAPSED=$((ELAPSED + INTERVAL))
                  done

                  if [ $ELAPSED -ge $MAX_WAIT ]; then
                    echo "✗ Timeout waiting for ManagedCluster to be ready"
                    exit 1
                  fi

                  # Additional wait for cluster to settle
                  echo ""
                  echo "Cluster is ready! Waiting 60 seconds for cluster to stabilize..."
                  sleep 60

                  echo "✅ Cluster is ready for certification"

            # Configuration validation
            - name: validate-configuration
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Configuration Validation ==="
                  kubectl get uk8sclusterpublic {{workflow.parameters.instanceName}} \
                    -n {{workflow.parameters.targetNamespace}} -o yaml > /tmp/instance.yaml
                  echo "✓ Instance YAML retrieved"
                  VERSION=$(kubectl get uk8sclusterpublic {{workflow.parameters.instanceName}} \
                    -n {{workflow.parameters.targetNamespace}} \
                    -o jsonpath='{.spec.kubernetesVersion}')
                  echo "✓ Kubernetes version: $VERSION"
                  echo "✅ Configuration validation complete"

            # KRO validation
            - name: validate-kro-resources
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== KRO Resource Validation ==="
                  NAMESPACE="{{workflow.parameters.targetNamespace}}"
                  INSTANCE="{{workflow.parameters.instanceName}}"
                  PASSED=0
                  FAILED=0

                  # Check ResourceGraphDefinitions
                  for rgd in uk8sclusterpublic.kro.run uk8sjobs.kro.run uk8sfluxgitops.kro.run uk8scertification.kro.run; do
                    if kubectl get resourcegraphdefinition $rgd &>/dev/null; then
                      STATE=$(kubectl get resourcegraphdefinition $rgd -o jsonpath='{.status.state}')
                      if [[ "$STATE" == "Active" ]]; then
                        echo "✓ $rgd is Active"
                        PASSED=$((PASSED+1))
                      else
                        echo "✗ $rgd not Active (state: $STATE)"
                        FAILED=$((FAILED+1))
                      fi
                    else
                      echo "✗ $rgd not found"
                      FAILED=$((FAILED+1))
                    fi
                  done

                  # Check UK8SClusterPublic instance
                  if kubectl get uk8sclusterpublic $INSTANCE -n $NAMESPACE &>/dev/null; then
                    echo "✓ UK8SClusterPublic instance exists"
                    PASSED=$((PASSED+1))

                    STATE=$(kubectl get uk8sclusterpublic $INSTANCE -n $NAMESPACE -o jsonpath='{.status.state}')
                    if [[ "$STATE" == "ACTIVE" ]]; then
                      echo "✓ Instance state is ACTIVE"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ Instance state is $STATE"
                      FAILED=$((FAILED+1))
                    fi

                    READY=$(kubectl get uk8sclusterpublic $INSTANCE -n $NAMESPACE -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                    if [[ "$READY" == "True" ]]; then
                      echo "✓ Instance Ready condition is True"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ Instance Ready condition is $READY"
                      FAILED=$((FAILED+1))
                    fi
                  else
                    echo "✗ UK8SClusterPublic instance not found"
                    FAILED=$((FAILED+3))
                  fi

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ KRO validation complete"

            # ASO validation
            - name: validate-aso-resources
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== ASO Resource Validation ==="
                  NAMESPACE="{{workflow.parameters.targetNamespace}}"
                  PASSED=0
                  FAILED=0

                  # Check ResourceGroup
                  if kubectl get resourcegroup {{workflow.parameters.resourceGroup}} -n $NAMESPACE &>/dev/null; then
                    RG_READY=$(kubectl get resourcegroup {{workflow.parameters.resourceGroup}} -n $NAMESPACE \
                      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                    if [[ "$RG_READY" == "True" ]]; then
                      echo "✓ ResourceGroup is ready"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ ResourceGroup not ready"
                      FAILED=$((FAILED+1))
                    fi
                  fi

                  # Check ManagedCluster
                  if kubectl get managedcluster {{workflow.parameters.clusterName}} -n $NAMESPACE &>/dev/null; then
                    MC_READY=$(kubectl get managedcluster {{workflow.parameters.clusterName}} -n $NAMESPACE \
                      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                    if [[ "$MC_READY" == "True" ]]; then
                      echo "✓ ManagedCluster is ready"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ ManagedCluster not ready"
                      FAILED=$((FAILED+1))
                    fi
                  fi

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ ASO validation complete"

            # Flux validation
            - name: validate-flux-gitops
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Flux GitOps Validation ==="
                  PASSED=0
                  FAILED=0

                  if kubectl get namespace flux-system &>/dev/null; then
                    echo "✓ flux-system namespace exists"
                    PASSED=$((PASSED+1))
                  else
                    echo "✗ flux-system namespace not found"
                    FAILED=$((FAILED+1))
                  fi

                  for controller in source-controller kustomize-controller helm-controller; do
                    if kubectl get deployment $controller -n flux-system &>/dev/null; then
                      READY=$(kubectl get deployment $controller -n flux-system \
                        -o jsonpath='{.status.conditions[?(@.type=="Available")].status}')
                      if [[ "$READY" == "True" ]]; then
                        echo "✓ $controller is ready"
                        PASSED=$((PASSED+1))
                      else
                        echo "✗ $controller not ready"
                        FAILED=$((FAILED+1))
                      fi
                    fi
                  done

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ Flux validation complete"

            # Get AKS credentials and save kubeconfig
            - name: get-aks-credentials
              script:
                image: mcr.microsoft.com/azure-cli:latest
                command: [bash]
                env:
                  - name: AZURE_TENANT_ID
                    value: "{{AZURE_SUBSCRIPTION_ID}}"
                  - name: AZURE_CLIENT_ID
                    value: "{{AZURE_SUBSCRIPTION_ID}}"
                  - name: AZURE_FEDERATED_TOKEN_FILE
                    value: /var/run/secrets/azure/tokens/azure-identity-token
                volumeMounts:
                  - name: azure-identity-token
                    mountPath: /var/run/secrets/azure/tokens
                    readOnly: true
                source: |
                  set -e
                  echo "=== Getting AKS Credentials ==="

                  # Install kubectl
                  echo "Installing kubectl..."
                  curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  chmod +x kubectl
                  mv kubectl /usr/local/bin/

                  CLUSTER_NAME="{{workflow.parameters.clusterName}}"
                  RESOURCE_GROUP="{{workflow.parameters.resourceGroup}}"
                  SUBSCRIPTION_ID="{{workflow.parameters.subscriptionId}}"
                  NAMESPACE="{{workflow.parameters.targetNamespace}}"

                  echo "Cluster: $CLUSTER_NAME"
                  echo "Resource Group: $RESOURCE_GROUP"
                  echo "Subscription: $SUBSCRIPTION_ID"

                  # Login using workload identity (federated token)
                  echo "Logging in to Azure with workload identity..."
                  echo "Client ID: $AZURE_CLIENT_ID"
                  echo "Tenant ID: $AZURE_TENANT_ID"

                  az login --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                    --service-principal \
                    -u "$AZURE_CLIENT_ID" \
                    -t "$AZURE_TENANT_ID"

                  # Set subscription
                  az account set --subscription $SUBSCRIPTION_ID

                  # Check if local accounts are disabled
                  echo "Checking cluster authentication mode..."
                  DISABLE_LOCAL=$(az aks show \
                    --resource-group $RESOURCE_GROUP \
                    --name $CLUSTER_NAME \
                    --query disableLocalAccounts \
                    -o tsv 2>/dev/null || echo "false")

                  # Get AKS credentials
                  echo "Getting AKS credentials..."
                  if [ "$DISABLE_LOCAL" == "true" ]; then
                    echo "Local accounts disabled - using Azure RBAC authentication"
                    az aks get-credentials \
                      --resource-group $RESOURCE_GROUP \
                      --name $CLUSTER_NAME \
                      --overwrite-existing
                  else
                    echo "Local accounts enabled - using admin credentials"
                    az aks get-credentials \
                      --resource-group $RESOURCE_GROUP \
                      --name $CLUSTER_NAME \
                      --overwrite-existing \
                      --admin
                  fi

                  echo "✓ Kubeconfig saved"

                  # Determine context name based on authentication mode
                  if [ "$DISABLE_LOCAL" == "true" ]; then
                    CONTEXT_NAME="$CLUSTER_NAME"
                  else
                    CONTEXT_NAME="$CLUSTER_NAME-admin"
                  fi

                  # Test connection
                  echo "Testing connection to AKS cluster..."
                  kubectl cluster-info --context $CONTEXT_NAME

                  # Export context name for subsequent tasks
                  echo "$CONTEXT_NAME" > /tmp/aks-context-name

                  echo "✅ AKS credentials acquired successfully"

            # Validate system components IN the AKS cluster
            - name: validate-aks-system-components
              script:
                image: mcr.microsoft.com/azure-cli:latest
                command: [bash]
                env:
                  - name: AZURE_TENANT_ID
                    value: "{{AZURE_SUBSCRIPTION_ID}}"
                  - name: AZURE_CLIENT_ID
                    value: "{{AZURE_SUBSCRIPTION_ID}}"
                  - name: AZURE_FEDERATED_TOKEN_FILE
                    value: /var/run/secrets/azure/tokens/azure-identity-token
                volumeMounts:
                  - name: azure-identity-token
                    mountPath: /var/run/secrets/azure/tokens
                    readOnly: true
                source: |
                  set -e
                  echo "=== AKS System Components Validation ==="

                  # Install kubectl
                  echo "Installing kubectl..."
                  curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  chmod +x kubectl
                  mv kubectl /usr/local/bin/

                  CLUSTER_NAME="{{workflow.parameters.clusterName}}"
                  PASSED=0
                  FAILED=0
                  WARNINGS=0

                  echo "Validating components IN the AKS cluster: $CLUSTER_NAME"
                  echo ""

                  # Enhanced function to check namespace and pod health
                  check_component() {
                    local NS=$1
                    local COMPONENT_NAME=$2
                    local LABEL_SELECTOR=$3

                    # Initialize counters to avoid bash parameter expansion syntax that KRO CEL parser can't handle
                    UNHEALTHY_DEPLOYMENTS=0
                    UNHEALTHY_DAEMONSETS=0

                    echo ""
                    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                    echo "Checking $COMPONENT_NAME..."
                    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

                    # Check if namespace exists
                    if ! kubectl get namespace $NS &>/dev/null; then
                      echo "⚠ Namespace $NS not found (component may not be installed)"
                      WARNINGS=$((WARNINGS+1))
                      return
                    fi

                    echo "✓ Namespace $NS exists"
                    PASSED=$((PASSED+1))

                    # Determine which pods to check
                    local SELECTOR_FLAG=""
                    if [ -n "$LABEL_SELECTOR" ]; then
                      SELECTOR_FLAG="-l $LABEL_SELECTOR"
                    fi

                    # Get pod statistics
                    TOTAL_PODS=$(kubectl get pods -n $NS $SELECTOR_FLAG --no-headers 2>/dev/null | wc -l)

                    if [ $TOTAL_PODS -eq 0 ]; then
                      if [ -n "$LABEL_SELECTOR" ]; then
                        echo "  ⚠ No pods found with label: $LABEL_SELECTOR"
                      else
                        echo "  ⚠ No pods found in namespace"
                      fi
                      WARNINGS=$((WARNINGS+1))
                      return
                    fi

                    echo ""
                    echo "Pod Health Summary:"
                    echo "  Total pods: $TOTAL_PODS"

                    # Check pod phases
                    RUNNING=$(kubectl get pods -n $NS $SELECTOR_FLAG --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
                    PENDING=$(kubectl get pods -n $NS $SELECTOR_FLAG --field-selector=status.phase=Pending --no-headers 2>/dev/null | wc -l)
                    FAILED=$(kubectl get pods -n $NS $SELECTOR_FLAG --field-selector=status.phase=Failed --no-headers 2>/dev/null | wc -l)
                    SUCCEEDED=$(kubectl get pods -n $NS $SELECTOR_FLAG --field-selector=status.phase=Succeeded --no-headers 2>/dev/null | wc -l)

                    echo "  Running: $RUNNING, Pending: $PENDING, Failed: $FAILED, Succeeded: $SUCCEEDED"

                    # Check Ready condition for all pods
                    READY_PODS=0
                    NOT_READY_PODS=0

                    while IFS= read -r line; do
                      POD_NAME=$(echo "$line" | awk '{print $1}')
                      READY_STATUS=$(echo "$line" | awk '{print $2}')

                      # Parse READY status (e.g., "1/1" or "0/1")
                      READY_CURRENT=$(echo "$READY_STATUS" | cut -d'/' -f1)
                      READY_TOTAL=$(echo "$READY_STATUS" | cut -d'/' -f2)

                      if [ "$READY_CURRENT" == "$READY_TOTAL" ]; then
                        READY_PODS=$((READY_PODS+1))
                      else
                        NOT_READY_PODS=$((NOT_READY_PODS+1))
                      fi
                    done < <(kubectl get pods -n $NS $SELECTOR_FLAG --no-headers 2>/dev/null)

                    echo "  Ready: $READY_PODS/$TOTAL_PODS"

                    # Check for problematic pods
                    CRASH_LOOP=$(kubectl get pods -n $NS $SELECTOR_FLAG -o json 2>/dev/null | \
                      jq -r '.items[] | select(.status.containerStatuses[]?.state.waiting?.reason == "CrashLoopBackOff") | .metadata.name' 2>/dev/null | wc -l)

                    IMAGE_PULL_ERROR=$(kubectl get pods -n $NS $SELECTOR_FLAG -o json 2>/dev/null | \
                      jq -r '.items[] | select(.status.containerStatuses[]?.state.waiting?.reason == "ImagePullBackOff" or .status.containerStatuses[]?.state.waiting?.reason == "ErrImagePull") | .metadata.name' 2>/dev/null | wc -l)

                    # Check restart counts
                    HIGH_RESTARTS=$(kubectl get pods -n $NS $SELECTOR_FLAG -o json 2>/dev/null | \
                      jq -r '.items[] | select(.status.containerStatuses[]?.restartCount > 5) | .metadata.name' 2>/dev/null | wc -l)

                    if [ $CRASH_LOOP -gt 0 ]; then
                      echo "  ✗ $CRASH_LOOP pod(s) in CrashLoopBackOff:"
                      kubectl get pods -n $NS $SELECTOR_FLAG -o json 2>/dev/null | \
                        jq -r '.items[] | select(.status.containerStatuses[]?.state.waiting?.reason == "CrashLoopBackOff") | "    - " + .metadata.name' 2>/dev/null
                      FAILED=$((FAILED+1))
                    fi

                    if [ $IMAGE_PULL_ERROR -gt 0 ]; then
                      echo "  ✗ $IMAGE_PULL_ERROR pod(s) with ImagePullBackOff:"
                      kubectl get pods -n $NS $SELECTOR_FLAG -o json 2>/dev/null | \
                        jq -r '.items[] | select(.status.containerStatuses[]?.state.waiting?.reason == "ImagePullBackOff" or .status.containerStatuses[]?.state.waiting?.reason == "ErrImagePull") | "    - " + .metadata.name' 2>/dev/null
                      FAILED=$((FAILED+1))
                    fi

                    if [ $HIGH_RESTARTS -gt 0 ]; then
                      echo "  ⚠ $HIGH_RESTARTS pod(s) with >5 restarts:"
                      kubectl get pods -n $NS $SELECTOR_FLAG -o json 2>/dev/null | \
                        jq -r '.items[] | select(.status.containerStatuses[]?.restartCount > 5) | "    - " + .metadata.name + " (restarts: " + (.status.containerStatuses[].restartCount | tostring) + ")"' 2>/dev/null
                      WARNINGS=$((WARNINGS+1))
                    fi

                    # Check Deployments/DaemonSets/StatefulSets health
                    echo ""
                    echo "Resource Health:"

                    # Check Deployments
                    DEPLOYMENTS=$(kubectl get deployments -n $NS $SELECTOR_FLAG --no-headers 2>/dev/null | wc -l)
                    if [ $DEPLOYMENTS -gt 0 ]; then
                      HEALTHY_DEPLOYMENTS=0
                      UNHEALTHY_DEPLOYMENTS=0

                      while IFS= read -r line; do
                        DEPLOY_NAME=$(echo "$line" | awk '{print $1}')
                        READY=$(echo "$line" | awk '{print $2}')
                        READY_CURRENT=$(echo "$READY" | cut -d'/' -f1)
                        READY_DESIRED=$(echo "$READY" | cut -d'/' -f2)

                        if [ "$READY_CURRENT" == "$READY_DESIRED" ] && [ "$READY_DESIRED" != "0" ]; then
                          HEALTHY_DEPLOYMENTS=$((HEALTHY_DEPLOYMENTS+1))
                        else
                          UNHEALTHY_DEPLOYMENTS=$((UNHEALTHY_DEPLOYMENTS+1))
                          echo "  ⚠ Deployment $DEPLOY_NAME: $READY_CURRENT/$READY_DESIRED ready"
                        fi
                      done < <(kubectl get deployments -n $NS $SELECTOR_FLAG --no-headers 2>/dev/null)

                      echo "  Deployments: $HEALTHY_DEPLOYMENTS/$DEPLOYMENTS healthy"
                      if [ $UNHEALTHY_DEPLOYMENTS -gt 0 ]; then
                        WARNINGS=$((WARNINGS+1))
                      fi
                    fi

                    # Check DaemonSets
                    DAEMONSETS=$(kubectl get daemonsets -n $NS $SELECTOR_FLAG --no-headers 2>/dev/null | wc -l)
                    if [ $DAEMONSETS -gt 0 ]; then
                      HEALTHY_DAEMONSETS=0
                      UNHEALTHY_DAEMONSETS=0

                      while IFS= read -r line; do
                        DS_NAME=$(echo "$line" | awk '{print $1}')
                        DESIRED=$(echo "$line" | awk '{print $2}')
                        READY=$(echo "$line" | awk '{print $4}')

                        if [ "$READY" == "$DESIRED" ] && [ "$DESIRED" != "0" ]; then
                          HEALTHY_DAEMONSETS=$((HEALTHY_DAEMONSETS+1))
                        else
                          UNHEALTHY_DAEMONSETS=$((UNHEALTHY_DAEMONSETS+1))
                          echo "  ⚠ DaemonSet $DS_NAME: $READY/$DESIRED ready"
                        fi
                      done < <(kubectl get daemonsets -n $NS $SELECTOR_FLAG --no-headers 2>/dev/null)

                      echo "  DaemonSets: $HEALTHY_DAEMONSETS/$DAEMONSETS healthy"
                      if [ $UNHEALTHY_DAEMONSETS -gt 0 ]; then
                        WARNINGS=$((WARNINGS+1))
                      fi
                    fi

                    # Overall health verdict
                    echo ""

                    # Check if there are any warnings (high restarts, unhealthy deployments/daemonsets)
                    LOCAL_WARNINGS=0
                    if [ $HIGH_RESTARTS -gt 0 ]; then
                      LOCAL_WARNINGS=$((LOCAL_WARNINGS+1))
                    fi
                    # Check if any deployments or daemonsets were flagged as unhealthy earlier
                    if [ $UNHEALTHY_DEPLOYMENTS -gt 0 ] || [ $UNHEALTHY_DAEMONSETS -gt 0 ]; then
                      LOCAL_WARNINGS=$((LOCAL_WARNINGS+1))
                    fi

                    # Determine overall health status
                    if [ $CRASH_LOOP -gt 0 ] || [ $IMAGE_PULL_ERROR -gt 0 ]; then
                      echo "❌ $COMPONENT_NAME has CRITICAL issues"
                      FAILED=$((FAILED+1))
                    elif [ $READY_PODS -eq $TOTAL_PODS ] && [ $LOCAL_WARNINGS -eq 0 ]; then
                      echo "✅ $COMPONENT_NAME is HEALTHY"
                      PASSED=$((PASSED+1))
                    else
                      echo "⚠ $COMPONENT_NAME has warnings"
                      WARNINGS=$((WARNINGS+1))
                    fi
                  }

                  # Re-authenticate to Azure and get AKS credentials
                  echo "Re-authenticating to Azure with workload identity..."
                  echo "Client ID: $AZURE_CLIENT_ID"
                  echo "Tenant ID: $AZURE_TENANT_ID"

                  az login --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                    --service-principal \
                    -u "$AZURE_CLIENT_ID" \
                    -t "$AZURE_TENANT_ID"

                  az account set --subscription {{workflow.parameters.subscriptionId}}

                  # Get AKS credentials (same logic as get-aks-credentials task)
                  RESOURCE_GROUP="{{workflow.parameters.resourceGroup}}"
                  DISABLE_LOCAL=$(az aks show \
                    --resource-group $RESOURCE_GROUP \
                    --name $CLUSTER_NAME \
                    --query disableLocalAccounts \
                    -o tsv 2>/dev/null || echo "false")

                  if [ "$DISABLE_LOCAL" == "true" ]; then
                    az aks get-credentials \
                      --resource-group $RESOURCE_GROUP \
                      --name $CLUSTER_NAME \
                      --overwrite-existing
                    CONTEXT_NAME="$CLUSTER_NAME"
                  else
                    az aks get-credentials \
                      --resource-group $RESOURCE_GROUP \
                      --name $CLUSTER_NAME \
                      --overwrite-existing \
                      --admin
                    CONTEXT_NAME="$CLUSTER_NAME-admin"
                  fi

                  # Use the AKS cluster context
                  export KUBECONFIG=~/.kube/config
                  kubectl config use-context $CONTEXT_NAME

                  # Check Flux (should be deployed to AKS)
                  check_component "flux-system" "Flux" "app.kubernetes.io/part-of=flux"

                  # Check Cert-Manager (if deployed to AKS)
                  check_component "cert-manager" "Cert-Manager" "app.kubernetes.io/instance=cert-manager"

                  # Check External DNS (if deployed to AKS)
                  check_component "external-dns" "External DNS" "app.kubernetes.io/name=external-dns"

                  # Check External Secrets (if deployed to AKS)
                  check_component "external-secrets" "External Secrets" "app.kubernetes.io/name=external-secrets"

                  # Check Kyverno (if deployed to AKS)
                  check_component "kyverno" "Kyverno" "app.kubernetes.io/part-of=kyverno"

                  # Check Reloader (if deployed to AKS)
                  check_component "reloader" "Reloader" "app=reloader-reloader"

                  # Check kube-system pods
                  check_component "kube-system" "Kube-System" ""

                  echo ""
                  echo "Summary: $PASSED passed, $FAILED failed, $WARNINGS warnings"
                  echo "✅ AKS system components validation complete"

            # Connectivity validation
            - name: validate-cluster-connectivity
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Cluster Connectivity Validation ==="
                  PASSED=0
                  FAILED=0

                  if kubectl cluster-info &>/dev/null; then
                    echo "✓ API server is accessible"
                    PASSED=$((PASSED+1))
                  else
                    echo "✗ Cannot connect to API server"
                    FAILED=$((FAILED+1))
                    exit 1
                  fi

                  TOTAL_NODES=$(kubectl get nodes --no-headers 2>/dev/null | wc -l)
                  READY_NODES=$(kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready" || true)
                  echo "Nodes: $READY_NODES/$TOTAL_NODES ready"

                  if [[ $READY_NODES -eq $TOTAL_NODES ]] && [[ $TOTAL_NODES -gt 0 ]]; then
                    echo "✓ All nodes are ready"
                    PASSED=$((PASSED+1))
                  else
                    echo "✗ Some nodes are not ready"
                    FAILED=$((FAILED+1))
                  fi

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ Connectivity validation complete"

            # Security validation
            - name: validate-security-compliance
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Security & Compliance Validation ==="
                  PASSED=0
                  FAILED=0

                  WI_SA=$(kubectl get serviceaccount -A \
                    -o json | jq -r '.items[] | select(.metadata.annotations["azure.workload.identity/client-id"]) | .metadata.name' | wc -l)
                  echo "Found $WI_SA service accounts with workload identity"
                  if [[ $WI_SA -gt 0 ]]; then
                    PASSED=$((PASSED+1))
                  fi

                  if kubectl get pods -n kube-system -l app=azure-policy &>/dev/null; then
                    echo "✓ Azure Policy addon found"
                    PASSED=$((PASSED+1))
                  fi

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ Security validation complete"

            # API access type validation (PUBLIC or PRIVATE)
            - name: validate-api-access-type
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== API Access Type Validation ==="
                  PASSED=0
                  FAILED=0
                  CLUSTER_TYPE="{{workflow.parameters.clusterType}}"

                  NAMESPACE="{{workflow.parameters.targetNamespace}}"
                  PRIVATE=$(kubectl get managedcluster {{workflow.parameters.clusterName}} -n $NAMESPACE \
                    -o jsonpath='{.spec.apiServerAccessProfile.enablePrivateCluster}' 2>/dev/null || echo "false")

                  if [[ "$CLUSTER_TYPE" == "PUBLIC" ]]; then
                    if [[ "$PRIVATE" == "false" ]]; then
                      echo "✓ Cluster has public API access (enablePrivateCluster: false)"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ Expected PUBLIC cluster but enablePrivateCluster: $PRIVATE"
                      FAILED=$((FAILED+1))
                    fi
                  else
                    if [[ "$PRIVATE" == "true" ]]; then
                      echo "✓ Cluster has private API access (enablePrivateCluster: true)"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ Expected PRIVATE cluster but enablePrivateCluster: $PRIVATE"
                      FAILED=$((FAILED+1))
                    fi
                  fi

                  OUTBOUND=$(kubectl get managedcluster {{workflow.parameters.clusterName}} -n $NAMESPACE \
                    -o jsonpath='{.spec.networkProfile.outboundType}' 2>/dev/null || echo "")
                  echo "Outbound type: $OUTBOUND"

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ API access validation complete"

            # Validate Flux GitOps reconciliation
            - name: validate-flux-reconciliation
              script:
                image: mcr.microsoft.com/azure-cli:latest
                command: [bash]
                env:
                  - name: AZURE_TENANT_ID
                    value: "{{AZURE_SUBSCRIPTION_ID}}"
                  - name: AZURE_CLIENT_ID
                    value: "{{AZURE_SUBSCRIPTION_ID}}"
                  - name: AZURE_FEDERATED_TOKEN_FILE
                    value: /var/run/secrets/azure/tokens/azure-identity-token
                volumeMounts:
                  - name: azure-identity-token
                    mountPath: /var/run/secrets/azure/tokens
                    readOnly: true
                source: |
                  set -e
                  echo "=== Flux GitOps Reconciliation Validation ==="

                  # Install kubectl
                  echo "Installing kubectl..."
                  curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  chmod +x kubectl
                  mv kubectl /usr/local/bin/

                  CLUSTER_NAME="{{workflow.parameters.clusterName}}"
                  PASSED=0
                  FAILED=0
                  WARNINGS=0

                  # Re-authenticate and get credentials
                  echo "Authenticating to Azure..."
                  az login --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                    --service-principal \
                    -u "$AZURE_CLIENT_ID" \
                    -t "$AZURE_TENANT_ID"

                  az account set --subscription {{workflow.parameters.subscriptionId}}

                  RESOURCE_GROUP="{{workflow.parameters.resourceGroup}}"
                  DISABLE_LOCAL=$(az aks show \
                    --resource-group $RESOURCE_GROUP \
                    --name $CLUSTER_NAME \
                    --query disableLocalAccounts \
                    -o tsv 2>/dev/null || echo "false")

                  if [ "$DISABLE_LOCAL" == "true" ]; then
                    az aks get-credentials \
                      --resource-group $RESOURCE_GROUP \
                      --name $CLUSTER_NAME \
                      --overwrite-existing
                    CONTEXT_NAME="$CLUSTER_NAME"
                  else
                    az aks get-credentials \
                      --resource-group $RESOURCE_GROUP \
                      --name $CLUSTER_NAME \
                      --overwrite-existing \
                      --admin
                    CONTEXT_NAME="$CLUSTER_NAME-admin"
                  fi

                  export KUBECONFIG=~/.kube/config
                  kubectl config use-context $CONTEXT_NAME

                  # Check if flux-system namespace exists
                  if ! kubectl get namespace flux-system &>/dev/null; then
                    echo "⚠ WARNING: flux-system namespace not found - Flux may not be deployed yet"
                    WARNINGS=$((WARNINGS+1))
                  else
                    echo "✓ Flux system namespace exists"
                    PASSED=$((PASSED+1))

                    # Check GitRepository resources
                    echo ""
                    echo "Checking GitRepository sources..."
                    TOTAL_REPOS=$(kubectl get gitrepository -n flux-system --no-headers 2>/dev/null | wc -l)
                    if [ $TOTAL_REPOS -gt 0 ]; then
                      echo "Found $TOTAL_REPOS GitRepository resources"

                      # Check for Ready condition (this will warn but not fail)
                      READY_REPOS=$(kubectl get gitrepository -n flux-system -o json 2>/dev/null | \
                        jq '[.items[] | select(.status.conditions[]? | select(.type=="Ready" and .status=="True"))] | length' 2>/dev/null || echo "0")

                      echo "  Ready: $READY_REPOS/$TOTAL_REPOS"
                      if [ $READY_REPOS -eq $TOTAL_REPOS ]; then
                        echo "  ✓ All GitRepository sources are ready"
                        PASSED=$((PASSED+1))
                      else
                        echo "  ⚠ WARNING: Some GitRepository sources not ready (GitOps not fully synced yet)"
                        WARNINGS=$((WARNINGS+1))
                        kubectl get gitrepository -n flux-system --no-headers | head -5
                      fi
                    else
                      echo "⚠ WARNING: No GitRepository resources found"
                      WARNINGS=$((WARNINGS+1))
                    fi

                    # Check Kustomization resources
                    echo ""
                    echo "Checking Kustomization resources..."
                    TOTAL_KUST=$(kubectl get kustomization -n flux-system --no-headers 2>/dev/null | wc -l)
                    if [ $TOTAL_KUST -gt 0 ]; then
                      echo "Found $TOTAL_KUST Kustomization resources"

                      READY_KUST=$(kubectl get kustomization -n flux-system -o json 2>/dev/null | \
                        jq '[.items[] | select(.status.conditions[]? | select(.type=="Ready" and .status=="True"))] | length' 2>/dev/null || echo "0")

                      echo "  Ready: $READY_KUST/$TOTAL_KUST"
                      if [ $READY_KUST -eq $TOTAL_KUST ]; then
                        echo "  ✓ All Kustomizations are ready"
                        PASSED=$((PASSED+1))
                      else
                        echo "  ⚠ WARNING: Some Kustomizations not ready (GitOps not fully synced yet)"
                        WARNINGS=$((WARNINGS+1))
                        kubectl get kustomization -n flux-system --no-headers | head -5
                      fi
                    else
                      echo "⚠ WARNING: No Kustomization resources found"
                      WARNINGS=$((WARNINGS+1))
                    fi

                    # Check Helm releases if any
                    echo ""
                    echo "Checking HelmRelease resources..."
                    TOTAL_HELM=$(kubectl get helmrelease -A --no-headers 2>/dev/null | wc -l)
                    if [ $TOTAL_HELM -gt 0 ]; then
                      echo "Found $TOTAL_HELM HelmRelease resources"

                      READY_HELM=$(kubectl get helmrelease -A -o json 2>/dev/null | \
                        jq '[.items[] | select(.status.conditions[]? | select(.type=="Ready" and .status=="True"))] | length' 2>/dev/null || echo "0")

                      echo "  Ready: $READY_HELM/$TOTAL_HELM"
                      if [ $READY_HELM -eq $TOTAL_HELM ]; then
                        echo "  ✓ All HelmReleases are ready"
                        PASSED=$((PASSED+1))
                      else
                        echo "  ⚠ WARNING: Some HelmReleases not ready"
                        WARNINGS=$((WARNINGS+1))
                      fi
                    else
                      echo "  No HelmRelease resources found (this is OK)"
                    fi
                  fi

                  echo ""
                  echo "Summary: $PASSED passed, $FAILED failed, $WARNINGS warnings"
                  echo "⚠ NOTE: GitOps sync warnings are expected during initial cluster setup"
                  echo "✅ Flux reconciliation validation complete"

            # Deploy and test a workload
            - name: validate-workload-deployment
              script:
                image: mcr.microsoft.com/azure-cli:latest
                command: [bash]
                env:
                  - name: AZURE_TENANT_ID
                    value: "{{AZURE_SUBSCRIPTION_ID}}"
                  - name: AZURE_CLIENT_ID
                    value: "{{AZURE_SUBSCRIPTION_ID}}"
                  - name: AZURE_FEDERATED_TOKEN_FILE
                    value: /var/run/secrets/azure/tokens/azure-identity-token
                volumeMounts:
                  - name: azure-identity-token
                    mountPath: /var/run/secrets/azure/tokens
                    readOnly: true
                source: |
                  set -e
                  echo "=== Workload Deployment & Connectivity Validation ==="

                  # Install kubectl and curl
                  echo "Installing kubectl..."
                  curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  chmod +x kubectl
                  mv kubectl /usr/local/bin/

                  CLUSTER_NAME="{{workflow.parameters.clusterName}}"
                  PASSED=0
                  FAILED=0

                  # Re-authenticate and get credentials
                  echo "Authenticating to Azure..."
                  az login --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                    --service-principal \
                    -u "$AZURE_CLIENT_ID" \
                    -t "$AZURE_TENANT_ID"

                  az account set --subscription {{workflow.parameters.subscriptionId}}

                  RESOURCE_GROUP="{{workflow.parameters.resourceGroup}}"
                  DISABLE_LOCAL=$(az aks show \
                    --resource-group $RESOURCE_GROUP \
                    --name $CLUSTER_NAME \
                    --query disableLocalAccounts \
                    -o tsv 2>/dev/null || echo "false")

                  if [ "$DISABLE_LOCAL" == "true" ]; then
                    az aks get-credentials \
                      --resource-group $RESOURCE_GROUP \
                      --name $CLUSTER_NAME \
                      --overwrite-existing
                    CONTEXT_NAME="$CLUSTER_NAME"
                  else
                    az aks get-credentials \
                      --resource-group $RESOURCE_GROUP \
                      --name $CLUSTER_NAME \
                      --overwrite-existing \
                      --admin
                    CONTEXT_NAME="$CLUSTER_NAME-admin"
                  fi

                  export KUBECONFIG=~/.kube/config
                  kubectl config use-context $CONTEXT_NAME

                  # Create test namespace
                  TEST_NS="certification-test-$(date +%s)"
                  echo "Creating test namespace: $TEST_NS"
                  kubectl create namespace $TEST_NS
                  echo "✓ Test namespace created"
                  PASSED=$((PASSED+1))

                  # Deploy test pod (nginx)
                  echo ""
                  echo "Deploying test workload (nginx)..."
                  cat <<EOF | kubectl apply -f -
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: certification-test-app
                    namespace: $TEST_NS
                    labels:
                      app: certification-test
                  spec:
                    replicas: 1
                    selector:
                      matchLabels:
                        app: certification-test
                    template:
                      metadata:
                        labels:
                          app: certification-test
                      spec:
                        containers:
                        - name: nginx
                          image: nginx:alpine
                          ports:
                          - containerPort: 80
                          resources:
                            requests:
                              cpu: 100m
                              memory: 128Mi
                            limits:
                              cpu: 200m
                              memory: 256Mi
                  EOF

                  # Create service
                  echo "Creating test service..."
                  cat <<EOF | kubectl apply -f -
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: certification-test-svc
                    namespace: $TEST_NS
                  spec:
                    selector:
                      app: certification-test
                    ports:
                    - protocol: TCP
                      port: 80
                      targetPort: 80
                    type: ClusterIP
                  EOF

                  # Wait for pod to be ready
                  echo ""
                  echo "Waiting for pod to be ready (max 60s)..."
                  if kubectl wait --for=condition=ready pod -l app=certification-test -n $TEST_NS --timeout=60s; then
                    echo "✓ Test pod is ready"
                    PASSED=$((PASSED+1))
                  else
                    echo "✗ Test pod failed to become ready"
                    FAILED=$((FAILED+1))
                    kubectl get pods -n $TEST_NS
                    kubectl describe pod -l app=certification-test -n $TEST_NS
                  fi

                  # Wait for service to get an IP
                  echo ""
                  echo "Waiting for service endpoint..."
                  sleep 5
                  SERVICE_IP=$(kubectl get svc certification-test-svc -n $TEST_NS -o jsonpath='{.spec.clusterIP}')
                  if [ -n "$SERVICE_IP" ] && [ "$SERVICE_IP" != "None" ]; then
                    echo "✓ Service has ClusterIP: $SERVICE_IP"
                    PASSED=$((PASSED+1))
                  else
                    echo "✗ Service failed to get ClusterIP"
                    FAILED=$((FAILED+1))
                  fi

                  # Test internal connectivity
                  echo ""
                  echo "Testing internal service connectivity..."
                  cat <<EOF | kubectl apply -f -
                  apiVersion: v1
                  kind: Pod
                  metadata:
                    name: certification-test-client
                    namespace: $TEST_NS
                  spec:
                    containers:
                    - name: curl
                      image: curlimages/curl:latest
                      command: ["sleep", "60"]
                  EOF

                  # Wait for client pod
                  kubectl wait --for=condition=ready pod/certification-test-client -n $TEST_NS --timeout=30s

                  # Test connectivity to the service
                  if kubectl exec -n $TEST_NS certification-test-client -- curl -s -o /dev/null -w "%{http_code}" http://certification-test-svc 2>/dev/null | grep -q "200"; then
                    echo "✓ Internal service connectivity working (HTTP 200)"
                    PASSED=$((PASSED+1))
                  else
                    echo "⚠ WARNING: Internal service connectivity test failed"
                    # Don't fail certification for this, just warn
                    FAILED=$((FAILED+1))
                  fi

                  # Test external connectivity (to verify DNS and egress)
                  echo ""
                  echo "Testing external connectivity..."
                  if kubectl exec -n $TEST_NS certification-test-client -- curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://www.google.com 2>/dev/null | grep -q "200"; then
                    echo "✓ External connectivity working (can reach google.com)"
                    PASSED=$((PASSED+1))
                  else
                    echo "⚠ WARNING: External connectivity test failed (may be expected for private clusters)"
                  fi

                  # Cleanup
                  echo ""
                  echo "Cleaning up test resources..."
                  kubectl delete namespace $TEST_NS --wait=false
                  echo "✓ Test namespace marked for deletion"

                  echo ""
                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ Workload deployment validation complete"

            # Aggregate results
            - name: aggregate-certification
              script:
                image: python:3.9-slim
                command: [python]
                source: |
                  import json
                  from datetime import datetime

                  report = {
                    "cluster": "{{workflow.parameters.clusterName}}",
                    "namespace": "{{workflow.parameters.targetNamespace}}",
                    "environment": "{{workflow.parameters.environment}}",
                    "cluster_type": "{{workflow.parameters.clusterType}}",
                    "timestamp": datetime.utcnow().isoformat() + "Z",
                    "workflow": "{{workflow.name}}",
                    "certification": {
                      "status": "CERTIFIED",
                      "workflow_name": "certify-{{workflow.parameters.clusterName}}"
                    }
                  }

                  print("=" * 60)
                  print("UK8S CLUSTER CERTIFICATION REPORT")
                  print("=" * 60)
                  print(json.dumps(report, indent=2))
                  print("=" * 60)
                  print("✅ CLUSTER CERTIFICATION COMPLETE")
                  print("=" * 60)

                  # Report printed to stdout, no artifact storage needed

            # Exit handler
            - name: generate-final-report
              container:
                image: alpine:latest
                command: [sh, -c]
                args:
                  - |
                    echo "======================================"
                    echo "Certification Complete"
                    echo "======================================"
                    echo "Cluster: {{workflow.parameters.clusterName}}"
                    echo "Status: {{workflow.status}}"
                    echo "Environment: {{workflow.parameters.environment}}"
                    echo "Type: {{workflow.parameters.clusterType}}"
                    echo "======================================"

    # ----------------------------------------
    # Weekly Certification Schedule
    # ----------------------------------------
    - id: certificationSchedule
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: CronWorkflow
        metadata:
          name: weekly-cert-${schema.spec.clusterName}
          namespace: argo
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: certification-schedule
            environment: ${schema.spec.environment}
          annotations:
            kro.run/description: "Weekly automated certification for ${schema.spec.clusterType} cluster ${schema.spec.clusterName}"
        spec:
          schedule: ${schema.spec.certification.schedule}
          timezone: "UTC"
          suspend: ${schema.spec.certification.suspended}
          workflowSpec:
            workflowTemplateRef:
              name: certify-${schema.spec.clusterName}

    # ----------------------------------------
    # Automatic Initial Certification Trigger
    # ----------------------------------------
    - id: certificationTrigger
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: trigger-cert-${schema.spec.clusterName}
          namespace: argo
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: certification-trigger
            environment: ${schema.spec.environment}
          annotations:
            kro.run/description: "Triggers initial certification for ${schema.spec.clusterType} cluster ${schema.spec.clusterName}"
        spec:
          ttlSecondsAfterFinished: 300
          backoffLimit: 3
          template:
            metadata:
              labels:
                kro.run/cluster: ${schema.spec.clusterName}
            spec:
              serviceAccountName: argo-workflow-executor
              restartPolicy: OnFailure
              containers:
                - name: trigger-certification
                  image: bitnami/kubectl:latest
                  command: [bash, -c]
                  env:
                    - name: AUTO_TRIGGER
                      value: "${schema.spec.certification.autoTrigger ? 'true' : 'false'}"
                  args:
                    - |
                      set -e

                      # Check if auto-trigger is disabled
                      if [[ "$AUTO_TRIGGER" == "false" ]]; then
                        echo "Auto-trigger disabled, skipping initial certification"
                        exit 0
                      fi

                      echo "Waiting for WorkflowTemplate to be ready..."

                      # Wait for WorkflowTemplate to exist
                      for i in $(seq 1 30); do
                        if kubectl get workflowtemplate certify-${schema.spec.clusterName} -n argo &>/dev/null; then
                          echo "✓ WorkflowTemplate found"
                          break
                        fi
                        echo "Waiting for WorkflowTemplate... ($i/30)"
                        sleep 10
                      done

                      # Wait for UK8SClusterPublic to be ACTIVE and Ready
                      echo "Waiting for UK8SClusterPublic to be ACTIVE and Ready..."
                      for i in $(seq 1 60); do
                        STATE=$(kubectl get uk8sclusterpublic ${schema.spec.instanceName} -n ${schema.spec.targetNamespace} -o jsonpath='{.status.state}' 2>/dev/null || echo "")
                        READY=$(kubectl get uk8sclusterpublic ${schema.spec.instanceName} -n ${schema.spec.targetNamespace} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")

                        if [[ "$STATE" == "ACTIVE" ]] && [[ "$READY" == "True" ]]; then
                          echo "✓ UK8SClusterPublic is ACTIVE and Ready"
                          break
                        fi
                        echo "Current state: $STATE, Ready: $READY (waiting... $i/60)"
                        sleep 30
                      done

                      # Wait for ManagedCluster to be Ready (basic check)
                      echo "Checking ManagedCluster status..."
                      MC_READY=$(kubectl get managedcluster ${schema.spec.clusterName} -n ${schema.spec.targetNamespace} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")
                      echo "ManagedCluster Ready: $MC_READY"
                      echo ""
                      echo "Note: Certification workflow will wait for full cluster health before proceeding"

                      # Submit certification workflow
                      echo "Submitting certification workflow..."
                      cat <<EOF | kubectl create -f -
                      apiVersion: argoproj.io/v1alpha1
                      kind: Workflow
                      metadata:
                        generateName: certify-${schema.spec.clusterName}-auto-
                        namespace: argo
                        labels:
                          kro.run/cluster: ${schema.spec.clusterName}
                          kro.run/trigger: automatic
                      spec:
                        workflowTemplateRef:
