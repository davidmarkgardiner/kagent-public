---
# Crow AI Stack — Management Cluster
# KRO ResourceGraphDefinition that deploys the full K8s event triage AI stack
# onto the management cluster as a single unit.
#
# What this creates (all in one instance):
#   - EventBus (NATS native)           — Argo Events message bus
#   - ServiceAccount (argo-events-sa)  — shared SA for EventSource/Sensor
#   - Role + RoleBinding               — permit SA to create Workflows
#   - ConfigMap: mattermost-webhook-config
#   - ConfigMap: kagent-config
#   - ConfigMap: agent-routing (namespace/reason → agent mapping)
#   - EventSource (Kafka → Event Hub)
#   - Sensor (rate-limited trigger)
#   - WorkflowTemplate (parse-otlp → classify → Mattermost)
#
# Pre-requisites (create once before applying an instance):
#   1. Argo Events installed (controller in argo-events namespace)
#   2. Argo Workflows installed
#   3. KAgent running (for A2A analysis, optional)
#   4. Secret: eventhub-credentials  (keys: username, connection-string)
#   5. Secret: eventhub-tls-ca       (key: ca.pem)
#
# Alloy lives on each workload cluster — use uk8s-kro-worker-alloy.kro.run instead.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: uk8s-kro-ai-stack.kro.run
  labels:
    kro.run/type: kro-ai-stack
    kro.run/category: ai-triage
    kro.run/layer: management
  annotations:
    kro.run/description: "Management cluster AI triage stack: Event Hub → Argo → KAgent → Mattermost"
    kro.run/version: "1.0.0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: KroAIStack
    spec:
      # Namespace where all Argo resources live
      namespace: string | default="argo-events" description="Namespace for Argo Events resources"

      # ── Event Hub connection ──────────────────────────────────────────────
      eventHub:
        # Full broker FQDN with port, e.g. evh-prod.servicebus.windows.net:9093
        fqdn: string | required=true description="Event Hub FQDN with port (namespace.servicebus.windows.net:9093)"
        topic: string | default="k8s-events" description="Event Hub topic name"
        consumerGroup: string | default="argo-events-consumer" description="Kafka consumer group name"
        # Pre-created secret names (values NOT stored in this CR)
        credentialsSecretName: string | default="eventhub-credentials" description="Secret with 'username' and 'connection-string' keys"
        tlsCaSecretName: string | default="eventhub-tls-ca" description="Secret with 'ca.pem' key"

      # ── Mattermost notifications ──────────────────────────────────────────
      mattermost:
        webhookUrl: string | required=true description="Mattermost incoming webhook URL"

      # ── KAgent A2A (optional — used by critical/warnings tiers) ──────────
      kagent:
        url: string | default="http://kagent-controller-manager.kagent.svc.cluster.local:8082"
        criticalAgent: string | default="sre-triage-agent"
        warningsAgent: string | default="sre-triage-agent"
        remediationAgent: string | default="sre-remediation-agent"

      # ── Sensor rate limit ─────────────────────────────────────────────────
      sensor:
        rateLimitPerMinute: integer | default=5 minimum=1 maximum=60

  resources:
    # ──────────────────────────────────────────────────────────────────────────
    # 1. EventBus — NATS native (required for EventSource ↔ Sensor comms)
    # ──────────────────────────────────────────────────────────────────────────
    - id: eventBus
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: EventBus
        metadata:
          name: default
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        spec:
          nats:
            native: {}

    # ──────────────────────────────────────────────────────────────────────────
    # 2. ServiceAccount shared by EventSource and Sensor
    # ──────────────────────────────────────────────────────────────────────────
    - id: serviceAccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: argo-events-sa
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}

    # ──────────────────────────────────────────────────────────────────────────
    # 3. Role — allow sensor SA to create Workflows
    # ──────────────────────────────────────────────────────────────────────────
    - id: role
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: sensor-workflow-creator
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        rules:
          - apiGroups: ["argoproj.io"]
            resources: ["workflows", "workflowtemplates"]
            verbs: ["create", "get", "list", "watch"]

    # ──────────────────────────────────────────────────────────────────────────
    # 4. RoleBinding
    # ──────────────────────────────────────────────────────────────────────────
    - id: roleBinding
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: sensor-workflow-creator
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        subjects:
          - kind: ServiceAccount
            name: argo-events-sa
            namespace: ${schema.spec.namespace}
        roleRef:
          kind: Role
          name: sensor-workflow-creator
          apiGroup: rbac.authorization.k8s.io

    # ──────────────────────────────────────────────────────────────────────────
    # 5. Mattermost webhook ConfigMap
    # ──────────────────────────────────────────────────────────────────────────
    - id: mattermostConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: mattermost-webhook-config
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        data:
          WEBHOOK_URL: ${schema.spec.mattermost.webhookUrl}

    # ──────────────────────────────────────────────────────────────────────────
    # 6. KAgent ConfigMap
    # ──────────────────────────────────────────────────────────────────────────
    - id: kagentConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: kagent-config
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        data:
          KAGENT_URL: ${schema.spec.kagent.url}
          KAGENT_CRITICAL_AGENT: ${schema.spec.kagent.criticalAgent}
          KAGENT_WARNINGS_AGENT: ${schema.spec.kagent.warningsAgent}

    # ──────────────────────────────────────────────────────────────────────────
    # 7. Agent routing ConfigMap — controls which KAgent handles each event
    #    Operators can edit namespace-routes / reason-routes post-deploy.
    # ──────────────────────────────────────────────────────────────────────────
    - id: agentRouting
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: agent-routing
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        data:
          # Default agents — used when no namespace/reason route matches
          default-triage: ${schema.spec.kagent.criticalAgent}
          default-remediation: ${schema.spec.kagent.remediationAgent}
          # Namespace-based routing (JSON object)
          # Keys = K8s namespace, Values = KAgent agent name
          # e.g. {"cert-manager": "cert-manager-agent", "ingress-nginx": "network-specialist-agent"}
          namespace-routes: "{}"
          # Reason-based routing (JSON object, checked only if namespace didn't match)
          # Keys = K8s event reason, Values = KAgent agent name
          # e.g. {"FailedMount": "storage-specialist-agent"}
          reason-routes: "{}"

    # ──────────────────────────────────────────────────────────────────────────
    # 8. EventSource — Kafka consumer from Azure Event Hub
    #    Naming chain (must stay consistent with Sensor below):
    #      EventSource.metadata.name  = "eventhub-k8s-events"
    #      EventSource.spec.kafka key = "k8s-events"
    # ──────────────────────────────────────────────────────────────────────────
    - id: eventSource
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: EventSource
        metadata:
          name: eventhub-k8s-events
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        spec:
          template:
            serviceAccountName: argo-events-sa
            container:
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          kafka:
            k8s-events:
              url: ${schema.spec.eventHub.fqdn}
              topic: ${schema.spec.eventHub.topic}
              consumerGroup:
                groupName: ${schema.spec.eventHub.consumerGroup}
              tls:
                # Must reference a real secret — empty name causes deployment failure
                caCertSecret:
                  name: ${schema.spec.eventHub.tlsCaSecretName}
                  key: ca.pem
              sasl:
                mechanism: "PLAIN"
                userSecret:
                  name: ${schema.spec.eventHub.credentialsSecretName}
                  key: username
                passwordSecret:
                  name: ${schema.spec.eventHub.credentialsSecretName}
                  key: connection-string
              jsonBody: true
              partition: ""
              version: "2.1.0"

    # ──────────────────────────────────────────────────────────────────────────
    # 9. Sensor — rate-limited event routing to WorkflowTemplate
    #    Naming chain (must match EventSource above):
    #      dependencies[].eventSourceName = "eventhub-k8s-events"  ← (A)
    #      dependencies[].eventName       = "k8s-events"            ← (B)
    # ──────────────────────────────────────────────────────────────────────────
    - id: sensor
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Sensor
        metadata:
          name: k8s-event-triage
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        spec:
          template:
            serviceAccountName: argo-events-sa
            container:
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          dependencies:
            - name: k8s-event
              eventSourceName: eventhub-k8s-events
              eventName: k8s-events
          triggers:
            - template:
                name: triage-workflow
                conditions: "k8s-event"
                rateLimit:
                  requestsPerUnit: ${schema.spec.sensor.rateLimitPerMinute}
                  unit: Minute
                k8s:
                  operation: create
                  source:
                    resource:
                      apiVersion: argoproj.io/v1alpha1
                      kind: Workflow
                      metadata:
                        generateName: k8s-triage-
                        namespace: ${schema.spec.namespace}
                        labels:
                          app.kubernetes.io/part-of: k8s-event-triage
                      spec:
                        workflowTemplateRef:
                          name: k8s-event-triage
                        arguments:
                          parameters:
                            - name: otlp-payload
                  parameters:
                    - src:
                        dependencyName: k8s-event
                        dataKey: body
                      dest: spec.arguments.parameters.0.value
              retryStrategy:
                steps: 3
                duration: 10s

    # ──────────────────────────────────────────────────────────────────────────
    # 10. WorkflowTemplate — parse-otlp → fan-out → classify-and-alert
    # ──────────────────────────────────────────────────────────────────────────
    - id: workflowTemplate
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: WorkflowTemplate
        metadata:
          name: k8s-event-triage
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/part-of: k8s-event-triage
            kro.run/instance: ${schema.metadata.name}
        spec:
          serviceAccountName: argo-events-sa
          entrypoint: triage-pipeline
          ttlStrategy:
            secondsAfterCompletion: 300
            secondsAfterSuccess: 120
            secondsAfterFailure: 600
          podGC:
            strategy: OnPodCompletion
          arguments:
            parameters:
              - name: otlp-payload
                description: "Full OTLP JSON envelope from Event Hub (Alloy otelcol.exporter.kafka otlp_json)"
          templates:
            - name: triage-pipeline
              steps:
                - - name: parse-otlp
                    template: parse-otlp
                    arguments:
                      parameters:
                        - name: otlp-payload
                          value: "{{workflow.parameters.otlp-payload}}"
                - - name: process-event
                    template: classify-and-alert
                    withParam: "{{steps.parse-otlp.outputs.parameters.events}}"
                    arguments:
                      parameters:
                        - name: cluster
                          value: "{{item.cluster}}"
                        - name: environment
                          value: "{{item.environment}}"
                        - name: event-type
                          value: "{{item.event_type}}"
                        - name: event-reason
                          value: "{{item.event_reason}}"
                        - name: event-message
                          value: "{{item.event_message}}"
                        - name: object-kind
                          value: "{{item.object_kind}}"
                        - name: object-name
                          value: "{{item.object_name}}"
                        - name: object-namespace
                          value: "{{item.object_namespace}}"
                        - name: event-time
                          value: "{{item.event_time}}"
                        - name: event-count
                          value: "{{item.event_count}}"

            # ── Step 1: Unwrap OTLP envelope, extract Warning events ──────────
            - name: parse-otlp
              inputs:
                parameters:
                  - name: otlp-payload
              outputs:
                parameters:
                  - name: events
                    valueFrom:
                      path: /tmp/events.json
                  - name: event-count
                    valueFrom:
                      path: /tmp/event-count.txt
              script:
                image: badouralix/curl-jq:alpine
                command: [sh]
                source: |
                  cat > /tmp/otlp_input.json << '__OTLP_EOF__'
                  {{inputs.parameters.otlp-payload}}
                  __OTLP_EOF__

                  jq '
                    def attrs: [.[]? | {(.key): (.value.stringValue // (.value.intValue // .value.boolValue // "" | tostring))}] | add // {};
                    [
                      .resourceLogs[]? |
                      (.resource.attributes // [] | attrs) as $res |
                      .scopeLogs[]?.logRecords[]? |
                      (.attributes // [] | attrs) as $a |
                      (.body.stringValue // "" | if . != "" then (fromjson? // {}) else {} end) as $ev |
                      ($a.event_type // $ev.type // "Unknown") as $type |
                      select($type == "Warning") |
                      {
                        cluster:          ($a.cluster // $res.cluster // "unknown"),
                        environment:      ($a.environment // $res.environment // "unknown"),
                        event_type:       $type,
                        event_reason:     ($a.event_reason // $ev.reason // "Unknown"),
                        event_message:    ($ev.message // ""),
                        object_kind:      ($a.obj_kind // $ev.involvedObject.kind // ""),
                        object_name:      ($ev.involvedObject.name // ""),
                        object_namespace: ($a.obj_namespace // $ev.involvedObject.namespace // ""),
                        event_time:       ($ev.lastTimestamp // $ev.firstTimestamp // ""),
                        event_count:      ($ev.count // 1 | tostring)
                      }
                    ]
                  ' /tmp/otlp_input.json > /tmp/events.json

                  COUNT=$(jq length /tmp/events.json)
                  echo "$COUNT" > /tmp/event-count.txt
                  echo "Parsed $COUNT Warning event(s) from OTLP payload"
                  jq -r '.[] | "  - \(.event_reason): \(.object_kind)/\(.object_name) in \(.object_namespace)"' /tmp/events.json
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi

            # ── Step 2: Classify severity + post Mattermost alert ─────────────
            - name: classify-and-alert
              memoize:
                key: "{{inputs.parameters.cluster}}-{{inputs.parameters.object-namespace}}-{{inputs.parameters.event-reason}}"
                maxAge: "24h"
                cache:
                  configMap:
                    name: event-dedup-cache
              inputs:
                parameters:
                  - name: cluster
                  - name: environment
                  - name: event-type
                  - name: event-reason
                  - name: event-message
                  - name: object-kind
                  - name: object-name
                  - name: object-namespace
                  - name: event-time
                  - name: event-count
              script:
                image: badouralix/curl-jq:alpine
                command: [sh]
                env:
                  - name: WEBHOOK_URL
                    valueFrom:
                      configMapKeyRef:
                        name: mattermost-webhook-config
                        key: WEBHOOK_URL
                source: |
                  REASON="{{inputs.parameters.event-reason}}"

                  case "$REASON" in
                    OOMKilled|CrashLoopBackOff|FailedScheduling|NodeNotReady)
                      SEVERITY="critical" ; EMOJI=":red_circle:"         ; COLOR="#e74c3c" ;;
                    BackOff|Failed|Unhealthy|FailedMount|FailedAttachVolume)
                      SEVERITY="high"     ; EMOJI=":large_orange_circle:" ; COLOR="#e67e22" ;;
                    Killing|Evicted|FailedCreate)
                      SEVERITY="medium"   ; EMOJI=":warning:"             ; COLOR="#f1c40f" ;;
                    *)
                      SEVERITY="low"      ; EMOJI=":white_circle:"        ; COLOR="#95a5a6" ;;
                  esac

                  echo "Event: $REASON -> severity=$SEVERITY"

                  cat > /tmp/event_message.txt << '__MSG_EOF__'
                  {{inputs.parameters.event-message}}
                  __MSG_EOF__
                  EVENT_MSG=$(cat /tmp/event_message.txt | head -c 500)

                  jq -n \
                    --arg emoji "$EMOJI" \
                    --arg severity "$SEVERITY" \
                    --arg color "$COLOR" \
                    --arg cluster "{{inputs.parameters.cluster}}" \
                    --arg environment "{{inputs.parameters.environment}}" \
                    --arg event_type "{{inputs.parameters.event-type}}" \
                    --arg event_reason "{{inputs.parameters.event-reason}}" \
                    --arg object_kind "{{inputs.parameters.object-kind}}" \
                    --arg object_name "{{inputs.parameters.object-name}}" \
                    --arg object_namespace "{{inputs.parameters.object-namespace}}" \
                    --arg event_count "{{inputs.parameters.event-count}}" \
                    --arg event_time "{{inputs.parameters.event-time}}" \
                    --arg event_message "$EVENT_MSG" \
                    '{
                      username: "K8s Event Triage",
                      icon_emoji: ":kubernetes:",
                      text: ($emoji + " **" + $event_reason + "** on " + $cluster),
                      attachments: [
                        {
                          fallback: ($event_reason + " - " + $severity),
                          color: $color,
                          title: ($object_kind + "/" + $object_name),
                          text: ("| Field | Value |\n|-------|-------|\n| **Severity** | " + $severity + " |\n| **Cluster** | `" + $cluster + "` |\n| **Environment** | `" + $environment + "` |\n| **Namespace** | `" + $object_namespace + "` |\n| **Type** | " + $event_type + " |\n| **Reason** | " + $event_reason + " |\n| **Count** | " + $event_count + " |\n| **Time** | " + $event_time + " |")
                        },
                        {
                          fallback: "Event Message",
                          color: $color,
                          title: "Message",
                          text: $event_message
                        }
                      ] + (if ($object_kind == "Pod") then [{
                        fallback: "Quick Commands",
                        color: "#3498db",
                        title: "Quick Commands",
                        text: ("```\nkubectl describe pod " + $object_name + " -n " + $object_namespace + " | tail -30\nkubectl logs " + $object_name + " -n " + $object_namespace + " --tail=50\nkubectl get events -n " + $object_namespace + " --field-selector involvedObject.name=" + $object_name + "\n```")
                      }] else [] end)
                    }' > /tmp/mattermost.json

                  RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d @/tmp/mattermost.json \
                    --max-time 10)

                  HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                  echo "Mattermost response: HTTP $HTTP_CODE"
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
