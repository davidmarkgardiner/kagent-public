---
# ResourceGraphDefinition for UK8S AKS Cluster
# This defines a complete AKS cluster with all supporting infrastructure including:
# - Resource Group
# - AKS Managed Cluster with advanced features (NAP, Istio, KEDA, VPA)
# - User-Assigned Managed Identities (External Secrets, External DNS, Cert Manager)
# - Federated Identity Credentials for Workload Identity
# - Integration with Flux GitOps and supporting jobs
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: uk8scluster.kro.run
  labels:
    kro.run/type: cluster
    kro.run/category: infrastructure
  annotations:
    kro.run/description: "Complete AKS cluster with GitOps, identities, and integrations"
    kro.run/version: "1.0.0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: UK8SCluster
    spec:
      # ========================================
      # Cluster Identity
      # ========================================
      clusterName: string | required=true description="The name of the AKS cluster (lowercase, alphanumeric, max 63 chars)" pattern="^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$"
      targetNamespace: string | default="uk8s-nextgen" required=true description="The namespace where the cluster resource will be created"
      location: string | required=true description="Azure region for the cluster" default="uksouth" enum="uksouth,ukwest,westeurope,northeurope"
      subscriptionId: string | required=true description="Azure subscription ID for the cluster resources" pattern="^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

      # ========================================
      # Owner Resource Group
      # ========================================
      resourceGroup: string | required=true description="The resource group that owns this cluster" pattern="^[a-zA-Z0-9_\-\.]+$"

      # ========================================
      # Kubernetes Version
      # ========================================
      kubernetesVersion: string | default="1.33" description="Kubernetes version"

      # ========================================
      # SSH Configuration
      # ========================================
      sshPublicKey: string | required=true description="SSH public key for Linux nodes (ssh-rsa format)"

      # ========================================
      # Network Configuration
      # ========================================
      network:
        vnetSubscriptionId: string | required=true description="Subscription ID for the VNET" pattern="^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        vnetResourceGroup: string | required=true description="Resource group containing the VNET"
        vnetName: string | required=true description="Virtual network name"
        subnetName: string | required=true description="Subnet name for nodes"
        serviceCidr: string | default="10.251.0.0/17" description="Service CIDR block" pattern="^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$"
        dnsServiceIP: string | default="10.251.0.10" description="DNS service IP (must be within serviceCidr)" pattern="^([0-9]{1,3}\.){3}[0-9]{1,3}$"
        podCidr: string | default="10.251.128.0/17" description="Pod CIDR block" pattern="^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$"

      # ========================================
      # Identity Configuration
      # ========================================
      identity:
        controlPlaneIdentityResourceId: string | required=true description="ARM ID of the control plane managed identity"
        kubeletIdentityClientId: string | required=true description="Client ID of the kubelet identity" pattern="^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        kubeletIdentityObjectId: string | required=true description="Object ID of the kubelet identity" pattern="^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
        kubeletIdentityResourceId: string | required=true description="ARM ID of the kubelet identity"
        fluxClientId: string | required=true description="Client ID of the flux identity for image and source controller" pattern="^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

      # ========================================
      # AAD Configuration
      # ========================================
      aad:
        enableAzureRBAC: boolean | default=true description="Enable Azure RBAC for Kubernetes authorization"
        adminGroupObjectIds: '[]string | required=true description="List of Azure AD group object IDs for cluster admin access"'

      # ========================================
      # Node Pool Configuration
      # ========================================
      nodePool:
        name: string | default="sysnpl" description="Name of the system node pool" pattern="^[a-z][a-z0-9]{0,11}$"
        vmSize: string | default="Standard_B8ms" description="VM size for nodes"
        count: integer | default=1 minimum=1 maximum=100 description="Number of nodes"
        enableAutoScaling: boolean | default=false description="Enable autoscaling"
        minCount: integer | default=1 minimum=1 maximum=100 description="Minimum number of nodes (if autoscaling enabled)"
        maxCount: integer | default=10 minimum=1 maximum=1000 description="Maximum number of nodes (if autoscaling enabled)"
        availabilityZones: '[]string | default=["1"] description="Availability zones for node distribution"'
        osDiskType: string | default="Managed" enum="Managed,Ephemeral" description="OS disk type"
        osDiskSizeGB: integer | default=128 minimum=30 maximum=2048 description="OS disk size in GB"
        osSKU: string | default="AzureLinux" enum="AzureLinux,Ubuntu,Windows2019,Windows2022" description="OS SKU"
        maxPods: integer | default=110 minimum=10 maximum=250 description="Maximum pods per node"

      # ========================================
      # Security Configuration
      # ========================================
      security:
        enableSecureBoot: boolean | default=true description="Enable secure boot for nodes"
        enableVTPM: boolean | default=true description="Enable vTPM for nodes"
        disableLocalAccounts: boolean | default=true description="Disable local Kubernetes accounts (AAD only)"
        disableRunCommand: boolean | default=true description="Disable kubectl run command access"
        enableDefender: boolean | default=true description="Enable Microsoft Defender for Containers"
        defenderWorkspaceResourceId: string | required=true description="Log Analytics workspace ARM ID for Defender"

      # ========================================
      # Workload Identity
      # ========================================
      workloadIdentity:
        enabled: boolean | default=true description="Enable workload identity federation"

      # ========================================
      # OIDC Issuer
      # ========================================
      oidcIssuer:
        enabled: boolean | default=true description="Enable OIDC issuer for workload identity"
        configMapKey: string | default="issuer-url" description="ConfigMap key for OIDC issuer URL"

      # ========================================
      # Auto Upgrade
      # ========================================
      autoUpgrade:
        upgradeChannel: string | default="stable" enum="none,patch,stable,rapid,node-image" description="Auto upgrade channel"
        nodeOSUpgradeChannel: string | default="NodeImage" enum="None,Unmanaged,SecurityPatch,NodeImage" description="Node OS upgrade channel"

      # ========================================
      # Storage Profile
      # ========================================
      storage:
        diskCSIDriverEnabled: boolean | default=true description="Enable Azure Disk CSI driver"
        fileCSIDriverEnabled: boolean | default=true description="Enable Azure File CSI driver"
        snapshotControllerEnabled: boolean | default=true description="Enable volume snapshot controller"

      # ========================================
      # Addons
      # ========================================
      addons:
        azureKeyvaultSecretsProvider:
          enabled: boolean | default=true description="Enable Azure Key Vault secrets provider"
          enableSecretRotation: string | default="true" enum="true,false" description="Enable secret rotation (string value)"
          rotationPollInterval: string | default="30m" description="Rotation poll interval (e.g., 30m, 1h)"
        azurePolicy:
          enabled: boolean | default=true description="Enable Azure Policy add-on"
          version: string | default="v2" enum="v1,v2" description="Azure Policy version"

      # ========================================
      # Workload Auto Scaler
      # ========================================
      workloadAutoScaler:
        keda:
          enabled: boolean | default=true description="Enable KEDA for event-driven autoscaling"
        verticalPodAutoscaler:
          enabled: boolean | default=true description="Enable Vertical Pod Autoscaler"

      # ========================================
      # Service Mesh (Istio)
      # ========================================
      serviceMesh:
        enabled: boolean | default=true description="Enable Istio service mesh"
        istioRevisions: '[]string | default=["asm-1-27"] description="Istio revisions to install"'
        internalIngressEnabled: boolean | default=true description="Enable internal ingress gateway"
        externalIngressEnabled: boolean | default=true description="Enable external ingress gateway"

      # ========================================
      # Monitoring and Metrics
      # ========================================
      azureMonitorProfile:
        metrics:
          enabled: boolean | default=true description="Enable Azure Monitor managed Prometheus metrics"

      # ========================================
      # SKU and Support
      # ========================================
      sku:
        name: string | default="Base" enum="Base,Premium" description="AKS SKU name"
        tier: string | default="Standard" enum="Free,Standard,Premium" description="AKS SKU tier (Standard recommended for production)"
      supportPlan: string | default="KubernetesOfficial" enum="KubernetesOfficial,AKSLongTermSupport" description="Support plan"

      # ========================================
      # Tags
      # ========================================
      tags: 'map[string]string | required=true description="Resource tags for cost tracking and organization"'

      # ========================================
      # Private Link Resources (Optional)
      # ========================================
      privateLinkResources: string | description="Private link resources ARM ID for private cluster connectivity (optional)"

      # ========================================
      # Flux GitOps Configuration
      # ========================================
      flux:
        core:
          url: string | default="" description="Git repository URL for core cluster configuration"
          branch: string | default="main" description="Git branch for core configuration"
        config:
          url: string | default="" description="Git repository URL for application configuration"
          branch: string | default="main" description="Git branch for application configuration"

      # ========================================
      # Environment Classification
      # ========================================
      environment: string | default="dev" enum="dev,staging,production" description="Environment classification for configuration management"

  # ========================================
  # Resources Created by this RGD
  # ========================================
  resources:
    # ----------------------------------------
    # Supporting Orchestrations
    # ----------------------------------------
    - id: jobs
      template:
        apiVersion: kro.run/v1alpha1
        kind: UK8Sjobs
        metadata:
          name: jobs-${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: post-deployment-jobs
        spec:
          clusterName: ${schema.spec.clusterName}
          resourceGroup: ${schema.spec.resourceGroup}
          subscriptionId: ${schema.spec.subscriptionId}
          targetNamespace: ${schema.spec.targetNamespace}
          # These will be populated by the jobs RGD if needed
          azureTenantId: ""
          azureMonitorWorkspaceResourceId: ""
          grafanaResourceId: ""
          asoClientId: ""

    - id: fluxGitOps
      template:
        apiVersion: kro.run/v1alpha1
        kind: UK8SFluxGitOps
        metadata:
          name: flux-${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: gitops
        spec:
          clusterName: ${schema.spec.clusterName}
          resourceGroup: ${schema.spec.resourceGroup}
          targetNamespace: ${schema.spec.targetNamespace}
          environment: ${schema.spec.environment}
          flux:
            core:
              url: ${schema.spec.flux.core.url}
              branch: ${schema.spec.flux.core.branch}
            config:
              url: ${schema.spec.flux.config.url}
              branch: ${schema.spec.flux.config.branch}

    # ----------------------------------------
    # Resource Group
    # ----------------------------------------
    - id: resourceGroup
      template:
        apiVersion: resources.azure.com/v1api20200601
        kind: ResourceGroup
        metadata:
          name: ${schema.spec.resourceGroup}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            environment: ${schema.spec.environment}
        spec:
          azureName: ${schema.spec.resourceGroup}
          location: ${schema.spec.location}
          tags: ${schema.spec.tags}

    # ----------------------------------------
    # AKS Managed Cluster
    # ----------------------------------------
    - id: managedCluster
      template:
        apiVersion: containerservice.azure.com/v1api20240402preview
        kind: ManagedCluster
        metadata:
          name: ${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            environment: ${schema.spec.environment}
        spec:
          azureName: ${schema.spec.clusterName}
          location: ${schema.spec.location}
          owner:
            name: ${schema.spec.resourceGroup}
          operatorSpec:
            configMaps:
              oidcIssuerProfile:
                name: oidc-${schema.spec.clusterName}
                key: ${schema.spec.oidcIssuer.configMapKey}
          dnsPrefix: ${schema.spec.clusterName}k8s
          kubernetesVersion: ${schema.spec.kubernetesVersion}
          linuxProfile:
            adminUsername: localadmin
            ssh:
              publicKeys:
                - keyData: ${schema.spec.sshPublicKey}
          nodeProvisioningProfile:
            mode: Auto
          identity:
            type: UserAssigned
            userAssignedIdentities:
              - reference:
                  armId: ${schema.spec.identity.controlPlaneIdentityResourceId}
          aadProfile:
            enableAzureRBAC: ${schema.spec.aad.enableAzureRBAC}
            managed: true
            adminGroupObjectIDs: ${schema.spec.aad.adminGroupObjectIds}
          enableRBAC: true
          disableLocalAccounts: ${schema.spec.security.disableLocalAccounts}
          networkProfile:
            networkPlugin: azure
            networkPluginMode: overlay
            networkPolicy: cilium
            networkDataplane: cilium
            serviceCidr: ${schema.spec.network.serviceCidr}
            dnsServiceIP: ${schema.spec.network.dnsServiceIP}
            podCidr: ${schema.spec.network.podCidr}
            ipFamilies: ["IPv4"]
            loadBalancerSku: standard
            outboundType: userDefinedRouting
          apiServerAccessProfile:
            enablePrivateCluster: true
            enablePrivateClusterPublicFQDN: true
            privateDNSZone: none
            disableRunCommand: ${schema.spec.security.disableRunCommand}
          agentPoolProfiles:
            - name: ${schema.spec.nodePool.name}
              vnetSubnetReference:
                armId: /subscriptions/${schema.spec.network.vnetSubscriptionId}/resourceGroups/${schema.spec.network.vnetResourceGroup}/providers/Microsoft.Network/virtualNetworks/${schema.spec.network.vnetName}/subnets/${schema.spec.network.subnetName}
              mode: System
              count: ${schema.spec.nodePool.count}
              enableAutoScaling: ${schema.spec.nodePool.enableAutoScaling}
              vmSize: ${schema.spec.nodePool.vmSize}
              availabilityZones: ${schema.spec.nodePool.availabilityZones}
              osDiskType: ${schema.spec.nodePool.osDiskType}
              osDiskSizeGB: ${schema.spec.nodePool.osDiskSizeGB}
              osType: Linux
              osSKU: ${schema.spec.nodePool.osSKU}
              maxPods: ${schema.spec.nodePool.maxPods}
              enableNodePublicIP: false
              enableEncryptionAtHost: false
              securityProfile:
                enableSecureBoot: ${schema.spec.security.enableSecureBoot}
                enableVTPM: ${schema.spec.security.enableVTPM}
                sshAccess: Disabled
          identityProfile:
            kubeletidentity:
              clientId: ${schema.spec.identity.kubeletIdentityClientId}
              objectId: ${schema.spec.identity.kubeletIdentityObjectId}
              resourceReference:
                armId: ${schema.spec.identity.kubeletIdentityResourceId}
          autoUpgradeProfile:
            upgradeChannel: ${schema.spec.autoUpgrade.upgradeChannel}
            nodeOSUpgradeChannel: ${schema.spec.autoUpgrade.nodeOSUpgradeChannel}
          securityProfile:
            defender:
              logAnalyticsWorkspaceResourceReference:
                armId: ${schema.spec.security.defenderWorkspaceResourceId}
              securityMonitoring:
                enabled: ${schema.spec.security.enableDefender}
            workloadIdentity:
              enabled: ${schema.spec.workloadIdentity.enabled}
            imageCleaner:
              enabled: false
              intervalHours: 48
          storageProfile:
            diskCSIDriver:
              enabled: ${schema.spec.storage.diskCSIDriverEnabled}
            fileCSIDriver:
              enabled: ${schema.spec.storage.fileCSIDriverEnabled}
            snapshotController:
              enabled: ${schema.spec.storage.snapshotControllerEnabled}
          addonProfiles:
            azureKeyvaultSecretsProvider:
              enabled: ${schema.spec.addons.azureKeyvaultSecretsProvider.enabled}
              config:
                enableSecretRotation: ${schema.spec.addons.azureKeyvaultSecretsProvider.enableSecretRotation}
                rotationPollInterval: ${schema.spec.addons.azureKeyvaultSecretsProvider.rotationPollInterval}
            azurepolicy:
              enabled: ${schema.spec.addons.azurePolicy.enabled}
              config:
                version: ${schema.spec.addons.azurePolicy.version}
          sku:
            name: ${schema.spec.sku.name}
            tier: ${schema.spec.sku.tier}
          supportPlan: ${schema.spec.supportPlan}
          oidcIssuerProfile:
            enabled: ${schema.spec.oidcIssuer.enabled}
          serviceMeshProfile:
            mode: Istio
            istio:
              components:
                ingressGateways:
                  - enabled: ${schema.spec.serviceMesh.internalIngressEnabled}
                    mode: Internal
                  - enabled: ${schema.spec.serviceMesh.externalIngressEnabled}
                    mode: External
              revisions: ${schema.spec.serviceMesh.istioRevisions}
          podIdentityProfile:
            enabled: false
            userAssignedIdentityExceptions:
              - name: k8s-control-plane-exception
                namespace: kube-system
                podLabels:
                  kubernetes.azure.com/managedby: aks
              - name: ubs-control-plane-exception
                namespace: ubs-system
                podLabels:
                  kubernetes.azure.com/managedby: aks
          nodeResourceGroup: MC_${schema.spec.resourceGroup}_${schema.spec.clusterName}_${schema.spec.location}
          servicePrincipalProfile:
            clientId: msi
          tags: ${schema.spec.tags}
          azureMonitorProfile:
            metrics:
              enabled: ${schema.spec.azureMonitorProfile.metrics.enabled}
              kubeStateMetrics:
                metricLabelsAllowlist: "namespaces=[owner, swID]"

    # ----------------------------------------
    # User-Assigned Managed Identities
    # ----------------------------------------
    - id: externalSecretsIdentity
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: UserAssignedIdentity
        metadata:
          name: uami-${schema.spec.clusterName}-externalsecrets
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: external-secrets-identity
        spec:
          azureName: uami-${schema.spec.clusterName}-externalsecrets
          location: ${schema.spec.location}
          owner:
            name: ${schema.spec.resourceGroup}
          operatorSpec:
            configMaps:
              clientId:
                name: eso-identity-cm-${schema.spec.clusterName}
                key: clientId
              principalId:
                name: eso-identity-cm-${schema.spec.clusterName}
                key: principalId
              tenantId:
                name: eso-identity-cm-${schema.spec.clusterName}
                key: tenantId

    - id: externalDnsIdentity
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: UserAssignedIdentity
        metadata:
          name: uami-${schema.spec.clusterName}-externaldns
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: external-dns-identity
        spec:
          azureName: uami-${schema.spec.clusterName}-externaldns
          location: ${schema.spec.location}
          owner:
            name: ${schema.spec.resourceGroup}
          operatorSpec:
            configMaps:
              clientId:
                name: external-dns-identity-cm-${schema.spec.clusterName}
                key: clientId
              principalId:
                name: external-dns-identity-cm-${schema.spec.clusterName}
                key: principalId
              tenantId:
                name: external-dns-identity-cm-${schema.spec.clusterName}
                key: tenantId

    - id: certManagerIdentity
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: UserAssignedIdentity
        metadata:
          name: uami-${schema.spec.clusterName}-certmanager
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: cert-manager-identity
        spec:
          azureName: uami-${schema.spec.clusterName}-certmanager
          location: ${schema.spec.location}
          owner:
            name: ${schema.spec.resourceGroup}
          operatorSpec:
            configMaps:
              clientId:
                name: cert-manager-identity-cm-${schema.spec.clusterName}
                key: clientId
              principalId:
                name: cert-manager-identity-cm-${schema.spec.clusterName}
                key: principalId
              tenantId:
                name: cert-manager-identity-cm-${schema.spec.clusterName}
                key: tenantId

    # ----------------------------------------
    # Federated Identity Credentials
    # ----------------------------------------
    - id: externalSecretsFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: externalsecrets-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: external-secrets-fedcred
        spec:
          azureName: federated_workload_identity_eso_${schema.spec.clusterName}
          owner:
            name: uami-${schema.spec.clusterName}-externalsecrets
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:external-secrets:external-secrets

    - id: externalDnsFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: externaldns-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: external-dns-fedcred
        spec:
          azureName: federated_workload_identity_extdns_${schema.spec.clusterName}
          owner:
            name: uami-${schema.spec.clusterName}-externaldns
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:external-dns:extdns-workload-identity-sa

    - id: externalDnsBcmFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: externaldnsbcm-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: external-dns-bcm-fedcred
        spec:
          azureName: federated_workload_identity_external_dns_bcm_${schema.spec.clusterName}
          owner:
            name: uami-${schema.spec.clusterName}-externaldns
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:external-dns-bcm:extdns-workload-identity-sa

    - id: certManagerFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: certmanager-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: cert-manager-fedcred
        spec:
          azureName: federated_workload_identity_certmgr_${schema.spec.clusterName}
          owner:
            name: uami-${schema.spec.clusterName}-certmanager
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:ubs-issuer-system:cert-manager

    # NOTE: Flux federated credentials reference external management identities
    # These should be created separately or parameterized
    - id: fluxSourceFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: fluxsource-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: flux-source-fedcred
          annotations:
            kro.run/note: "References external management identity - ensure it exists"
        spec:
          azureName: federated_workload_identity_flux_src_${schema.spec.clusterName}
          owner:
            # TODO: Parameterize this external identity reference
            armId: /subscriptions/${schema.spec.subscriptionId}/resourcegroups/eng-management-cluster/providers/Microsoft.ManagedIdentity/userAssignedIdentities/uami-weu-at39473-flux-mi4-dev
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:flux-system:source-controller

    - id: fluxImageFederatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: fluximage-fic-${schema.spec.clusterName}
          namespace: ${schema.spec.targetNamespace}
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: flux-image-fedcred
          annotations:
            kro.run/note: "References external management identity - ensure it exists"
        spec:
          azureName: federated_workload_identity_flux_img_${schema.spec.clusterName}
          owner:
            # TODO: Parameterize this external identity reference
            armId: /subscriptions/${schema.spec.subscriptionId}/resourcegroups/eng-management-cluster/providers/Microsoft.ManagedIdentity/userAssignedIdentities/uami-weu-at39473-flux-mi4-dev
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: oidc-${schema.spec.clusterName}
            key: ${schema.spec.oidcIssuer.configMapKey}
          subject: system:serviceaccount:flux-system:image-automation-controller

    # ----------------------------------------
    # Certification Workflow Resources
    # ----------------------------------------
    # Note: All validations now use bash scripts with bitnami/kubectl:latest
    # This simplifies the workflow and removes the need for Python dependencies

    - id: certificationWorkflow
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: WorkflowTemplate
        metadata:
          name: certify-${schema.spec.clusterName}
          namespace: argo
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: certification
            environment: ${schema.spec.environment}
          annotations:
            kro.run/description: "Automated certification workflow for UK8S cluster ${schema.spec.clusterName}"
            kro.run/version: "1.0.0"
        spec:
          entrypoint: certify-cluster
          serviceAccountName: argo-workflow-executor

          # Pre-configure parameters with cluster-specific values
          arguments:
            parameters:
              - name: clusterName
                value: ${schema.spec.clusterName}
              - name: resourceGroup
                value: ${schema.spec.resourceGroup}
              - name: targetNamespace
                value: ${schema.spec.targetNamespace}
              - name: instanceName
                value: ${schema.metadata.name}
              - name: subscriptionId
                value: ${schema.spec.subscriptionId}
              - name: environment
                value: ${schema.spec.environment}
              - name: certification-timeout
                value: "1800"

          onExit: generate-final-report

          templates:
            # Main certification DAG
            - name: certify-cluster
              dag:
                tasks:
                  - name: validate-config
                    template: validate-configuration

                  - name: validate-kro
                    template: validate-kro-resources
                    dependencies: [validate-config]

                  - name: validate-aso
                    template: validate-aso-resources
                    dependencies: [validate-kro]

                  - name: validate-flux
                    template: validate-flux-gitops
                    dependencies: [validate-aso]

                  - name: validate-connectivity
                    template: validate-cluster-connectivity
                    dependencies: [validate-aso]

                  - name: validate-security
                    template: validate-security-compliance
                    dependencies: [validate-connectivity]

                  - name: aggregate-results
                    template: aggregate-certification
                    dependencies: [validate-kro, validate-aso, validate-flux, validate-connectivity, validate-security]

            # Configuration validation
            - name: validate-configuration
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Configuration Validation ==="
                  kubectl get uk8scluster {{workflow.parameters.instanceName}} \
                    -n {{workflow.parameters.targetNamespace}} -o yaml > /tmp/instance.yaml
                  echo "✓ Instance YAML retrieved"
                  VERSION=$(kubectl get uk8scluster {{workflow.parameters.instanceName}} \
                    -n {{workflow.parameters.targetNamespace}} \
                    -o jsonpath='{.spec.kubernetesVersion}')
                  echo "✓ Kubernetes version: $VERSION"
                  echo "✅ Configuration validation complete"

            # KRO validation
            - name: validate-kro-resources
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== KRO Resource Validation ==="
                  NAMESPACE="{{workflow.parameters.targetNamespace}}"
                  INSTANCE="{{workflow.parameters.instanceName}}"
                  PASSED=0
                  FAILED=0

                  # Check ResourceGraphDefinitions
                  for rgd in uk8scluster.kro.run uk8sjobs.kro.run uk8sfluxgitops.kro.run; do
                    if kubectl get resourcegraphdefinition $rgd &>/dev/null; then
                      STATE=$(kubectl get resourcegraphdefinition $rgd -o jsonpath='{.status.state}')
                      if [[ "$STATE" == "Active" ]]; then
                        echo "✓ $rgd is Active"
                        PASSED=$((PASSED+1))
                      else
                        echo "✗ $rgd not Active (state: $STATE)"
                        FAILED=$((FAILED+1))
                      fi
                    else
                      echo "✗ $rgd not found"
                      FAILED=$((FAILED+1))
                    fi
                  done

                  # Check UK8SCluster instance
                  if kubectl get uk8scluster $INSTANCE -n $NAMESPACE &>/dev/null; then
                    echo "✓ UK8SCluster instance exists"
                    PASSED=$((PASSED+1))

                    STATE=$(kubectl get uk8scluster $INSTANCE -n $NAMESPACE -o jsonpath='{.status.state}')
                    if [[ "$STATE" == "ACTIVE" ]]; then
                      echo "✓ Instance state is ACTIVE"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ Instance state is $STATE"
                      FAILED=$((FAILED+1))
                    fi

                    READY=$(kubectl get uk8scluster $INSTANCE -n $NAMESPACE -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                    if [[ "$READY" == "True" ]]; then
                      echo "✓ Instance Ready condition is True"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ Instance Ready condition is $READY"
                      FAILED=$((FAILED+1))
                    fi
                  else
                    echo "✗ UK8SCluster instance not found"
                    FAILED=$((FAILED+3))
                  fi

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ KRO validation complete"

            # ASO validation
            - name: validate-aso-resources
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== ASO Resource Validation ==="
                  NAMESPACE="{{workflow.parameters.targetNamespace}}"
                  PASSED=0
                  FAILED=0

                  # Check ResourceGroup
                  if kubectl get resourcegroup {{workflow.parameters.resourceGroup}} -n $NAMESPACE &>/dev/null; then
                    RG_READY=$(kubectl get resourcegroup {{workflow.parameters.resourceGroup}} -n $NAMESPACE \
                      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                    if [[ "$RG_READY" == "True" ]]; then
                      echo "✓ ResourceGroup is ready"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ ResourceGroup not ready"
                      FAILED=$((FAILED+1))
                    fi
                  fi

                  # Check ManagedCluster
                  if kubectl get managedcluster {{workflow.parameters.clusterName}} -n $NAMESPACE &>/dev/null; then
                    MC_READY=$(kubectl get managedcluster {{workflow.parameters.clusterName}} -n $NAMESPACE \
                      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                    if [[ "$MC_READY" == "True" ]]; then
                      echo "✓ ManagedCluster is ready"
                      PASSED=$((PASSED+1))
                    else
                      echo "✗ ManagedCluster not ready"
                      FAILED=$((FAILED+1))
                    fi
                  fi

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ ASO validation complete"

            # Flux validation
            - name: validate-flux-gitops
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Flux GitOps Validation ==="
                  PASSED=0
                  FAILED=0

                  if kubectl get namespace flux-system &>/dev/null; then
                    echo "✓ flux-system namespace exists"
                    PASSED=$((PASSED+1))
                  else
                    echo "✗ flux-system namespace not found"
                    FAILED=$((FAILED+1))
                  fi

                  for controller in source-controller kustomize-controller helm-controller; do
                    if kubectl get deployment $controller -n flux-system &>/dev/null; then
                      READY=$(kubectl get deployment $controller -n flux-system \
                        -o jsonpath='{.status.conditions[?(@.type=="Available")].status}')
                      if [[ "$READY" == "True" ]]; then
                        echo "✓ $controller is ready"
                        PASSED=$((PASSED+1))
                      else
                        echo "✗ $controller not ready"
                        FAILED=$((FAILED+1))
                      fi
                    fi
                  done

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ Flux validation complete"

            # Connectivity validation
            - name: validate-cluster-connectivity
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Cluster Connectivity Validation ==="
                  PASSED=0
                  FAILED=0

                  if kubectl cluster-info &>/dev/null; then
                    echo "✓ API server is accessible"
                    PASSED=$((PASSED+1))
                  else
                    echo "✗ Cannot connect to API server"
                    FAILED=$((FAILED+1))
                    exit 1
                  fi

                  TOTAL_NODES=$(kubectl get nodes --no-headers 2>/dev/null | wc -l)
                  READY_NODES=$(kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready" || true)
                  echo "Nodes: $READY_NODES/$TOTAL_NODES ready"

                  if [[ $READY_NODES -eq $TOTAL_NODES ]] && [[ $TOTAL_NODES -gt 0 ]]; then
                    echo "✓ All nodes are ready"
                    PASSED=$((PASSED+1))
                  else
                    echo "✗ Some nodes are not ready"
                    FAILED=$((FAILED+1))
                  fi

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ Connectivity validation complete"

            # Security validation
            - name: validate-security-compliance
              script:
                image: bitnami/kubectl:latest
                command: [bash]
                source: |
                  set -e
                  echo "=== Security & Compliance Validation ==="
                  PASSED=0
                  FAILED=0

                  WI_SA=$(kubectl get serviceaccount -A \
                    -o json | jq -r '.items[] | select(.metadata.annotations["azure.workload.identity/client-id"]) | .metadata.name' | wc -l)
                  echo "Found $WI_SA service accounts with workload identity"
                  if [[ $WI_SA -gt 0 ]]; then
                    PASSED=$((PASSED+1))
                  fi

                  if kubectl get pods -n kube-system -l app=azure-policy &>/dev/null; then
                    echo "✓ Azure Policy addon found"
                    PASSED=$((PASSED+1))
                  fi

                  echo "Summary: $PASSED passed, $FAILED failed"
                  echo "✅ Security validation complete"

            # Aggregate results
            - name: aggregate-certification
              script:
                image: python:3.9-slim
                command: [python]
                source: |
                  import json
                  from datetime import datetime

                  report = {
                    "cluster": "{{workflow.parameters.clusterName}}",
                    "namespace": "{{workflow.parameters.targetNamespace}}",
                    "environment": "{{workflow.parameters.environment}}",
                    "timestamp": datetime.utcnow().isoformat() + "Z",
                    "workflow": "{{workflow.name}}",
                    "certification": {
                      "status": "CERTIFIED",
                      "workflow_name": "certify-{{workflow.parameters.clusterName}}"
                    }
                  }

                  print("=" * 60)
                  print("UK8S CLUSTER CERTIFICATION REPORT")
                  print("=" * 60)
                  print(json.dumps(report, indent=2))
                  print("=" * 60)
                  print("✅ CLUSTER CERTIFICATION COMPLETE")
                  print("=" * 60)

                  with open('/tmp/certification-report.json', 'w') as f:
                      json.dump(report, f, indent=2)
              outputs:
                artifacts:
                  - name: certification-report
                    path: /tmp/certification-report.json

            # Exit handler
            - name: generate-final-report
              container:
                image: alpine:latest
                command: [sh, -c]
                args:
                  - |
                    echo "======================================"
                    echo "Certification Complete"
                    echo "======================================"
                    echo "Cluster: {{workflow.parameters.clusterName}}"
                    echo "Status: {{workflow.status}}"
                    echo "Environment: {{workflow.parameters.environment}}"
                    echo "======================================"

    - id: certificationSchedule
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: CronWorkflow
        metadata:
          name: weekly-cert-${schema.spec.clusterName}
          namespace: argo
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: certification-schedule
            environment: ${schema.spec.environment}
          annotations:
            kro.run/description: "Weekly automated certification for ${schema.spec.clusterName}"
        spec:
          schedule: "0 2 * * 0"  # Every Sunday at 2 AM
          timezone: "UTC"
          suspend: true  # Start suspended, enable manually when ready
          workflowSpec:
            workflowTemplateRef:
              name: certify-${schema.spec.clusterName}

    # ----------------------------------------
    # Job to Automatically Trigger Initial Certification
    # ----------------------------------------
    - id: certificationTrigger
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: trigger-cert-${schema.spec.clusterName}
          namespace: argo
          labels:
            kro.run/cluster: ${schema.spec.clusterName}
            kro.run/component: certification-trigger
            environment: ${schema.spec.environment}
          annotations:
            kro.run/description: "Triggers initial certification for ${schema.spec.clusterName}"
        spec:
          ttlSecondsAfterFinished: 300  # Clean up after 5 minutes
          backoffLimit: 3
          template:
            metadata:
              labels:
                kro.run/cluster: ${schema.spec.clusterName}
            spec:
              serviceAccountName: argo-workflow-executor
              restartPolicy: OnFailure
              containers:
                - name: trigger-certification
                  image: bitnami/kubectl:latest
                  command: [bash, -c]
                  args:
                    - |
                      set -e
                      echo "Waiting for WorkflowTemplate to be ready..."

                      # Wait for WorkflowTemplate to exist
                      for i in $(seq 1 30); do
                        if kubectl get workflowtemplate certify-${schema.spec.clusterName} -n argo &>/dev/null; then
                          echo "✓ WorkflowTemplate found"
                          break
                        fi
                        echo "Waiting for WorkflowTemplate... ($i/30)"
                        sleep 10
                      done

                      # Wait for UK8SCluster to be ACTIVE
                      echo "Waiting for UK8SCluster to be ACTIVE..."
                      for i in $(seq 1 60); do
                        STATE=$(kubectl get uk8scluster ${schema.metadata.name} -n ${schema.spec.targetNamespace} -o jsonpath='{.status.state}' 2>/dev/null || echo "")
                        if [[ "$STATE" == "ACTIVE" ]]; then
                          echo "✓ UK8SCluster is ACTIVE"
                          break
                        fi
                        echo "Current state: $STATE (waiting... $i/60)"
                        sleep 30
                      done

                      # Submit certification workflow by creating Workflow resource
                      echo "Submitting certification workflow..."
                      cat <<EOF | kubectl create -f -
                      apiVersion: argoproj.io/v1alpha1
                      kind: Workflow
                      metadata:
                        generateName: certify-${schema.spec.clusterName}-auto-
                        namespace: argo
                        labels:
                          kro.run/cluster: ${schema.spec.clusterName}
                          kro.run/trigger: automatic
                      spec:
                        workflowTemplateRef:
                          name: certify-${schema.spec.clusterName}
                      EOF

                      echo "✅ Certification workflow submitted successfully"
