---
# ResourceGraphDefinition for LiteLLM Proxy Deployment
# Deploys LiteLLM as a proxy between OpenWebUI and Azure OpenAI
# with MCP server integration for AI-assisted Kubernetes operations
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: uk8slitellm.kro.run
  labels:
    kro.run/type: infrastructure
    kro.run/category: ai-proxy
spec:
  schema:
    apiVersion: v1alpha1
    kind: UK8sLiteLLM
    spec:
      # Azure OpenAI Configuration
      clientId: string | required=true
      azureOpenAIEndpoint: string | required=true
      azureOpenAIDeployment: string | default="gpt-4o-mini"
      azureOpenAIApiVersion: string | default="2024-10-21"

      # Workload Identity Configuration
      identityName: string | required=true
      identityNamespace: string | default="azure-system"
      oidcConfigMapName: string | default="aks-oidc-config"
      oidcConfigMapKey: string | default="issuer-url"

      # LiteLLM Configuration
      namespace: string | default="litellm"
      replicas: integer | default=2 minimum=1 maximum=10
      imageTag: string | default="v1.55.1-stable"
      masterKeySecretName: string | default="litellm-master-key"

      # MCP Server Integration
      mcpServers: string | default=""
      mcpAliases: string | default=""

      # Resource Configuration
      cpuRequest: string | default="100m"
      cpuLimit: string | default="1000m"
      memoryRequest: string | default="256Mi"
      memoryLimit: string | default="1Gi"

      # Networking
      domain: string | default=""
      port: integer | default=4000

      # Logging
      logLevel: string | default="INFO"

  resources:
    - id: litellmNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}
          labels:
            kro.run/component: litellm-namespace
            istio-injection: enabled

    - id: serviceAccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: litellm
          namespace: ${schema.spec.namespace}
          labels:
            azure.workload.identity/use: "true"
          annotations:
            azure.workload.identity/client-id: ${schema.spec.clientId}

    - id: federatedCredential
      template:
        apiVersion: managedidentity.azure.com/v1api20230131
        kind: FederatedIdentityCredential
        metadata:
          name: litellm-fedcred
          namespace: ${schema.spec.identityNamespace}
          labels:
            kro.run/component: litellm-fedcred
        spec:
          azureName: federated_workload_identity_litellm
          owner:
            name: ${schema.spec.identityName}
          audiences:
            - api://AzureADTokenExchange
          issuerFromConfig:
            name: ${schema.spec.oidcConfigMapName}
            key: ${schema.spec.oidcConfigMapKey}
          subject: system:serviceaccount:${schema.spec.namespace}:litellm

    - id: configMap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: litellm-config
          namespace: ${schema.spec.namespace}
        data:
          config.yaml: |
            model_list:
              - model_name: ${schema.spec.azureOpenAIDeployment}
                litellm_params:
                  model: azure/${schema.spec.azureOpenAIDeployment}
                  api_base: ${schema.spec.azureOpenAIEndpoint}
                  api_version: "${schema.spec.azureOpenAIApiVersion}"
                  azure_ad_token: os.environ/AZURE_FEDERATED_TOKEN_FILE

              # Add GPT-4 alias for compatibility
              - model_name: gpt-4
                litellm_params:
                  model: azure/${schema.spec.azureOpenAIDeployment}
                  api_base: ${schema.spec.azureOpenAIEndpoint}
                  api_version: "${schema.spec.azureOpenAIApiVersion}"
                  azure_ad_token: os.environ/AZURE_FEDERATED_TOKEN_FILE

            litellm_settings:
              enable_azure_ad_token_refresh: true
              drop_params: true
              set_verbose: false
              request_timeout: 600

            general_settings:
              master_key: os.environ/LITELLM_MASTER_KEY

    - id: mcpConfigMap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: litellm-mcp-config
          namespace: ${schema.spec.namespace}
        data:
          MCP_SERVERS: ${schema.spec.mcpServers}
          MCP_ALIASES: ${schema.spec.mcpAliases}
          # Example: MCP_SERVERS=aks_mcp:http://aks-mcp.aks-mcp:8000/mcp
          # Example: MCP_ALIASES=aks:aks_mcp,k8s:aks_mcp,kubectl:aks_mcp

    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: litellm
          namespace: ${schema.spec.namespace}
          labels:
            app: litellm
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: litellm
          template:
            metadata:
              labels:
                app: litellm
                azure.workload.identity/use: "true"
            spec:
              serviceAccountName: litellm
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
              containers:
                - name: litellm
                  image: ghcr.io/berriai/litellm:${schema.spec.imageTag}
                  imagePullPolicy: IfNotPresent
                  args:
                    - --config
                    - /app/config.yaml
                    - --port
                    - "${schema.spec.port}"
                    - --detailed_debug
                  env:
                    - name: AZURE_CLIENT_ID
                      value: ${schema.spec.clientId}
                    - name: LITELLM_MASTER_KEY
                      valueFrom:
                        secretKeyRef:
                          name: ${schema.spec.masterKeySecretName}
                          key: master-key
                    - name: LITELLM_LOG
                      value: ${schema.spec.logLevel}
                  envFrom:
                    - configMapRef:
                        name: litellm-mcp-config
                  ports:
                    - name: http
                      containerPort: ${schema.spec.port}
                      protocol: TCP
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: false
                    runAsNonRoot: true
                    capabilities:
                      drop:
                        - ALL
                  resources:
                    requests:
                      cpu: ${schema.spec.cpuRequest}
                      memory: ${schema.spec.memoryRequest}
                    limits:
                      cpu: ${schema.spec.cpuLimit}
                      memory: ${schema.spec.memoryLimit}
                  livenessProbe:
                    httpGet:
                      path: /health/liveliness
                      port: ${schema.spec.port}
                    initialDelaySeconds: 30
                    periodSeconds: 30
                    timeoutSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /health/readiness
                      port: ${schema.spec.port}
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    timeoutSeconds: 5
                  volumeMounts:
                    - name: config
                      mountPath: /app/config.yaml
                      subPath: config.yaml
                    - name: tmp
                      mountPath: /tmp
              volumes:
                - name: config
                  configMap:
                    name: litellm-config
                - name: tmp
                  emptyDir: {}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: litellm
          namespace: ${schema.spec.namespace}
          labels:
            app: litellm
        spec:
          type: ClusterIP
          ports:
            - name: http
              port: ${schema.spec.port}
              targetPort: http
              protocol: TCP
          selector:
            app: litellm

    - id: pdb
      template:
        apiVersion: policy/v1
        kind: PodDisruptionBudget
        metadata:
          name: litellm
          namespace: ${schema.spec.namespace}
        spec:
          minAvailable: 1
          selector:
            matchLabels:
              app: litellm

    - id: hpa
      template:
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        metadata:
          name: litellm
          namespace: ${schema.spec.namespace}
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: litellm
          minReplicas: ${schema.spec.replicas}
          maxReplicas: 10
          metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 80
            - type: Resource
              resource:
                name: memory
                target:
                  type: Utilization
                  averageUtilization: 80
