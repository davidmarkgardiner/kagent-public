---
# Example UK8S Cluster Instance - Development Environment
# Based on tested working configuration from kro-aks-cluster
# This creates a complete AKS cluster with all supporting infrastructure
apiVersion: kro.run/v1alpha1
kind: UK8SCluster
metadata:
  name: example-cluster-prod
  namespace: uk8s-nextgen
  labels:
    environment: dev
    team: AKSEngineering
    cost-center: BT-TS-INFRA
    project: uk8s
  annotations:
    kro.run/description: "Development cluster based on tested working configuration"
spec:
  # ========================================
  # Cluster Identity
  # ========================================
  clusterName: "example-cluster-prod"
  location: "uksouth"
  subscriptionId: "{{AZURE_SUBSCRIPTION_ID}}"

  # ========================================
  # Resource Group
  # ========================================
  resourceGroup: "example-rg"

  # ========================================
  # Kubernetes Configuration
  # ========================================
  kubernetesVersion: "1.32"
  environment: "dev"

  # ========================================
  # SSH Configuration
  # ========================================
  sshPublicKey: "ssh-rsa "

  # ========================================
  # Network Configuration
  # ========================================
  network:
    vnetSubscriptionId: "{{AZURE_SUBSCRIPTION_ID}}"
    vnetResourceGroup: "aks-cluster"
    vnetName: "aks-vnet"
    subnetName: "aks-subnet"
    serviceCidr: "10.251.0.0/17"
    dnsServiceIP: "10.251.0.10"
    podCidr: "10.251.128.0/17"

  # ========================================
  # Identity Configuration
  # ========================================
  identity:
    controlPlaneIdentityResourceId: "/subscriptions/{{AZURE_SUBSCRIPTION_ID}}/resourceGroups/rg-my-aks-cluster/providers/Microsoft.ManagedIdentity/userAssignedIdentities/my-aks-cluster-control-plane-identity"
    kubeletIdentityClientId: "{{AZURE_SUBSCRIPTION_ID}}"
    kubeletIdentityObjectId: "{{AZURE_SUBSCRIPTION_ID}}"
    kubeletIdentityResourceId: "/subscriptions/{{AZURE_SUBSCRIPTION_ID}}/resourceGroups/rg-my-aks-cluster/providers/Microsoft.ManagedIdentity/userAssignedIdentities/my-aks-cluster-kubelet-identity"
    fluxClientId: "{{AZURE_SUBSCRIPTION_ID}}"  # Using kubelet identity for flux

  # ========================================
  # AAD Configuration
  # ========================================
  aad:
    enableAzureRBAC: true
    adminGroupObjectIds:
      - "{{AZURE_SUBSCRIPTION_ID}}"

  # ========================================
  # Node Pool Configuration (Development)
  # ========================================
  nodePool:
    name: "systempool"  # Changed from sysnpl to match tested config
    vmSize: "Standard_B8ms"  # Dev/Test size
    count: 1
    enableAutoScaling: false
    availabilityZones: ["1"]
    osDiskType: "Managed"
    osDiskSizeGB: 128
    osSKU: "AzureLinux"
    maxPods: 110

  # ========================================
  # Security Configuration
  # ========================================
  security:
    enableSecureBoot: true
    enableVTPM: true
    disableLocalAccounts: false  # Allow local accounts for dev (matches tested config)
    disableRunCommand: true
    enableDefender: true
    defenderWorkspaceResourceId: "/subscriptions/{{AZURE_SUBSCRIPTION_ID}}/resourceGroups/aks-cluster/providers/Microsoft.OperationalInsights/workspaces/test-workspace"

  # ========================================
  # Workload Identity
  # ========================================
  workloadIdentity:
    enabled: true

  # ========================================
  # OIDC Issuer
  # ========================================
  oidcIssuer:
    enabled: true
    configMapKey: "issuer-url"

  # ========================================
  # Auto Upgrade
  # ========================================
  autoUpgrade:
    upgradeChannel: "stable"
    nodeOSUpgradeChannel: "NodeImage"

  # ========================================
  # Storage Profile
  # ========================================
  storage:
    diskCSIDriverEnabled: true
    fileCSIDriverEnabled: true
    snapshotControllerEnabled: true

  # ========================================
  # Addons
  # ========================================
  addons:
    azureKeyvaultSecretsProvider:
      enabled: true
      enableSecretRotation: "true"
      rotationPollInterval: "30m"
    azurePolicy:
      enabled: true
      version: "v2"

  # ========================================
  # Workload Auto Scaler
  # ========================================
  workloadAutoScaler:
    keda:
      enabled: true
    verticalPodAutoscaler:
      enabled: true

  # ========================================
  # Service Mesh
  # ========================================
  serviceMesh:
    enabled: true
    istioRevisions: ["asm-1-27"]
    internalIngressEnabled: true
    externalIngressEnabled: true

  # ========================================
  # Monitoring
  # ========================================
  azureMonitorProfile:
    metrics:
      enabled: true

  # ========================================
  # SKU and Support
  # ========================================
  sku:
    name: "Base"
    tier: "Standard"
  supportPlan: "KubernetesOfficial"

  # ========================================
  # Tags (from tested configuration)
  # ========================================
  tags:
    environment: dev
    project: uk8s
    costCenter: BT-TS-INFRA
    managedBy: flux-system
    billingReference: BT-TS-INFRA
    opEnvironment: EV
    cmdbReference: DEV01
    Owner: DavidGardiner
    Status: InUse
    Team: AKSEngineering
    DeployedBy: AzureServiceOperator

  # ========================================
  # Flux GitOps Configuration
  # ========================================
  flux:
    core:
      url: "https://dev.azure.com/your-org/uk8s-core/_git/uk8s-core"
      branch: "jf/feat/kroAsoBuild"  # Using tested branch
    config:
      url: "https://dev.azure.com/your-org/uk8s-config/_git/uk8s-config"
      branch: "main"
