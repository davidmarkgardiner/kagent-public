apiVersion: kyverno.io/v2
kind: ClusterPolicy
metadata:
  name: validate-modelconfig-via-litellm
  labels:
    app.kubernetes.io/part-of: byo-kagent
  annotations:
    policies.kyverno.io/title: "Validate ModelConfig Routes via LiteLLM"
    policies.kyverno.io/category: "BYO-KAgent Cost Control"
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Every ModelConfig used by tenant agents must route through the shared LiteLLM
      proxy for cost attribution and rate limiting. BYO model is permitted only if
      the ModelConfig carries annotation platform.kagent.dev/byo-model-approved=true
      (set by platform team). Exempt: kagent-platform namespace (orchestrator).
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-litellm-base-url
      match:
        any:
          - resources:
              kinds:
                - ModelConfig
              apiGroups:
                - kagent.dev
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              namespaces:
                - kagent-platform
                - kagent-shared
          - resources:
              annotations:
                platform.kagent.dev/byo-model-approved: "true"
      validate:
        message: >-
          ModelConfig '{{ request.object.metadata.name }}' must use the shared LiteLLM
          proxy (http://litellm.litellm.svc.cluster.local:4000/v1) for cost attribution.
          For a custom model endpoint, get platform team approval and add annotation
          platform.kagent.dev/byo-model-approved=true before submitting.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.openAI.baseUrl || '' }}"
                operator: NotEquals
                value: "http://litellm.litellm.svc.cluster.local:4000/v1"
              - key: "{{ request.object.spec.anthropic.baseUrl || '' }}"
                operator: NotEquals
                value: ""

    - name: require-team-label-on-modelconfig
      match:
        any:
          - resources:
              kinds:
                - ModelConfig
              apiGroups:
                - kagent.dev
              operations:
                - CREATE
      exclude:
        any:
          - resources:
              namespaces:
                - kagent-platform
                - kagent-shared
      validate:
        message: >-
          ModelConfig '{{ request.object.metadata.name }}' must carry label 'team'
          for cost attribution in LiteLLM spend reports.
        pattern:
          metadata:
            labels:
              team: "?*"
