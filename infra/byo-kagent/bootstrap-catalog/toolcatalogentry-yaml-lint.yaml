apiVersion: platform.kagent.dev/v1alpha1
kind: ToolCatalogEntry
metadata:
  name: yaml-lint-mcp-v1
  labels:
    app.kubernetes.io/part-of: byo-kagent
    platform.kagent.dev/bootstrap: "true"
  annotations:
    platform.kagent.dev/bootstrap-note: "Bootstrap catalog entry — orchestrator-internal tool, not available to tenants."
    platform.kagent.dev/orchestrator-only: "true"
spec:
  name: yaml-lint-mcp
  version: v1.0
  description: "YAML linting and kubeval/kubeconform schema validation — validates generated Kubernetes manifests before PR submission."
  source:
    url: http://yaml-lint-mcp.kagent-platform.svc.cluster.local:8000/mcp
    protocol: STREAMABLE_HTTP
  maintainer: "platform-team"
  tags:
    - lint
    - validation
    - orchestrator-internal
