apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: toolcatalogentries.platform.kagent.dev
  labels:
    app.kubernetes.io/part-of: byo-kagent
    app.kubernetes.io/managed-by: platform-team
  annotations:
    kro.run/description: "Cluster-scoped registry of verified MCP tool servers available for BYO agents"
spec:
  group: platform.kagent.dev
  names:
    kind: ToolCatalogEntry
    listKind: ToolCatalogEntryList
    plural: toolcatalogentries
    singular: toolcatalogentry
    shortNames:
      - tce
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Verified
          type: string
          jsonPath: .status.verifiedAt
        - name: Tools
          type: integer
          jsonPath: .status.toolCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - name
                - version
                - description
              properties:
                name:
                  type: string
                  description: "Canonical tool server name (e.g. aks-mcp). Must be unique per version."
                  pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
                version:
                  type: string
                  description: "Semantic version of this catalog entry (e.g. v1.2). Immutable once status.verifiedAt is set."
                  pattern: '^v[0-9]+\.[0-9]+(\.[0-9]+)?$'
                description:
                  type: string
                  description: "Human-readable description of what this tool server does."
                source:
                  type: object
                  description: "Origin of the MCP server — image or remote URL."
                  properties:
                    image:
                      type: string
                      description: "OCI image reference (e.g. ghcr.io/org/aks-mcp:v1.2)"
                    url:
                      type: string
                      description: "Remote HTTPS endpoint for an already-running MCP server"
                    protocol:
                      type: string
                      enum: [STREAMABLE_HTTP, SSE]
                      default: STREAMABLE_HTTP
                maintainer:
                  type: string
                  description: "Team or individual responsible for this tool server (email or GitHub handle)."
                tags:
                  type: array
                  items:
                    type: string
                  description: "Searchable tags (e.g. [kubernetes, networking, read-only])"
            status:
              type: object
              properties:
                verifiedAt:
                  type: string
                  format: date-time
                  description: "Timestamp when platform team completed verification. Immutable once set."
                verifiedBy:
                  type: string
                  description: "Principal that wrote this status (byo-kagent-orchestrator or platform-team)."
                toolCount:
                  type: integer
                  description: "Number of tools confirmed in status.verifiedTools."
                verifiedTools:
                  type: array
                  description: "Tools confirmed present and safe after quarantine verification."
                  items:
                    type: object
                    required:
                      - name
                      - verbClassification
                    properties:
                      name:
                        type: string
                        description: "Exact tool name as returned by the MCP server."
                      description:
                        type: string
                        description: "Tool description from MCP introspection."
                      verbClassification:
                        type: string
                        enum: [read, write, exec, network, admin]
                        description: "Risk classification determined during verification."
                      dangerous:
                        type: boolean
                        default: false
                        description: "True if Kyverno mcp-dangerous-verb policy flagged this tool."
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        enum: [Verified, Quarantined, DangerousVerbs]
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
