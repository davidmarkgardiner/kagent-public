# OIDC Issuer Discovery Job
# Discovers OIDC issuer URLs for all AKS clusters in engineering resource groups
# and writes them to a ConfigMap that ASO FederatedIdentityCredentials can reference.
#
# Run on the management cluster (where ASO is installed).
# The ConfigMap is consumed by FederatedIdentityCredential resources via issuerFromConfig.
#
# REPLACE before deploying:
#   - RESOURCE_GROUP_PATTERN: regex pattern matching your engineering RGs (e.g. "rg-eng-*")
#   - SUBSCRIPTION_ID: your Azure subscription ID
#   - Image: replace with your private registry image
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oidc-discovery
  namespace: azureserviceoperator-system
  labels:
    app.kubernetes.io/name: oidc-discovery
    app.kubernetes.io/component: workload-identity
    azure.workload.identity/use: "true"
  annotations:
    # UAMI that has Reader on the subscription or resource groups
    azure.workload.identity/client-id: "<UAMI_CLIENT_ID>"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oidc-discovery-configmap-writer
  namespace: azureserviceoperator-system
  labels:
    app.kubernetes.io/name: oidc-discovery
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc-discovery-configmap-writer
  namespace: azureserviceoperator-system
  labels:
    app.kubernetes.io/name: oidc-discovery
subjects:
  - kind: ServiceAccount
    name: oidc-discovery
    namespace: azureserviceoperator-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oidc-discovery-configmap-writer
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: oidc-discovery
  namespace: azureserviceoperator-system
  labels:
    app.kubernetes.io/name: oidc-discovery
    app.kubernetes.io/component: workload-identity
  annotations:
    description: "Discovers OIDC issuer URLs for AKS clusters and writes to ConfigMap"
spec:
  schedule: "0 */6 * * *"  # Every 6 hours (OIDC endpoints rarely change)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: oidc-discovery
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: oidc-discovery
          restartPolicy: Never
          containers:
            - name: discover
              image: mcr.microsoft.com/azure-cli:latest  # REPLACE with private registry
              env:
                # Comma-separated list of resource groups to scan
                - name: RESOURCE_GROUPS
                  value: "rg-eng-dev,rg-eng-staging,rg-eng-prod"
                # OR: set a subscription and discover all AKS clusters
                # - name: SUBSCRIPTION_ID
                #   value: "<YOUR_SUBSCRIPTION_ID>"
                # - name: DISCOVER_ALL
                #   value: "true"
                - name: CONFIGMAP_NAME
                  value: "aks-oidc-issuers"
                - name: CONFIGMAP_NAMESPACE
                  value: "azureserviceoperator-system"
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  log() { echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] $*"; }

                  log "=== OIDC Issuer Discovery Starting ==="

                  # Authenticate via Workload Identity (UAMI)
                  az login --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                    --service-principal \
                    -u "$AZURE_CLIENT_ID" \
                    -t "$AZURE_TENANT_ID" \
                    --output none 2>/dev/null

                  log "Azure CLI authenticated"

                  # Build the OIDC issuer map
                  declare -A ISSUERS
                  CLUSTER_COUNT=0

                  if [[ "${DISCOVER_ALL:-false}" == "true" ]]; then
                    # Discover all AKS clusters in the subscription
                    log "Discovering all AKS clusters in subscription..."
                    CLUSTERS=$(az aks list --query '[].{name:name, rg:resourceGroup}' -o tsv 2>/dev/null)
                  else
                    # Scan specific resource groups
                    CLUSTERS=""
                    IFS=',' read -ra RGS <<< "${RESOURCE_GROUPS}"
                    for RG in "${RGS[@]}"; do
                      log "Scanning resource group: ${RG}"
                      RG_CLUSTERS=$(az aks list --resource-group "${RG}" --query '[].{name:name, rg:resourceGroup}' -o tsv 2>/dev/null || true)
                      if [[ -n "$RG_CLUSTERS" ]]; then
                        CLUSTERS="${CLUSTERS}${RG_CLUSTERS}"$'\n'
                      fi
                    done
                  fi

                  # Collect OIDC issuer URLs
                  DATA_ARGS=""
                  while IFS=$'\t' read -r CLUSTER_NAME CLUSTER_RG; do
                    [[ -z "$CLUSTER_NAME" ]] && continue

                    log "Getting OIDC issuer for ${CLUSTER_RG}/${CLUSTER_NAME}..."
                    OIDC_URL=$(az aks show \
                      --name "${CLUSTER_NAME}" \
                      --resource-group "${CLUSTER_RG}" \
                      --query "oidcIssuerProfile.issuerUrl" \
                      -o tsv 2>/dev/null || true)

                    if [[ -n "$OIDC_URL" && "$OIDC_URL" != "None" ]]; then
                      # ConfigMap key format: cluster-name (dots/underscores normalised to dashes)
                      KEY=$(echo "${CLUSTER_NAME}" | tr '._' '-')
                      DATA_ARGS="${DATA_ARGS} --from-literal=${KEY}=${OIDC_URL}"
                      CLUSTER_COUNT=$((CLUSTER_COUNT + 1))
                      log "  ${KEY} = ${OIDC_URL}"
                    else
                      log "  WARN: No OIDC issuer for ${CLUSTER_NAME} (OIDC not enabled?)"
                    fi
                  done <<< "$CLUSTERS"

                  if [[ $CLUSTER_COUNT -eq 0 ]]; then
                    log "ERROR: No OIDC issuers found. Check resource groups and cluster OIDC configuration."
                    exit 1
                  fi

                  # Write ConfigMap
                  log "Writing ConfigMap ${CONFIGMAP_NAMESPACE}/${CONFIGMAP_NAME} with ${CLUSTER_COUNT} clusters..."

                  kubectl create configmap "${CONFIGMAP_NAME}" \
                    -n "${CONFIGMAP_NAMESPACE}" \
                    ${DATA_ARGS} \
                    --dry-run=client -o yaml | kubectl apply -f -

                  log "=== OIDC Discovery Complete ==="
                  log "Clusters discovered: ${CLUSTER_COUNT}"
                  log "ConfigMap: ${CONFIGMAP_NAMESPACE}/${CONFIGMAP_NAME}"

                  # Print the ConfigMap for logging
                  kubectl get configmap "${CONFIGMAP_NAME}" -n "${CONFIGMAP_NAMESPACE}" -o yaml
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
