---
# ============================================================================
# Example: External Secrets Operator on cluster "aks-eng-dev"
# (different SA, same OIDC pattern)
# ============================================================================
apiVersion: managedidentity.azure.com/v1api20230131
kind: FederatedIdentityCredential
metadata:
  name: fic-eso-eng-dev
  namespace: azureserviceoperator-system
  labels:
    app.kubernetes.io/name: workload-identity
    app.kubernetes.io/component: federated-credential
    target-cluster: aks-eng-dev
    target-service-account: external-secrets-sa
spec:
  azureName: fic_eso_eng_dev
  owner:
    name: external-secrets-identity  # Different UAMI for ESO
  audiences:
    - api://AzureADTokenExchange
  issuerFromConfig:
    name: aks-oidc-issuers
    key: aks-eng-dev
  subject: system:serviceaccount:external-secrets:external-secrets-sa
