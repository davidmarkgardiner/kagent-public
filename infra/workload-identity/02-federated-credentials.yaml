# ASO Federated Identity Credentials
# Each FederatedIdentityCredential binds a UAMI to a K8s ServiceAccount on a specific cluster
# using the OIDC issuer URL from the ConfigMap written by the discovery job.
#
# The ConfigMap key is the cluster name (normalised: dots/underscores → dashes).
# The FIC subject is: system:serviceaccount:{namespace}:{service-account-name}
#
# To add a new cluster: copy one block, change the cluster name in issuerFromConfig.name
# To add a new service account: copy one block, change subject + azureName
#
# REPLACE before deploying:
#   - owner.name: your UAMI resource name (must exist in this namespace via ASO)
#   - namespace: the ASO namespace where your UAMI lives
#   - issuerFromConfig.name: must match the key in aks-oidc-issuers ConfigMap
#   - subject: system:serviceaccount:{target-ns}:{target-sa} on the remote cluster
---
# ============================================================================
# Example: AKS-MCP on cluster "aks-eng-dev"
# Allows the aks-mcp ServiceAccount on aks-eng-dev to authenticate as UAMI
# ============================================================================
apiVersion: managedidentity.azure.com/v1api20230131
kind: FederatedIdentityCredential
metadata:
  name: fic-aks-mcp-eng-dev
  namespace: azureserviceoperator-system  # Namespace where your UAMI ASO resource lives
  labels:
    app.kubernetes.io/name: workload-identity
    app.kubernetes.io/component: federated-credential
    target-cluster: aks-eng-dev
    target-service-account: aks-mcp
spec:
  azureName: fic_aks_mcp_eng_dev  # Azure resource name (underscores, not dashes)
  owner:
    name: aks-mcp-identity  # ASO UserAssignedIdentity resource name
  audiences:
    - api://AzureADTokenExchange
  issuerFromConfig:
    name: aks-oidc-issuers  # ConfigMap written by the discovery job
    key: aks-eng-dev        # Key = cluster name (normalised)
  subject: system:serviceaccount:aks-mcp:aks-mcp  # {namespace}:{sa-name} on the target cluster

---
# ============================================================================
# Example: AKS-MCP on cluster "aks-eng-staging"
